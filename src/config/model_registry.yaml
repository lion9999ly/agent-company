# ============================================================
# 智能路由规则 (基于任务特征选择最优模型)
# ============================================================
routing_rules:
  task_model_mapping:
    # 代码类任务
    code_review: ["claude_sonnet_4_6", "gemini_2_5_flash", "cro"]
    code_generation: ["gpt_5_4", "cto", "claude_opus_4_6"]
    code_debug: ["o3", "deepseek_r1", "gpt_5_4"]

    # 架构设计类
    architecture_design: ["claude_opus_4_6", "gpt_5_4", "o3"]
    system_design: ["gpt_5_4", "claude_opus_4_6", "gemini_3_1_pro"]

    # 快速响应类
    quick_qa: ["gemini_2_5_flash", "claude_sonnet_4_6"]
    quick_summary: ["gemini_2_5_flash", "gpt_5_3"]

    # 研究分析类
    search_augmented: ["gemini_2_5_flash", "gemini_3_1_pro"]
    data_analysis: ["o3", "claude_opus_4_6", "gpt_5_4"]
    competitive_research: ["o3_deep_research", "gemini_deep_research", "cmo"]
    market_analysis: ["o3_deep_research", "gemini_deep_research", "cmo"]

    # 创意类
    creative_writing: ["claude_opus_4_6", "gpt_5_4", "gemini_3_1_pro"]
    content_generation: ["gpt_5_4", "claude_sonnet_4_6"]

    # 多语言类
    multilingual: ["gemini_3_1_pro", "qwen_3_32b"]
    chinese_task: ["qwen_3_32b", "deepseek_v3_2", "gemini_3_1_pro"]

    # 硬件类
    hardware_review: ["deepseek_v3_2", "qwen_3_32b", "o3"]

    # 复杂推理类
    complex_reasoning: ["o3", "claude_opus_4_6", "gemini_3_1_pro"]
    math_problem: ["o3", "deepseek_r1", "o3_mini"]
    logic_analysis: ["o3", "claude_opus_4_6", "deepseek_r1"]

  # 成本控制
  cost_control:
    prefer_cheaper: true
    max_cost_tier: "$$$$"
    budget_alert_threshold: 0.8

  # 降级策略
  fallback:
    enabled: true
    on_rate_limit: true
    on_timeout: true

# === 评审规则 ===
review_rules:
  critic_pass_threshold: 8.0
  require_dual_pass: true
  max_retry_count: 3

# === 工具白名单 ===
tool_whitelist:
  cpo: ["web_search", "doc_read", "state_update"]
  cto: ["code_execute", "file_write", "test_run", "web_search"]
  cmo: ["web_search", "social_media", "database_query"]
  critic: ["doc_read", "code_analyze", "web_search"]
  cro: ["code_analyze", "doc_read", "test_run"]