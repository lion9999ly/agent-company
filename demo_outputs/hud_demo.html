<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD Demo</title>
  <style>
    /* CSS Variables */
    :root {
      --color-normal: #00FF41;
      --color-caution: #FFD700;
      --color-danger: #FF0000;
      --color-info: #00BFFF;
      --color-inactive: #666666;
      --color-bg: #000000;
      --color-primary-monochrome: #00FF41;

      --font-family-primary: 'Roboto Mono', monospace;
      --font-size-base: 24px;
      --font-size-lg: calc(var(--font-size-base) * 1.5);
      --font-size-md: var(--font-size-base);
      --font-size-sm: calc(var(--font-size-base) * 0.75);
      --font-weight-normal: 400;
      --font-weight-bold: 700;

      --spacing-unit: 8px;
      --padding-sm: var(--spacing-unit);
      --padding-md: calc(var(--spacing-unit) * 2);
      --padding-lg: calc(var(--spacing-unit) * 3);
      --icon-size-sm: 24px;
      --icon-size-md: 32px;
      --icon-size-lg: 48px;
      --border-radius-sm: 4px;
    }

    /* Global Styles */
    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-bg);
      color: var(--color-normal);
      font-family: var(--font-family-primary);
      font-size: var(--font-size-md);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #hud {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-areas:
        "LT . RT"
        ". . ."
        "LB . RB";
      grid-template-rows: 1fr 1fr 1fr;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .hud-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--padding-md);
      text-align: center;
      font-size: var(--font-size-md);
      border-radius: var(--border-radius-sm);
    }

    #LT { grid-area: LT; }
    #RT { grid-area: RT; }
    #LB { grid-area: LB; }
    #RB { grid-area: RB; }

    .hud-section.dynamic {
      background-color: var(--color-inactive);
    }

    .hud-section.persistent {
      background-color: var(--color-bg);
    }

    .icon {
      width: var(--icon-size-md);
      height: var(--icon-size-md);
      background-color: var(--color-info);
      border-radius: 50%;
      margin: var(--padding-sm);
    }

    /* A/B Mode Toggle */
    #ab-toggle {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--color-bg);
      color: var(--color-normal);
      padding: var(--padding-sm) var(--padding-md);
      border-radius: var(--border-radius-sm);
      font-size: var(--font-size-sm);
      cursor: pointer;
      z-index: 10;
    }

    /* Timeline */
    #timeline {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: var(--color-inactive);
    }

    #timeline-progress {
      width: 0;
      height: 100%;
      background-color: var(--color-normal);
      transition: width 0.1s linear;
    }

    /* Event Drawer */
    #event-drawer {
      position: absolute;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background-color: var(--color-bg);
      color: var(--color-normal);
      padding: var(--padding-md);
      overflow-y: auto;
      display: none;
    }

    #event-drawer.open {
      display: block;
    }

    /* Warning Flash */
    .warning-flash {
      animation: warning-flash 1s steps(1) infinite;
    }

    @keyframes warning-flash {
      0%, 50% { background-color: var(--color-danger); }
      51%, 100% { background-color: transparent; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="LT" class="hud-section persistent">速度</div>
    <div id="RT" class="hud-section persistent">设备状态</div>
    <div id="LB" class="hud-section dynamic">通知/来电/音乐</div>
    <div id="RB" class="hud-section dynamic">导航主区</div>
  </div>

  <div id="ab-toggle">A/B 模式切换</div>
  <div id="timeline">
    <div id="timeline-progress"></div>
  </div>
  <div id="event-drawer">
    <h3>事件面板</h3>
    <ul>
      <li>事件 1</li>
      <li>事件 2</li>
      <li>事件 3</li>
    </ul>
  </div>

  <script>
    // JavaScript for HUD Demo
    const abToggle = document.getElementById('ab-toggle');
    const timelineProgress = document.getElementById('timeline-progress');
    const eventDrawer = document.getElementById('event-drawer');

    let abMode = 'A';
    abToggle.addEventListener('click', () => {
      abMode = abMode === 'A' ? 'B' : 'A';
      abToggle.textContent = `当前模式: ${abMode}`;
    });

    let timelineWidth = 0;
    setInterval(() => {
      timelineWidth = (timelineWidth + 1) % 100;
      timelineProgress.style.width = `${timelineWidth}%`;
    }, 100);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'E') {
        eventDrawer.classList.toggle('open');
      }
    });
  </script>
</body>
</html>
