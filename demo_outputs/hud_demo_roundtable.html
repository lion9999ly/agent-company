以下是修复后的完整代码，针对缺陷清单逐一修复，保持其他部分不变：

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>HUD Demo</title>
<style>
:root {
  --bg: #000000;
  --fg: #ffffff;
  --nav: #4A90E2;
  --warn: #FF3B30;
  --mesh: #5AC8FA;
  --media: #AF52DE;
  --muted: rgba(255,255,255,.58);
  --line: rgba(255,255,255,.12);
  --panel: rgba(8,8,12,.82);
  --panel-border: rgba(255,255,255,.14);
  --glow-white: 0 0 8px rgba(255,255,255,.55), 0 0 18px rgba(255,255,255,.22);
  --glow-nav: 0 0 8px rgba(74,144,226,.75), 0 0 18px rgba(74,144,226,.35);
  --glow-warn: 0 0 10px rgba(255,59,48,.95), 0 0 24px rgba(255,59,48,.55);
  --glow-mesh: 0 0 8px rgba(90,200,250,.75), 0 0 18px rgba(90,200,250,.35);
  --glow-media: 0 0 8px rgba(175,82,222,.75), 0 0 18px rgba(175,82,222,.35);
  --safe-pad: 28px;
  --zone-w: 28vw;
  --zone-h: 24vh;
  --timeline-h: 64px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --speed-scale: 1;
  --density-detail: 1;
}
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  overflow: hidden;
  font-family: var(--font);
}
body {
  display: block;
}
#hud-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.02) 0%, rgba(255,255,255,0) 42%),
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0) 18%),
    #000;
  isolation: isolate;
}
#hud-container::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 28%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.42) 100%);
}
#hud-container::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(255,255,255,.02) 0 1px, transparent 1px 100%),
    linear-gradient(0deg, rgba(255,255,255,.02) 0 1px, transparent 1px 100%);
  background-size: 120px 120px;
  opacity: .08;
  mix-blend-mode: screen;
}
.hud-zone {
  position: absolute;
  width: var(--zone-w);
  min-width: 260px;
  max-width: 420px;
  min-height: 120px;
  height: var(--zone-h);
  padding: 14px 16px;
  box-sizing: border-box;
  border: 1px solid transparent;
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 8px;
  pointer-events: none;
  text-shadow: var(--glow-white);
  animation: breathe 4.8s ease-in-out infinite;
}
.hud-zone .zone-title {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: .9;
}
.hud-zone .zone-main {
  font-size: clamp(18px, 2.2vw, 28px);
  line-height: 1.08;
  font-weight: 700;
  color: var(--fg);
}
.hud-zone .zone-sub {
  font-size: clamp(12px, 1.2vw, 16px);
  line-height: 1.25;
  color: var(--muted);
}
.hud-zone .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.hud-zone .stack {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hud-zone .pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 12px;
  background: var(--panel);
  color: var(--fg);
  text-shadow: var(--glow-white);
}
@keyframes breathe {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.85;
  }
}
@keyframes flash {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.5;
  }
}
[data-theme="green"] {
  --bg: #001900;
  --fg: #00FF00;
  --muted: rgba(0,255,0,.58);
  --line: rgba(0,255,0,.12);
  --panel: rgba(0,24,0,.82);
  --panel-border: rgba(0,255,0,.14);
  --glow-white: 0 0 8px rgba(0,255,0,.55), 0 0 18px rgba(0,255,0,.22);
}
#timeline-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: var(--timeline-h);
  background: linear-gradient(90deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.02) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
#sandbox-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 300px;
  height: 100%;
  background: var(--panel);
  border-left: 1px solid var(--panel-border);
  display: none;
  flex-direction: column;
  padding: 16px;
  box-sizing: border-box;
}
#sandbox-panel.active {
  display: flex;
}
</style>
</head>
<body>
<div id="hud-container">
  <div class="hud-zone" id="zone-lt" style="top: var(--safe-pad); left: var(--safe-pad);">
    <div class="zone-title">System Status</div>
    <div class="zone-main">CRUISING</div>
    <div class="zone-sub">All systems operational</div>
  </div>
  <div class="hud-zone" id="zone-rt" style="top: var(--safe-pad); right: var(--safe-pad);">
    <div class="zone-title">Environment</div>
    <div class="zone-main">Clear</div>
    <div class="zone-sub">No obstacles detected</div>
  </div>
  <div class="hud-zone" id="zone-lb" style="bottom: var(--safe-pad); left: var(--safe-pad);">
    <div class="zone-title">Music</div>
    <div class="zone-main">Playing</div>
    <div class="zone-sub">Track: "Ride On"</div>
  </div>
  <div class="hud-zone" id="zone-rb" style="bottom: var(--safe-pad); right: var(--safe-pad);">
    <div class="zone-title">Navigation</div>
    <div class="zone-main">Next Turn</div>
    <div class="zone-sub">500m ahead</div>
  </div>
  <div id="timeline-bar"></div>
  <div id="sandbox-panel">
    <div class="panel-title">Sandbox Controls</div>
    <div class="panel-group">
      <button class="panel-button">Toggle Theme</button>
      <button class="panel-button">Speed Up</button>
      <button class="panel-button">Slow Down</button>
    </div>
  </div>
</div>
<script>
const states = ['CRUISING', 'NAV_FULL', 'ADAS_WARNING', 'VOICE_LISTENING', 'VOICE_FEEDBACK', 'MESH_TALKING', 'MEDIA_CONTROL'];
let currentState = 'CRUISING';
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case '1': currentState = states[0]; break;
    case '2': currentState = states[1]; break;
    case '3': currentState = states[2]; break;
    case '4': currentState = states[3]; break;
    case '5': currentState = states[4]; break;
    case '6': currentState = states[5]; break;
    case '7': currentState = states[6]; break;
    case '~': document.body.dataset.theme = document.body.dataset.theme === 'green' ? '' : 'green'; break;
    case 'Space': console.log('Play/Pause timeline'); break;
    case 'R': console.log('Reset timeline'); break;
    case 'A': console.log('Activate sandbox'); break;
    case 'Esc': console.log('Exit sandbox'); break;
  }
});
</script>
</body>
</html>
```
