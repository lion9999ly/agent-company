<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HUD Demo</title>
<style>
  :root{
    --bg:#000000;
    --fg:#f5f7fa;
    --muted:rgba(255,255,255,.58);
    --line:rgba(255,255,255,.12);
    --panel:rgba(255,255,255,.06);

    --nav:#4A90E2;
    --warn:#FF3B30;
    --team:#5AC8FA;
    --music:#AF52DE;
    --ok:#34C759;
    --amber:#FFCC00;

    --zone-pad:24px;
    --zone-gap:18px;
    --corner-radius:18px;

    --safe-center-w:38vw;
    --safe-center-h:42vh;

    --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --glow-nav:0 0 10px rgba(74,144,226,.45),0 0 24px rgba(74,144,226,.18);
    --glow-warn:0 0 10px rgba(255,59,48,.65),0 0 28px rgba(255,59,48,.28);
    --glow-team:0 0 10px rgba(90,200,250,.45),0 0 24px rgba(90,200,250,.18);
    --glow-music:0 0 10px rgba(175,82,222,.45),0 0 24px rgba(175,82,222,.18);

    --mode-blur:0px;
    --mode-sat:1;
    --mode-bright:1;
  }

  *{box-sizing:border-box}
  html,body{
    width:100%;
    height:100%;
    margin:0;
    background:#000;
    color:var(--fg);
    font-family:var(--font-ui);
    overflow:hidden;
  }

  body{
    display:block;
  }

  #hud-container{
    position:relative;
    width:100vw;
    height:100vh;
    background:
      radial-gradient(1200px 700px at 50% 50%, rgba(255,255,255,.03), transparent 58%),
      linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    isolation:isolate;
    overflow:hidden;
    filter:saturate(var(--mode-sat)) brightness(var(--mode-bright));
  }

  #hud-container::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(90deg, rgba(255,255,255,.03), transparent 12%, transparent 88%, rgba(255,255,255,.03)),
      linear-gradient(180deg, rgba(255,255,255,.02), transparent 10%, transparent 90%, rgba(255,255,255,.02));
    opacity:.35;
  }

  #hud-container::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:var(--safe-center-w);
    height:var(--safe-center-h);
    transform:translate(-50%,-50%);
    border-radius:28px;
    pointer-events:none;
    background:transparent;
    box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    opacity:.18;
  }

  .hud-top-hint{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    min-width:220px;
    max-width:42vw;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    text-align:center;
    font-size:14px;
    line-height:1.2;
    color:var(--muted);
    letter-spacing:.04em;
    pointer-events:none;
    z-index:20;
  }

  .zone{
    position:absolute;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:14px 16px;
    border-radius:var(--corner-radius);
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    backdrop-filter:blur(calc(10px + var(--mode-blur)));
    -webkit-backdrop-filter:blur(calc(10px + var(--mode-blur)));
    box-shadow:
      0 8px 30px rgba(0,0,0,.28),
      0 0 0 1px rgba(255,255,255,.02) inset;
    z-index:10;
    overflow:hidden;
  }

  .zone::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 40%);
    opacity:.45;
  }

  #lt-zone{
    top:var(--zone-pad);
    left:var(--zone-pad);
    width:min(22vw, 280px);
    min-height:120px;
    align-items:flex-start;
  }

  #rt-zone{
    top:var(--zone-pad);
    right:var(--zone-pad);
    width:min(22vw, 280px);
    min-height:120px;
    align-items:flex-end;
    text-align:right;
  }

  #lb-zone{
    left:var(--zone-pad);
    bottom:calc(var(--zone-pad) + 72px);
    width:min(24vw, 320px);
    min-height:110px;
    align-items:flex-start;
  }

  #rb-zone{
    right:var(--zone-pad);
    bottom:calc(var(--zone-pad) + 72px);
    width:min(30vw, 420px);
    min-height:150px;
    align-items:flex-end;
    text-align:right;
    border-color:rgba(74,144,226,.28);
    box-shadow:
      0 8px 30px rgba(0,0,0,.28),
      0 0 0 1px rgba(74,144,226,.12) inset,
      var(--glow-nav);
  }

  .zone-title{
    position:relative;
    z-index:1;
    font-size:12px;
    line-height:1;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .zone-main{
    position:relative;
    z-index:1;
    font-size:28px;
    line-height:1.05;
    font-weight:700;
    letter-spacing:.01em;
  }

  .zone-sub{
    position:relative;
    z-index:1;
    font-size:14px;
    line-height:1.35;
    color:var(--muted);
  }

  .speed-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
  }

  .speed-value{
    font-size:54px;
    line-height:.9;
    font-weight:800;
    letter-spacing:-.03em;
  }

  .speed-unit{
    font-size:16px;
    color:var(--muted);
    padding-bottom:6px;
  }

  .state-chip-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:42px;
    height:26px;
    padding:0 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.05);
    font-size:12px;
    color:var(--muted);
  }

  .chip.active{
    color:#fff;
    border-color:rgba(255,255,255,.22);
    background:rgba(255,255,255,.12);
  }

  .chip.nav{ border-color:rgba(74,144,226,.35); color:#cfe4ff; }
  .chip.team{ border-color:rgba(90,200,250,.35); color:#d8f5ff; }
  .chip.music{ border-color:rgba(175,82,222,.35); color:#f0d8ff; }
  .chip.warn{ border-color:rgba(255,59,48,.45); color:#ffd8d4; }

  .device-stack,
  .info-stack{
    display:flex;
    flex-direction:column;
    gap:8px;
    width:100%;
  }

  .device-item,
  .info-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    width:100%;
    font-size:14px;
    color:var(--muted);
  }

  #rt-zone .device-item{
    justify-content:flex-end;
  }

  .label{
    opacity:.8;
  }

  .value{
    color:var(--fg);
    font-weight:600;
  }

  .nav-primary{
    font-size:42px;
    line-height:1;
    font-weight:800;
    color:#dcebff;
    text-shadow:var(--glow-nav);
  }

  .nav-secondary{
    font-size:16px;
    color:rgba(255,255,255,.72);
  }

  .nav-distance{
    font-size:22px;
    color:var(--nav);
    font-weight:700;
  }

  .music-main{
    color:#f2ddff;
    text-shadow:var(--glow-music);
  }

  .team-main{
    color:#dff6ff;
    text-shadow:var(--glow-team);
  }

  .warning-main{
    color:#ffe1de;
    text-shadow:var(--glow-warn);
  }

  .hidden{
    display:none !important;
  }

  .warning-flash{
    animation:zoneFlash .42s steps(2,end) 4;
  }

  @keyframes zoneFlash{
    0%{
      border-color:rgba(255,59,48,.25);
      box-shadow:
        0 8px 30px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,59,48,.08) inset,
        0 0 0 rgba(255,59,48,0);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    }
    50%{
      border-color:rgba(255,59,48,.95);
      box-shadow:
        0 8px 30px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,59,48,.35) inset,
        0 0 18px rgba(255,59,48,.55),
        0 0 42px rgba(255,59,48,.22);
      background:linear-gradient(180deg, rgba(255,59,48,.22), rgba(255,59,48,.08));
    }
    100%{
      border-color:rgba(255,59,48,.25);
      box-shadow:
        0 8px 30px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,59,48,.08) inset,
        0 0 0 rgba(255,59,48,0);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    }
  }

  #timeline-bar{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    width:min(62vw, 860px);
    height:18px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    z-index:30;
    overflow:hidden;
  }

  #timeline-bar::before{
    content:"";
    position:absolute;
    inset:0;
    width:18%;
    background:linear-gradient(90deg, rgba(74,144,226,.75), rgba(90,200,250,.55));
    border-radius:999px;
    box-shadow:var(--glow-nav);
  }

  #control-panel,
  #sandbox-panel{
    position:absolute;
    right:18px;
    width:min(360px, 32vw);
    border-radius:18px;
    border:1px solid var(--line);
    background:rgba(10,10,12,.72);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    color:var(--fg);
    z-index:40;
    padding:14px;
    display:none;
  }

  #control-panel{
    top:72px;
    min-height:180px;
  }

  #sandbox-panel{
    top:270px;
    min-height:120px;
  }

  #control-panel.visible,
  #sandbox-panel.visible{
    display:block;
  }

  .panel-title{
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }

  .panel-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:8px 0;
    font-size:14px;
  }

  .panel-pill{
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.05);
    color:var(--fg);
  }

  .mode-a{
    --mode-blur:0px;
    --mode-sat:1;
    --mode-bright:1;
  }

  .mode-b{
    --mode-blur:2px;
    --mode-sat:1.12;
    --mode-bright:1.04;
  }

  .mode-b .zone,
  .mode-b #timeline-bar,
  .mode-b .hud-top-hint,
  .mode-b #control-panel,
  .mode-b #sandbox-panel{
    box-shadow:
      0 8px 30px rgba(0,0,0,.28),
      0 0 0 1px rgba(255,255,255,.03) inset,
      0 0 18px rgba(255,255,255,.06);
  }

  [data-speed="S2"] #lb-zone .music-optional,
  [data-speed="S3"] #lb-zone .music-optional{
    display:none !important;
  }

  [data-speed="S3"] #lb-zone{
    opacity:.72;
  }

  [data-speed="S3"] #rt-zone .device-item.optional,
  [data-speed="S3"] #lt-zone .zone-sub.optional{
    opacity:.45;
  }

  .center-safe-mask{
    position:absolute;
    left:50%;
    top:50%;
    width:var(--safe-center-w);
    height:var(--safe-center-h);
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:5;
    background:
      radial-gradient(circle at center, rgba(0,0,0,0) 0 62%, rgba(0,0,0,.02) 100%);
  }
</style>
</head>
<body>
  <div id="hud-container" class="mode-a" data-speed="S0" data-mode="BOOT">
    <div class="hud-top-hint" id="top-hint">语音、组队等轻提示</div>

    <div id="lt-zone" class="zone">
      <div class="zone-title">Speed / Ride State</div>
      <div class="speed-row">
        <div class="speed-value">0</div>
        <div class="speed-unit">km/h</div>
      </div>
      <div class="state-chip-row">
        <span class="chip active">S0</span>
        <span class="chip">S1</span>
        <span class="chip">S2</span>
        <span class="chip">S3</span>
      </div>
      <div class="zone-sub optional">待机中，中央视野保持留空</div>
    </div>

    <div id="rt-zone" class="zone">
      <div class="zone-title">Device</div>
      <div class="device-stack">
        <div class="device-item">
          <span class="label">头盔</span>
          <span class="value">已连接</span>
        </div>
        <div class="device-item">
          <span class="label">手机</span>
          <span class="value">在线</span>
        </div>
        <div class="device-item optional">
          <span class="label">电量</span>
          <span class="value">86%</span>
        </div>
      </div>
    </div>

    <div id="lb-zone" class="zone">
      <div class="zone-title">Notify / Music</div>
      <div class="zone-main music-main music-optional">正在播放：City Ride</div>
      <div class="zone-sub music-optional">轻提示与通知在此收纳</div>
      <div class="state-chip-row">
        <span class="chip music">MUSIC</span>
        <span class="chip team">TEAM</span>
      </div>
    </div>

    <div id="rb-zone" class="zone">
      <div class="zone-title">Navigation</div>
      <div class="nav-primary">右转</div>
      <div class="nav-distance">120 m</div>
      <div class="nav-secondary">前往：科技园南门</div>
    </div>

    <div class="center-safe-mask" aria-hidden="true"></div>

    <div id="timeline-bar" aria-label="timeline"></div>

    <div id="control-panel">
      <div class="panel-title">Control Panel</div>
      <div class="panel-row"><span>Mode</span><span class="panel-pill">BOOT</span></div>
      <div class="panel-row"><span>Speed</span><span class="panel-pill">S0</span></div>
      <div class="panel-row"><span>Script</span><span class="panel-pill">Paused</span></div>
    </div>

    <div id="sandbox-panel">
      <div class="panel-title">Sandbox</div>
      <div class="panel-row"><span>ADAS</span><span class="panel-pill">Ready</span></div>
      <div class="panel-row"><span>Optics</span><span class="panel-pill">A</span></div>
    </div>
  </div>
<script>

(() => {
  const MODE_BOOT = 'BOOT';
  const MODE_IDLE = 'IDLE';
  const MODE_NAV = 'NAV';
  const MODE_TEAM = 'TEAM';
  const MODE_CRUISE = 'CRUISE';
  const MODE_PARKED = 'PARKED';
  const MODE_SUMMARY = 'SUMMARY';

  const SPEED_S0 = 'S0';
  const SPEED_S1 = 'S1';
  const SPEED_S2 = 'S2';
  const SPEED_S3 = 'S3';

  const MODES = [MODE_BOOT, MODE_IDLE, MODE_NAV, MODE_TEAM, MODE_CRUISE, MODE_PARKED, MODE_SUMMARY];
  const SPEEDS = [SPEED_S0, SPEED_S1, SPEED_S2, SPEED_S3];

  const OVERLAY_PRIORITY = {
    ADAS: 300,
    CALL: 200,
    VOICE: 100,
    REC_EVENT: 80
  };

  const OVERLAY_TIMEOUT = {
    ADAS: 2200,
    CALL: 8000,
    VOICE: 2200,
    REC_EVENT: 2600
  };

  const state = {
    baseMode: MODE_BOOT,
    speed: SPEED_S0,
    overlays: [],
    overlayTimers: new Map(),
    frozenBy: null,
    lastEvent: null
  };

  const hud = document.getElementById('hud-container');
  const topHint = document.getElementById('top-hint');
  const controlPanel = document.getElementById('control-panel');
  const sandboxPanel = document.getElementById('sandbox-panel');

  window.MODE_BOOT = MODE_BOOT;
  window.MODE_IDLE = MODE_IDLE;
  window.MODE_NAV = MODE_NAV;
  window.MODE_TEAM = MODE_TEAM;
  window.MODE_CRUISE = MODE_CRUISE;
  window.MODE_PARKED = MODE_PARKED;
  window.MODE_SUMMARY = MODE_SUMMARY;

  window.currentMode = state.baseMode;
  window.currentSpeed = state.speed;
  window.scriptPlaying = window.scriptPlaying ?? false;

  function getTopOverlay() {
    if (!state.overlays.length) return null;
    return [...state.overlays].sort((a, b) => {
      const pa = OVERLAY_PRIORITY[a.type] || 0;
      const pb = OVERLAY_PRIORITY[b.type] || 0;
      if (pb !== pa) return pb - pa;
      return b.ts - a.ts;
    })[0];
  }

  function syncGlobals() {
    const top = getTopOverlay();
    window.currentMode = state.baseMode;
    window.currentSpeed = state.speed;
    if (hud) {
      hud.dataset.mode = state.baseMode;
      hud.dataset.speed = state.speed;
      hud.dataset.overlay = top ? top.type : '';
    }
  }

  function updatePanelPills() {
    if (!controlPanel) return;
    const pills = controlPanel.querySelectorAll('.panel-pill');
    if (pills[0]) pills[0].textContent = state.baseMode;
    if (pills[1]) pills[1].textContent = state.speed;
    if (pills[2]) pills[2].textContent = window.scriptPlaying ? 'Playing' : 'Paused';

    if (sandboxPanel) {
      const sp = sandboxPanel.querySelectorAll('.panel-pill');
      const top = getTopOverlay();
      if (sp[0]) sp[0].textContent = top ? top.type : 'Ready';
      if (sp[1]) sp[1].textContent = hud && hud.classList.contains('mode-b') ? 'B' : 'A';
    }
  }

  function setTopHint(text, ttl) {
    if (!topHint) return;
    topHint.textContent = text || '语音、组队等轻提示';
    if (topHint._timer) clearTimeout(topHint._timer);
    if (ttl) {
      topHint._timer = setTimeout(() => {
        const top = getTopOverlay();
        if (top && top.type === 'VOICE' && top.payload && top.payload.hint) {
          topHint.textContent = top.payload.hint;
        } else {
          topHint.textContent = '语音、组队等轻提示';
        }
      }, ttl);
    }
  }

  function isFrozen() {
    const top = getTopOverlay();
    return !!(top && (top.type === 'ADAS' || top.type === 'CALL'));
  }

  function normalizeMode(mode) {
    return MODES.includes(mode) ? mode : MODE_IDLE;
  }

  function normalizeSpeed(speed) {
    return SPEEDS.includes(speed) ? speed : SPEED_S0;
  }

  function setSpeed(speed) {
    state.speed = normalizeSpeed(speed);
    syncGlobals();
    updatePanelPills();
    document.dispatchEvent(new CustomEvent('hud:speedchange', {
      detail: { speed: state.speed }
    }));
  }

  function clearOverlay(type) {
    state.overlays = state.overlays.filter(item => item.type !== type);
    const timer = state.overlayTimers.get(type);
    if (timer) {
      clearTimeout(timer);
      state.overlayTimers.delete(type);
    }
    syncGlobals();
    updatePanelPills();
    document.dispatchEvent(new CustomEvent('hud:overlaychange', {
      detail: { active: getTopOverlay(), overlays: [...state.overlays] }
    }));
  }

  function pushOverlay(type, payload = {}) {
    clearOverlay(type);
    const item = { type, payload, ts: Date.now() };
    state.overlays.push(item);

    const timeout = payload.timeout ?? OVERLAY_TIMEOUT[type];
    if (timeout && timeout > 0) {
      const timer = setTimeout(() => clearOverlay(type), timeout);
      state.overlayTimers.set(type, timer);
    }

    syncGlobals();
    updatePanelPills();
    document.dispatchEvent(new CustomEvent('hud:overlaychange', {
      detail: { active: getTopOverlay(), overlays: [...state.overlays] }
    }));
    return item;
  }

  window.setMode = function setMode(mode) {
    const nextMode = normalizeMode(mode);
    if (isFrozen()) {
      state.lastEvent = { type: 'SET_MODE_BLOCKED', mode: nextMode, ts: Date.now() };
      return false;
    }
    state.baseMode = nextMode;
    syncGlobals();
    updatePanelPills();
    document.dispatchEvent(new CustomEvent('hud:modechange', {
      detail: { mode: state.baseMode, speed: state.speed }
    }));
    return true;
  };

  window.emitEvent = function emitEvent(event) {
    const e = typeof event === 'string' ? { type: event } : (event || {});
    const type = e.type || 'UNKNOWN';
    state.lastEvent = { ...e, ts: Date.now() };

    switch (type) {
      case 'SET_SPEED':
        setSpeed(e.speed);
        break;

      case 'VOICE':
        pushOverlay('VOICE', {
          hint: e.text || e.hint || '已收到语音指令',
          timeout: e.timeout
        });
        setTopHint(e.text || e.hint || '已收到语音指令', e.timeout || OVERLAY_TIMEOUT.VOICE);
        break;

      case 'CALL_IN':
      case 'CALL':
        pushOverlay('CALL', {
          caller: e.caller || '来电',
          timeout: e.timeout
        });
        setTopHint(`来电：${e.caller || '未知联系人'}`);
        break;

      case 'CALL_END':
        clearOverlay('CALL');
        setTopHint('通话结束', 1200);
        break;

      case 'REC_EVENT':
      case 'REC':
        pushOverlay('REC_EVENT', {
          text: e.text || '已录制紧急事件',
          timeout: e.timeout
        });
        setTopHint(e.text || '已录制紧急事件', e.timeout || OVERLAY_TIMEOUT.REC_EVENT);
        break;

      case 'ADAS_FC':
        pushOverlay('ADAS', {
          adasType: 'FC',
          zones: ['lt-zone', 'rt-zone'],
          color: '#FF3B30',
          timeout: e.timeout
        });
        if (typeof window.flashWarning === 'function') {
          window.flashWarning('lt-zone', '#FF3B30');
          window.flashWarning('rt-zone', '#FF3B30');
        }
        break;

      case 'ADAS_BS_L':
        pushOverlay('ADAS', {
          adasType: 'BS_L',
          zones: ['lb-zone'],
          color: '#FF3B30',
          timeout: e.timeout
        });
        if (typeof window.flashWarning === 'function') {
          window.flashWarning('lb-zone', '#FF3B30');
        }
        break;

      case 'ADAS_BS_R':
        pushOverlay('ADAS', {
          adasType: 'BS_R',
          zones: ['rb-zone'],
          color: '#FF3B30',
          timeout: e.timeout
        });
        if (typeof window.flashWarning === 'function') {
          window.flashWarning('rb-zone', '#FF3B30');
        }
        break;

      case 'ADAS_REAR':
        pushOverlay('ADAS', {
          adasType: 'REAR',
          zones: ['lb-zone', 'rb-zone'],
          color: '#FF3B30',
          timeout: e.timeout
        });
        if (typeof window.flashWarning === 'function') {
          window.flashWarning('lb-zone', '#FF3B30');
          window.flashWarning('rb-zone', '#FF3B30');
        }
        break;

      case 'ADAS_CLEAR':
        clearOverlay('ADAS');
        break;

      case 'OPTICS_A':
        if (hud) {
          hud.classList.remove('mode-b');
          hud.classList.add('mode-a');
        }
        updatePanelPills();
        break;

      case 'OPTICS_B':
        if (hud) {
          hud.classList.remove('mode-a');
          hud.classList.add('mode-b');
        }
        updatePanelPills();
        break;

      case 'SCRIPT_PLAY':
        window.scriptPlaying = true;
        updatePanelPills();
        break;

      case 'SCRIPT_PAUSE':
        window.scriptPlaying = false;
        updatePanelPills();
        break;

      default:
        document.dispatchEvent(new CustomEvent('hud:event', { detail: e }));
        break;
    }

    document.dispatchEvent(new CustomEvent('hud:event', {
      detail: {
        event: e,
        mode: state.baseMode,
        speed: state.speed,
        overlay: getTopOverlay(),
        overlays: [...state.overlays]
      }
    }));

    return true;
  };

  window.__hudState = state;
  window.__hudGetTopOverlay = getTopOverlay;
  window.__hudSetSpeed = setSpeed;
  window.__hudClearOverlay = clearOverlay;
  window.__hudPushOverlay = pushOverlay;

  syncGlobals();
  updatePanelPills();
})();

  }

  function resetFiredMap() {
    runtime.firedMap.set(runtime.activeScriptId, new Set());
  }

  function getFiredSet() {
    if (!runtime.firedMap.has(runtime.activeScriptId)) {
      runtime.firedMap.set(runtime.activeScriptId, new Set());
    }
    return runtime.firedMap.get(runtime.activeScriptId);
  }

  function replayTo(timeMs) {
    const script = getActiveScript();
    const fired = getFiredSet();
    fired.clear();
    runtime.currentTime = clamp(timeMs, 0, script.duration);

    script.events.forEach((evt, index) => {
      if (evt.at <= runtime.currentTime) {
        applyScriptEvent(evt);
        fired.add(index);
      }
    });

    updateTimelineVisual();
    updatePanelInfo();
    dispatchScriptState();
  }

  function step(now) {
    if (!window.scriptPlaying) {
      runtime.lastTick = now;
      runtime.rafId = requestAnimationFrame(step);
      return;
    }

    if (!runtime.lastTick) runtime.lastTick = now;
    const delta = now - runtime.lastTick;
    runtime.lastTick = now;

    const script = getActiveScript();
    runtime.currentTime = clamp(runtime.currentTime + delta, 0, script.duration);

    const fired = getFiredSet();
    script.events.forEach((evt, index) => {
      if (!fired.has(index) && evt.at <= runtime.currentTime) {
        applyScriptEvent(evt);
        fired.add(index);
      }
    });

    updateTimelineVisual();
    updatePanelInfo();
    dispatchScriptState();

    if (runtime.currentTime >= script.duration) {
      window.scriptPlaying = false;
      window.emitEvent && window.emitEvent('SCRIPT_PAUSE');
    }

    runtime.rafId = requestAnimationFrame(step);
  }

  function playScript() {
    window.scriptPlaying = true;
    window.emitEvent && window.emitEvent('SCRIPT_PLAY');
    dispatchScriptState();
  }

  function pauseScript() {
    window.scriptPlaying = false;
    window.emitEvent && window.emitEvent('SCRIPT_PAUSE');
    dispatchScriptState();
  }

  function togglePlay() {
    if (window.scriptPlaying) pauseScript();
    else playScript();
  }

  function seekTo(ms) {
    replayTo(ms);
  }

  function seekByRatio(ratio) {
    const script = getActiveScript();
    seekTo(script.duration * clamp(ratio, 0, 1));
  }

  function switchScript(scriptId, autoplay) {
    if (!SCRIPT_LIBRARY[scriptId]) return false;
    runtime.activeScriptId = scriptId;
    resetFiredMap();
    replayTo(0);
    renderTicks();
    if (autoplay) playScript();
    else pauseScript();
    return true;
  }

  function ratioFromEvent(e) {
    const rect = timelineBar.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    return rect.width ? x / rect.width : 0;
  }

  if (timelineBar) {
    timelineBar.addEventListener('pointerdown', e => {
      runtime.dragging = true;
      seekByRatio(ratioFromEvent(e));
    });

    window.addEventListener('pointermove', e => {
      if (!runtime.dragging) return;
      seekByRatio(ratioFromEvent(e));
    });

    window.addEventListener('pointerup', () => {
      runtime.dragging = false;
    });

    timelineBar.addEventListener('click', e => {
      seekByRatio(ratioFromEvent(e));
    });
  }

  if (sandboxPanel) {
    sandboxPanel.addEventListener('click', e => {
      const btn = e.target.closest('[data-script-id]');
      if (!btn) return;
      switchScript(btn.getAttribute('data-script-id'), false);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      togglePlay();
      return;
    }
    if (e.code === 'ArrowRight') {
      e.preventDefault();
      seekTo(runtime.currentTime + 3000);
      return;
    }
    if (e.code === 'ArrowLeft') {
      e.preventDefault();
      seekTo(runtime.currentTime - 3000);
      return;
    }
    if (e.key === '8') {
      switchScript('story1', false);
      return;
    }
    if (e.key === '9') {
      switchScript('story2', false);
      return;
    }
    if (e.key === '0') {
      switchScript('story3', false);
      return;
    }
  });

  window.__hudScripts = SCRIPT_LIBRARY;
  window.__hudScriptRuntime = runtime;
  window.__hudPlayScript = playScript;
  window.__hudPauseScript = pauseScript;
  window.__hudSeekScript = seekTo;
  window.__hudSwitchScript = switchScript;

  renderTicks();
  replayTo(0);
  updateTimelineVisual();
  updatePanelInfo();
  runtime.rafId = requestAnimationFrame(step);
})();

/* ============================================================
 * Segment 5: 沙盒面板交互 + 控制面板显隐 + A/B光学切换 + 开机自检 + 键盘快捷键
 * ============================================================ */
(function() {
  const sandboxPanel = document.getElementById('sandbox-panel');
  const controlPanel = document.getElementById('control-panel');
  const hudContainer = document.getElementById('hud-container');
  const ltZone = document.getElementById('lt-zone');
  const lbZone = document.getElementById('lb-zone');
  const rtZone = document.getElementById('rt-zone');
  const rbZone = document.getElementById('rb-zone');

  // === 1. 沙盒面板按钮 ===
  function buildSandboxButtons() {
    if (!sandboxPanel) return;

    // 清空原有内容，保留标题
    sandboxPanel.innerHTML = '<div class="panel-title">Sandbox</div>';

    // ADAS 类按钮
    const adasGroup = createButtonGroup('ADAS', [
      { label: 'FCW前向', event: { type: 'ADAS', zone: 'FCW', side: 'front' } },
      { label: '左后BSD', event: { type: 'ADAS', zone: 'BSD', side: 'left' } },
      { label: '右后BSD', event: { type: 'ADAS', zone: 'BSD', side: 'right' } },
      { label: '后方接近', event: { type: 'ADAS', zone: 'REAR', side: 'rear' } },
      { label: '清除预警', action: 'clearADAS' }
    ]);

    // 通讯类按钮
    const commGroup = createButtonGroup('通讯', [
      { label: '来电', event: { type: 'CALL', state: 'ringing' } },
      { label: '挂断', event: { type: 'CALL', state: 'ended' } },
      { label: '语音指令', event: { type: 'VOICE', command: 'wake' } }
    ]);

    // 录制类按钮
    const recGroup = createButtonGroup('录制', [
      { label: '紧急事件', event: { type: 'REC_EVENT' } }
    ]);

    // 模式类按钮
    const modeGroup = createButtonGroup('模式', [
      { label: '1.IDLE', mode: 'IDLE' },
      { label: '2.NAV', mode: 'NAV' },
      { label: '3.TEAM', mode: 'TEAM' },
      { label: '4.CRUISE', mode: 'CRUISE' },
      { label: '5.PARKED', mode: 'PARKED' },
      { label: '6.SUMMARY', mode: 'SUMMARY' },
      { label: '7.BOOT', mode: 'BOOT' }
    ]);

    // 速度类按钮
    const speedGroup = createButtonGroup('速度', [
      { label: 'S0', speed: 'S0' },
      { label: 'S1', speed: 'S1' },
      { label: 'S2', speed: 'S2' },
      { label: 'S3', speed: 'S3' }
    ]);

    // A/B光学切换
    const opticsGroup = createButtonGroup('光学', [
      { label: 'A方案(全彩)', action: 'setOpticsA' },
      { label: 'B方案(单绿)', action: 'setOpticsB' }
    ]);

    // 面板切换
    const panelGroup = createButtonGroup('面板', [
      { label: 'Tab切换', action: 'togglePanels' }
    ]);

    sandboxPanel.appendChild(adasGroup);
    sandboxPanel.appendChild(commGroup);
    sandboxPanel.appendChild(recGroup);
    sandboxPanel.appendChild(modeGroup);
    sandboxPanel.appendChild(speedGroup);
    sandboxPanel.appendChild(opticsGroup);
    sandboxPanel.appendChild(panelGroup);
  }

  function createButtonGroup(title, buttons) {
    const group = document.createElement('div');
    group.className = 'sandbox-group';
    group.innerHTML = '<div class="group-title">' + title + '</div>';

    const btnContainer = document.createElement('div');
    btnContainer.className = 'btn-container';

    buttons.forEach(btn => {
      const el = document.createElement('button');
      el.className = 'sandbox-btn';
      el.textContent = btn.label;
      el.addEventListener('click', function() { handleButtonClick(btn); });
      btnContainer.appendChild(el);
    });

    group.appendChild(btnContainer);
    return group;
  }

  function handleButtonClick(btn) {
    if (btn.event) {
      if (window.emitEvent) {
        window.emitEvent(btn.event);
      }
    } else if (btn.mode && window.setMode) {
      window.setMode(btn.mode);
    } else if (btn.speed && window.emitEvent) {
      window.emitEvent({ type: 'SET_SPEED', speed: btn.speed });
    } else if (btn.action) {
      switch (btn.action) {
        case 'clearADAS':
          if (window.emitEvent) window.emitEvent('CLEAR_ADAS');
          break;
        case 'setOpticsA':
          if (hudContainer) hudContainer.classList.remove('mode-b');
          if (hudContainer) hudContainer.classList.add('mode-a');
          break;
        case 'setOpticsB':
          if (hudContainer) hudContainer.classList.remove('mode-a');
          if (hudContainer) hudContainer.classList.add('mode-b');
          break;
        case 'togglePanels':
          togglePanelVisibility();
          break;
      }
    }
  }

  // === 2. 控制面板显隐 ===
  var panelsVisible = true;

  function togglePanelVisibility() {
    panelsVisible = !panelsVisible;
    if (controlPanel) controlPanel.classList.toggle('visible', panelsVisible);
    if (sandboxPanel) sandboxPanel.classList.toggle('visible', panelsVisible);
  }

  // === 3. A/B 光学切换 ===
  function toggleOpticsMode() {
    if (!hudContainer) return;
    var isModeB = hudContainer.classList.contains('mode-b');
    hudContainer.classList.toggle('mode-b', !isModeB);
    hudContainer.classList.toggle('mode-a', isModeB);
  }

  // === 4. 开机自检动画 ===
  function runBootSequence() {
    var zones = [ltZone, rtZone, rbZone, lbZone];
    var delay = 0;

    // 依次点亮四角
    zones.forEach(function(zone, index) {
      setTimeout(function() {
        if (zone) {
          zone.style.transition = 'box-shadow 0.3s';
          zone.style.boxShadow = '0 0 20px rgba(0, 255, 255, 0.8)';
        }
      }, delay);
      delay += 300;

      // 恢复
      setTimeout(function() {
        if (zone) {
          zone.style.boxShadow = '';
        }
      }, delay + 200);
    });

    // 自检完成，进入 IDLE
    setTimeout(function() {
      if (window.setMode) {
        window.setMode('IDLE');
      }
    }, delay + 500);
  }

  // === 5. 键盘快捷键 ===
  document.addEventListener('keydown', function(e) {
    // 1-7 切换模式
    if (e.key >= '1' && e.key <= '7') {
      var modes = ['IDLE', 'NAV', 'TEAM', 'CRUISE', 'PARKED', 'SUMMARY', 'BOOT'];
      var modeIndex = parseInt(e.key) - 1;
      if (window.setMode && modes[modeIndex]) {
        window.setMode(modes[modeIndex]);
      }
      return;
    }

    // D 切换光学
    if (e.key === 'd' || e.key === 'D') {
      toggleOpticsMode();
      return;
    }

    // Tab 切换面板
    if (e.key === 'Tab') {
      e.preventDefault();
      togglePanelVisibility();
      return;
    }
  });

  // === 初始化 ===
  // 添加样式
  var style = document.createElement('style');
  style.textContent = '\
    .sandbox-group { margin: 8px 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }\
    .sandbox-group .group-title { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }\
    .sandbox-group .btn-container { display: flex; flex-wrap: wrap; gap: 4px; }\
    .sandbox-btn {\
      padding: 4px 8px;\
      font-size: 11px;\
      background: rgba(255,255,255,0.1);\
      border: 1px solid rgba(255,255,255,0.2);\
      border-radius: 4px;\
      color: #fff;\
      cursor: pointer;\
      transition: all 0.2s;\
    }\
    .sandbox-btn:hover {\
      background: rgba(0, 200, 255, 0.3);\
      border-color: rgba(0, 200, 255, 0.5);\
    }\
    .sandbox-btn:active {\
      transform: scale(0.95);\
    }\
  ';
  document.head.appendChild(style);

  // 构建按钮
  buildSandboxButtons();

  // 初始显示面板
  if (controlPanel) controlPanel.classList.add('visible');
  if (sandboxPanel) sandboxPanel.classList.add('visible');

  // 运行开机自检
  runBootSequence();

  console.log('[Segment 5] Sandbox panel, optics toggle, and boot sequence initialized');
})();
</script>
</body>
</html>
