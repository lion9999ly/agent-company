<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HUD Demo</title><style>
:root{
  --bg:#050608;
  --panel:rgba(255,255,255,.06);
  --panel-strong:rgba(255,255,255,.1);
  --line:rgba(255,255,255,.14);
  --text:#FFFFFF;
  --muted:rgba(255,255,255,.68);
  --dim:rgba(255,255,255,.42);

  --speed:#FFFFFF;
  --nav:#4A90E2;
  --adas:#FF3B30;
  --mesh:#5AC8FA;
  --music:#AF52DE;
  --system:#FF9500;
  --success:#34C759;

  --hud-w:min(92vw,1100px);
  --hud-h:min(58vw,620px);
  --radius:28px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --shadow:0 20px 60px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.06);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font);
  background:
    radial-gradient(circle at 50% 20%, rgba(74,144,226,.08), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(175,82,222,.06), transparent 24%),
    linear-gradient(180deg, #0a0c10 0%, #050608 100%);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:18px;
  padding:20px;
}

#hud-container{
  position:relative;
  width:var(--hud-w);
  height:var(--hud-h);
  min-height:520px;
  border-radius:var(--radius);
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
    linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.28));
  box-shadow:var(--shadow);
  isolation:isolate;
}

#hud-container::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), transparent 18%, transparent 82%, rgba(255,255,255,.02)),
    radial-gradient(circle at 50% 110%, rgba(255,255,255,.06), transparent 30%);
  pointer-events:none;
}

#hud-container::after{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.06);
  pointer-events:none;
}

.hud-top-strip{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:10%;
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 18px;
  color:var(--muted);
  font-size:13px;
  letter-spacing:.04em;
  z-index:3;
}

.hud-top-strip .status-left,
.hud-top-strip .status-right{
  display:flex;
  align-items:center;
  gap:12px;
}

.hud-center-empty{
  position:absolute;
  left:18%;
  right:18%;
  top:16%;
  bottom:22%;
  border-radius:24px;
  pointer-events:none;
}

.hud-center-empty::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  border:1px dashed rgba(255,255,255,.04);
  opacity:.35;
}

.hud-overlay-anchor{
  position:absolute;
  left:50%;
  bottom:19%;
  transform:translateX(-50%);
  min-width:220px;
  min-height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--text);
  z-index:4;
  pointer-events:none;
}

.zone{
  position:absolute;
  padding:10px 12px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
  z-index:3;
}

.zone .zone-label{
  display:block;
  font-size:10px;
  line-height:1;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:6px;
}

.zone .zone-content{
  font-size:14px;
  line-height:1.25;
  color:var(--text);
  white-space:pre-line;
}

#lt-zone{
  top:56px;
  left:18px;
  width:170px;
  min-height:72px;
}

#rt-zone{
  top:56px;
  right:18px;
  width:170px;
  min-height:72px;
  text-align:right;
}

#lb-zone{
  left:18px;
  bottom:18px;
  width:220px;
  min-height:92px;
}

#rb-zone{
  right:18px;
  bottom:18px;
  width:220px;
  min-height:92px;
  text-align:right;
}

.hud-bottom-band{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  width:min(58%, 560px);
  min-height:92px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px 18px;
  z-index:3;
}

.band-left,.band-right{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.band-title{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
}

.band-main{
  font-size:28px;
  font-weight:700;
  line-height:1;
  letter-spacing:.01em;
}

.band-sub{
  font-size:14px;
  color:var(--muted);
}

.band-speed{
  font-size:42px;
  font-weight:800;
  line-height:1;
  color:var(--speed);
}

.band-unit{
  font-size:13px;
  color:var(--dim);
  margin-top:4px;
}

.mode-idle .band-main{color:var(--speed)}
.mode-nav .band-main{color:var(--nav)}
.mode-music .band-main{color:var(--music)}
.mode-group .band-main{color:var(--mesh)}
.mode-recording .band-main{color:var(--system)}

.corner-dot{
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
  background:currentColor;
  box-shadow:0 0 10px currentColor;
}

.rec-badge{
  color:var(--adas);
  font-weight:700;
  letter-spacing:.08em;
}

.mesh-badge{color:var(--mesh)}
.nav-badge{color:var(--nav)}
.music-badge{color:var(--music)}
.sys-badge{color:var(--system)}

.warning-flash{
  animation:warningFlash .35s linear 4;
}

@keyframes warningFlash{
  0%,100%{box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 0 0 rgba(255,59,48,0)}
  50%{box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 0 0 2px rgba(255,59,48,.35), 0 0 24px rgba(255,59,48,.75)}
}

#timeline-bar{
  width:var(--hud-w);
  height:14px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
  position:relative;
}

#timeline-bar::before{
  content:"";
  position:absolute;
  inset:0;
  width:0%;
  background:linear-gradient(90deg, var(--nav), var(--mesh), var(--music));
}

#control-panel,
#sandbox-panel{
  width:calc(var(--hud-w) / 2 - 9px);
  min-height:120px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.08);
  padding:14px;
  box-shadow:var(--shadow);
}

.panels{
  width:var(--hud-w);
  display:flex;
  gap:18px;
}

.panel-title{
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:12px;
}

.button-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  appearance:none;
  border:1px solid rgba(255,255,255,.12);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  color:var(--text);
  border-radius:12px;
  padding:10px 14px;
  font:600 14px var(--font);
  cursor:pointer;
}

button:hover{background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06))}
button:active{transform:translateY(1px)}

@media (max-width: 980px){
  :root{--hud-h:min(72vw,620px)}
  .panels{flex-direction:column}
  #control-panel,#sandbox-panel{width:100%}
  .hud-bottom-band{width:min(72%,560px)}
}

@media (max-width: 720px){
  body{padding:12px}
  #lt-zone,#rt-zone{width:140px}
  #lb-zone,#rb-zone{width:180px}
  .hud-bottom-band{width:calc(100% - 36px)}
  .band-main{font-size:22px}
  .band-speed{font-size:34px}
}
</style></head><body>

<script>

(() => {
  const MODE_IDLE = 'MODE_IDLE';
  const MODE_NAVIGATING = 'MODE_NAVIGATING';
  const MODE_MUSIC_PLAYING = 'MODE_MUSIC_PLAYING';
  const MODE_GROUP_TALKING = 'MODE_GROUP_TALKING';
  const MODE_RECORDING = 'MODE_RECORDING';
  const MODE_ADAS_ALERT = 'MODE_ADAS_ALERT';
  const MODE_INCOMING_CALL = 'MODE_INCOMING_CALL';

  const SPEED_S0 = 'S0';
  const SPEED_S1 = 'S1';
  const SPEED_S2 = 'S2';
  const SPEED_S3 = 'S3';

  const BASE_MODES = [
    MODE_IDLE,
    MODE_NAVIGATING,
    MODE_MUSIC_PLAYING,
    MODE_GROUP_TALKING,
    MODE_RECORDING
  ];

  const OVERLAY_MODES = [
    MODE_ADAS_ALERT,
    MODE_INCOMING_CALL
  ];

  const MODE_PRIORITY = {
    [MODE_IDLE]: 10,
    [MODE_NAVIGATING]: 20,
    [MODE_MUSIC_PLAYING]: 20,
    [MODE_GROUP_TALKING]: 20,
    [MODE_RECORDING]: 20,
    [MODE_ADAS_ALERT]: 100,
    [MODE_INCOMING_CALL]: 110
  };

  const MODE_META = {
    [MODE_IDLE]: { type: 'base', className: 'mode-idle' },
    [MODE_NAVIGATING]: { type: 'base', className: 'mode-nav' },
    [MODE_MUSIC_PLAYING]: { type: 'base', className: 'mode-music' },
    [MODE_GROUP_TALKING]: { type: 'base', className: 'mode-group' },
    [MODE_RECORDING]: { type: 'base', className: 'mode-recording' },
    [MODE_ADAS_ALERT]: { type: 'overlay', className: 'mode-adas' },
    [MODE_INCOMING_CALL]: { type: 'overlay', className: 'mode-call' }
  };

  const state = {
    baseMode: MODE_IDLE,
    overlayStack: [],
    speedValue: 0,
    speedLevel: SPEED_S0,
    lastEvent: null
  };

  window.MODE_IDLE = MODE_IDLE;
  window.MODE_NAVIGATING = MODE_NAVIGATING;
  window.MODE_MUSIC_PLAYING = MODE_MUSIC_PLAYING;
  window.MODE_GROUP_TALKING = MODE_GROUP_TALKING;
  window.MODE_RECORDING = MODE_RECORDING;
  window.MODE_ADAS_ALERT = MODE_ADAS_ALERT;
  window.MODE_INCOMING_CALL = MODE_INCOMING_CALL;

  window.currentMode = MODE_IDLE;
  window.currentSpeed = SPEED_S0;
  window.scriptPlaying = window.scriptPlaying || false;

  window.HUD_STATE = state;
  window.HUD_MODE_PRIORITY = MODE_PRIORITY;

  function getHud() {
    return document.getElementById('hud-container');
  }

  function getOverlayAnchor() {
    return document.getElementById('overlay-anchor');
  }

  function getTopOverlay() {
    if (!state.overlayStack.length) return null;
    return state.overlayStack
      .slice()
      .sort((a, b) => MODE_PRIORITY[b] - MODE_PRIORITY[a])[0];
  }

  function resolveCurrentMode() {
    return getTopOverlay() || state.baseMode;
  }

  function normalizeMode(mode) {
    return MODE_META[mode] ? mode : MODE_IDLE;
  }

  function isBaseMode(mode) {
    return BASE_MODES.includes(mode);
  }

  function isOverlayMode(mode) {
    return OVERLAY_MODES.includes(mode);
  }

  function speedToLevel(speed) {
    const n = Math.max(0, Number(speed) || 0);
    if (n === 0) return SPEED_S0;
    if (n <= 20) return SPEED_S1;
    if (n <= 45) return SPEED_S2;
    return SPEED_S3;
  }

  function setSpeed(speed) {
    state.speedValue = Math.max(0, Number(speed) || 0);
    state.speedLevel = speedToLevel(state.speedValue);
    window.currentSpeed = state.speedLevel;
    document.dispatchEvent(new CustomEvent('hud:speedchange', {
      detail: {
        speed: state.speedValue,
        level: state.speedLevel
      }
    }));
  }

  function syncHudClass() {
    const hud = getHud();
    if (!hud) return;
    Object.values(MODE_META).forEach(meta => {
      hud.classList.remove(meta.className);
    });
    const current = resolveCurrentMode();
    const currentMeta = MODE_META[current];
    const baseMeta = MODE_META[state.baseMode];
    if (baseMeta) hud.classList.add(baseMeta.className);
    if (currentMeta && currentMeta.className !== baseMeta.className) {
      hud.classList.add(currentMeta.className);
    }
    hud.dataset.baseMode = state.baseMode;
    hud.dataset.currentMode = window.currentMode;
    hud.dataset.speedLevel = window.currentSpeed;
  }

  function syncOverlayVisual() {
    const anchor = getOverlayAnchor();
    if (!anchor) return;
    const current = getTopOverlay();
    if (!current) {
      anchor.innerHTML = '';
      anchor.style.opacity = '0';
      return;
    }
    anchor.style.opacity = '1';
    if (current === MODE_ADAS_ALERT) {
      anchor.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:18px;border:1px solid rgba(255,59,48,.45);background:linear-gradient(180deg, rgba(255,59,48,.18), rgba(255,59,48,.08));color:#FF3B30;font-weight:800;letter-spacing:.04em;"><span style="font-size:28px;">⚠</span><span>注意！</span></div>';
    } else if (current === MODE_INCOMING_CALL) {
      anchor.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:18px;border:1px solid rgba(90,200,250,.45);background:linear-gradient(180deg, rgba(90,200,250,.18), rgba(90,200,250,.08));color:#FFFFFF;font-weight:800;letter-spacing:.04em;"><span style="font-size:24px;color:#5AC8FA;">✆</span><span>来电提醒</span></div>';
    }
  }

  function syncMode() {
    window.currentMode = resolveCurrentMode();
    window.currentSpeed = state.speedLevel;
    syncHudClass();
    syncOverlayVisual();
    document.dispatchEvent(new CustomEvent('hud:modechange', {
      detail: {
        currentMode: window.currentMode,
        baseMode: state.baseMode,
        overlayStack: state.overlayStack.slice(),
        speedLevel: state.speedLevel,
        speedValue: state.speedValue
      }
    }));
  }

  window.setMode = function setMode(mode) {
    const next = normalizeMode(mode);
    if (isBaseMode(next)) {
      state.baseMode = next;
    } else if (isOverlayMode(next)) {
      state.overlayStack = state.overlayStack.filter(item => item !== next);
      state.overlayStack.push(next);
    }
    syncMode();
    return window.currentMode;
  };

  window.emitEvent = function emitEvent(event) {
    const e = typeof event === 'string' ? { type: event } : (event || {});
    const type = e.type || '';
    state.lastEvent = e;

    switch (type) {
      case 'BASE_IDLE':
        window.setMode(MODE_IDLE);
        break;
      case 'BASE_NAV':
        window.setMode(MODE_NAVIGATING);
        break;
      case 'BASE_MUSIC':
        window.setMode(MODE_MUSIC_PLAYING);
        break;
      case 'BASE_GROUP':
        window.setMode(MODE_GROUP_TALKING);
        break;
      case 'BASE_RECORD':
        window.setMode(MODE_RECORDING);
        break;
      case 'OVERLAY_ADAS':
        window.setMode(MODE_ADAS_ALERT);
        if (e.zoneId) window.flashWarning(e.zoneId, e.color || '#FF3B30');
        break;
      case 'OVERLAY_CALL':
        window.setMode(MODE_INCOMING_CALL);
        break;
      case 'CLEAR_OVERLAY':
        if (e.mode && isOverlayMode(e.mode)) {
          state.overlayStack = state.overlayStack.filter(item => item !== e.mode);
        } else {
          state.overlayStack = [];
        }
        syncMode();
        break;
      case 'SET_SPEED':
        setSpeed(e.value);
        syncMode();
        break;
      case 'SPEED_S0':
        setSpeed(0);
        syncMode();
        break;
      case 'SPEED_S1':
        setSpeed(10);
        syncMode();
        break;
      case 'SPEED_S2':
        setSpeed(30);
        syncMode();
        break;
      case 'SPEED_S3':
        setSpeed(60);
        syncMode();
        break;
      case 'PLAY_SCRIPT':
        window.scriptPlaying = true;
        document.dispatchEvent(new CustomEvent('hud:script', { detail: { playing: true } }));
        break;
      case 'PAUSE_SCRIPT':
        window.scriptPlaying = false;
        document.dispatchEvent(new CustomEvent('hud:script', { detail: { playing: false } }));
        break;
      case 'TOGGLE_SCRIPT':
        window.scriptPlaying = !window.scriptPlaying;
        document.dispatchEvent(new CustomEvent('hud:script', { detail: { playing: window.scriptPlaying } }));
        break;
      default:
        document.dispatchEvent(new CustomEvent('hud:event', { detail: e }));
        break;
    }

    return {
      currentMode: window.currentMode,
      currentSpeed: window.currentSpeed,
      scriptPlaying: window.scriptPlaying
    };
  };

  window.renderZone = window.renderZone || function renderZone(zoneId, content) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    const target = zone.querySelector('.zone-content') || zone;
    target.innerHTML = content;
  };

  window.flashWarning = window.flashWarning || function flashWarning(zoneId, color) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    const prev = zone.style.color;
    if (color) zone.style.color = color;
    zone.classList.remove('warning-flash');
    void zone.offsetWidth;
    zone.classList.add('warning-flash');
    setTimeout(() => {
      zone.classList.remove('warning-flash');
      zone.style.color = prev;
    }, 1600);
  };

  window.getSpeedLevel = speedToLevel;
  window.getCurrentOverlay = getTopOverlay;

  syncMode();
})(); 


(() => {
  const COLORS = {

    },
    MODE_NAVIGATING: {

      bandSub: '280 米 · 西山森林公园',

      rt: '预计 14:46<br>剩余 4.2 km',
      lb: 'BSD<br>左后安全',
      rb: '<span class="nav-badge">路名</span><br>枫林大道'

      hudClass: 'mode-music',
      color: COLORS.music,
      bandTitle: 'Now Playing',
      bandMain: '夜航星',
      bandSub: '歌手 · 播放中 01:24 / 03:58',
      lt: '<span class="music-badge">音乐</span> 已连接<br>语音可控',
      rt: '音量 68%<br>降噪开启',
      lb: 'BSD<br>左后安全',
      rb: '<span class="music-badge">媒体</span><br>下一首可切换'
    },
    MODE_GROUP_TALKING: {
      hudClass: 'mode-group',
      color: COLORS.mesh,
      bandTitle: 'Mesh Group',
      bandMain: '与山线小队通话中',
      bandSub: '3 人在线 · 延迟稳定',
      lt: '<span class="mesh-badge">Mesh</span> 已组队<br>频道 A-03',
      rt: '麦克风开启<br>风噪抑制',
      lb: 'BSD<br>左后安全',
      rb: '<span class="mesh-badge">队友</span><br>阿杰 / 小北 / 你'
    },
    MODE_RECORDING: {
      hudClass: 'mode-recording',
      color: COLORS.system,
      bandTitle: 'Recorder',
      bandMain: '行车记录中',
      bandSub: '1080P · 循环录制',
      lt: '存储剩余 5h<br>碰撞锁定开启',
      rt: '<span class="rec-badge">REC</span><br>录制中',
      lb: 'BSD<br>左后安全',
      rb: '<span class="sys-badge">系统</span><br>麦克风同步'
    }
  };

  const SPEED_VALUE_MAP = {
    S0: 0,
    S1: 18,
    S2: 32,
    S3: 58
  };

  const ADAS_PRESETS = {
    rightBlind: {
      zoneId: 'rb-zone',
      title: 'BSD',
      text: '右后盲区有车',
      arrow: '↗',
      label: '注意！',
      color: COLORS.adas
    },
    leftBlind: {
      zoneId: 'lb-zone',
      title: 'BSD',
      text: '左后盲区有车',
      arrow: '↖',
      label: '注意！',
      color: COLORS.adas
    },
    leftDoor: {
      zoneId: 'lb-zone',
      title: 'DOW',
      text: '左侧开门风险',
      arrow: '←',
      label: '注意开门杀',
      color: COLORS.adas
    },
    frontCollision: {
      zoneId: 'rt-zone',
      title: 'FCW',
      text: '前方碰撞风险',
      arrow: '↑',
      label: '立即减速',
      color: COLORS.adas
    }
  };

  const CALL_PRESET = {
    title: 'Incoming Call',
    name: '李晨',
    sub: '头盔语音接听',
    color: COLORS.mesh
  };

  const runtime = {
    adasTimer: null,
    callVisible: false,
    lastBaseMode: 'MODE_IDLE',
    adasData: null,
    callData: null
  };

  function ensureBand() {
    const hud = document.getElementById('hud-container');
    if (!hud) return null;
    let band = hud.querySelector('.hud-bottom-band');
    if (band) return band;
    band = document.createElement('div');
    band.className = 'hud-bottom-band';
    band.innerHTML = `
      <div class="band-left">
        <div class="band-title">Main Info</div>
        <div class="band-main">待机巡航</div>
        <div class="band-sub">前方道路畅通</div>
      </div>
      <div class="band-right" style="align-items:flex-end;">
        <div class="band-speed">0</div>
        <div class="band-unit">km/h</div>
      </div>
    `;
    hud.appendChild(band);
    return band;
  }

  function ensureOverlayAnchor() {
    const hud = document.getElementById('hud-container');
    if (!hud) return null;
    let anchor = document.getElementById('overlay-anchor');
    if (anchor) return anchor;
    anchor = document.createElement('div');
    anchor.id = 'overlay-anchor';
    anchor.className = 'hud-overlay-anchor';
    hud.appendChild(anchor);
    return anchor;
  }

  function getSpeedNumber() {
    const level = window.currentSpeed || 'S0';
    return SPEED_VALUE_MAP[level] ?? 0;
  }

  function setBand(view) {
    const band = ensureBand();
    if (!band || !view) return;
    const title = band.querySelector('.band-title');
    const main = band.querySelector('.band-main');
    const sub = band.querySelector('.band-sub');
    const speed = band.querySelector('.band-speed');
    if (title) title.textContent = view.bandTitle;
    if (main) {
      main.textContent = view.bandMain;
      main.style.color = view.color;
    }
    if (sub) sub.textContent = view.bandSub;
    if (speed) speed.textContent = String(getSpeedNumber());
  }

  function setZoneTone(zoneId, color) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    zone.style.borderColor = 'rgba(255,255,255,.08)';
    zone.style.color = '';
    const content = zone.querySelector('.zone-content');
    if (content) content.style.color = color || COLORS.text;
  }

  function renderBase(mode) {
    const view = MODE_VIEW[mode] || MODE_VIEW.MODE_IDLE;
    runtime.lastBaseMode = mode in MODE_VIEW ? mode : runtime.lastBaseMode;

    window.renderZone('lt-zone', view.lt);
    window.renderZone('rt-zone', view.rt);
    window.renderZone('lb-zone', view.lb);
    window.renderZone('rb-zone', view.rb);

    setZoneTone('lt-zone', COLORS.muted);
    setZoneTone('rt-zone', COLORS.text);
    setZoneTone('lb-zone', COLORS.text);
    setZoneTone('rb-zone', COLORS.text);

  }

  function renderAdasOverlay(data) {
    const anchor = ensureOverlayAnchor();
    if (!anchor) return;
    const d = data || ADAS_PRESETS.rightBlind;
    anchor.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:18px;border:1px solid rgba(255,59,48,.45);background:linear-gradient(180deg, rgba(255,59,48,.18), rgba(255,59,48,.08));color:${d.color};font-weight:800;letter-spacing:.04em;box-shadow:0 0 24px rgba(255,59,48,.22);">

      </div>
    `;
    anchor.style.opacity = '1';

    window.renderZone(d.zoneId, `<span style="color:${d.color};font-weight:800;">${d.title}</span><br>${d.text}`);
    window.flashWarning(d.zoneId, d.color);
  }

  function renderCallOverlay(data) {
    const anchor = ensureOverlayAnchor();
    if (!anchor) return;
    const d = data || CALL_PRESET;
    anchor.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:18px;border:1px solid rgba(90,200,250,.45);background:linear-gradient(180deg, rgba(90,200,250,.18), rgba(90,200,250,.08));color:#FFFFFF;font-weight:800;letter-spacing:.04em;box-shadow:0 0 24px rgba(90,200,250,.18);">
        <span style="font-size:24px;line-height:1;color:${d.color};">✆</span>
        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;">
          <span style="font-size:12px;color:rgba(255,255,255,.72);font-weight:700;">${d.title}</span>
          <span style="font-size:18px;line-height:1;">${d.name}</span>
          <span style="font-size:12px;color:${d.color};font-weight:700;">${d.sub}</span>
        </div>
      </div>
    `;
    anchor.style.opacity = '1';
    window.renderZone('rt-zone', `<span style="color:${d.color};font-weight:800;">来电</span><br>${d.name}`);
  }

  function clearOverlayVisual() {
    const anchor = ensureOverlayAnchor();
    if (anchor) {
      anchor.innerHTML = '';
      anchor.style.opacity = '0';
    }
  }

  function render(mode) {
    const current = mode || window.currentMode || 'MODE_IDLE';
    const baseMode = (window.HUD_STATE && window.HUD_STATE.baseMode) || runtime.lastBaseMode || 'MODE_IDLE';
    renderBase(baseMode);

    if (current === 'MODE_ADAS_ALERT' && runtime.adasData) {
      renderAdasOverlay(runtime.adasData);
      return;
    }

    if (current === 'MODE_INCOMING_CALL' && runtime.callVisible) {
      renderCallOverlay(runtime.callData || CALL_PRESET);
      return;
    }

    clearOverlayVisual();
  }

  const originalSetMode = window.setMode;
  window.setMode = function setMode(mode) {
    const result = originalSetMode ? originalSetMode(mode) : mode;
    if (
      mode === 'MODE_IDLE' ||
      mode === 'MODE_NAVIGATING' ||
      mode === 'MODE_MUSIC_PLAYING' ||
      mode === 'MODE_GROUP_TALKING' ||
      mode === 'MODE_RECORDING'
    ) {
      runtime.lastBaseMode = mode;
    }
    render(window.currentMode);
    return result;
  };

  const originalEmitEvent = window.emitEvent;
  window.emitEvent = function emitEvent(event) {
    const e = typeof event === 'string' ? { type: event } : (event || {});
    const type = e.type || '';

    if (type === 'OVERLAY_ADAS') {
      const preset = ADAS_PRESETS[e.preset] || {
        zoneId: e.zoneId || 'rb-zone',
        title: e.title || 'ADAS',
        text: e.text || '周边风险',
        arrow: e.arrow || '⚠',
        label: e.label || '注意！',
        color: e.color || COLORS.adas
      };
      runtime.adasData = preset;
      clearTimeout(runtime.adasTimer);
      runtime.adasTimer = setTimeout(() => {
        runtime.adasData = null;
        if (window.currentMode === 'MODE_ADAS_ALERT') {
          if (originalEmitEvent) originalEmitEvent({ type: 'CLEAR_OVERLAY', mode: 'MODE_ADAS_ALERT' });
          render(window.currentMode);
        }
      }, e.duration || 2200);
    }

    if (type === 'OVERLAY_CALL') {
      runtime.callVisible = true;
      runtime.callData = {
        title: e.title || CALL_PRESET.title,
        name: e.name || CALL_PRESET.name,
        sub: e.sub || CALL_PRESET.sub,
        color: e.color || CALL_PRESET.color
      };
    }

    if (type === 'CLEAR_OVERLAY') {
      runtime.adasData = null;
      runtime.callVisible = false;
      runtime.callData = null;
      clearTimeout(runtime.adasTimer);
    }

    const result = originalEmitEvent ? originalEmitEvent(e) : null;
    render(window.currentMode);
    return result;
  };

  const originalRenderZone = window.renderZone;
  window.renderZone = function renderZone(zoneId, content) {
    if (originalRenderZone) {
      originalRenderZone(zoneId, content);
    } else {
      const zone = document.getElementById(zoneId);
      if (!zone) return;
      const target = zone.querySelector('.zone-content') || zone;
      target.innerHTML = content;
    }
  };

  const originalFlashWarning = window.flashWarning;
  window.flashWarning = function flashWarning(zoneId, color) {
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    zone.style.borderColor = color || COLORS.adas;
    zone.style.color = color || COLORS.adas;
    if (originalFlashWarning) {
      originalFlashWarning(zoneId, color || COLORS.adas);
    } else {
      zone.classList.remove('warning-flash');
      void zone.offsetWidth;
      zone.classList.add('warning-flash');
      setTimeout(() => {
        zone.classList.remove('warning-flash');
        zone.style.color = '';
        zone.style.borderColor = 'rgba(255,255,255,.08)';
      }, 1600);
    }
  };

  window.HUD_COLORS = COLORS;
  window.HUD_ADAS_PRESETS = ADAS_PRESETS;
  window.render = render;

  document.addEventListener('hud:modechange', () => render(window.currentMode));
  document.addEventListener('hud:speedchange', () => render(window.currentMode));

  render(window.currentMode || 'MODE_IDLE');
})();

(() => {
  window.currentMode = window.currentMode || 'MODE_IDLE';
  window.currentSpeed = window.currentSpeed || 'S0';
  window.scriptPlaying = !!window.scriptPlaying;

  const SPEED_LEVELS = { 0:'S0', 1:'S1', 2:'S2', 3:'S3' };
  const SPEED_NUMBERS = { S0:0, S1:18, S2:32, S3:58 };

  function normalizeSpeedLevel(value){
    if (typeof value === 'string' && /^S[0-3]$/.test(value)) return value;
    const n = Number(value) || 0;
    if (n <= 0) return 'S0';
    if (n < 24) return 'S1';
    if (n < 42) return 'S2';
    return 'S3';
  }

  window.renderZone = window.renderZone || function renderZone(zoneId, content){
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    const target = zone.querySelector('.zone-content') || zone;
    target.innerHTML = content;
  };

  window.flashWarning = window.flashWarning || function flashWarning(zoneId, color){
    const zone = document.getElementById(zoneId);
    if (!zone) return;
    zone.style.borderColor = color || '#FF3B30';
    zone.classList.remove('warning-flash');
    void zone.offsetWidth;
    zone.classList.add('warning-flash');
    setTimeout(() => {
      zone.classList.remove('warning-flash');
      zone.style.borderColor = 'rgba(255,255,255,.08)';
    }, 1600);
  };

  window.setMode = window.setMode || function setMode(mode){
    window.currentMode = mode || 'MODE_IDLE';
    document.dispatchEvent(new CustomEvent('hud:modechange', { detail:{ mode: window.currentMode } }));
    return window.currentMode;
  };

  window.emitEvent = window.emitEvent || function emitEvent(event){
    const e = typeof event === 'string' ? { type:event } : (event || {});
    if (e.type === 'SET_SPEED') {
      window.currentSpeed = normalizeSpeedLevel(e.level || e.value);
      const speedEl = document.querySelector('.band-speed');
      if (speedEl) speedEl.textContent = String(SPEED_NUMBERS[window.currentSpeed] || 0);
      document.dispatchEvent(new CustomEvent('hud:speedchange', { detail:{ speed: window.currentSpeed } }));
    }
    return e;
  };

  window.HUD_BOOT = {
    playing:false,
    timer:0,
    start(duration = 2600){
      const overlay = document.getElementById('boot-overlay');
      if (!overlay) return;
      clearTimeout(this.timer);
      this.playing = true;
      overlay.classList.remove('hidden');
      const steps = [...overlay.querySelectorAll('.boot-step')];
      const bar = overlay.querySelector('.boot-progress > span');
      const sub = overlay.querySelector('.boot-sub');
      steps.forEach((el) => {
        el.classList.remove('active','done');
        const tail = el.querySelector('span:last-child');
        if (tail) tail.textContent = '待检';
      });
      let idx = 0;
      const tick = () => {
        steps.forEach((el, i) => {
          el.classList.toggle('active', i === idx);
          if (i < idx) el.classList.add('done');
          const tail = el.querySelector('span:last-child');
          if (tail) tail.textContent = i < idx ? '通过' : (i === idx ? '检测中' : '待检');
        });
        if (bar) bar.style.width = `${((idx + 1) / steps.length) * 100}%`;
        if (sub) sub.textContent = idx >= steps.length - 1 ? '系统就绪' : '启动自检中';
        idx += 1;
        if (idx < steps.length) {
          this.timer = setTimeout(tick, duration / steps.length);
        } else {
          this.timer = setTimeout(() => {
            overlay.classList.add('hidden');
            this.playing = false;
          }, 420);
        }
      };
      tick();
    }
  };
})();
