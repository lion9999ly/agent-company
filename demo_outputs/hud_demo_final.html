<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD Demo - Smart Riding Display</title>
<style>
/* M1: 骨架 CSS - CSS变量 + 四角布局 + 全屏背景 + 预警动画 */

:root {
  --bg: #050607; --bg-zone: rgba(255,255,255,0.04);
  --c-speed: #ffffff; --c-nav: #4A90E2; --c-warn: #FF3B30;
  --c-mesh: #5AC8FA; --c-music: #AF52DE; --c-call: #34C759;
  --c-dvr: #FF9500; --c-text: #ffffff;
  --c-muted: rgba(255,255,255,0.58); --c-dim: rgba(255,255,255,0.18);
  --s-font-xl: 48px; --s-font-lg: 24px;
}

.theme-green {
  --bg: #010a02; --c-speed: #8CFF7A; --c-nav: #6dff6d; --c-warn: #b8ff7a;
  --c-mesh: #7dff9d; --c-music: #56d856; --c-call: #8fff8f;
  --c-dvr: #a0ff60; --c-text: #9dff9d;
  --c-muted: rgba(157,255,157,0.58); --c-dim: rgba(157,255,157,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--c-text); font-family: -apple-system, sans-serif; min-height: 100vh; overflow: hidden; }

#hud-root { width: 100vw; height: 100vh; position: relative; }

.zone { position: absolute; padding: 24px; min-width: 180px; max-width: 280px; opacity: 0; transition: opacity 0.3s; }
#zone-lt { top: 32px; left: 32px; text-align: left; }
#zone-rt { top: 32px; right: 32px; text-align: right; }
#zone-lb { bottom: 80px; left: 32px; text-align: left; }
#zone-rb { bottom: 80px; right: 32px; text-align: right; }

.zone-label { font-size: 10px; color: var(--c-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.zone-content { font-size: 16px; line-height: 1.5; }
.zone-content .value { font-size: 48px; font-weight: 700; color: var(--c-speed); line-height: 1; }
.zone-content .unit { font-size: 14px; color: var(--c-muted); margin-left: 4px; }

#center-clear { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40%; height: 40%; }

#bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 48px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); display: flex; justify-content: space-between; align-items: center; padding: 0 32px; font-size: 14px; color: var(--c-muted); z-index: 100; opacity: 0; transition: opacity 0.3s; }

#timeline { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); width: 60%; max-width: 600px; display: flex; align-items: center; gap: 12px; z-index: 90; }
#timeline-progress { flex: 1; height: 4px; background: var(--c-dim); border-radius: 2px; overflow: hidden; cursor: pointer; }
#timeline-progress .bar { height: 100%; background: var(--c-text); width: 0%; transition: width 0.1s linear; }
#timeline-label { font-size: 12px; color: var(--c-muted); min-width: 80px; }

@keyframes warn-flash { 0%, 100% { box-shadow: 0 0 0 2px var(--c-warn), 0 0 20px var(--c-warn); } 50% { box-shadow: 0 0 0 4px var(--c-warn), 0 0 40px var(--c-warn); } }
.warn-flash { animation: warn-flash 0.5s ease-in-out infinite; border: 2px solid var(--c-warn); }

#boot-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
#boot-overlay .logo { font-size: 32px; font-weight: 700; color: var(--c-text); opacity: 0; animation: fadeIn 1s ease-out forwards; }
#boot-overlay .status { margin-top: 16px; font-size: 14px; color: var(--c-muted); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

#sandbox { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(20,20,22,0.95); border-left: 1px solid var(--c-dim); padding: 20px; overflow-y: auto; transition: right 0.3s; z-index: 200; }
#sandbox.open { right: 0; }
#sandbox .sandbox-group { margin-bottom: 16px; }
#sandbox .group-title { font-size: 12px; color: var(--c-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--c-dim); }
#sandbox .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }
#sandbox button { background: var(--bg-zone); border: 1px solid var(--c-dim); color: var(--c-text); padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; }
#sandbox button:hover { background: var(--c-dim); border-color: var(--c-muted); }

.hidden { display: none !important; }
.dim { opacity: 0.3; }
</style>
</head>
<body>

<!-- 开机覆盖层 -->
<div id="boot-overlay">
  <div class="logo">SMART HUD</div>
  <div class="status">系统初始化中...</div>
</div>

<!-- HUD 主容器 -->
<div id="hud-root">
  <!-- 左上角：速度 -->
  <div id="zone-lt" class="zone">
    <div class="zone-label">速度</div>
    <div class="zone-content" id="content-lt">
      <div class="value" id="speed-value">0</div>
      <div class="unit">km/h</div>
    </div>
  </div>

  <!-- 右上角：设备状态 -->
  <div id="zone-rt" class="zone">
    <div class="zone-label">设备</div>
    <div class="zone-content" id="content-rt">
      <span style="color:var(--c-call)">●</span> 电量 87%
      <span style="margin-left:8px;color:var(--c-nav)">●</span> 信号 良好
    </div>
  </div>

  <!-- 中央留空 -->
  <div id="center-clear"></div>

  <!-- 左下角：导航 -->
  <div id="zone-lb" class="zone">
    <div class="zone-label">导航</div>
    <div class="zone-content" id="content-lb"></div>
  </div>

  <!-- 右下角：信息 -->
  <div id="zone-rb" class="zone">
    <div class="zone-label">信息</div>
    <div class="zone-content" id="content-rb"></div>
  </div>
</div>

<!-- 底部信息栏 -->
<div id="bottom-bar">
  <div class="left">
    <span id="current-time">--:--</span>
    <span id="distance">里程: 0 km</span>
  </div>
  <div class="right">
    <span id="mode-label">骑行</span>
  </div>
</div>

<!-- 时间轴 -->
<div id="timeline">
  <div id="timeline-label">就绪</div>
  <div id="timeline-progress">
    <div class="bar" id="progress-bar"></div>
  </div>
</div>

<!-- 沙盒控制面板 -->
<div id="sandbox">
  <section data-group="adas" class="sandbox-group">
    <div class="group-title">ADAS 预警</div>
    <div class="btn-row">
      <button data-event="warn-front">前方碰撞</button>
      <button data-event="warn-left">左后盲区</button>
      <button data-event="warn-right">右后盲区</button>
    </div>
  </section>
  <section data-group="comm" class="sandbox-group">
    <div class="group-title">通信</div>
    <div class="btn-row">
      <button data-event="call-zhang">来电：张三</button>
      <button data-event="mesh-join">Mesh 加入</button>
    </div>
  </section>
  <section data-group="media" class="sandbox-group">
    <div class="group-title">媒体</div>
    <div class="btn-row">
      <button data-event="music-play">音乐播放</button>
      <button data-event="music-pause">暂停</button>
    </div>
  </section>
  <section data-group="nav" class="sandbox-group">
    <div class="group-title">导航</div>
    <div class="btn-row">
      <button data-event="nav-start">导航开始</button>
      <button data-event="nav-arrive">到达</button>
    </div>
  </section>
  <section data-group="dvr" class="sandbox-group">
    <div class="group-title">录制</div>
    <div class="btn-row">
      <button data-event="dvr-start">开始录制</button>
      <button data-event="dvr-stop">停止</button>
    </div>
  </section>
  <section data-group="speed" class="sandbox-group">
    <div class="group-title">速度</div>
    <div class="btn-row">
      <button data-event="speed-0">0 km/h</button>
      <button data-event="speed-40">40 km/h</button>
      <button data-event="speed-80">80 km/h</button>
      <button data-event="speed-120">120 km/h</button>
    </div>
  </section>
  <section data-group="scenario" class="sandbox-group">
    <div class="group-title">剧本</div>
    <div class="btn-row">
      <button data-event="scenario-commute">通勤</button>
      <button data-event="scenario-emergency">紧急</button>
      <button data-event="scenario-group">组队</button>
    </div>
  </section>
</div>

<script>
// M2: 状态机
const MODE = { CRUISE: 'cruise', NAV: 'nav', CALL: 'call', MUSIC: 'music', MESH: 'mesh', WARN: 'warn', DVR: 'dvr' };
const PRIORITY = { cruise: 0, dvr: 1, music: 2, mesh: 3, nav: 4, call: 5, warn: 6 };
let currentMode = MODE.CRUISE, currentSpeed = 0, speedLevel = 'S0', modeStack = [];

function setMode(mode) {
  // 无效 mode 检查（0 是有效值，需用 undefined 检查）
  if (PRIORITY[mode] === undefined) { return false; }
  const newPriority = PRIORITY[mode], currentPriority = PRIORITY[currentMode];
  // warn 特殊处理：立即切换，保存当前状态
  if (mode === MODE.WARN) { if (currentMode !== MODE.WARN) modeStack.push(currentMode); currentMode = mode; renderAll(); return true; }
  // cruise 特殊处理：总是可以切换到 cruise（清空栈）
  if (mode === MODE.CRUISE) { modeStack = []; currentMode = mode; renderAll(); return true; }
  // 优先级不足检查
  if (newPriority < currentPriority) { console.log(`[HUD] ${mode} 优先级不足，当前 ${currentMode}`); return false; }
  currentMode = mode; renderAll(); return true;
}
function getMode() { return currentMode; }
function getPriority(mode) { return PRIORITY[mode] || 0; }
function pushMode(mode) { modeStack.push(currentMode); currentMode = mode; renderAll(); }
function popMode() {
  if (modeStack.length > 0) {
    currentMode = modeStack.pop();
  } else {
    currentMode = MODE.CRUISE; // 栈空时恢复到 cruise
  }
  renderAll();
}
function emitEvent(event) {
  if (!event || !event.type) return;
  switch (event.type) {
    case 'warning': if (event.direction) emitWarning(event.direction); break;
    case 'speed': if (typeof event.data === 'number') setSpeed(event.data); break;
    case 'call': setMode(MODE.CALL); break;
    case 'nav': setMode(MODE.NAV); break;
    case 'music': setMode(MODE.MUSIC); break;
    case 'mesh': setMode(MODE.MESH); break;
    case 'dvr': setMode(MODE.DVR); break;
  }
}
function emitWarning(direction) {
  setMode(MODE.WARN);
  const zones = { front: ['zone-lt', 'zone-rt'], left: ['zone-lb'], right: ['zone-rb'] };
  const targetZones = zones[direction] || [];
  targetZones.forEach(id => { const el = document.getElementById(id); if (el) { el.classList.add('warn-flash'); setTimeout(() => el.classList.remove('warn-flash'), 3000); } });
  const warnMessages = { front: { type: '前方碰撞', distance: '30m' }, left: { type: '左后盲区', distance: '车辆接近' }, right: { type: '开门预警', distance: '右侧有车' } };
  const msg = warnMessages[direction] || { type: '未知预警', distance: '' };
  window._warnData = msg; renderAll();
  setTimeout(() => { if (currentMode === MODE.WARN) { popMode(); window._warnData = null; } }, 3000);
}
function setSpeed(kmh) {
  currentSpeed = kmh;
  if (kmh <= 30) speedLevel = 'S0'; else if (kmh <= 60) speedLevel = 'S1'; else if (kmh <= 100) speedLevel = 'S2'; else speedLevel = 'S3';
  renderAll();
}
function getSpeedLevel() { return speedLevel; }
window.MODE = MODE; window.PRIORITY = PRIORITY; window.setMode = setMode; window.getMode = getMode;
window.getPriority = getPriority; window.pushMode = pushMode; window.popMode = popMode;
window.emitEvent = emitEvent; window.emitWarning = emitWarning; window.setSpeed = setSpeed;
window.getSpeedLevel = getSpeedLevel;
</script>

<script>
// M3: 渲染器
const CONTENT_TEMPLATES = {
  cruise: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<span style="color:var(--c-call)">●</span> 电量 87%`, lb: () => '', rb: () => '', bottom: '就绪' },
  nav: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<div style="color:var(--c-nav)">下一路口</div><div style="font-size:24px">${window._navDistance || '200'}m</div>`, lb: () => `<div style="font-size:32px;color:var(--c-nav)">←</div>`, rb: () => `<div style="color:var(--c-muted)">ETA</div><div>${window._navETA || '5分钟'}</div>`, bottom: '导航中' },
  call: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<div style="color:var(--c-call)">📞 来电</div><div style="font-size:20px">${window._callName || '张三'}</div>`, lb: () => `<div style="color:var(--c-call)">接听</div>`, rb: () => `<div style="color:var(--c-warn)">挂断</div>`, bottom: '来电' },
  music: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => '', lb: () => `<div>${window._musicTrack || '未知'}</div><div style="color:var(--c-muted)">${window._musicArtist || ''}</div>`, rb: () => `<span style="color:var(--c-music)">▶</span>`, bottom: '音乐' },
  mesh: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<div style="color:var(--c-mesh)">👥 组队</div><div style="font-size:24px">${window._meshCount || 3}人</div>`, lb: () => `<div style="font-size:12px">最近队友</div><div>${window._meshDistance || '50'}m</div>`, rb: () => `<div style="color:var(--c-mesh)">已连接</div>`, bottom: '组队中' },
  warn: { lt: () => `<div class="value" style="color:var(--c-warn)">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<div style="color:var(--c-warn)">⚠ ${window._warnData?.type || '预警'}</div>`, lb: () => `<div>方向</div>`, rb: () => `<div>距离 ${window._warnData?.distance || '30m'}</div>`, bottom: '⚠ 注意' },
  dvr: { lt: () => `<div class="value">${currentSpeed}</div><div class="unit">km/h</div>`, rt: () => `<div style="color:var(--c-dvr)">● REC</div>`, lb: () => '', rb: () => `<div>时长 ${window._dvrTime || '00:00'}</div>`, bottom: '录制中' }
};
function renderAll() {
  const mode = getMode(), level = getSpeedLevel(), template = CONTENT_TEMPLATES[mode] || CONTENT_TEMPLATES.cruise;
  const speedEl = document.getElementById('speed-value'); if (speedEl) speedEl.textContent = currentSpeed;
  const timeEl = document.getElementById('current-time'); if (timeEl) timeEl.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const zones = ['lt', 'rt', 'lb', 'rb'];
  zones.forEach(zone => {
    const zoneEl = document.getElementById(`zone-${zone}`);
    const el = document.getElementById(`content-${zone}`);
    if (!el) return;
    // S3 高速模式：隐藏 rt/lb/rb（只保留 lt）
    if (level === 'S3' && zone !== 'lt') {
      if (zoneEl) zoneEl.style.display = 'none';
      el.innerHTML = '';
    } else {
      if (zoneEl) zoneEl.style.display = '';
      // S2 中高速：精简显示
      if (level === 'S2' && zone !== 'lt') {
        if (mode === 'warn' || zone === 'rt') el.innerHTML = template[zone] ? template[zone]() : '';
        else el.innerHTML = '';
      } else {
        el.innerHTML = template[zone] ? template[zone]() : '';
      }
    }
  });
  const bottomEl = document.getElementById('mode-label'); if (bottomEl) bottomEl.textContent = template.bottom || '骑行';
}
setInterval(() => { const el = document.getElementById('current-time'); if (el) el.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }, 1000);
window.renderAll = renderAll;
</script>

<script>
// M4: 剧本
const SCENARIOS = {
  commute: { name: '日常通勤', duration: 45000, events: [
    { time: 0, action: () => { setMode(MODE.CRUISE); setSpeed(0); } },
    { time: 3000, action: () => setSpeed(40) },
    { time: 8000, action: () => { setMode(MODE.NAV); window._navDistance = '3200'; } },
    { time: 15000, action: () => emitWarning('front') },
    { time: 25000, action: () => { setMode(MODE.CALL); window._callName = '张三'; } },
    { time: 35000, action: () => { setSpeed(0); setMode(MODE.CRUISE); } }
  ] },
  emergency: { name: '紧急场景', duration: 40000, events: [
    { time: 0, action: () => { setMode(MODE.CRUISE); setSpeed(60); } },
    { time: 5000, action: () => emitWarning('front') },
    { time: 12000, action: () => emitWarning('left') },
    { time: 20000, action: () => emitWarning('right') },
    { time: 30000, action: () => { setSpeed(30); setMode(MODE.CRUISE); } }
  ] },
  group: { name: '组队骑行', duration: 50000, events: [
    { time: 0, action: () => { setMode(MODE.CRUISE); setSpeed(45); } },
    { time: 5000, action: () => { setMode(MODE.MESH); window._meshCount = 3; } },
    { time: 15000, action: () => { setMode(MODE.DVR); window._dvrTime = '00:30'; } },
    { time: 25000, action: () => emitWarning('front') },
    { time: 40000, action: () => { setSpeed(0); setMode(MODE.CRUISE); } }
  ] }
};
let currentScenario = null, scenarioTimer = null, scenarioStartTime = 0, isPaused = false, eventIndex = 0;
function playScenario(key) {
  stopScenario(); currentScenario = SCENARIOS[key] || SCENARIOS['commute']; if (!currentScenario) return;
  scenarioStartTime = Date.now(); eventIndex = 0; isPaused = false;
  const labelEl = document.getElementById('timeline-label'); if (labelEl) labelEl.textContent = currentScenario.name;
  runScenario();
}
function runScenario() {
  if (!currentScenario || isPaused) return;
  const elapsed = Date.now() - scenarioStartTime, events = currentScenario.events;
  while (eventIndex < events.length && events[eventIndex].time <= elapsed) { events[eventIndex].action(); eventIndex++; }
  const progress = Math.min(elapsed / currentScenario.duration * 100, 100);
  const bar = document.getElementById('progress-bar'); if (bar) bar.style.width = progress + '%';
  if (elapsed >= currentScenario.duration) { stopScenario(); return; }
  scenarioTimer = setTimeout(runScenario, 100);
}
function pauseScenario() { isPaused = !isPaused; if (!isPaused) runScenario(); }
function stopScenario() { if (scenarioTimer) { clearTimeout(scenarioTimer); scenarioTimer = null; } currentScenario = null; isPaused = false; const bar = document.getElementById('progress-bar'); if (bar) bar.style.width = '0%'; const labelEl = document.getElementById('timeline-label'); if (labelEl) labelEl.textContent = '就绪'; }
window.SCENARIOS = SCENARIOS; window.playScenario = playScenario; window.pauseScenario = pauseScenario; window.stopScenario = stopScenario;
</script>

<script>
// M5: 控制
function bootSequence() {
  const overlay = document.getElementById('boot-overlay'); if (!overlay) return;
  const sandbox = document.getElementById('sandbox'); if (sandbox) sandbox.classList.remove('open');
  setMode(MODE.CRUISE); setSpeed(0); renderAll();
  setTimeout(() => { const zones = ['zone-lt', 'zone-rt', 'zone-rb', 'zone-lb']; zones.forEach((id, i) => { setTimeout(() => { const el = document.getElementById(id); if (el) el.style.opacity = '1'; }, i * 300); }); }, 1000);
  setTimeout(() => { const bottom = document.getElementById('bottom-bar'); if (bottom) bottom.style.opacity = '1'; }, 2500);
  setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }, 3000);
}
function setupSandboxEvents() {
  const sandbox = document.getElementById('sandbox'); if (!sandbox) return;
  sandbox.addEventListener('click', (e) => { const btn = e.target.closest('button[data-event]'); if (!btn) return; handleSandboxEvent(btn.dataset.event); });
}
function handleSandboxEvent(event) {
  switch (event) {
    case 'warn-front': emitWarning('front'); break;
    case 'warn-left': emitWarning('left'); break;
    case 'warn-right': emitWarning('right'); break;
    case 'call-zhang': setMode(MODE.CALL); window._callName = '张三'; renderAll(); break;
    case 'mesh-join': setMode(MODE.MESH); window._meshCount = 3; renderAll(); break;
    case 'music-play': setMode(MODE.MUSIC); window._musicTrack = '追梦人'; renderAll(); break;
    case 'music-pause': setMode(MODE.CRUISE); break;
    case 'nav-start': setMode(MODE.NAV); window._navDistance = '3200'; renderAll(); break;
    case 'nav-arrive': window._navDistance = '0 已到达'; renderAll(); break;
    case 'dvr-start': setMode(MODE.DVR); window._dvrTime = '00:00'; renderAll(); break;
    case 'dvr-stop': setMode(MODE.CRUISE); break;
    case 'speed-0': setSpeed(0); break;
    case 'speed-40': setSpeed(40); break;
    case 'speed-80': setSpeed(80); break;
    case 'speed-120': setSpeed(120); break;
    case 'scenario-commute': playScenario('commute'); break;
    case 'scenario-emergency': playScenario('emergency'); break;
    case 'scenario-group': playScenario('group'); break;
  }
}
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); if (currentScenario) pauseScenario(); else playScenario('commute'); }
  if (e.key === '1') playScenario('commute'); if (e.key === '2') playScenario('emergency'); if (e.key === '3') playScenario('group');
  if (e.key === 't' || e.key === 'T') document.body.classList.toggle('theme-green');
  if (e.key === 's' || e.key === 'S') { const sandbox = document.getElementById('sandbox'); if (sandbox) sandbox.classList.toggle('open'); }
  if (e.key === 'w' || e.key === 'W') emitWarning('front');
  if (e.key === 'a' || e.key === 'A') emitWarning('left');
  if (e.key === 'd' || e.key === 'D') emitWarning('right');
  if (e.key === 'Escape') { stopScenario(); setMode(MODE.CRUISE); setSpeed(0); renderAll(); }
});
document.addEventListener('DOMContentLoaded', () => { setupSandboxEvents(); });
window.bootSequence = bootSequence;
window.onload = bootSequence;
</script>
</body>
</html>
