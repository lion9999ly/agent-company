<body style="padding-bottom: 0px;">
    <div id="modal">

        </div>

        <div id="text">
            氓聤聽猫陆陆氓陇卤猫麓楼茂录聦猫炉路莽颅聣盲赂聙莽颅聣氓聠聧氓聢路忙聳掳氓聯娄
        </div>
        <div onclick="refresh()" id="refresh_btn">氓聢路忙聳掳 (5)</div>
    </div>

<script>
    var time = 5;
    var $toApp = $('#to_app');
    var module = getQuery('module') || '';
    var sceneType = getQuery('sceneType') || ''; // 茅隆碌茅聺垄盲陆驴莽聰篓氓聹潞忙聶炉
    setAppBtnStyle(sessionStorage.limitedConfig);
    function getQuery(name) {
        var u = window.location.search && window.location.search;
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
        var r = u.substr(u.indexOf("?") + 1).match(reg);
        return r != null ? r[2] : "";
    }
    var search = window.location.search && window.location.search.substr(1);
    var lastIndex = search.lastIndexOf('referer=');
    var refer = decodeURIComponent(search.slice(lastIndex + 8));
    var keyWord = decodeURIComponent(getQuery('keyword'));
    
    function chooseStyle(isUA) {
        if(!refer) {
            crash();
            return;
        }
        $('body').css('background', isUA ? "rgba(0,0,0,0.7)" : "#FFF");
        $('#modal').css('display', isUA ? "flex" : "none");
        $('#refresh').css('display', isUA ? "none" : "flex");
        if (!isUA) {
            var btn = $("#refresh_btn");
            var timer = setInterval(() => {
                time--;
                if (time == 0) {
                    clearInterval(timer);
                    btn.text('氓聢路忙聳掳');
                    btn.css('border-color', 'rgba(117,117,117,1)');
                    btn.css('color', '#1A1A1A');
                } else {
                    btn.text('氓聢路忙聳掳 (' + time + ')');
                }
            }, 1000)
        }
    }
    function setAppBtnStyle(config) {
        if ((config && $toApp && $toApp[0])) {
            $toApp[0].style = "background:linear-gradient(98.54deg, rgba(255, 64, 79, 1) 0%, rgba(250, 44, 25, 1) 100%)";
        }
    }
    function crash() {
        $('#refresh').css('display', "flex");
        $('#text').text('忙麓禄氓聤篓氓陇陋莽聛芦莽聢聠盲潞聠,猫炉路莽篓聧氓聬聨茅聡聧猫炉聲~');
        $('#refresh_btn').css('display', 'none');  
    }
    function setData(config) {
        if (!sceneType) {
            config.msg1 && $('#text').text(config.msg1);
            config.img1 && $('#img').css('background-image', "url(" + config.img1 + ")");
            if(!config.uaList) {
                crash();
                return;
            }
            var isHasUa = config.uaList.length && !uaList(config.uaList).length;
            if (isHasUa) {
                config.msg2 && $('#title').text(config.msg2[0]);
                config.msg2 && $('#info').text(config.msg2[1]);
                config.msg2 && $('#to_app').text(config.msg2[2]);
                config.img2 && $('#top_img').css('background-image', "url(" + config.img2 + ")");
            }
            chooseStyle(isHasUa);
        } else { 
            if (sceneType === '1') { // 氓聭陆盲赂颅莽聶戮猫隆楼氓卤聫猫聰陆氓聹潞忙聶炉
                config.img2 && $('#top_img').css('background-image', "url(" + config.img2 + ")");
                var title = '忙麓禄氓聤篓莽聛芦莽聢聠', info = '猫炉路茅聙聣猫麓颅氓聟露盲禄聳氓聲聠氓聯聛', to_app = '忙聢聭莽聼楼茅聛聯盲潞聠'; //忙聳聡忙隆聢氓聟聹氓潞聲
                if(config.msg3) {
                    title = config.msg3[0];
                    info = config.msg3[1];
                    to_app = config.msg3[2];
                }
                $('body').css('background',"rgba(0,0,0,0.7)");
                $('#title').text(title);
                $('#info').text(info);
                $('#to_app').text(to_app);
                $('#modal').css('display', 'block');
            }
        }
    }
    function getData() {
        var url = 'https://api.m.jd.com/trade/config';    
        if (module) {
            $.ajax({
                url: url,
                data: {
                    functionId: 'trade_config',
                    appid: 'm_core',
                    uuid: $.fn.cookie('visitkey') || '',
                    body: JSON.stringify({
                        platform: '3',
                        extParam: {
                            waf_module: module
                        }
                    })
                },
                dataType: 'json',
                timeout: 3000,
                xhrFields: {
                    withCredentials: true
                },
                success: function (data) {
                    if (data.code == "0" && JSON.stringify(data.body) != '{}') {
                        var config = data.body.wafConfig;
                        sessionStorage.limitedConfig = JSON.stringify(config);
                        sessionStorage.limitedTime = +new Date();
                        sessionStorage.moduleName = module;
                        setAppBtnStyle(sessionStorage.limitedConfig);
                        setData(config);
                    }
                    else {
                        crash();
                    }
                },
                error: function (xhr, type) {
                    console.log(xhr.response);
                    crash();
                }
            })
        } else {
            crash();
        }

    }
    var storageConfig = JSON.parse(sessionStorage.getItem('limitedConfig')) || null;
    if (!storageConfig || +new Date() - sessionStorage.getItem('limitedTime') >= 60000 || sessionStorage.getItem('moduleName') !== module) {
        getData();
    } else {
        setData(storageConfig);
    }
    function toAPP() {
        var skuId = '';
        var index = refer.lastIndexOf('product/');
        var storeConfig = JSON.parse(sessionStorage.limitedConfig);
        var config = storeConfig.openConfig;
        if (index !== -1) {
            var lastIndex = refer.lastIndexOf('.html');
            skuId = refer.slice(index + 8, lastIndex);
        } else {
            index = refer.lastIndexOf('wareId=');
            if (index !== -1) {
                skuId = refer.slice(index + 7);
            }
        }
        
        $.immediateOpenApp({
            M_sourcefrom: config.sourceFrom,
            inteneUrl: 'openApp.jdMobile://virtual?',
            inteneUrlParams: {
                category: 'jump',
                des: config.des,
                skuId: skuId,
                sourceType: 'h5',
                keyWord: keyWord,
                from: config.sourceFrom || "",
                sourceValue: config.sourceValue
            }
        })
    }
    function refresh() {
        if (time > 0) return;
        location.replace(unescape(refer));
    }
    /**
    * ua氓卤聫猫聰陆
    */
    function uaList(arr = []) {
        var lowUa = navigator.userAgent.toLowerCase();
        var uaArr = arr.filter(function (ua) {
            var itemUa = ua ? ua.toLowerCase() : '';
            return lowUa.indexOf(itemUa) != -1
        })
        return uaArr
    }

    $('#to_app').on('click', function () {
        if (sceneType === '1') { // 莽聶戮猫隆楼氓卤聫猫聰陆猫路鲁猫陆卢茅娄聳茅隆碌
            location.replace('https://m.jd.com/')
        } else {
            if (sessionStorage.limitedConfig) {
                toAPP();
            }
        }
    })
</script>
