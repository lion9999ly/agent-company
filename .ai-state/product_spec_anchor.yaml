# ==================== HUD 端模块 ====================
hud_modules:

  - name: 导航
    sub_features:
      - 手机地图投送（高德/百度/Google Maps）
      - 本地离线导航引擎（头盔端运行）
      - 断连时离线路线缓存兜底
      - 出发前WiFi预下载路线
      - 本地与手机导航无缝切换
      - 骑车与步行场景自动识别切换（IMU+速度判断）
      - 蜂窝通讯模块在线导航（有蜂窝时启用，无蜂窝降级离线）
      - 骑行前路线规划与预览（App端可查看全程路线/途经点/预估时间/海拔，HUD端开始导航前显示路线概览）
      - 简易导航模式（导航的极简子模式：仅显示方向箭头+距离+下一路口名，隐藏详细路线信息，适合熟悉路线时使用）
    existing_l2:
      - 路线发起与同步
      - HUD导航呈现
      - 语音导航交互
      - 偏航与重算
      - 导航控制与容错
      - 个性化导航体验
      - 导航信息展示
      - 导航交互控制
      - 导航状态管理
      - 显示安全与可读性
      - 设备与功耗联动
      - 新手引导与校准
      - 定位与路线异常
      - 网络与地图数据异常
      - 交互打断与恢复
      - 设备状态联动降级
      - 安全边界与误触防护
      - 异常记录与售后诊断

  - name: 来电
    existing_l2:
      - 来电显示
      - 来电处理
      - 通话体验
      - 安全与免打扰
      - 连接与异常处理

  - name: 音乐
    sub_features:
      - 音效模式选择（标准/摇滚/流行/古典/人声增强/重低音，参考Cardo/智驾座舱）
      - EQ均衡器自定义（高/中/低频可调）
      - 风噪补偿（骑行速度自适应调节音量和频率补偿）
      - 头盔扬声器特性优化（针对头盔封闭腔体的声学调校预设）
      - 空间音频/3D音效开关
      - 音源质量显示（蓝牙编码格式：SBC/AAC/LDAC/LC3）
    existing_l2:
      - 音乐播放控制
      - 音乐信息展示
      - 语音音乐交互
      - 音频连接与稳定性
      - 骑行场景音量管理
      - 音频焦点与打断
      - 连接异常处理
      - 功耗与热管理边界
      - 恢复与记忆机制

  - name: 消息
    sub_features:
      - 手机消息同步显示（短信、微信、WhatsApp、Line、Telegram等）
      - 海外通讯App适配（WhatsApp/Line/Telegram/Messenger）
      - 消息来源筛选与免打扰规则
    existing_l2:
      - 消息接入与同步
      - HUD提醒展示
      - 语音播报与控制
      - 安全策略与免打扰
      - 消息记录与设置
      - 隐私与数据保护

  - name: AI语音助手
    sub_features:
      - 聆听中HUD可视化状态
      - 识别处理中HUD可视化状态
      - 播报中HUD可视化状态
      - 异常/未识别HUD可视化状态
      - 离线降级状态HUD可视化
    existing_l2:
      - 唤醒与会话控制
      - 状态展示与反馈
      - 场景状态机
      - 设置与个性化
      - 数据记录与诊断
      - 骑行指令理解与执行
      - 语音反馈与多模态提示
      - 抗噪拾音与通话增强
      - 声学环境异常处理
      - 连接与资源异常处理
      - 误唤醒与误执行防护
      - 骑行安全边界控制

  - name: 信息中岛
    reference: Apple灵动岛
    sub_features:
      - 多任务并行时迷你状态聚合
      - 导航中显示音乐/FM迷你卡片
      - 队友语音活跃指示
      - 来电悬浮通知
      - 录像状态常驻角标
      - 消息通知迷你预览
      - 主卡片与中岛之间焦点切换
      - 中岛展开/收起交互
      - 中岛内容优先级排序

  # 自定义HUD显示已合并到场景模式下（HUD布局/位置/距离调节是场景模式的配置功能）

  # 简易路线已合并到导航模块下，不再作为独立模块

  - name: 主动安全预警提示
    notes: >
      本模块关注骑行中的ADAS预警（感知→提示），不包含碰撞后的SOS响应（归SOS模块）。
      AI碰撞识别归SOS模块，本模块只做碰撞前的风险预警。
    sub_features:
      - 大车预警（AI视觉识别大型车辆接近）
      - 红绿灯读秒（V2X或视觉识别）
    existing_l2:
      - 盲区监测预警
      - 后向接近风险预警
      - 预警展示与播报
      - 状态优先级与流转
      - 用户控制与配置
      - 感知异常处理
      - 系统资源边界
      - 场景边界管理
      - 提示策略与人因保护
      - 恢复与追溯
      - 功耗热管理与异常状态
      - 故障降级与记录

  - name: 组队
    sub_features:
      - 显示队友位置（L2子功能：队友位置采集与同步/HUD位置呈现/方向箭头与距离/隐私与权限控制）
      - 队友碰撞/摔车检测（队友端IMU检测剧烈冲击+突然静止→全队HUD告警+语音通知+自动定位摔车队友位置）
      - 队友摔车后全队响应流程（队长收到告警→HUD显示摔车队友位置+距离→一键导航到队友位置→队长可代触发SOS）
    existing_l2:
      - 组队建立与加入
      - 骑行中状态展示
      - 队内交互控制
      - 异常与安全提醒
      - App队伍管理
      - 队伍状态同步
      - 队内沟通控制
      - 队友位置与跟随
      - 队伍管理与安全退出
      - 成员状态异常
      - 容量与权限边界
      - 功耗与设备边界

  - name: 摄像状态
    sub_features:
      - 摄像头隐私指示灯（摄像头旁硬件级LED，录像/拍照时强制亮起，固件层控制不可软件关闭）
      - 隐私灯状态定义（录像中→红色常亮、拍照瞬间→红色闪烁、ADAS视觉处理中→橙色微亮、摄像头关闭→灯灭）
      - 隐私灯与录制状态硬件联锁（摄像头通电=隐私灯必亮，防止偷录）
      - 隐私合规说明（App端/包装上标注隐私灯用途，满足GDPR/各国隐私法规要求）
    existing_l2:
      - 录制状态显示
      - 存储与文件状态
      - 电量与温度联动
      - 连接与控制反馈
      - 取景与画面状态
      - 事件片段状态
      - 传输与同步状态

  - name: 胎温胎压
    existing_l2:
      - 数据显示
      - 异常预警
      - 设备连接与绑定
      - 交互与设置
      - 历史记录与诊断

  - name: 开机动画
    existing_l2:
      - 启动展示内容
      - 启动流程控制
      - 多端联动反馈
      - 个性化与配置管理

  - name: 速度
    existing_l2:
      - 实时速度显示
      - 超速提醒
      - 平均与峰值速度
      - 速度数据源与校准
      - 速度交互控制

  - name: 设备状态
    existing_l2:
      - 电源与续航异常
      - 充电与供电边界
      - 连接与通信异常
      - 环境与硬件边界
      - 显示与交互异常
      - 日志与售后诊断

  # 显示队友位置已合并到组队模块下，不再作为独立模块
  # SOS与紧急救援已移到 App 端模块

  - name: 生命体征与疲劳监测
    sub_features:
      - 心率异常检测与HUD告警
      - 疲劳驾驶预警（长时骑行+心率+IMU综合判断）
      - 长时骑行休息提醒（可配置间隔）
      - IMU异常姿态检测（点头/歪头）
      - 体征数据骑行后摘要
      - App端体征趋势图表

  - name: 场景模式
    sub_features:
      - 通勤模式（导航+来电+消息+速度，简洁HUD）
      - 摩旅模式（全功能，导航+组队+摄像+胎压+队友位置）
      - 赛道模式（速度+圈速+倾角+极简HUD，关闭通知）
      - 巡航模式（定速提醒+油耗/续航+最少打扰）
      - 返航模式（自动规划返程路线+剩余距离+电量预估）
      - 哨兵模式（停车监控+异动检测+通知推送+录像）
      - HUD显示自定义（用户选择各卡片显示/隐藏、卡片排列位置、信息密度档位、模式预设绑定不同显示组合）
      - HUD位置与距离调节（页面整体位置上下左右偏移、投射距离近场/远场、亮度对比度微调、首次校准向导）
    notes: 每个模式定义启用的功能组合和HUD显示内容，用户可自定义模式。HUD显示自定义归本模块管理。

  - name: 佩戴检测与电源管理
    sub_features:
      - 佩戴/取下检测（红外/电容/IMU多传感器融合）
      - 取下后自动进入低功耗待机（延迟可配置，如30秒）
      - 佩戴后自动唤醒恢复工作状态
      - 长时间取下自动关机（可配置阈值，如10分钟）
      - 充电时强制关屏但保持蓝牙连接
      - 高功耗场景自动降级规则（摄像+导航+对讲同时运行时，优先保导航、降摄像帧率）
      - 低功耗模式定义（关闭摄像/降低HUD刷新率/关闭WiFi）
      - 功耗预算智能分配（根据剩余电量和预计骑行时长动态调节）
      - App端功耗策略配置（用户可选择续航优先/性能优先/平衡）

  # 日程提醒已合并到 我的Tab → 第三方应用联动 下

  - name: 恢复出厂设置
    sub_features:
      # ---- 头盔端 ----
      - 实体按键触发恢复出厂（长按组合键10秒，防误触）
      - 恢复前二次确认（HUD显示倒计时+语音提示"即将清除所有数据"）
      - 恢复范围定义（清除：WiFi配置/蓝牙配对记录/用户偏好/HUD布局/场景模式/认证缓存）
      - 保留项定义（保留：固件版本/硬件校准数据/部件认证密钥/出厂SN）
      - 恢复过程HUD反馈（进度条+灯效提示+完成后自动重启进入配对模式）
      - 恢复后状态（等同首次开箱：进入配对模式+新手引导）
      # ---- App端 ----
      - App端远程触发恢复出厂（需输入账号密码二次验证）
      - 恢复前数据备份提醒（骑行数据/设置偏好可选云端备份）
      - 恢复后App端自动解绑设备（设备列表移除+提示重新配对）
      - 防盗场景（丢失头盔时远程恢复出厂，清除个人数据）

# ==================== App 端模块 ====================
app_modules:

  - name: 设备Tab
    sub_features:
      - 摄像参数设定（分辨率1080P/4K、帧率30/60fps、视角广角/标准、HDR开关、循环录制时长、连拍/定时拍）
      - 部件信息查看（各模组型号/SN/固件版本/认证状态/健康度/循环次数/剩余寿命预估）
      - 部件更换记录（历史更换时间线/更换原因/旧部件归档）
      - 部件保养提醒（基于使用时长/循环次数/环境条件的主动提醒）
      - 非认证部件告警详情与引导（显示具体不兼容原因/功能降级说明/官方购买入口）
    existing_l2:
      - 头盔/手机互联
      - 设备状况
      - 骑行轨迹
      - 行车记录
      - 高光时刻
      - AI剪片
      - 设备设置与升级
      - 蓝牙配对与重连
      - 设备状态展示
      - 亮度与可视性调节
      - HUD内容管理
      - 续航预估与提醒
      - 节能模式管理
      - 充电管理

  - name: 相册Tab
    sub_features:
      - 照片/视频浏览（时间线/按骑行分组）
      - 视频/照片自定义水印（品牌Logo/时间/GPS坐标/速度叠加）
      - 水印模板管理与自定义
      - 批量导出与分享
      - AI高光片段浏览
      - 云端备份（可选）

  - name: 社区
    sub_features:
      - 用户等级体系（骑行里程/互动积分/内容贡献综合升级）
      - 等级升级规则与权益说明（发帖权限/标识/专属活动）
      - 等级徽章与社区头衔展示
      - 排行榜（骑行里程/活跃度/内容热度）
    existing_l2:
      - 内容浏览
      - 互动系统
      - 用户主页
      - 内容发布
      - 社区消息

  - name: AI Tab
    sub_features:
      - AI对话助手（骑行规划/设备问答/路线推荐）
      - "AI剪片（一键成片：选模板自动生成短视频；对话式剪片：用自然语言指令编辑，如\"把第3段加速\"\"删掉中间晃动的部分\"\"加个日落滤镜\"\"配一首轻快的BGM\"，支持多轮对话逐步调整直到满意）"
      - "AI内容搜索（对话式检索素材库：\"找上周末在山路上的那段视频\"\"有没有日落时候拍的照片\"\"找到所有超速片段\"，支持按时间/地点/场景/速度/天气等多维度语义搜索，结果可直接送入AI剪片）"
      - AI骑行摘要（自动生成骑行报告）
      - AI图片增强（夜景/HDR后处理）
      - AI旅行总结（多日骑行旅程自动整合：路线地图拼接/里程统计/途经城市/天气回顾/精选照片视频/花费统计/骑行数据趋势，生成可分享的图文长页或短视频）
      - AI能力设置（模型选择/隐私设置）

  - name: 我的Tab
    notes: >
      我的Tab 是 App 的个人中心入口，包含身份认证、用户成就、手机消息同步、
      第三方应用联动（含日程提醒）、账号设置、帮助反馈等子模块。
      这些在 Leo 手工版中全部收归我的Tab 下，不再作为独立模块。
    sub_features:
      # ---- 身份认证（原独立模块，合并到此） ----
      - 账号注册与登录（手机号/邮箱/第三方登录）
      - 用户基本信息采集（昵称/头像/性别/出生日期/所在地区/骑行经验/车型，可跳过后续补）
      - 授权与隐私说明（明确告知用途，满足GDPR）
      - 信息脱敏与合规（出生日期仅存年龄段、地区仅到市级）
      - 游客模式（部分功能可用）
      # ---- 用户成就（原独立模块，合并到此） ----
      - 成就体系框架（骑行/社交/探索/安全 四大类）
      - 骑行成就（首骑/百公里/千公里/连续打卡）
      - 社交成就（首次组队/社区互动达人）
      - 探索与安全成就（新路线/跨省/连续安全天数/SOS设置完成）
      - 成就展示与分享（个人主页/社区头像框）
      - 进度追踪与提醒
      # ---- 手机消息同步（原独立模块，合并到此） ----
      - 基础消息接入（短信/微信/QQ同步显示）
      - 海外消息适配（WhatsApp/Line/Telegram/Messenger）
      - 消息筛选与优先级规则
      - 消息预览与快捷回复模板
      - 隐私模式（骑行中仅显示来源不显示内容）
      # ---- 第三方应用联动（原独立模块，合并到此，含日程提醒） ----
      - 日程提醒（访问手机日历，骑行中HUD弹窗提醒，导航联动）
      - 导航类应用联动（高德/百度投送到头盔HUD）
      - 行程与目的地导入（携程/Booking等酒店旅程App）
      - 通知筛选与转发规则
      - 运动健康数据同步（Apple Health/Google Fit）
      - 多语言切换
    existing_l2:
      - 账号与设置
      - 帮助与反馈
      - 关于设备
      - 隐私与协议
      - 数据管理
      - 安全与设备管理
      - 版本与更新

  - name: 通知中心
    sub_features:
      - 信息分类（系统通知/社交互动/设备状态）
      - 设备通知列表（设备故障/电量过低/保养提醒/哨兵模式触发/AI视频生成完成/OTA可用）
      - 通知偏好设置（各类通知开关/免打扰时段）
      - 通知历史与已读管理

  # 第三方应用联动已合并到 我的Tab 下
  # 手机消息同步已合并到 我的Tab 下

  - name: 商城
    sub_features:
      # ---- 报修与售后服务 ----
      - 在线报修工单（用户选择故障部位：HUD/摄像头/电池/耳机模组/按键/氛围灯/壳体/其他）
      - 故障描述与现场照片上传（支持多图+短视频，最大支持30MB）
      - 故障自检向导（报修前引导用户做基础排查：重启/恢复出厂/检查连接，减少无效工单）
      - 工单进度追踪（待受理→维修中→已寄出→已完成，每步有通知推送）
      - 寄修地址与物流对接（自动填充用户地址，生成寄件单，支持上门取件）
      - 维修报价确认（检测后推送报价，用户确认后才维修，支持放弃取回）
      - 保修状态自动判断（根据设备SN+购买日期+部件更换记录，自动识别在保/过保）
      # ---- 海内外售后差异 ----
      - 售后区域自动识别（根据账号注册区域/当前定位/购买渠道判断）
      - 国内售后（官方维修中心/授权服务点地图/顺丰寄修/微信客服）
      - 海外售后（区域代理商网络/当地合作维修点/国际物流寄修/邮件客服）
      - 多语言工单系统（工单内容自动翻译，国内客服可处理海外英文工单）
      - 区域化保修政策差异说明（国内1年/欧盟2年消费者权益/北美各州不同）
      - 海外RMA流程（Return Merchandise Authorization，先申请再寄回）
      - 跨境退换货物流与关税处理
    existing_l2:
