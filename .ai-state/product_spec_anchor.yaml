      - 目标追踪
      - HUD视觉呈现
      - 摄像联动可视化
      - 视觉设置与升级

  - name: 多模态交互
    existing_l2:
      - 传感器融合交互
      - 上下文感知交互
      - 多通道反馈编排
      - 低干扰操作机制
