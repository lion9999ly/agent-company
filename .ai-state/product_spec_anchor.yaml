  - name: 实体按键交互
    existing_l2:
      - 基础按键输入
      - 骑行核心控制
      - 菜单与HUD联动
      - 安全防误触
      - 反馈与可学习性

  - name: 氛围灯交互
    notes: >
      头盔有两个独立灯区：后脑勺灯（后方可见，面向后车）和眼下方灯（前下方，
      骑手余光可见+前方行人可见）。两个灯区可独立控制颜色/模式/亮度，
      也可联动协同。灯效定义表中每条灯效需标注作用灯区。
    sub_features:
      # ---- 灯区定义 ----
      - 后脑勺灯区（主要面向后方车辆/行人，安全警示为主：刹车灯/转向灯/后向告警）
      - 眼下方灯区（骑手余光可见+前方可见，状态反馈为主：配对状态/语音助手状态/通知提示）
      - 双灯区独立控制（颜色/闪烁模式/亮度可分别设置）
      - 双灯区联动模式（如SOS时全灯交替红蓝闪烁、开机时双灯呼吸）
      # ---- 安全灯效（后脑勺灯为主） ----
      - 制动灯效（IMU检测急减速→后脑勺灯高亮红色快闪）
      - 转向灯效（按键或语音触发→对应侧后脑勺灯橙色闪烁）
      - 后向告警灯效（ADAS检测后方快速接近→后脑勺灯红色高频闪烁警示后车）
      - 夜间常亮模式（后脑勺灯持续低亮度红光，提升后方可见性）
      # ---- 状态反馈灯效（眼下方灯为主） ----
      - 语音助手状态灯（聆听→蓝色呼吸、处理→蓝色快闪、错误→红色闪烁）
      - 配对状态灯（搜索→蓝色慢闪、成功→绿色脉冲、失败→红色闪烁）
      - 通知提示灯（来电→绿色闪烁、消息→白色单闪、组队请求→紫色闪烁）
      - 电量状态灯（正常→无、低电量→红色慢闪、充电中→橙色呼吸、充满→绿色常亮）
      # ---- App 配置 ----
      - App端灯效自定义（分灯区选择颜色/模式/亮度）
      - 灯效预设方案（安全优先/低调/派对/自定义）
      - 灯效与场景模式绑定（通勤→最小灯效、摩旅→全开、赛道→仅制动灯）
      # ---- 用户灯光开关权限（App设置页） ----
      - 灯效分项开关管理（用户可逐项选择开启/关闭每种灯光提示）
      - "可关闭的灯效：消息通知灯、组队请求灯、充电完成灯、配对成功灯、音乐状态灯、社交通知灯"
      - "不可关闭的灯效（安全强制项，开关灰显+说明原因）：制动灯、转向灯、后向告警灯、低电量灯、SOS灯、摄像头隐私灯"
      - 灯效静默时段设置（如22点-6点关闭非安全类灯效）
      - 一键全关非安全灯效（快捷开关，安全类灯效不受影响）
      - 关闭灯效时的确认提示（说明关闭后的影响，如"关闭消息灯后骑行中将无灯光消息提示"）
    existing_l2:
      - 基础灯效控制
      - 状态联动灯效
      - 骑行安全灯效
      - 消息与社交通知灯效
      - 个性化与配置管理

  - name: 部件识别与兼容性管理
    notes: >
      核心问题：用户更换电池/耳机模组/摄像头模组/HUD光机等部件后，头盔固件层必须能
      识别新部件身份、判断兼容性、决定功能启用或降级。参考Apple MFi认证芯片机制、
      DJI智能电池加密认证、Tesla部件配对激活模式。
    sub_features:
      # ---- 固件层（头盔端，开机/插入时自动执行） ----
      - 部件身份读取（I2C/SPI/1-Wire读取部件内置认证芯片的SN/型号/厂商/固件版本）
      - 部件认证判断（校验数字签名，区分：官方原装/官方授权第三方/未认证第三方/无法识别）
      - 功能启用策略（原装→全功能；授权第三方→全功能+提示非原装；未认证→功能降级；无法识别→安全模式）
      - 电池认证专项（未认证电池：可开机但不显示电量百分比/不显示健康度/不启用快充/HUD持续警告）
      - 耳机模组认证专项（未认证：音频可用但ANC关闭/音效EQ不可调/通话降噪降级）
      - 摄像头模组认证专项（未认证：可录像但ADAS不启用/画质参数锁定/无AI高光识别）
      - HUD光机认证专项（未认证：基础显示可用但亮度自适应关闭/色温校准不可用）
      - 部件热插拔检测（支持不关机更换的部件：耳机模组。不支持的：电池/摄像头/HUD，需关机提示）
      # ---- HUD提示层 ----
      - 新部件接入HUD通知（"检测到新电池，型号XXX，认证通过"或"检测到非认证电池，部分功能受限"）
      - 部件异常HUD告警（接触不良/通信超时/温度异常/认证芯片损坏）
      - 功能降级状态常驻提示（状态栏小图标：⚠️+受影响功能名）
      # ---- App层 ----
      - 部件信息总览页（各模组当前状态/认证状态/健康度仪表盘）
      - 非认证部件引导（说明降级原因+官方配件购买链接+授权维修点定位）
      - 部件更换向导（分步引导：关机→拆卸→安装→开机→自动识别→确认）
      - 部件固件OTA（部件自身固件可通过头盔通道升级）
      # ---- 安全与合规 ----
      - 认证日志持久化（每次部件变更记录：时间/旧SN/新SN/认证结果，用于售后追溯）
      - 非认证部件免责声明（首次检测到时弹窗确认，用户知情后可继续使用降级功能）
      - 防伪溯源（扫码验真/序列号在线查询）

  - name: 手机系统权限管理
    notes: >
      App 必须向手机系统申请的权限清单，以及权限被拒绝时的降级策略。
      iOS 和 Android 权限模型不同，需分别适配。每个权限必须有申请时机、
      用途说明文案、被拒后的功能降级方案、引导用户去系统设置开启的路径。
    sub_features:
      # ---- 必需权限（无则核心功能不可用） ----
      - "蓝牙权限（iOS CBManager / Android BLUETOOTH_CONNECT+SCAN）— 用途：头盔配对与通信。被拒→无法连接头盔，进入未连接引导页"
      - "定位权限（精确位置，始终允许或使用期间允许）— 用途：导航/轨迹/组队/SOS定位。被拒→导航不可用，轨迹不记录"
      - "通知权限 — 用途：设备状态推送/来电转发/消息同步。被拒→App后台无法推送告警"
      # ---- 重要权限（影响主要功能） ----
      - "相册存储权限（iOS PHPhotoLibrary / Android READ_MEDIA_IMAGES+VIDEO）— 用途：照片视频导入导出/水印/AI剪片。被拒→相册Tab不可用"
      - "麦克风权限 — 用途：语音助手/对讲。被拒→语音功能全部不可用"
      - "相机权限（App端扫码用）— 用途：扫描头盔二维码配对/扫码验真。被拒→手动输入SN"
      - "日历权限 — 用途：日程提醒同步。被拒→日程提醒不可用"
      - "通讯录权限（可选）— 用途：来电显示联系人姓名/SOS紧急联系人。被拒→来电只显示号码"
      # ---- 后台权限（影响持续运行） ----
      - "后台App刷新权限（iOS）/ 后台运行白名单（Android）— 用途：保持蓝牙连接/哨兵模式推送。被拒→App切后台后断连"
      - "后台定位权限（始终允许）— 用途：骑行中App切后台仍记录轨迹/SOS持续定位。被拒→切后台丢失轨迹"
      # ---- 权限申请策略 ----
      - 首次启动权限申请流程（配对前统一申请核心权限，分步说明用途，不一次弹全部）
      - 权限被拒后的降级UI（功能入口灰显+点击弹出权限说明+一键跳转系统设置）
      - 权限状态监控（每次App启动检查权限状态，权限被回收时提示用户）
      - "iOS/Android权限差异适配表（两端权限名称/申请方式/降级策略的映射）"

