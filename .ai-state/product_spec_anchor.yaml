# ==================== 分离规则 ====================
separation_rules:
  - rule: HUD表不包含纯App功能
    detail: 复杂操作、历史数据查看、内容管理、商城、社区等归App表
  - rule: 纯按键细节只放按键映射表
    detail: HUD/App功能表中提到按键交互时用"支持按键操作"一笔带过，具体映射放按键表。功能表不描述按键具体操作方式。
  - rule: 灯光效果只放灯效定义表
    detail: HUD/App功能表中提到灯光时用"灯光联动提示"一笔带过，具体定义放灯效表
  - rule: 语音指令细节放语音指令表
    detail: 功能表中用"支持语音控制"概述，具体说法/变体/反馈放语音指令表
  - rule: 每条功能区分"显示内容"和"用户操作"
    detail: >
      功能描述中明确区分用户看到什么（HUD显示的具体内容/图标/卡片）和用户做什么（触发方式/操作步骤）。
      如果一条功能同时包含显示和操作，拆成两条：一条描述显示，一条描述交互。
  - rule: 跨模块不重复
    detail: >
      同一个功能点只在一个模块中详细描述。例如"队友失联提示"只在"组队"模块中，
      不在"显示队友位置"中重复。"AI碰撞检测"只在"SOS与紧急救援"中，不在"主动安全预警"中重复。
      "导航"和"简易路线"不重复——简易路线是导航的极简模式，功能表中只描述差异点。
  - rule: 降级/规则/异常逻辑标记为研发关注
    detail: >
      功能表中涉及降级策略、规则引擎、异常处理的条目，在备注列标注"[研发]"。
      用户可见的功能标注"[设计]"。脑图中仅展示"[设计]"条目，"[研发]"条目不进脑图。

# ==================== 脑图生成规则 ====================
mindmap_rules:
  layout: tree  # 树状结构（不用圆形/径向）
  skip_mm_file: true  # 不再生成 .mm 文件
  node_color:
    design: "#4A90D9"  # 用户可见功能 — 蓝色
    dev: "#95A5A6"     # 研发逻辑/降级/规则 — 灰色（脑图中不显示）
    safety: "#E74C3C"  # 安全相关 — 红色
  dedup_across_modules: true  # 跨模块去重后再生成脑图
  max_depth: 3  # L1→L2→L3 三层

# ==================== 流程图需求 ====================
# 每个流程图生成 Mermaid 代码，嵌入 PRD HTML + 单独导出 .md 文件
# ==================== 用户故事旅程图 ====================
# 按角色画故事线，用 Mermaid journey 语法输出
# 嵌入 PRD HTML "用户旅程" Tab + Excel "用户旅程" Sheet
user_journeys:

  - role: 摩旅骑手（长途旅行用户）
    persona: 经验丰富，多日长途，重视导航/组队/记录/旅途体验
    journey:
      - stage: 出发前准备
        touchpoints:
          - App规划多日路线（途经点+住宿+加油站）
          - WiFi预下载离线地图
          - 第三方行程导入（酒店/携程/Booking）
          - 检查设备状态（电量/存储/固件/胎压计连接）
          - 创建骑行队伍邀请码
          - 设置摩旅模式（全功能HUD）
      - stage: 骑行途中
        touchpoints:
          - 摩旅模式HUD（导航+组队+摄像+胎压全开）
          - 信息中岛多任务管理（导航+音乐+队友语音）
          - 队友位置实时显示
          - 主动安全预警（大车/盲区/疲劳）
          - 语音控制拍照记录沿途风景
          - 日程提醒到达住宿点
          - AI主动提醒休息（连续骑行2小时）
      - stage: 途中休息
        touchpoints:
          - 取下头盔自动待机
          - App查看当日骑行数据
          - AI生成当日骑行摘要
          - 社区分享今日路线
          - 充电+检查明日路线
      - stage: 旅程结束
        touchpoints:
          - AI旅行总结（多日汇总地图+数据+精选影像）
          - AI剪片生成旅行短视频
          - 社区发布完整旅行帖
          - 骑行成就解锁（跨省/里程碑）

  - role: 团队领队（车队/俱乐部组织者）
    persona: 管理多人骑行活动，关注队伍安全和组织效率
    journey:
      - stage: 活动组织
        touchpoints:
          - App创建队伍+设置人数上限
          - 生成邀请码/二维码分享到群
          - 规划团骑路线+途经集合点
          - 提醒队员检查设备状态
      - stage: 出发集合
        touchpoints:
          - 确认全员在线+设备连接正常
          - HUD显示全队成员列表+电量状态
          - 队长广播出发语音
      - stage: 骑行中管理
        touchpoints:
          - HUD显示全队成员位置分布
          - 发现掉队成员自动提醒
          - 监控队员低电量/信号弱
          - 队长语音广播指令（减速/停车/变道）
          - 紧急情况一键全队SOS通知
      - stage: 活动结束
        touchpoints:
          - 团骑数据汇总（总里程/参与人数/时长）
          - AI生成团骑视频集锦
          - 社区发布活动回顾
          - 队员互评+领队积分

  - role: 周末聚会骑友（周边短途/车友聚会）
    persona: 周末约骑为主，社交属性强，喜欢拍照分享，路线不远但重体验
    journey:
      - stage: 约骑前
        touchpoints:
          - 社区看周边热门路线推荐
          - App选路线或朋友分享路线导入
          - 加入朋友创建的队伍
          - 佩戴头盔自动连接
      - stage: 骑行途中
        touchpoints:
          - 组队HUD显示队友位置
          - 队内语音闲聊
          - 到达打卡点语音拍照
          - 音乐共享（队内同步听歌）
          - 信息中岛查看队友消息
      - stage: 到达目的地/聚餐
        touchpoints:
          - 取下头盔自动待机+哨兵模式
          - 翻看今日拍摄照片视频
          - AI剪片一键生成骑行短视频
          - 分享到社区+朋友圈
      - stage: 返程
        touchpoints:
          - 返航模式自动规划回家路线
          - AI提醒天黑前注意安全
          - 到家后查看骑行成就

  - role: 日常通勤骑手（每日通勤用户）
    persona: 工作日固定路线通勤，追求高效省心，不想折腾
    journey:
      - stage: 出门上班
        touchpoints:
          - 佩戴自动开机+自动连接手机
          - AI识别上班时间+自动建议导航到公司
          - 通勤模式HUD（速度+导航+时间，极简）
          - 来电/消息HUD简要提示
      - stage: 通勤骑行中
        touchpoints:
          - HUD导航箭头+红绿灯读秒
          - 大车预警+盲区提醒
          - 音乐播放+来电自动接听
          - 日程提醒（早会9点开始）
      - stage: 到达公司
        touchpoints:
          - 取下头盔自动待机
          - App自动记录通勤里程
          - 哨兵模式监控车辆
      - stage: 下班回家
        touchpoints:
          - 佩戴头盔，AI识别下班时间自动导航回家
          - 路上顺路加油/充电提醒
          - 到家后查看当日骑行统计
          - 连续通勤打卡成就

# ==================== 主动AI场景触发表 ====================
# 头盔/App 基于上下文主动触发的 AI 行为，无需用户指令
# PRD 生成时输出为独立 Sheet "主动AI场景" + HTML Tab
ai_proactive_scenarios:

  # ---- 导航类 ----
  - scenario: 下班自动导航回家
    trigger: "用户在公司附近 + 当前时间在下班时段(可配置) + 佩戴头盔启动设备"
    action: HUD弹窗建议"导航回家？"，用户语音确认后启动
    data_needed: [常用地点（家/公司）, 用户日常时间模式, 当前GPS位置]
    user_control: 可关闭此场景/调整触发时段

  - scenario: 上班自动导航到公司
    trigger: "用户在家附近 + 工作日早间时段 + 佩戴头盔"
    action: HUD建议"导航到公司？"
    data_needed: [常用地点, 工作日判断, GPS]
    user_control: 可关闭/调整

  - scenario: 日程地点自动导航
    trigger: "日历中下一个日程有地址 + 距日程开始<60分钟 + 佩戴头盔"
    action: HUD提示"XX会议30分钟后开始，导航到XX？"
    data_needed: [日历权限, 日程地址解析, GPS]
    user_control: 可关闭日程导航联动

  - scenario: 返航路线自动规划
    trigger: "返航模式开启 或 用户距离家>50km + 电量<30%"
    action: 自动计算回家最短路线，HUD提示"建议返航，剩余电量预计可支撑XX km"
    data_needed: [家庭地址, 电量, 距离计算]
    user_control: 返航模式开关

  # ---- 安全类 ----
  - scenario: 疲劳驾驶提醒
    trigger: "连续骑行时间≥2小时（可配置）或 心率异常模式"
    action: HUD弹窗+语音"已连续骑行2小时，建议休息" + 推荐附近休息点
    data_needed: [骑行计时, 心率传感器, 附近POI]
    user_control: 可调整提醒间隔(1h/2h/3h/关闭)

  - scenario: 夜间骑行安全提醒
    trigger: "日落后仍在骑行 + 未开启夜间灯光模式"
    action: HUD提示"天色已暗，已自动开启后脑勺夜间常亮灯" + 自动调高HUD亮度
    data_needed: [日落时间API, 灯光状态, 环境光传感器]
    user_control: 可关闭自动灯光

  - scenario: 低温/高温骑行提醒
    trigger: "环境温度<5°C 或 >38°C"
    action: HUD提示温度 + 建议注意体感/设备散热
    data_needed: [温度传感器或天气API]
    user_control: 可设置温度阈值

  - scenario: SOS碰撞自动检测
    trigger: "IMU检测到剧烈冲击+突然静止+心率异常"
    action: HUD倒计时30秒→未取消则自动拨打急救+发送GPS给紧急联系人
    data_needed: [IMU, 心率, GPS, 紧急联系人]
    user_control: 倒计时时长可调，不可完全关闭

  # ---- 设备管理类 ----
  - scenario: 低电量功能降级
    trigger: "电量<20%"
    action: 自动关闭摄像/降低HUD刷新率/关闭WiFi，HUD提示"已切换省电模式"
    data_needed: [电量]
    user_control: 可选"续航优先"或"保持全功能直到没电"

  - scenario: 存储空间即将满
    trigger: "存储<500MB"
    action: HUD提示"存储即将满" + App建议传输/清理 + 自动停止循环录制最旧片段
    data_needed: [存储余量]
    user_control: 可设置自动清理策略

  - scenario: OTA升级可用提醒
    trigger: "检测到新固件 + 当前未骑行 + 电量>50% + WiFi连接"
    action: App推送+HUD下次开机提醒"新版本可用"
    data_needed: [固件版本检查API, 电量, 网络状态]
    user_control: 可选自动更新/仅提醒

  - scenario: 部件保养提醒
    trigger: "内衬使用>500小时 或 电池循环>300次 或 距上次保养>6个月"
    action: App通知中心推送保养建议 + 官方配件购买链接
    data_needed: [部件使用数据, 保养记录]
    user_control: 可调整提醒周期/关闭

  # ---- 社交类 ----
  - scenario: 到达打卡点自动提醒
    trigger: "GPS到达社区热门打卡点附近500m"
    action: HUD提示"附近有热门打卡点：XX，要拍照记录吗？"
    data_needed: [社区打卡点POI库, GPS]
    user_control: 可关闭打卡提醒

  - scenario: 骑行里程碑成就
    trigger: "累计骑行里程突破100/500/1000/5000/10000km"
    action: HUD庆祝动画 + App成就解锁通知 + 建议分享到社区
    data_needed: [累计里程]
    user_control: 可关闭HUD庆祝动画

  - scenario: 队友附近发现
    trigger: "开启组队 + 检测到附近有头盔用户(蓝牙广播)"
    action: HUD提示"附近发现X位骑友，要打招呼？"
    data_needed: [蓝牙扫描, 用户隐私设置]
    user_control: 可关闭附近发现/设置仅对好友可见

flow_diagrams:

  - name: 首次配对流程
    trigger: 用户首次开机/新设备
    scope: 头盔+App双端
    must_include:
      - 头盔开机进入配对模式（灯效提示）
      - App端引导页（权限申请：蓝牙/定位/通知）
      - 蓝牙扫描与发现设备
      - 用户确认配对
      - 配对成功确认（HUD+App+灯效+语音四路反馈）
      - 自动进入新手教学流程
      - 配对信息持久化（下次自动连接）
    exceptions:
      - 蓝牙未开启 → 引导开启蓝牙
      - 扫描超时未发现设备 → 提示检查头盔是否开机/距离是否过远
      - 配对被拒绝/取消 → 返回扫描页，提示重试
      - 权限被拒绝 → 说明权限用途，引导去系统设置开启
      - 手机蓝牙版本不兼容 → 提示最低系统版本要求
      - 配对过程中头盔关机/断电 → App提示连接中断，引导重新开机
      - 已绑定其他手机 → 提示需要先在原手机解绑或头盔端重置配对

  - name: 非首次连接流程
    trigger: 已配对设备开机/App打开
    scope: 头盔+App双端
    must_include:
      - 头盔开机自动搜索已绑定手机
      - 自动回连（无需用户操作）
      - 回连成功反馈（HUD+灯效）
      - App端设备状态刷新
      - 多设备优先级（最近连接优先）
    exceptions:
      - 手机蓝牙关闭 → HUD提示"未连接手机"，App提示开启蓝牙
      - 回连超时（30s）→ HUD提示手动连接，可语音触发重连
      - 手机不在范围 → HUD显示离线模式可用功能
      - 手机已连接其他蓝牙音频设备 → 提示音频通道冲突
      - OTA升级后首次连接 → 可能需要重新配对，引导用户操作

  - name: 组队配对流程
    trigger: 用户发起组队/加入队伍
    scope: 多头盔+App
    must_include:
      - 创建队伍（生成邀请码/二维码）
      - 附近设备发现与加入
      - 邀请码/扫码加入
      - 成员确认与队伍建立
      - 队内通信链路建立（Mesh/蓝牙）
      - HUD队伍状态显示
    exceptions:
      - 队伍已满 → 提示人数上限
      - 邀请码过期 → 提示刷新
      - 成员连接不稳定 → 提示距离过远或干扰
      - 队长掉线 → 自动转移队长或提示重建
      - 成员头盔固件版本不兼容 → 提示升级

  - name: 第三方设备配对流程
    trigger: 用户绑定胎压计/运动相机/车辆设备
    scope: 头盔+App
    must_include:
      - App端第三方设备入口
      - 设备类型选择
      - 搜索与发现第三方设备
      - 配对确认与绑定
      - 数据通道建立
      - HUD显示第三方设备数据（如胎压值）
    exceptions:
      - 第三方设备未开机/不在范围 → 引导检查设备状态
      - 协议不兼容 → 提示支持的设备型号列表
      - 已绑定的设备离线 → HUD显示"--"占位 + 断连提示
      - 同类设备重复绑定 → 提示替换或多设备管理

  - name: 照片/视频传输流程
    trigger: 用户在App端查看/导出头盔影像
    scope: 头盔→App/手机
    must_include:
      - 传输前提条件（头盔已连接+电量>15%+存储卡正常）
      - 文件列表同步（App显示头盔端文件列表：缩略图+时长+大小）
      - 选择传输方式（蓝牙慢传/WiFi Direct快传）
      - WiFi Direct连接建立（自动切换，传完恢复原WiFi）
      - 传输进度展示（百分比+预计时间+传输速度）
      - 传输完成确认（App端可预览+头盔端可选删除释放空间）
      - 批量传输与后台传输
    exceptions:
      - 传输中蓝牙断连 → 暂停传输，自动重试3次，提示手动恢复
      - 传输中头盔低电量 → 暂停传输并提示充电，记录断点续传位置
      - 手机存储空间不足 → 传输前检查，提示清理空间
      - WiFi Direct连接失败 → 降级到蓝牙传输，提示速度会慢
      - 文件损坏/读取失败 → 跳过损坏文件，标记异常，继续传输其他文件
      - 传输中App被杀后台 → 恢复后显示传输中断位置，支持断点续传
      - 头盔存储卡异常 → 提示检查存储卡，尝试只读挽救已有文件
      - 大文件传输超时（单文件>2GB）→ 自动分片传输

  - name: 部件更换与识别流程
    trigger: 用户更换电池/耳机模组/摄像头模组等可更换部件
    scope: 头盔固件+HUD+App
    must_include:
      - 用户关机（电池等需关机更换的部件）
      - 物理拆卸旧部件
      - 安装新部件
      - 开机触发部件扫描（固件自动读取所有模组认证芯片）
      - 身份认证判断（官方原装/授权第三方/未认证/无法识别）
      - HUD显示认证结果通知
      - 认证通过→全功能启用+App同步部件信息
      - 认证未通过→功能降级+HUD常驻警告+App显示降级详情与购买引导
    exceptions:
      - 部件无认证芯片（老款/第三方）→ 按"无法识别"处理，安全模式运行
      - 认证芯片通信失败（接触不良）→ HUD提示"部件连接异常，请重新安装"，重试3次
      - 部件固件版本过旧 → 提示通过App进行部件固件OTA升级
      - 部件与当前头盔固件不兼容 → 提示升级头盔固件或更换兼容部件
      - 伪造认证芯片检测 → 签名校验失败，按未认证处理+记录异常日志
      - 更换过程中意外通电 → 检测到热插拔不支持的部件，强制关机保护

  - name: 恢复出厂设置流程
    trigger: 用户主动恢复或远程防盗清除
    scope: 头盔+App
    must_include:
      - 触发方式选择（头盔长按组合键10秒 或 App远程触发）
      - App远程触发需账号密码二次验证
      - 恢复前数据备份提醒（可选备份骑行数据/设置到云端）
      - 二次确认（HUD倒计时10秒/App弹窗确认）
      - 执行恢复（清除配对/偏好/缓存，保留固件和校准数据）
      - 恢复完成重启进入配对模式
      - App端自动解绑设备
    exceptions:
      - 恢复过程中断电 → 下次开机继续执行恢复（断点保护）
      - App远程触发但头盔离线 → 记录指令，头盔下次上线时执行
      - 用户取消（倒计时内按任意键）→ 中止恢复，恢复正常运行
      - 恢复后无法进入配对模式 → 硬件自检，引导联系售后

  - name: 权限申请与降级流程
    trigger: App首次启动/功能首次使用
    scope: App（iOS+Android）
    must_include:
      - 首次启动展示权限总览页（说明需要哪些权限及用途）
      - 分步申请（先蓝牙→定位→通知，不一次弹全部）
      - 每个权限弹窗前先展示自定义说明页（为什么需要+不授予会怎样）
      - 用户授权→功能正常启用
      - 用户拒绝→对应功能降级+灰显+点击提示
      - 引导去系统设置开启（一键跳转）
      - 后续使用中权限被回收→检测到后弹窗提醒
    exceptions:
      - 用户选择"不再询问"（Android）→ 只能引导去系统设置，不能再弹系统弹窗
      - iOS隐私追踪权限被全局关闭 → 说明影响范围，不强制要求
      - 低版本系统不支持某些权限 → 自动跳过，用替代方案
      - 权限授权后又被系统自动回收（Android省电模式）→ 下次启动检测并提醒

