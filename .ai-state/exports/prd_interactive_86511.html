"}, {"module": "消息", "level": "L3", "parent": "消息接入与同步", "name": "手机通知权限引导", "priority": "P0", "interaction": "App", "description": "首次配对后引导用户开启系统通知读取权限。", "acceptance": "首次连接流程内完成权限引导页展示；未授权时App在设备页给出阻断提示且2步内可跳转系统设置；权限状态刷新时延[待验证]。", "dependencies": "设备互联、首次使用引导", "note": "App-设备Tab", "_id": "HUD-003-01-01"}, {"module": "消息", "level": "L3", "parent": "消息接入与同步", "name": "消息源白名单同步", "priority": "P1", "interaction": "App", "description": "允许用户选择哪些应用的消息可推送到头盔。", "acceptance": "App内可配置消息应用白名单；V1至少支持3类消息源配置（即时通讯/短信/系统通知）；配置变更后同步到头盔生效时间[待验证]。", "dependencies": "手机通知权限引导、设备互联", "note": "App-设备Tab[补充]", "_id": "HUD-003-01-02"}, {"module": "消息", "level": "L3", "parent": "消息接入与同步", "name": "连接中断消息降级处理", "priority": "P1", "interaction": "HUD/语音/App", "description": "当蓝牙断连或权限失效时，系统给出明确降级提示避免误判漏提醒。", "acceptance": "蓝牙断连后HUD或语音在[待验证]秒内提示“消息不可用”；App设备页同步显示异常状态；恢复连接后自动恢复消息接入。", "dependencies": "设备状态、音频播报、设备互联", "note": "骑行主界面/App-设备Tab[补充]", "_id": "HUD-003-01-03"}, {"module": "消息", "level": "L2", "parent": "消息", "name": "HUD提醒展示", "priority": "P0", "interaction": "HUD", "description": "在HUD上以低干扰方式展示消息提醒卡片。", "acceptance": "消息提醒卡片在HUD中显示时应满足亮度>12000 cd/m²、透明度>80%、刷新率90~120Hz、显示链路延迟<20ms；单条提醒默认展示时长[待验证]。", "dependencies": "HUD显示引擎、消息接入与同步", "note": "骑行主界面", "_id": "HUD-003-02"}, {"module": "消息", "level": "L3", "parent": "HUD提醒展示", "name": "极简消息卡片", "priority": "P0", "interaction": "HUD", "description": "仅显示应用名、联系人和摘要，避免占用过多视野。", "acceptance": "单张消息卡片默认字段≤3项；卡片显示区域占HUD有效信息区比例[待验证]；在FOV 15°x6°~20°x8°范围内不遮挡核心骑行信息布局。", "dependencies": "HUD布局系统、消息接入与同步", "note": "骑行主界面", "_id": "HUD-003-02-01"}, {"module": "消息", "level": "L3", "parent": "HUD提醒展示", "name": "速度随动显示策略", "priority": "P1", "interaction": "HUD", "description": "根据骑行状态调整消息展示强度，确保高速时更克制。", "acceptance": "当检测到车辆处于运动状态时，HUD仅展示极简卡片，不进入长文本浏览；速度阈值与展示时长策略[待验证]；切换策略不引入额外显示延迟，整体仍<20ms。", "dependencies": "速度、HUD显示引擎", "note": "骑行主界面", "_id": "HUD-003-02-02"}, {"module": "消息", "level": "L3", "parent": "HUD提醒展示", "name": "多条消息堆叠提醒", "priori nput": "语音：还有多远/剩余距离/多久到", "ai_action": "读取当前路线剩余里程、预计到达时间和剩余时长并简短播报", "hud_display": "显示剩余距离、剩余时间、预计到达时间三项信息", "voice_output": "距离目的地还有十二公里，预计十五分钟到达。", "light_effect": "白灯短闪1次", "fallback": "若无活动导航，则提示当前未在导航中", "priority": "P1", "note": "信息查询类高频"}, {"scene": "地图显示切换", "trigger": "用户希望调整视觉信息密度", "user_input": "语音：切换地图显示/显示全览地图/只看箭头", "ai_action": "在全览地图、简洁箭头、路口放大三种模式间切换；记忆用户偏好", "hud_display": "切换为对应模式：全览地图、箭头导航或路口放大图；统一高对比样式", "voice_output": "已切换地图显示模式。", "light_effect": "白灯短闪2次", "fallback": "若当前HUD负载过高，则优先切换到简洁箭头模式", "priority": "P2", "note": "多模态协同"}, {"scene": "HUD投影导航开关", "trigger": "用户控制HUD导航投影状态", "user_input": "语音：打开HUD导航/关闭HUD导航", "ai_action": "开启或关闭HUD导航图层；关闭后保留语音播报，开启后恢复箭头和关键路口提示", "hud_display": "开启时显示标准导航层；关闭时仅保留极简状态栏或完全熄屏", "voice_output": "HUD导航已打开。/ HUD导航已关闭，保留语音播报。", "light_effect": "开启时蓝灯短闪1次，关闭时白灯短闪1次", "fallback": "若环境光过强导致投影不可见，提示改用语音播报或提高亮度", "priority": "P1", "note": "适配不同骑行环境"}, {"scene": "语音播报开关", "trigger": "用户控制语音提示频率", "user_input": "语音：关闭语音播报/打开语音播报/静音导航", "ai_action": "切换导航语音播报状态；关闭后保留安全级别最高的事故和封路提醒；开启后恢复完整播报", "hud_display": "显示“语音播报已关闭/已开启”状态标签", "voice_output": "已关闭语音播报，安全提醒仍会保留。/ 已开启语音播报。", "light_effect": "关闭时白灯短闪1次，开启时蓝灯短闪1次", "fallback": "若用户连续关闭所有提醒，系统保留不可关闭的P0安全播报并说明原因", "priority": "P0", "note": "多模态协同，安全提醒不可完全关闭"}], "user_stories": [{"feature": "版本与维护信息(设备状态)", "role": "后台管理员", "story": "作为后台管理员，我想要查看设备固件版本、升级状态与基础维护信息，以便支撑OTA升级管理和售后服务闭环。", "acceptance": "可按设备查看当前固件版本、升级结果、最近维护记录与异常状态；支持识别升级失败设备并用于售后跟进。", "priority": "P1"}, {"feature": "内容浏览(App-社区)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要在社区Tab浏览推荐内容、关注内容与骑行相关图文视频，以便获取灵感并发现感兴趣的骑行内容。", "acceptance": "用户可在社区页查看推荐流、关注流和骑行图文视频内容；内容可正常加载、切换与进入详情页。", "priority": "P0"}, {"feature": "互动系统(App-社区)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要对社区内容进行点赞、评论和分享，以便与其他骑手互动并提升社区活跃度。", "acceptance": "用户可对内容执行点赞、评论、分享操作；操作结果即时反馈并正确更新互动数据。", "priority": "P0"}, {"feature": "用户主页(App-社区)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要展示我的公开资料、发布内容与关注关系，以便沉淀个人品牌并建立影响力。", "acceptance": "用户主页可展示头像、昵称、简 以便快速找到适合自己的商品。", "acceptance": "用户可查看商品列表与详情，并按品类、价格或用途进行筛选；筛选结果准确可用。", "priority": "P0"}, {"feature": "下单支付(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手，我想要完成购物车、订单确认、支付与结果反馈，以便顺利购买所需商品。", "acceptance": "用户可将商品加入购物车、提交订单、完成支付并收到支付结果反馈；订单状态与支付结果一致。", "priority": "P0"}, {"feature": "订单履约(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手，我想要查看订单状态、物流进度与收货结果，以便及时掌握购买商品的履约情况。", "acceptance": "用户可查看订单各阶段状态、物流轨迹和签收结果；状态更新及时且可追踪。", "priority": "P1"}, {"feature": "售后服务(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手，我想要发起退换货、维修与咨询，以便在购买后遇到问题时获得持续服务支持。", "acceptance": "用户可针对订单发起退换货、维修或咨询申请，并查看处理进度与结果反馈。", "priority": "P1"}, {"feature": "商品营销与推荐(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手，我想要看到新品、套餐、配件联动与活动推荐，以便更高效地发现适合自己的优惠组合。", "acceptance": "商城可展示新品、活动、套餐和配件推荐；用户可进入对应商品或活动详情并完成后续购买。", "priority": "P2"}, {"feature": "账号与服务保障(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手，我想要管理商城登录、收货地址、发票与协议确认，以便顺利完成交易并获得必要保障。", "acceptance": "用户可登录商城、管理地址、填写发票信息并确认相关协议；缺失必要信息时系统可提示补全。", "priority": "P0"}, {"feature": "语音交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过语音完成导航、通话与基础设备控制，以便在骑行中减少手动操作并提升安全性。", "acceptance": "用户可通过语音触发导航、拨打电话和执行基础设备控制；系统在骑行场景下可返回明确执行结果。", "priority": "P0"}, {"feature": "视觉交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要基于摄像头与感知算法获得ADAS预警、目标追踪与事件识别，以便提升骑行安全和环境感知能力。", "acceptance": "系统可识别关键风险场景并提供预警，支持目标追踪和事件识别；预警信息在骑行中可被及时感知。", "priority": "P0"}, {"feature": "多模态感知(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要融合IMU、GNSS及可扩展生理数据进行状态识别与异常提醒，以便及时发现风险并触发联动能力。", "acceptance": "系统可基于多源数据识别骑行状态和异常情况，并输出提醒或联动动作；异常事件有明确记录。", "priority": "P1"}, {"feature": "AI内容与服务(AI功能)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要使用AI剪片、事件摘要与持续升级能力，以便更高效地整理、分享骑行内容并持续获得新体验。", "acceptance": "系统可基于骑行记录生成剪辑内容或事件摘要，并支持通过OTA持续提供新能力；用户可查看和使用生成结果。", "priority": "P1"}, {"feature": "语音唤醒与拾音(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在骑行环境下实现远场拾音、唤醒词检测与基础语音输入，以便无需手动操作即可发起语音交互。", "acceptance": "系统可在骑行噪声环境中完成唤醒词识别和基础语音采集；唤醒成功后进入可交互状态并有反馈。", "priority": "P0"}, {"feature": "核心骑行指令(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过语音直接控制导航、通话和音乐等高频任务，以便在骑行中快速完成常用操作。", "acceptance": "用户可通过语音执行导航、接打电话、播放暂停音乐等核心指令；系统能正确识别并执行常见命令。", "priority": "P0"}, {"feature": "反馈与会话管理(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过HUD、语音播报和灯光提示了解语音会话状态与执行结果，以便确认系统是否正确响应我的指令。", "acceptance": "系统在唤醒、识别、执行成功、执行失败等阶段提供清晰反馈；用户可感知当前会话状态和结果。", "priority": "P1"}, {"feature": "手机协同与云端能力(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过头盔轻量端与手机主算力/云端协同处理复杂语义、地图与在线服务，以便获得更完整的语音能力。", "acceptance": "头盔端可与手机和云端协同完成复杂语音请求；连接正常时可调用地图和在线服务，异常时有兜底提示。", "priority": "P1"}, {"feature": "可靠性与隐私(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要语音功能在长时间骑行中保持稳定，并可管理录音、日志与隐私设置，以便安心持续使用语音能力。", "acceptance": "语音功能可在长时间使用中保持可用，用户可查看或管理录音、日志和隐私选项；隐私设置变更后立即生效。", "priority": "P0"}, {"feature": "输入感知融合(多模态交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要融合语音、按键、IMU与生理信号输入来识别我的意图与状态，以便在复杂骑行场景下获得更准确的交互响应。", "acceptance": "系统可综合多种输入信号判断用户意图或状态，并触发对应交互或提醒；在单一输入不稳定时仍可提供可用结果。", "priority": "P1"}, {"feature": "来电提醒显示(来电)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在来电到达时通过HUD主提醒、灯光辅提醒和语音播报收到提示,以便在不低头看手机的情况下及时感知来电。", "acceptance": "当手机收到来电时,头盔应在1秒内触发HUD来电提醒卡片,同时提供灯光提醒与语音播报; 提醒内容至少包含来电状态与联系人名称或号码; 骑行中提醒样式应保持低干扰且不遮挡关键骑行信息。", "priority": "P0"}, {"feature": "来电处理控制(来电)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中快速接听、拒接或静音来电,以便减少分心并安全处理通信。", "acceptance": "用户可通过按键或语音完成接听、拒接、静音操作; 关键操作步骤不超过2步; 操作后系统应在HUD或语音中反馈结果; 全程无需拿出手机即可完成基础来电处理。", "priority": "P0"}, {"feature": "通话中状态显示(来电)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在接听后看到通话进行状态和最小必要控制,以便确认通话是否正常并进行必要操作。", "acceptance": "接听后HUD或音频反馈应显示通话中状态; 至少支持挂断和静音等最小必要控制; 通话状态展示不得长期占用主要视野区域; 通话异常中断时应有明确提示。", "priority": "P1"}, {"feature": "安全策略与打扰管理(来电)", "role": "新手骑手", "story": "作为新手骑手,我想要系统根据骑行场景自动控制来电展示强度与交互方式,以便降低分心风险并优先保障骑行安全。", "acceptance": "系统应根据速度、导航进行中或预警触发等场景调整来电提醒强度; 高风险场景下应限制复杂交互并优先保留安全相关信息; 用户可在设置中选择打扰管理策略; 策略切换后应即时生效。", "priority": "P0"}, {"feature": "手机互联与设置(来电)", "role": "后台管理员", "story": "作为后台管理员,我想要用户能够完成来电功能所需的手机权限、通讯录同步和显示偏好设置,以便保障来电功能可正常启用和配置。", "acceptance": "App应引导用户完成蓝牙连接、通知/通话权限授权和通讯录同步; 用户可配置联系人显示方式、播报开关和提醒偏好; 未授权时系统应提示缺失项及影响; 设置结果应在头盔端生效。", "priority": "P1"}, {"feature": "播放控制(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中进行音乐的基础播放控制,以便减少掏手机操作并保持骑行专注。", "acceptance": "用户可通过按键或语音完成播放、暂停、上一首、下一首操作; 操作响应应清晰可感知; 基础控制无需解锁手机; 骑行中不提供高复杂度音乐浏览操作。", "priority": "P1"}, {"feature": "信息展示(音乐)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在HUD与App中查看必要的音乐状态信息,以便在低打扰前提下确认当前播放内容和状态。", "acceptance": "HUD应展示最小必要信息,如播放状态和曲目基础信息; App可展示更完整的音乐信息; HUD展示应简洁且不遮挡导航或安全预警; 信息更新应与手机播放状态保持同步。", "priority": "P2"}, {"feature": "音频协同策略(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统处理音乐与导航、来电、语音助手等音频源的优先级关系,以便关键提示不会被音乐遮挡。", "acceptance": "当导航、来电或安全提示出现时,音乐应按策略自动降低音量、暂停或让路; 高优先级音频结束后音乐应按设定恢复; 多音频源同时出现时应遵循统一优先级规则; 用户可在App中查看或调整基础策略。", "priority": "P0"}, {"feature": "连接与兼容(音乐)", "role": "后台管理员", "story": "作为后台管理员,我想要保障头盔与手机音乐源的蓝牙连接稳定性与基础兼容性,以便用户能够持续稳定地使用音乐功能。", "acceptance": "头盔应支持主流手机系统的基础蓝牙音乐连接; 连接成功后可稳定传输音频与控制指令; 断连后系统应提示并支持自动重连或手动重连; 兼容性问题应可在日志或诊断中定位。", "priority": "P0"}, {"feature": "可靠性与安全限制(音乐)", "role": "新手骑手", "story": "作为新手骑手,我想要系统在骑行安全优先前提下限制音乐交互复杂度并保证稳定性,以便减少分心并获得可靠体验。", "acceptance": "骑行中仅开放基础音乐控制,不开放复杂列表浏览与搜索; 音乐功能在长时间骑行中应保持稳定无明显卡顿; 出现异常时应可快速恢复或提示用户; 验收标准应包含连接稳定性、控制成功率和异常恢复能力。", "priority": "P0"}, {"feature": "消息接入与同步(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过手机互联接入系统通知并同步到头盔消息模块,以便骑行中及时获知重要消息提醒。", "acceptance": "用户授权后,系统应接入手机通知并同步到头盔; 支持主流消息类通知的基础接入; 同步内容至少包含应用来源、发送者或摘要; 未授权或连接异常时应明确提示。", "priority": "P1"}, {"feature": "HUD提醒展示(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD上以低干扰方式看到消息提醒卡片,以便快速感知消息而不影响骑行注意力。", "acceptance": "新消息到达时HUD应显示简洁提醒卡片; 卡片展示时间有限且不遮挡导航和安全预警; 展示内容应遵循隐私设置; 用户可快速忽略提醒而无需额外交互。", "priority": "P1"}, {"feature": "语音播报与控制(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过语音播报消息摘要并支持免手操作,以便在不看手机和不腾手的情况下处理消息提醒。", "acceptance": "系统可按设置播报消息摘要或发送者信息; 用户可通过语音执行朗读、忽略等基础操作; 高噪声环境下应提供明确反馈或降级方案; 整个流程无需手持手机。", "priority": "P1"}, {"feature": "安全策略与免打扰(消息)", "role": "新手骑手", "story": "作为新手骑手,我想要系统根据骑行安全原则限制消息干扰并提供免打扰与场景化抑制,以便避免被频繁消息打断。", "acceptance": "系统应支持免打扰模式和按场景抑制消息提醒; 高速、复杂路况或安全预警期间应降低或延后消息打扰; 用户可配置白名单或重要消息例外; 策略生效时应有可理解的状态提示。", "priority": "P0"}, {"feature": "消息记录与设置(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在App中查看近期消息提醒记录并管理消息偏好,以便错过提醒后仍能回看并调整通知方式。", "acceptance": "App应展示近期消息提醒记录列表; 用户可按应用或类型管理提醒开关、播报方式和展示偏好; 设置修改后应同步到头盔端; 记录应遵循隐私与保存期限规则。", "priority": "P2"}, {"feature": "隐私与数据保护(消息)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要控制消息内容在HUD和App中的暴露范围,以便降低公开场景下的隐私风险。", "acceptance": "用户可设置仅显示应用名、联系人、摘要或完全隐藏内容; HUD与App应分别支持隐私级别配置; 锁屏、共享设备或公开场景下应默认采用更保守展示策略; 消息数据处理应符合最小必要原则。", "priority": "P1"}, {"feature": "路线规划与发起(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要在App或通过语音发起目的地导航并同步到HUD,以便快速开始骑行导航而无需频繁操作手机。", "acceptance": "用户可在App输入目的地或通过语音发起导航; 路线发起后应同步到HUD并开始导航流程; 发起失败时应提示原因与重试方式; 同步过程应在合理时间内完成。", "priority": "P0"}, {"feature": "HUD导航显示(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要将关键导航信息以低分心方式显示在HUD视野下缘,以便在保持前方视线的同时获取转向指引。", "acceptance": "HUD应在视野下缘展示转向箭头、距离、道路信息等关键导航内容; 显示应简洁清晰且不遮挡道路观察; 临近转向时提示应增强; 非关键时刻应降低信息占用。", "priority": "P0"}, {"feature": "语音与音频播报(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要通过头盔音频系统接收转向、偏航和到达等导航播报,以便在复杂路况下及时获得路线提示。", "acceptance": "系统应播报即将转向、已偏航、重新规划和到达等关键导航事件; 播报时机应与路线状态匹配; 播报应与音乐等音频源按优先级协同; 用户可设置播报开关和简洁程度。", "priority": "P0"}, {"feature": "定位与重规划(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要基于手机协同定位实现实时跟踪、偏航检测和路线重规划,以便在走错路时快速回到正确路线。", "acceptance": "系统应持续获取定位并更新当前位置; 偏离路线后应在合理阈值内识别并触发重规划; 重规划结果应同步到HUD和音频播报; 定位异常时应提示精度不足或信号问题。", "priority": "P0"}, {"feature": "交互控制(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要在骑行中通过语音、按键和App安全控制导航,以便根据路况灵活调整导航而不影响安全。", "acceptance": "用户可执行开始、结束、静音、恢复播报等基础导航控制; 骑行中优先提供语音和按键方式; 复杂设置应引导至停车后在App完成; 每次控制后系统应提供明确反馈。", "priority": "P1"}, {"feature": "异常与安全降级(导航)", "role": "新手骑手", "story": "作为新手骑手,我想要在断连、低电量或显示异常时获得导航降级与安全提示,以便在异常情况下仍能安全应对。", "acceptance": "当手机断连、头盔低电量或HUD异常时,系统应提示当前问题及影响; 可用时应切换到音频优先或App接管等降级模式; 严重异常时应建议安全停车处理; 异常恢复后应提示状态恢复。", "priority": "P0"}, {"feature": "盲区监测预警(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要对车辆左右后侧盲区来车进行识别并分级提醒,以便在变道或转向前更早发现风险。", "acceptance": "系统应识别左右后侧盲区目标并区分一般接近与高风险接近; 预警应通过HUD、灯光或语音进行分级提示; 提示方向应明确; 无目标或低可信度场景下不应频繁误报。", "priority": "P0"}, {"feature": "后向碰撞预警(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要识别后方快速接近目标并在可能追尾时提前收到提醒,以便及时采取避让或防御性操作。", "acceptance": "系统应检测后方快速接近目标并在达到风险阈值时触发预警; 预警需具备足够提前量; 告警强度应高于普通盲区提醒; 误报率应控制在可接受范围内。", "priority": "P0"}, {"feature": "前向风险提示(主动安全预警提示)", "role": "新手骑手", "story": "作为新手骑手,我想要对前方潜在碰撞或危险路况收到视觉与语音提醒,以便更早做出减速和避让决策。", "acceptance": "系统应对前方潜在碰撞风险或危险路况触发视觉与语音提醒; 风险等级不同应对应不同提示强度; 提醒应简洁明确且不遮挡关键视野; 风险解除后提示应及时消退。", "priority": "P0"}, {"feature": "多模态告警呈现(主动安全预警提示)", "role": "新手骑手", "story": "作为新手骑手,我想要通过HUD、骨传导语音和灯光接收分层告警,以便在不同环境下都能及时感知风险且不过度打扰。", "acceptance": "系统应支持HUD、语音和灯光的组合告警; 不同风险等级对应不同模态组合与强度; 高优先级告警应优先覆盖普通信息; 告警结束后界面与音频应快速恢复正常状态。", "priority": "P0"}, {"feature": "预警策略与抑制(主动安全预警提示)", "role": "后台管理员", "story": "作为后台管理员,我想要通过优先级、去抖和场景抑制减少误报与信息轰炸,以便让预警系统更可信且适合量产使用。", "acceptance": "系统应定义统一的预警优先级规则; 对短时抖动目标和重复事件进行去抖与合并; 在低风险或不适用场景下抑制无效提醒; 策略效果应可通过日志和测试指标验证。", "priority": "P0"}, {"feature": "设置校准与自检(主动安全预警提示)", "role": "后台管理员", "story": "作为后台管理员,我想要提供预警功能开关、传感器校准和健康自检,以便保证主动安全功能长期可用且便于维护。", "acceptance": "用户可在App中开启或关闭预警功能并查看状态; 系统应支持传感器校准流程与结果反馈; 开机或按需触发时应执行健康自检; 检测到异常时应提示故障项和处理建议。", "priority": "P1"}, {"feature": "路线创建与导入(路线)", "role": "团骑领队", "story": "作为团骑领队,我想要通过App、语音或快捷入口创建骑行路线,以便快速组织和发起团队骑行行程。", "acceptance": "用户可通过App手动创建路线,也可通过语音或快捷入口发起; 支持导入已有路线数据或常用目的地; 创建成功后路线可保存并用于导航; 失败时应提示原因与修正方式。", "priority": "P1"}, {"feature": "路线规划策略(路线)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要根据骑行场景获得可选路线方案并支持偏好设置,以便选择更适合当前旅程的路线。", "acceptance": "系统应根据通勤、摩旅或避堵等场景提供多条可选路线; 用户可设置高速优先、风景优先、少收费等偏好; 路线方案应展示核心差异信息; 选择结果应可用于后续导航发起。", "priority": "P1"}, {"feature": "头盔与手机配对", "role": "新手骑手", "story": "作为新手骑手，我想要完成头盔与手机之间的蓝牙发现、选择、绑定和连接确认，以便快速开始使用智能骑行功能。", "acceptance": "用户可在App中搜索到附近头盔设备；可选择目标头盔并发起配对；配对成功后App与头盔均显示已连接状态；首次绑定后可记录设备信息用于后续自动重连。", "priority": "P0"}, {"feature": "配对态交互反馈", "role": "通勤骑手", "story": "作为通勤骑手，我想要在配对各阶段通过HUD、语音和灯光获得状态反馈，以便在骑行或准备出发时快速确认当前连接进度和结果。", "acceptance": "在扫描中、待确认、配对成功、配对失败等阶段，系统均提供明确反馈；HUD、语音和灯光反馈内容一致且易于理解；成功与失败状态可被用户明显区分；反馈过程不影响用户继续操作或重试。", "priority": "P1"}, {"feature": "多设备与第三方绑定", "role": "后台管理员", "story": "作为后台管理员，我想要在App内管理头盔与第三方设备的绑定入口和状态，以便统一维护多设备接入体验并支持后续生态扩展。", "acceptance": "App内提供头盔及第三方设备的绑定入口；用户可查看各设备当前绑定状态；支持新增绑定、解绑和状态刷新；不同设备类型在管理页中有清晰区分；绑定状态异常时可提示用户处理方式。", "priority": "P1"}, {"feature": "异常与恢复机制", "role": "新手骑手", "story": "作为新手骑手，我想要在扫描不到、连接失败、重复绑定、解绑重连等异常场景下获得恢复指引，以便尽快重新完成连接并减少使用挫败感。", "acceptance": "当扫描不到设备时，系统提示检查蓝牙、距离或设备电量；当连接失败时，支持一键重试；当检测到重复绑定时，系统提示当前绑定关系并给出处理选项；解绑后可重新发起绑定；异常提示应包含可执行的恢复建议。", "priority": "P0"}, {"feature": "连接架构兼容性", "role": "后台管理员", "story": "作为后台管理员，我想要为蜂窝、Wi‑Fi、Mesh等扩展互联能力预留统一配对与绑定框架，以便后续新增连接方式时减少改造成本并保持一致体验。", "acceptance": "系统采用统一的配对与绑定流程抽象；新增连接类型时无需重构现有蓝牙配对主流程；不同连接方式可复用统一的状态定义与管理入口；框架支持扩展设备发现、绑定、连接确认和异常处理能力。", "priority": "P2"}, {"feature": "输出反馈编排(多模态交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统根据场景优先级将信息分发到HUD、语音播报和灯光提示,以便在骑行中快速获取一致且不过载的反馈。", "acceptance": "当同时出现多类信息时,系统可按安全优先级进行分发;高优先级安全信息优先通过HUD高亮与语音提示输出;普通状态信息可通过灯光或低干扰方式提示;不同通道反馈内容保持一致且不冲突。", "priority": "P0"}, {"feature": "场景化交互流程(多模态交互)", "role": "新手骑手", "story": "作为新手骑手,我想要系统围绕骑行前、骑行中、停车后提供清晰的多模态交互流程与状态切换,以便我在不同阶段都能正确使用设备。", "acceptance": "系统可识别骑行前、骑行中、停车后等阶段并切换对应交互模式;各阶段展示与提示内容符合当前场景;状态切换时有明确反馈;骑行中限制高干扰操作。", "priority": "P1"}, {"feature": "连接与设备协同(多模态交互)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要通过蓝牙、Wi‑Fi与蜂窝协同外设和手机,以便扩展多模态能力并同步骑行与创作数据。", "acceptance": "系统支持与手机及外设建立稳定连接;可根据场景自动选择或切换合适连接方式;连接状态可见且异常时有提示;关键数据可在设备与手机间同步。", "priority": "P1"}, {"feature": "基础按键输入(实体按键交互)", "role": "后台管理员", "story": "作为后台管理员,我想要定义单击、双击、长按等基础输入能力,以便为所有按键交互提供统一稳定的底层规则。", "acceptance": "系统支持单击、双击、长按等标准输入识别;不同输入动作有明确判定阈值;输入事件可被上层功能统一调用;误判率控制在可接受范围内。", "priority": "P0"}, {"feature": "骑行核心控制(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过实体按键完成骑行中必须可盲操的核心功能控制,以便在不分散注意力的情况下安全操作。", "acceptance": "骑行中高频核心功能可通过实体按键完成;按键布局与操作逻辑支持盲操;关键操作响应及时并有反馈;无需依赖触屏完成核心控制。", "priority": "P0"}, {"feature": "菜单与HUD联动(实体按键交互)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要通过实体按键在HUD界面中完成菜单切换、确认与返回,以便在长途骑行中便捷调整设置。", "acceptance": "用户可通过实体按键在HUD中进行菜单切换、确认和返回;当前焦点与层级关系清晰可见;操作后HUD实时更新;骑行中仅开放安全范围内菜单项。", "priority": "P1"}, {"feature": "安全防误触(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过锁定、去抖和场景限制降低骑行中误触风险,以便避免错误操作影响安全。", "acceptance": "系统支持按键锁定、输入去抖和场景化限制;连续抖动或非预期触发不会执行危险操作;骑行中对高风险功能进行限制;误触被拦截时有适当提示。", "priority": "P0"}, {"feature": "反馈与可学习性(实体按键交互)", "role": "新手骑手", "story": "作为新手骑手,我想要按键操作后获得HUD、语音或音效反馈并得到学习提示,以便更快掌握正确操作方式。", "acceptance": "按键操作后系统提供至少一种明确反馈;新手模式下可展示按键说明或引导;错误操作有纠正提示;用户可逐步关闭学习辅助。", "priority": "P1"}, {"feature": "ADAS安全预警(视觉交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要对后向来车、盲区风险与潜在碰撞获得分级预警并在HUD中高优先显示,以便及时规避危险。", "acceptance": "系统可识别后向来车、盲区风险和潜在碰撞场景;不同风险等级采用不同视觉样式;高风险预警在HUD中优先显示并可联动语音/灯光;预警出现与解除状态清晰。", "priority": "P0"}, {"feature": "目标追踪(视觉交互)", "role": "团骑领队", "story": "作为团骑领队,我想要对队友、前车或关注目标进行视觉标记与状态跟踪,以便提升编队协同与队伍管理效率。", "acceptance": "系统支持对指定目标进行标记与持续跟踪;HUD中可显示目标位置或状态变化;目标丢失时有提示;跟踪信息不遮挡关键安全信息。", "priority": "P1"}, {"feature": "HUD视觉呈现(视觉交互)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要将视觉交互结果以低干扰、高可读的方式呈现在HUD中,并支持校准与样式设置,以便在不同路况下稳定查看信息。", "acceptance": "HUD信息具备高可读性且不遮挡关键视野;支持位置、亮度或样式校准设置;不同环境下显示效果可调;设置修改后即时生效。", "priority": "P0"}, {"feature": "摄像联动可视化(视觉交互)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要将摄像头工作状态、录制状态与视觉识别结果联动展示,以便随时确认拍摄与识别是否正常。", "acceptance": "系统可显示摄像头开启/关闭、录制中、异常等状态;视觉识别结果可与摄像状态联动展示;录制开始和结束有明确提示;异常状态可被快速感知。", "priority": "P1"}, {"feature": "视觉设置与升级(视觉交互)", "role": "后台管理员", "story": "作为后台管理员,我想要提供视觉功能开关、灵敏度配置与OTA升级能力,以便持续优化视觉交互体验并迭代功能。", "acceptance": "系统支持视觉功能独立开关与灵敏度配置;用户设置可保存并生效;支持OTA升级视觉能力;升级过程有版本说明、状态提示与失败回退机制。", "priority": "P1"}, {"feature": "账号注册与登录(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要完成账号创建、登录及基础会话建立,以便使用个性化和设备绑定功能。", "acceptance": "用户可通过有效方式完成注册与登录;登录成功后建立有效会话;失败时有明确错误提示;已登录状态在有效期内可保持。", "priority": "P0"}, {"feature": "游客模式(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要在未注册时以受限权限浏览和体验基础功能,以便先了解产品再决定是否注册。", "acceptance": "未注册用户可进入游客模式;游客可访问基础浏览与体验功能;涉及账号、绑定或敏感数据功能时受限并提示注册;游客数据与正式账号数据隔离。", "priority": "P2"}, {"feature": "账号安全与找回(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要通过验证码校验、异常登录处理与账号恢复能力保护账号,以便在账号异常或遗忘信息时快速找回。", "acceptance": "系统支持验证码校验与身份验证流程;检测到异常登录时可提醒或限制访问;用户可通过安全流程找回账号或重置凭证;关键操作留有安全记录。", "priority": "P0"}, {"feature": "设备鉴权与绑定校验(身份认证)", "role": "后台管理员", "story": "作为后台管理员,我想要确保头盔与账号建立可信绑定关系并限制未授权访问,以便保障设备与用户数据安全。", "acceptance": "设备绑定前需完成身份校验;已绑定设备与账号关系可被验证;未授权设备无法访问受保护能力;解绑、换绑流程受控且有记录。", "priority": "P0"}, {"feature": "协议同意与隐私授权留痕(身份认证)", "role": "后台管理员", "story": "作为后台管理员,我想要在注册登录过程中完成用户协议与隐私政策确认并留存记录,以便满足合规要求并可追溯。", "acceptance": "注册登录前展示用户协议与隐私政策;用户需明确同意后方可继续关键流程;同意时间、版本和账号信息被留存;政策更新后可触发重新确认。", "priority": "P0"}, {"feature": "品牌与定位(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要了解品牌理念、产品定位与目标用户场景,以便判断产品是否适合我的骑行需求。", "acceptance": "页面清晰展示品牌理念、产品定位和典型使用场景;内容结构易于理解;用户可快速找到适合自己的场景说明;信息与品牌口径一致。", "priority": "P2"}, {"feature": "核心功能说明(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要系统化了解头盔核心功能能力与交互方式,以便在购买或使用前建立正确认知。", "acceptance": "核心功能按模块清晰展示;每项功能包含用途与交互方式说明;重点功能有示意或示例;内容准确且便于快速浏览。", "priority": "P1"}, {"feature": "安全与认证说明(产品介绍)", "role": "通勤骑手", "story": "作为通勤骑手,我想要了解产品安全价值、辅助预警能力与合规认证信息,以便放心使用并评估安全性。", "acceptance": "页面展示安全能力边界、辅助预警说明和认证信息;避免夸大安全承诺;认证信息真实可查;用户可清楚理解产品的安全价值与限制。", "priority": "P1"}, {"feature": "使用指引与上手(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要快速理解首次使用流程、配对方式与基础操作,以便尽快完成上手。", "acceptance": "提供首次使用步骤说明;包含配对方式、基础操作和注意事项;内容顺序符合实际流程;用户可在短时间内完成基础上手。", "priority": "P1"}, {"feature": "参数与版本信息(产品介绍)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要查看硬件规格、连接参数、续航与版本差异信息,以便选择适合长途骑行的配置。", "acceptance": "页面展示关键硬件规格、连接参数、续航和版本差异;不同版本对比清晰;参数信息准确一致;用户可快速完成版本判断。", "priority": "P2"}, {"feature": "多媒体与转化(产品介绍)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要通过视频、对比与FAQ了解产品细节,以便更高效评估产品并做出购买决策。", "acceptance": "页面提供视频、对比内容和FAQ;多媒体内容可正常播放与浏览;FAQ覆盖高频问题;内容有助于提升理解与转化。", "priority": "P2"}, {"feature": "首次使用引导(用户学习)", "role": "新手骑手", "story": "作为新手骑手,我想要在首次开机时获得围绕配对、权限与校准的分步引导,以便顺利完成初始设置。", "acceptance": "首次开机自动触发引导流程;引导覆盖配对、权限申请和校准步骤;每步有明确说明与完成状态;用户可跳过并稍后继续。", "priority": "P0"}, {"feature": "核心功能教学(用户学习)", "role": "新手骑手", "story": "作为新手骑手,我想要获得高频功能的分主题教学内容与操作演示,以便更快掌握常用能力。", "acceptance": "系统提供按主题分类的核心功能教学;每个主题包含操作演示或步骤说明;用户可按需查看与重复学习;教学内容与实际功能一致。", "priority": "P1"}, {"feature": "设备互联与升级学习(用户学习)", "role": "新手骑手", "story": "作为新手骑手,我想要理解配对、连接、传输与OTA升级的使用方法,以便独立完成设备互联和维护。", "acceptance": "学习内容覆盖配对、连接、数据传输和OTA升级;包含常见问题与注意事项;步骤清晰可执行;用户可根据场景快速定位所需内容。", "priority": "P1"}, {"feature": "帮助中心与问题解决(用户学习)", "role": "新手骑手", "story": "作为新手骑手,我想要访问可检索的帮助内容、常见问题与售后支持入口,以便在遇到问题时快速获得解决方案。", "acceptance": "帮助中心支持搜索与分类浏览;常见问题覆盖高频故障与使用问题;提供售后或人工支持入口;用户可在少量步骤内找到解决路径。", "priority": "P1"}, {"feature": "进阶学习与内容运营(用户学习)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要通过课程、成就和社区内容持续学习,以便提升使用深度并保持长期活跃。", "acceptance": "系统提供课程、成就或社区内容入口;用户可查看学习进度或成就状态;内容持续更新且与产品能力相关;可激励用户长期参与。", "priority": "P3"}, {"feature": "首次配对引导(设备配对流程)", "role": "新手骑手", "story": "作为新手骑手,我想要在首次使用时获得从开机、权限申请到绑定完成的分步配对引导,以便顺利完成设备连接。", "acceptance": "首次配对流程按开机、权限申请、搜索设备、确认绑定等步骤展开;每步有明确操作提示与结果反馈;失败时提供重试与排障建议;完成后进入可用状态。", "priority": "P0"}, {"feature": "HUD路线展示", "role": "通勤骑手", "story": "作为通勤骑手,我想要将路线核心信息以低干扰方式显示在HUD中并配合语音提示,以便我在骑行中无需频繁低头查看手机也能安全跟随导航。", "acceptance": "给定已开始导航,当骑手正常骑行时,HUD应持续显示下一动作、距离和关键路线信息; 当接近转向点时,系统应提供清晰语音提示; HUD信息不得遮挡核心骑行视野; 当无有效路线时,应明确提示导航不可用状态。", "priority": "P0"}, {"feature": "路线执行与重规划", "role": "通勤骑手", "story": "作为通勤骑手,我想要在偏航、错过路口或路况变化时路线仍能持续可用,以便我能快速回到正确路线并减少通勤中断。", "acceptance": "给定导航进行中,当骑手偏航、错过路口或原路线受阻时,系统应在可接受时间内自动重规划; 重规划后HUD与语音提示应同步更新; 若暂时无法重规划,系统应提示当前状态并保留已知路线信息; 全过程无需骑手手动重新发起导航。", "priority": "P0"}, {"feature": "路线与设备协同", "role": "通勤骑手", "story": "作为通勤骑手,我想要路线功能能结合设备连接、电量和安全状态稳定运行,以便在关键通勤场景下导航不中断。", "acceptance": "当手机、头盔、网络或定位状态变化时,系统应识别对路线功能的影响并提示用户; 当设备低电或连接不稳定时,应提前告警并给出建议处理动作; 当安全状态不满足导航使用条件时,应限制高风险操作; 路线核心能力在可用条件下应优先保持运行。", "priority": "P1"}, {"feature": "录制状态显示", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要清楚看到摄像头当前是否正在录制及录制模式,以便确认关键骑行画面已被正确记录。", "acceptance": "当摄像头连接且可用时,HUD或相关界面应明确显示录制中、待机、暂停等状态以及当前录制模式; 当录制状态发生变化时,应在短时间内更新显示; 当录制失败时,应给出可识别提示; 状态展示应便于骑行中快速确认。", "priority": "P0"}, {"feature": "连接与可用性状态", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要看到摄像头是否在线、是否可用以及与头盔系统的连接状态,以便在拍摄前及时发现问题并避免漏录。", "acceptance": "系统应区分并展示在线、离线、连接中、不可用等状态; 当摄像头与头盔系统连接异常时,应及时提示; 当状态恢复正常时,显示应自动更新; 用户可在HUD、App或控制入口中查看当前可用性状态。", "priority": "P1"}, {"feature": "存储与文件状态", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要查看剩余存储、存储异常和录像文件写入状态,以便避免因空间不足或写入失败导致素材丢失。", "acceptance": "系统应显示剩余存储容量或可录制时长; 当存储空间不足、存储卡异常或文件写入失败时,应明确告警; 当录像文件正常写入时,应有可确认的状态反馈; 异常恢复后状态应同步更新。", "priority": "P1"}, {"feature": "异常与安全提示", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在摄像头过热、故障或异常中断时收到提示,以便及时处理并降低拍摄中断风险。", "acceptance": "当出现过热、故障、异常断连或录制中断时,系统应在HUD、语音或其他可用通道中发出提示; 提示应区分异常类型和严重程度; 对影响继续录制的异常应给出建议动作; 异常解除后应更新为恢复状态。", "priority": "P1"}, {"feature": "交互控制入口", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要通过HUD、按键、语音和App进入摄像状态并执行基础控制,以便在骑行中快速完成录制相关操作。", "acceptance": "用户可通过至少一种骑行中可用入口查看摄像状态; 用户可执行开始录制、停止录制、切换基础模式等控制; 不同入口的状态反馈应保持一致; 对骑行中高风险复杂操作应限制或简化处理。", "priority": "P1"}, {"feature": "数据接入与绑定", "role": "新手骑手", "story": "作为新手骑手,我想要完成胎压计发现、绑定、轮位分配与连接状态同步,以便正确使用胎温胎压监测功能。", "acceptance": "系统应支持发现可配对胎压计并发起绑定; 绑定过程中用户可完成前后轮位分配; 绑定成功后应显示各传感器连接状态; 当传感器断连、重连或更换时,状态应同步更新并可重新配置。", "priority": "P0"}, {"feature": "HUD实时显示", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中以低干扰方式看到前后轮胎温与胎压信息,以便及时掌握轮胎状态并降低风险。", "acceptance": "当胎压计已连接且有有效数据时,HUD应显示前后轮胎压和胎温; 展示应简洁且不遮挡关键骑行信息; 数据更新应与传感器状态同步; 当某一轮数据不可用时,应明确标识而非显示错误数值。", "priority": "P1"}, {"feature": "异常告警与提醒", "role": "通勤骑手", "story": "作为通勤骑手,我想要在胎压异常、胎温异常或传感器异常时收到分级提醒,以便及时采取措施降低骑行风险。", "acceptance": "系统应支持对高压、低压、高温和传感器异常进行识别; 不同严重程度应采用不同提醒方式或等级; 严重异常应在骑行中及时触发提醒; 异常恢复后应更新状态并停止持续告警。", "priority": "P0"}, {"feature": "设置与历史记录", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要设置阈值、切换单位并查看历史趋势与异常记录,以便根据长途骑行需求管理轮胎健康。", "acceptance": "用户可设置胎压和胎温告警阈值; 用户可切换压力和温度单位; 系统应保存并展示历史趋势与异常记录; 历史数据应可按前后轮区分查看; 设置修改后应即时生效或明确提示生效时机。", "priority": "P2"}, {"feature": "启动内容展示", "role": "后台管理员", "story": "作为后台管理员,我想要定义开机动画中品牌Logo、系统名与基础视觉元素的展示规则,以便统一设备启动品牌体验。", "acceptance": "系统应支持配置品牌Logo、系统名称和基础视觉元素的展示内容; 展示顺序、时长和样式应符合预设规则; 当资源缺失时应回退到默认内容; 不同配置版本应可被正确下发和生效。", "priority": "P2"}, {"feature": "启动流程控制", "role": "新手骑手", "story": "作为新手骑手,我想要开机动画的触发、跳过、结束与异常分支被正确控制,以便设备能顺利进入可用状态而不影响出发。", "acceptance": "当设备开机时,系统应按规则触发开机动画; 当满足跳过条件时,应允许跳过或缩短动画; 动画结束后设备应进入可用主界面; 若启动过程中出现异常,系统应进入对应异常分支并给出可理解提示,而不是卡死在动画阶段。", "priority": "P1"}, {"feature": "状态与安全提示", "role": "新手骑手", "story": "作为新手骑手,我想要在开机阶段看到必要的设备状态与安全提示,以便判断当前是否适合立即骑行。", "acceptance": "开机阶段应展示关键状态信息,如电量、连接或必要传感器状态; 当存在影响骑行的风险时,应给出明确安全提示; 提示内容应简洁易懂且不阻碍正常进入系统; 风险解除后提示应自动更新或消失。", "priority": "P1"}, {"feature": "个性化与配置", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在App中配置开机动画样式、开关或品牌联名资源,以便获得更符合个人偏好的设备体验。", "acceptance": "用户可在App中查看并选择可用的开机动画样式; 用户可开启或关闭开机动画,或在允许范围内调整展示偏好; 联名或品牌资源应在授权后可用; 配置保存后应在下次开机按预期生效。", "priority": "P3"}, {"feature": "实时速度显示", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行主界面持续看到当前车速,以便随时掌握基础骑行信息。", "acceptance": "当设备处于骑行主界面且速度数据可用时,HUD应持续显示当前车速; 速度数值应清晰可读; 当车辆静止时应显示合理静止状态; 当速度数据不可用时,应明确提示而非显示误导数值。", "priority": "P0"}, {"feature": "速度数据源与精度管理", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统管理速度来源、可用性与异常状态,以便看到可信的速度信息。", "acceptance": "系统应识别当前速度数据来源及其可用状态; 当主数据源异常时,应按规则切换到备选来源或提示不可用; 当速度精度下降或数据异常跳变时,应进行处理并避免误导显示; 用户看到的速度状态应与实际数据可信度一致。", "priority": "P1"}, {"feature": "超速提醒", "role": "通勤骑手", "story": "作为通勤骑手,我想要在当前速度超过设定阈值时通过HUD收到提醒,以便及时控制车速。", "acceptance": "用户可设置超速提醒阈值; 当当前速度持续超过阈值时,HUD应触发明显但不过度干扰的提醒; 当速度回落到阈值以下时,提醒应停止或恢复正常状态; 阈值未设置时应采用默认策略或不触发并明确说明。", "priority": "P1"}, {"feature": "速度趋势与骑行反馈", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要获得速度变化趋势与阶段反馈,以便理解当前骑行状态并优化节奏。", "acceptance": "系统应基于实时速度提供上升、下降或稳定等趋势反馈; 阶段反馈应在不干扰骑行的前提下呈现; 趋势判断应避免因瞬时抖动频繁变化; 当速度数据不可用时,趋势反馈应暂停并提示原因。", "priority": "P2"}, {"feature": "交互与配置", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过按键、语音和App对速度模块进行开关与样式配置,以便按个人习惯使用速度显示。", "acceptance": "用户可通过按键、语音或App开启/关闭速度模块显示; 用户可选择支持的显示样式或布局; 配置结果应在各入口保持一致; 骑行中不安全的复杂配置应限制到安全场景或App中完成。", "priority": "P2"}, {"feature": "队友位置采集与同步", "role": "团骑领队", "story": "作为团骑领队,我想要采集队友位置并通过手机、蜂窝或蓝牙链路同步到头盔用于HUD展示,以便实时掌握队伍分布。", "acceptance": "系统应支持采集已加入队伍成员的位置数据; 位置数据可通过可用链路同步到头盔; 当链路切换时应尽量保持同步连续性; 对未授权或未加入队伍的成员不得采集或展示位置。", "priority": "P0"}, {"feature": "HUD位置展示", "role": "团骑领队", "story": "作为团骑领队,我想要在HUD中以简洁图形看到队友方向、距离和数量,以便在不分散注意力的情况下掌握队伍情况。", "acceptance": "HUD应以简洁方式展示队友相对方向、距离和队友数量; 展示不得遮挡导航、速度等关键骑行信息; 当队友数量较多时,应采用聚合或简化策略; 数据更新应与同步状态保持一致。", "priority": "P1"}, {"feature": "队友状态识别", "role": "团骑领队", "story": "作为团骑领队,我想要识别队友在线、失联和掉队等状态并在HUD中提示,以便及时调整队伍节奏和安全策略。", "acceptance": "系统应识别并区分在线、失联、掉队等状态; 当队友状态变化时,HUD应及时提示; 掉队判断应基于合理规则避免误报; 对严重状态如长时间失联应提供更明显提醒。", "priority": "P1"}, {"feature": "交互与控制", "role": "团骑领队", "story": "作为团骑领队,我想要通过按键、语音和App控制队友位置显示开关与查看方式,以便根据路况灵活调整信息展示。", "acceptance": "用户可通过按键、语音或App开启/关闭队友位置显示; 用户可切换支持的查看方式或信息层级; 配置变更后HUD展示应及时更新; 骑行中高复杂度操作应被限制或简化。", "priority": "P2"}, {"feature": "异常与隐私保护", "role": "团骑领队", "story": "作为团骑领队,我想要系统处理定位权限、弱网和隐私授权等异常场景并确保位置共享可控,以便在保障队伍协同的同时保护成员隐私。", "acceptance": "系统应在位置共享前获取必要授权并记录授权状态; 当定位权限缺失、网络较弱或成员撤回授权时,应明确提示并停止或降级共享; 用户应可随时关闭自己的位置共享; 未授权成员的位置不得被展示给其他人。", "priority": "P0"}, {"feature": "电量状态管理", "role": "通勤骑手", "story": "作为通勤骑手,我想要看到头盔主电池剩余电量、低电提醒与续航预估,以便判断是否足够支撑当前行程。", "acceptance": "系统应显示当前剩余电量; 当电量低于阈值时应主动提醒; 在条件允许时应提供续航预估; 当电量状态变化明显时显示应及时更新; 若无法估算续航,应明确说明而非给出误导值。", "priority": "P0"}, {"feature": "充电状态管理", "role": "新手骑手", "story": "作为新手骑手,我想要看到头盔是否在充电、是否已充满以及预计充满时间,以便安排出发时间和充电计划。", "acceptance": "当设备接入电源时,系统应显示充电中状态; 当电量充满时,应显示已充满; 在可估算条件下应展示预计充满时间; 充电状态变化应及时同步到设备或App界面。", "priority": "P1"}, {"feature": "连接状态管理", "role": "新手骑手", "story": "作为新手骑手,我想要看到头盔与手机及相关链路的连接状态,以便降低首次使用和异常恢复成本。", "acceptance": "系统应展示头盔与手机及关键链路的连接中、已连接、断开等状态; 当连接失败或中断时,应给出可理解提示; 当连接恢复后状态应自动更新; 用户应能从主要界面或App快速查看连接状态。", "priority": "P0"}, {"feature": "故障与健康状态", "role": "新手骑手", "story": "作为新手骑手,我想要看到设备异常、关键故障和建议处理动作,以便及时维护设备并保障骑行安全。", "acceptance": "系统应识别一般异常与关键故障并分级展示; 对关键故障应提供明确建议处理动作; 故障信息应便于用户理解且可在需要时进一步查看详情; 当故障恢复后,状态应更新并保留必要记录。", "priority": "P0"}], "test_cases": [{"case_id": "TC-0061", "feature": "开始/结束导航控制", "title": "按键、语音、App共3种入口可开始导航", "precondition": "设备已正常开机并连接手机；App已登录；已存在可用目的地", "steps": "在HUD主界面通过按键选择并确认开始导航；结束当前导航并返回主界面；通 ition": "设备具备1个实体按键；语音模块正常；可观察监听状态", "steps": "按规范长按实体按键1次直至触发语音；确认进入监听状态；重复上述操作共30次；统计成功次数", "expected": "系统支持1个实体按键长按触发语音；连续30次按键触发测试中，进入监听状态成功30次；每次均有HUD或语音反馈", "priority": "P0"}, {"case_id": "TC-0258", "feature": "按键唤醒兜底", "title": "异常流程-短按实体按键不应误进入监听状态", "precondition": "设备具备1个实体按键；语音模块正常", "steps": "连续短按实体按键10次，每次按压时长小于长按阈值；观察设备状态；查看是否进入监听状态", "expected": "系统仅支持1个实体按键长按触发语音；短按10次不应误进入监听状态；监听成功次数应为0次", "priority": "P1"}, {"case_id": "TC-0259", "feature": "风噪场景拾音优化", "title": "正常流程-完成静止低速高速3类场景录音识别并输出日志与回录", "precondition": "设备具备录音、识别、日志导出和事件回录能力；可模拟静止、低速骑行、高速骑行场景", "steps": "在静止场景下录制并执行1轮语音识别；在低速骑行场景下录制并执行1轮语音识别；在高速骑行场景下录制并执行1轮语音识别；导出系统日志与事件回录文件", "expected": "已完成静止、低速骑行、高速骑行共3类场景测试；每类场景均有录音与识别结果；系统输出日志与事件回录文件各至少1份", "priority": "P1"}, {"case_id": "TC-0260", "feature": "风噪场景拾音优化", "title": "异常流程-缺少任一场景测试时不满足验收", "precondition": "设备具备录音和日志导出能力", "steps": "仅执行静止和低速骑行2类场景录音识别；不执行高速骑行场景；尝试生成测试报告", "expected": "由于仅完成2类场景，未覆盖静止、低速骑行、高速骑行共3类场景，因此不满足验收；测试报告应标记场景覆盖不足1类", "priority": "P2"}, {"case_id": "TC-0261", "feature": "导航语音控制", "title": "正常流程-联网与断网兜底各完成1轮4类导航指令演示", "precondition": "设备与手机已连接；已配置家庭和公司地址；支持联网与断网场景切换", "steps": "在手机联网状态下依次说出去公司、回家、取消导航、重复一遍4条指令并观察执行结果；切换手机为断网状态；再次依次说出去公司、回家、取消导航、重复一遍4条指令；查看执行日志", "expected": "系统至少支持去公司、回家、取消导航、重复一遍4类导航指令；在手机联网与断网兜底场景各完成1轮演示；每条指令均有对应执行结果或兜底反馈", "priority": "P0"}, {"case_id": "TC-0262", "feature": "导航语音控制", "title": "异常流程-非支持导航指令不应误执行为4类标准指令", "precondition": "设备与手机已连接；导航功能可用", "steps": "说出不在支持列表中的导航表达，例如打开地图收藏夹；观察系统反馈；查看日志中的识别与执行结果", "expected": "系统标准验收仅覆盖去公司、回家、取消导航、重复一遍4类指令；对非支持指令不应误执行为上述4类中的任意1类；日志中应记录未命中或失败", "priority": "P1"}, {"case_id": "TC-0263", "feature": "来电语音控制", "title": "正常流程-20次模拟来电中接听拒接挂断均可执行并记录日志", "precondition": "设备与手机蓝牙连接正常；可模拟来电；可查看通话控制日志", "steps": "发起20次模拟来电测试；在测试中轮流说出接听、拒接、挂断3条指令并覆盖三种动作；每次执行后检查手机通话状态；导出日志", "expected": "系统至少支持接听、拒接、挂断3条来电指令；连续20次模拟来电测试中，系统均能执行对应动作；20次均有日志记录", "priority": "P0"}, {"case_id": "TC-0264", "feature": "来电语音控制", "title": "异常流程-非来电状态下说出接听或拒接不应误操作", "precondition": "设备与手机蓝 const TAB_CONFIG = [
    {id: "hud", label: "HUD及头盔端", type: "tree"},
    {id: "app", label: "App端", type: "tree"},
    {id: "state", label: "状态场景对策", type: "table"},
    {id: "voice", label: "语音指令表", type: "table"},
    {id: "button", label: "按键映射表", type: "table"},
    {id: "light", label: "灯效定义表", type: "table"},
    {id: "voice_nav", label: "AI语音导航", type: "table"},
    {id: "user_stories", label: "用户故事", type: "table"},
    {id: "test_cases", label: "测试用例", type: "table"},
    {id: "page_mapping", label: "页面映射", type: "table"},
    {id: "dev_tasks", label: "开发任务", type: "table"},
];

// 分组功能清单
const HUD_MODULES = new Set(["导航","来电","音乐","消息","AI语音助手","Ai语音助手",
    "简易","简易路线","路线","主动安全预警提示","组队","摄像状态","胎温胎压",
    "开机动画","速度","设备状态","显示队友位置","头盔HUD",
    "实体按键交互","氛围灯交互","AI功能","语音交互","视觉交互","多模态交互"]);

const hudFeatures = DATA.features.filter(f => HUD_MODULES.has(f.module));
const appFeatures = DATA.features.filter(f => !HUD_MODULES.has(f.module));

function buildTabs() {
    const bar = document.getElementById('tabBar');
    const content = document.getElementById('contentArea');

    TAB_CONFIG.forEach((tab, idx) => {
        const el = document.createElement('div');
        el.className = 'tab' + (idx === 0 ? ' active' : '');
        el.dataset.target = tab.id;

        let count = 0;
        if (tab.id === 'hud') count = hudFeatures.length;
        else if (tab.id === 'app') count = appFeatures.length;
        else if (tab.id === 'state') count = DATA.state_scenarios.length;
        else if (tab.id === 'voice') count = DATA.voice_commands.length;
        else if (tab.id === 'button') count = DATA.button_mapping.length;
        else if (tab.id === 'light') count = DATA.light_effects.length;
        else if (tab.id === 'voice_nav') count = DATA.voice_nav.length;
        else if (tab.id === 'user_stories') count = (DATA.user_stories || []).length;
        else if (tab.id === 'test_cases') count = (DATA.test_cases || []).length;
        else if (tab.id === 'page_mapping') count = (DATA.page_mapping || []).length;
        else if (tab.id === 'dev_tasks') count = (DATA.dev_tasks || []).length;

        el.innerHTML = `${tab.label}<span class="badge">${count}</span>`;
        el.onclick = () => switchTab(tab.id);
        bar.appendChild(el);

        const section = document.createElement('div');
        section.id = 'section-' + tab.id;
        section.className = 'section' + (idx === 0 ? ' active' : '');

        if (tab.type === 'tree') {
            section.innerHTML = buildTreeView(tab.id === 'hud' ? hudFeatures : appFeatures);
        } else {
            section.innerHTML = buildTableView(tab.id);
        }
        content.appendChild(section);
    });
}

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.target === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + id));
    window.scrollTo(0, 0);
}

function buildTreeView(features) {
    let html = '<div class="stats">';
    const counts = {};
    features.forEach(f => { counts[f.priority] = (counts[f.priority]||0) + 1; });
    Object.entries(counts).sort().forEach(([p,c]) => {
        html += `<div class="stat"><div class="num">${c}</div><div class="label">${p}</div></div>`;
    });
    html += `<div class="stat"><div class="num">${features.length}</div><div class="label">总计</div></div></div>`;

    let currentL1 = null, currentL2 = null;
    let l1Html = '';

    features.forEach(f => {
        const tag = `<span class="tag tag-${f.priority}">${f.priority}</span>`;
        if (f.level === 'L1') {
            if (currentL2) { l1Html += '</div>'; currentL2 = null; }
            if (currentL1) l1Html += '</div></div>';
            l1Html += `<div class="l1" data-name="${f.name}" data-priority="${f.priority}">
                <div class="l1-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${tag} ${f.name} <span style="color:#999;font-size:12px;margin-left:auto">${f.interaction||''}</span>
                </div><div class="l1-body">`;
            currentL1 = f; currentL2 = null;
        } else if (f.level === 'L2') {
            if (currentL2) l1Html += '</div>';
            l1Html += `<div class="l2"><div class="l2-title" data-name="${f.name}" data-priority="${f.priority}">${tag} ${f.name}</div>`;
            currentL2 = f;
        } else if (f.level === 'L3') {
            l1Html += `<div class="l3" data-name="${f.name}" data-priority="${f.priority}">
                <span class="name">${tag} ${f.name}</span>
                <span class="desc">${f.description||''}</span>
                <span class="acc">${f.acceptance||''}</span></div>`;
        }
    });
    if (currentL2) l1Html += '</div>';
    if (currentL1) l1Html += '</div></div>';

    return html + l1Html;
}

function buildTableView(id) {
    let data, headers, keys;
    if (id === 'state') {
        data = DATA.state_scenarios;
        headers = ['前置状态','场景/操作','执行状态','HUD提示','灯光','语音','App提示','周期'];
        keys = ['pre_state','current','exec_state','hud','light','voice','app','cycle'];
    } else if (id === 'voice') {
        data = DATA.voice_commands;
        headers = ['分类','唤醒','用户说法','变体','系统动作','成功反馈','HUD反馈','失败反馈','优先级'];
        keys = ['category','wake','user_says','variants','action','success_voice','success_hud','fail_feedback','priority'];
    } else if (id === 'button') {
        data = DATA.button_mapping;
        headers = ['按键','场景','单击','双击','长按','组合键','反馈','备注'];
        keys = ['button','scene','single_click','double_click','long_press','combo','feedback','note'];
    } else if (id === 'light') {
        data = DATA.light_effects;
        headers = ['场景','颜色','模式','频率','时长','优先级','备注'];
        keys = ['trigger','color','mode','frequency','duration','priority','note'];
    } else if (id === 'voice_nav') {
        data = DATA.voice_nav;
        headers = ['场景','触发','用户输入','AI动作','HUD显示','语音播报','灯光反馈','异常兜底','优先级','备注'];
        keys = ['scene','trigger','user_input','ai_action','hud_display','voice_output','light_effect','fallback','priority','note'];
    } else if (id === 'user_stories') {
        data = DATA.user_stories || [];
        headers = ['功能名','角色','用户故事','验收条件','优先级'];
        keys = ['feature','role','story','acceptance','priority'];
    } else if (id === 'test_cases') {
        data = DATA.test_cases || [];
        headers = ['用例ID','功能名','标题','前置条件','步骤','预期结果','优先级'];
        keys = ['case_id','feature','title','precondition','steps','expected','priority'];
    } else if (id === 'page_mapping') {
        data = DATA.page_mapping || [];
        headers = ['页面','父页面','平台','功能','入口','优先级','备注'];
        keys = ['page','parent','platform','features','entry','priority','note'];
    } else if (id === 'dev_tasks') {
        data = DATA.dev_tasks || [];
        headers = ['任务ID','功能','描述','角色','工时','依赖','迭代','优先级','备注'];
        keys = ['task_id','feature','task','assignee','effort_days','dependency','sprint','priority','note'];
    }

    if (!data || data.length === 0) return '<p style="padding:20px;color:#999;">暂无数据</p>';

    let html = '<table><thead><tr>';
    headers.forEach(h => { html += `<th>${h}</th>`; });
    html += '</tr></thead><tbody>';
    data.forEach(row => {
        html += '<tr>';
        keys.forEach(k => {
            let val = row[k] || '';
            if (k === 'priority' && val) val = `<span class="tag tag-${val}">${val}</span>`;
            html += `<td>${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

function filterAll() {
    const q = document.getElementById('search').value.toLowerCase();
    const p = document.getElementById('priorityFilter').value;

    document.querySelectorAll('.l1').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q) || el.textContent.toLowerCase().includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('.l2, .l3').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('tbody tr').forEach(tr => {
        const text = tr.textContent.toLowerCase();
        const matchQ = !q || text.includes(q);
        const tagEl = tr.querySelector('.tag');
        const rowP = tagEl ? tagEl.textContent.trim() : '';
        const matchP = !p || rowP === p;
        tr.classList.toggle('hidden', !(matchQ && matchP));
    });
}

function expandAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.add('open'));
}
function collapseAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.remove('open'));
}

buildTabs();
const firstBody = document.querySelector('.l1-body');
if (firstBody) firstBody.classList.add('open');
</script></body></html>
