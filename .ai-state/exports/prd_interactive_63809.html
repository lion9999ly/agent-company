.stats-bar .stat-value { font-weight: 700; color: #fff; }
.hidden { display: none !important; }

用户反馈执行状态。", "priority": "P1"}, {"feature": "备份与解绑联动(恢复出厂设置)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在恢复出厂设置前收到备份提醒并在恢复后自动解绑设备,以便减少重要数据损失并顺利重新配对使用。", "acceptance": "恢复前提示用户可进行数据备份; 用户可跳转或进入备份流程; 恢复完成后设备自动与原账号解绑; 系统提示用户重新配对或重新绑定设备。", "priority": "P1"}, {"feature": "防盗与隐私保护(恢复出厂设置)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在头盔丢失时远程清除个人数据,以便降低隐私泄露和账号信息被滥用的风险。", "acceptance": "支持在设备丢失场景下通过远程方式发起个人数据清除; 发起操作需经过身份校验; 清除后个人隐私数据不可在设备端恢复读取; 用户可收到清除结果反馈。", "priority": "P0"}, {"feature": "成就体系框架(用户成就)", "role": "后台管理员", "story": "作为后台管理员,我想要定义成就分类、等级、解锁规则与统一数据结构,以便稳定支撑成就系统扩展和前后端一致展示。", "acceptance": "系统支持配置成就分类、等级和解锁规则; 成就数据采用统一结构存储与返回; 不同成就类型可复用同一套规则框架; 前后端可基于统一字段完成展示与计算。", "priority": "P1"}, {"feature": "骑行与探索成就(用户成就)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要获得覆盖里程、连续打卡、天气、路线、城市与跨省探索的成就,以便记录我的骑行经历并增强探索动力。", "acceptance": "系统支持按里程、连续打卡、天气条件、路线完成、城市到达和跨省行为解锁成就; 成就解锁规则清晰可追踪; 满足条件后自动发放对应成就。", "priority": "P1"}, {"feature": "社交成就(用户成就)", "role": "团骑领队", "story": "作为团骑领队,我想要因组队、带队和社区互动行为获得社交类成就,以便体现我的组织贡献并激励更多社交参与。", "acceptance": "系统支持围绕组队、带队、邀请、互动等行为配置社交成就; 满足条件后自动发放; 成就记录可区分不同社交行为来源。", "priority": "P2"}, {"feature": "安全与收集成就(用户成就)", "role": "新手骑手", "story": "作为新手骑手,我想要通过安全骑行、完成教程、设置SOS和收集徽章获得成就,以便在学习和规范使用过程中获得激励。", "acceptance": "系统支持安全骑行、教程完成、SOS设置和徽章收集类成就; 用户完成对应行为后自动更新进度或解锁; 成就条件需可理解且可验证。", "priority": "P1"}, {"feature": "成就展示与分享(用户成就)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在个人主页、头像框、HUD开机界面和社区中展示并分享成就,以便表达个人风格并提升内容传播效果。", "acceptance": "成就可在个人主页展示; 支持头像框或类似身份标识应用; HUD开机阶段可展示选定成就内容; 支持分享到社区并正确展示成就信息。", "priority": "P2"}, {"feature": "进度追踪与提醒(用户成就)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要实时查看成就进度并在接近解锁或解锁时收到提醒,以便及时调整骑行计划并获得达成反馈。", "acceptance": "系统实时展示成就进度; 接近解锁时提供提醒; 解锁成功时提供明确通知; 提醒内容不过度打扰且可被用户理解。", "priority": "P1"}, {"feature": "启动展示内容(开机动画)", "role": "后台管理员", "story": "作为后台管理员,我想要管理品牌标识、安全提示和设备信息等开机展示内容,以便统一品牌表达并确保关键提示在启动阶段可见。", "acceptance": "支持配置品牌标识、安全提示和设备信息等开机展示内容; 不同内容有明确展示顺序或规则; 配置生效后设备端按规则展示。", "priority": "P1"}, {"feature": "启动流程控制(开机动画)", "role": "通勤骑手", "story": "作为通勤骑手,我想要开机动画支持播放、跳过、超时和异常分支控制,以便在保证可用性的前提下尽快进入可骑行状态。", "acceptance": "开机动画支持正常播放; 在允许场景下可跳过; 超时或异常时自动进入可用优先分支; 不得因动画问题阻塞核心功能可用性。", "priority": "P0"}, {"feature": "多端联动反馈(开机动画)", "role": "新手骑手", "story": "作为新手骑手,我想要头盔、手机与连接模块在启动时同步反馈状态,以便减少我对设备是否正常启动和连接成功的不确定感。", "acceptance": "头盔、手机和连接模块在启动阶段提供一致或可对应的状态反馈; 用户可识别当前启动进度与连接状态; 任一端异常时有明确提示。", "priority": "P1"}, {"feature": "个性化与配置管理(开机动画)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要配置开机动画样式、显示内容和首次引导策略,以便让设备启动体验更符合我的偏好和使用场景。", "acceptance": "用户可配置开机动画样式; 可选择展示的内容项; 可设置首次引导相关策略; 配置保存后在后续启动中生效。", "priority": "P2"}, {"feature": "电源与续航异常(设备状态)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在低电、超低电和续航不足时及时收到提示,以便提前充电或调整行程避免骑行中突然关机。", "acceptance": "系统可识别低电、超低电和续航不足状态; 在对应阈值触发时及时提示用户; 提示内容包含风险等级或建议动作; 关键低电状态优先展示。", "priority": "P0"}, {"feature": "充电与供电边界(设备状态)", "role": "通勤骑手", "story": "作为通勤骑手,我想要了解充电中、满电、异常供电和边充边用的边界提示,以便安全管理设备供电并避免错误使用。", "acceptance": "系统可识别充电中、满电、异常供电和边充边用状态; 对异常供电给出明确警示; 对边充边用场景给出限制或风险提示; 状态变化时及时更新显示。", "priority": "P1"}, {"feature": "连接与通信异常(设备状态)", "role": "团骑领队", "story": "作为团骑领队,我想要在手机、蓝牙音频及外设连接异常时被快速提示并自动降级,以便减少队伍沟通中断和导航失效的影响。", "acceptance": "系统持续监测手机、蓝牙音频及外设连接状态; 连接异常时快速提示用户; 支持进入预设降级模式; 降级后核心可用功能尽量保留。", "priority": "P0"}, {"feature": "环境与硬件边界(设备状态)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要在温度、传感器和关键硬件异常时收到提示,以便避免在不可靠状态下继续使用设备。", "acceptance": "系统可识别温度异常、传感器异常和关键硬件异常; 异常发生时及时提示; 对影响安全或核心功能的异常给出停止使用或谨慎使用建议。", "priority": "P0"}, {"feature": "显示与交互异常(设备状态)", "role": "新手骑手", "story": "作为新手骑手,我想要在HUD不可读、亮度异常或交互受限时收到提示并进入降级模式,以便在异常情况下仍能安全判断设备状态。", "acceptance": "系统可识别HUD不可读、亮度异常和交互受限状态; 异常时提供明确提示; 必要时自动切换到安全降级模式; 降级后避免继续展示复杂交互。", "priority": "P0"}, {"feature": "日志与售后诊断(设备状态)", "role": "后台管理员", "story": "作为后台管理员,我想要记录关键异常事件并支持售后导出诊断信息,以便提升问题复现效率和维修处理速度。", "acceptance": "系统记录关键异常事件及时间信息; 日志可用于售后诊断导出; 导出内容包含定位问题所需的核心字段; 日志记录不影响设备正常运行。", "priority": "P1"}, {"feature": "基础信息简显(简易路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要用最少元素查看当前路线核心信息,以便在骑行中快速获取导航重点并降低分心。", "acceptance": "界面仅展示当前路线所需的核心信息; 非必要元素被隐藏或弱化; 用户能快速识别下一步导航重点; 显示内容符合低干扰原则。", "priority": "P0"}, {"feature": "简化导航入口(简易路线)", "role": "新手骑手", "story": "作为新手骑手,我想要通过低步骤入口进入简易路线并获得开始引导,以便更容易上手导航功能。", "acceptance": "用户可通过少量步骤进入简易路线模式; 首次或关键场景下提供开始引导; 入口位置清晰易发现; 进入流程不复杂。", "priority": "P1"}, {"feature": "简化消息提醒(简易路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要仅在关键节点收到轻量提醒,以便避免信息过载并专注道路环境。", "acceptance": "系统仅在关键导航节点触发提醒; 非关键消息不主动打扰; 提醒内容简短明确; 骑行中不会连续造成信息轰炸。", "priority": "P0"}, {"feature": "快捷交互控制(简易路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中通过最少操作完成路线显示切换和播报控制,以便减少手动操作带来的风险。", "acceptance": "支持少步骤完成路线显示切换; 支持快速控制播报开关或模式; 骑行中操作路径简短明确; 不要求复杂多层交互。", "priority": "P0"}, {"feature": "显示与安全约束(简易路线)", "role": "后台管理员", "story": "作为后台管理员,我想要限制简易路线模式下的显示复杂度和异常状态处理规则,以便确保骑行安全优先于信息丰富度。", "acceptance": "简易路线模式下有明确的显示复杂度上限; 异常状态时自动减少非必要信息; 安全相关提示优先级高于普通信息; 不允许展示影响骑行安全的复杂内容。", "priority": "P0"}, {"feature": "账号注册与登录(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要通过手机号或邮箱注册登录并完成首次身份建立,以便快速开始使用设备和App服务。", "acceptance": "支持手机号注册登录; 支持邮箱注册登录; 首次登录后可完成基础身份建立; 注册登录流程清晰且可成功进入账号体系。", "priority": "P0"}, {"feature": "个人资料管理(身份认证)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要管理昵称、头像、性别、年龄段、地区、经验和车型等资料,以便完善个人身份并获得更匹配的服务体验。", "acceptance": "用户可查看和编辑昵称、头像、性别、年龄段、地区、经验和车型等资料; 修改后可保存并生效; 资料展示与存储保持一致。", "priority": "P1"}, {"feature": "隐私授权与最小化(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要在注册和使用过程中了解信息用途、进行选择性授权并只被收集最少必要信息,以便更安心地使用产品。", "acceptance": "系统明确说明信息收集用途; 用户可对可选信息进行选择性授权; 仅存储完成服务所需的最小必要信息; 未授权的可选信息不得默认采集。", "priority": "P0"}, {"feature": "账号安全(身份认证)", "role": "后台管理员", "story": "作为后台管理员，我想要提供账号安全能力，以便降低盗号和误用风险，保障用户账号可信使用。", "acceptance": "支持基础身份认证与安全校验；异常登录或高风险操作可触发二次验证；用户可感知账号安全状态；安全策略生效后不影响正常登录主流程。", "priority": "P0"}, {"feature": "设备绑定认证(身份认证)", "role": "通勤骑手", "story": "作为通勤骑手，我想要将账号与头盔设备建立可信绑定关系，以便确保设备归属明确并减少被他人误连误用。", "acceptance": "用户可发起设备绑定；绑定成功后账号与设备形成唯一可信关系；更换设备或解绑时需经过身份校验；绑定状态可查询且异常绑定可提示处理。", "priority": "P0"}, {"feature": "会话与授权管理(身份认证)", "role": "后台管理员", "story": "作为后台管理员，我想要管理登录态、令牌有效期和多端授权状态，以便保障账号访问安全并支持问题排查。", "acceptance": "支持会话有效期管理；支持多端登录与授权状态查看；用户可主动退出指定设备或全部设备；令牌失效后需重新认证；异常会话可被识别和清理。", "priority": "P0"}, {"feature": "合规与审计(身份认证)", "role": "后台管理员", "story": "作为后台管理员，我想要记录关键身份操作日志，以便满足隐私合规要求并支持问题追溯。", "acceptance": "关键身份操作均有审计日志；日志包含时间、操作类型、主体与结果；日志访问受权限控制；支持按账号或时间范围检索；日志保留策略符合合规要求。", "priority": "P0"}, {"feature": "语音唤醒与会话控制(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过唤醒词触发语音助手并保持短会话，以便在骑行中少动手完成连续操作。", "acceptance": "支持唤醒词触发；唤醒后在短时间内可连续下达指令；支持按键补充唤醒；会话超时后自动退出；唤醒与退出状态有明确反馈。", "priority": "P0"}, {"feature": "导航语音控制(语音交互)", "role": "摩旅骑手", "story": "作为摩旅骑手，我想要通过语音发起导航、改路和控制导航播报，以便在长途骑行中更安全高效地调整路线。", "acceptance": "支持语音发起导航到指定地点；支持改路、取消导航和重算路线；支持开启、关闭或调整导航播报；执行结果有明确语音或HUD反馈；失败时提供可理解提示。", "priority": "P0"}, {"feature": "骑行信息语音查询与控制(语音交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要通过语音查询速度、电量和设备状态等信息，以便在不分散注意力的情况下掌握骑行关键状态。", "acceptance": "支持查询速度、电量、连接状态等核心信息；查询结果可通过语音或HUD返回；信息应与当前设备状态一致；无法获取时给出明确原因与兜底提示。", "priority": "P1"}, {"feature": "音频与通信控制(语音交互)", "role": "团骑领队", "story": "作为团骑领队，我想要通过语音控制音乐、来电和对讲，以便在带队过程中快速处理音频与通信事务。", "acceptance": "支持播放、暂停、切歌和音量控制；支持接听、拒接来电；支持对讲开启、关闭或切换；执行后有明确反馈；在不可执行场景下给出原因说明。", "priority": "P1"}, {"feature": "语音反馈与异常兜底(语音交互)", "role": "新手骑手", "story": "作为新手骑手，我想要在语音识别成功或失败时获得明确反馈和替代路径，以便知道系统当前状态并继续完成操作。", "acceptance": "识别成功时反馈执行结果；识别失败时说明失败原因或不确定状态；提供重试、按键操作或简化指令等兜底路径；反馈方式在骑行中易感知。", "priority": "P0"}, {"feature": "多语言与个性化(语音交互)", "role": "摩旅骑手", "story": "作为摩旅骑手，我想要设置多语言和语音播报偏好，以便在不同出行场景下获得更适合自己的交互体验。", "acceptance": "支持基础多语言切换；支持设置播报音色、音量或简洁程度等偏好；设置生效后在语音交互中统一体现；切换失败时有提示。", "priority": "P2"}, {"feature": "状态展示与反馈(AI语音助手)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在HUD上看到语音助手统一的状态展示并联动语音或灯光反馈，以便快速理解系统是否正在工作。", "acceptance": "HUD可展示待机、唤醒、识别、执行和异常等状态；状态变化时可联动提示音或灯光；视觉语言统一且易区分；状态反馈不遮挡核心骑行信息。", "priority": "P0"}, {"feature": "场景状态机(AI语音助手)", "role": "后台管理员", "story": "作为后台管理员，我想要管理语音助手从待机到唤醒、识别、播报、异常和离线的状态流转规则，以便保证系统行为稳定一致。", "acceptance": "定义完整状态集合与流转规则；互斥状态不可同时出现；异常与离线状态可正确进入和退出；超时后可回到安全默认状态；状态切换可被记录与排查。", "priority": "P0"}, {"feature": "语音反馈与多模态提示(AI语音助手)", "role": "新手骑手", "story": "作为新手骑手，我想要通过HUD、提示音、播报和简化按键退出获得多模态反馈，以便在骑行中更容易感知和控制语音助手。", "acceptance": "同一关键状态至少支持两种反馈方式；支持通过简化按键快速退出当前语音流程；反馈节奏清晰不过载；在高噪环境下仍有可感知提示。", "priority": "P1"}, {"feature": "声学环境异常处理(AI语音助手)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在风噪、爆音、多人串音或未识别时获得明确状态反馈和处理结果，以便知道语音助手是否还能继续使用。", "acceptance": "可识别常见声学异常场景；异常发生时HUD或语音给出明确提示；系统可重试、降噪或建议改用按键；异常结束后可恢复正常交互。", "priority": "P0"}, {"feature": "连接与资源异常处理(AI语音助手)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在手机断连、云端不可达、算力不足或电量受限时获得可感知的降级处理，以便在异常情况下仍能安全使用核心能力。", "acceptance": "可识别连接、云端、算力和电量类异常；异常时提示当前受影响能力；系统执行本地优先、关闭非核心能力或限制交互等降级策略；恢复后可自动或手动回到正常状态。", "priority": "P0"}, {"feature": "骑行安全边界控制(AI语音助手)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在高速、复杂路况和高认知负荷场景下自动限制语音助手的展示与交互复杂度，以便优先保障骑行安全。", "acceptance": "系统可识别高风险骑行场景；高风险时限制复杂卡片、长播报或多轮交互；仅保留必要提示与核心操作；风险降低后可恢复完整能力。", "priority": "P0"}, {"feature": "状态一致性与恢复机制(AI语音助手)", "role": "后台管理员", "story": "作为后台管理员，我想要保证语音状态机在异常切换、超时和恢复后保持一致，以便避免HUD残留错误状态并提升系统稳定性。", "acceptance": "异常中断后状态可正确回收；超时后自动回到默认安全状态；恢复后HUD与语音状态一致；不存在残留高亮、错误图标或不可退出状态；相关恢复过程可记录。", "priority": "P0"}, {"feature": "新手入门课程(用户学习与新手引导)", "role": "新手骑手", "story": "作为新手骑手，我想要在首次配对成功后自动进入完整新手教学流程，并可选择跳过，以便快速了解设备核心能力。", "acceptance": "首次配对成功后自动触发教学；教学覆盖核心功能；支持跳过、继续和稍后学习；完成或跳过状态可被记录；再次进入有明确入口。", "priority": "P1"}, {"feature": "设备连接学习(用户学习与新手引导)", "role": "新手骑手", "story": "作为新手骑手，我想要学习配对、语音唤醒与核心连接能力的操作方法，以便顺利完成设备基础使用。", "acceptance": "课程包含配对、连接检查和语音唤醒教学；步骤清晰可操作；关键步骤支持演示或模拟；学习后用户可独立完成基础连接流程。", "priority": "P1"}, {"feature": "HUD与交互学习(用户学习与新手引导)", "role": "新手骑手", "story": "作为新手骑手，我想要学习实体按键、HUD卡片切换与信息中岛等核心交互，以便更快上手日常骑行操作。", "acceptance": "课程覆盖实体按键功能、HUD卡片切换和信息中岛含义；支持分步骤学习；学习中有操作反馈；完成后可进行简单测验或确认。", "priority": "P1"}, {"feature": "安全与合规学习(用户学习与新手引导)", "role": "新手骑手", "story": "作为新手骑手，我想要了解安全认证、SOS、预警提示和紧急联系人设置，以便在关键场景下正确使用安全能力。", "acceptance": "课程讲解安全认证、SOS触发方式、预警提示含义和紧急联系人设置；关键安全内容不可完全省略；学习后用户可完成紧急联系人配置。", "priority": "P0"}, {"feature": "学习反馈与成长(用户学习与新手引导)", "role": "新手骑手", "story": "作为新手骑手，我想要保存学习进度、获得奖励并看到成长反馈，以便持续完成学习并建立使用信心。", "acceptance": "学习进度自动保存；完成课程后可发放奖励或徽章；用户可查看已学内容与成长反馈；中断后可从上次进度继续。", "priority": "P2"}, {"feature": "功能进阶学习(用户学习与新手引导)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要随时进入可重学的进阶课程并按主题学习，以便深入掌握更多高级功能。", "acceptance": "提供统一进阶课程入口；支持按主题分类进入；支持重复学习；课程完成状态可记录但不影响再次进入；入口易于发现。", "priority": "P2"}, {"feature": "语音交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在骑行中通过低干扰语音唤醒、指令理解与结果播报完成操作，以便减少手动操作并提升安全性。", "acceptance": "支持低干扰唤醒；可理解常用骑行指令；结果通过语音或HUD播报；在骑行中响应及时；失败时有明确反馈与兜底方案。", "priority": "P0"}, {"feature": "视觉交互（ADAS/追踪）(AI功能)", "role": "摩旅骑手", "story": "作为摩旅骑手，我想要基于视觉识别获得风险提示与目标追踪辅助信息，以便更早感知周边风险并提升骑行判断。", "acceptance": "可输出基础风险提示；支持目标追踪辅助信息展示；提示应简洁且不干扰骑行；误报漏报有可接受控制；异常时可关闭或降级。", "priority": "P1"}, {"feature": "多模态感知（陀螺仪/心率）(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要融合姿态、生理与设备状态获得更稳健的骑行判断，以便在复杂场景下得到更可靠的辅助提示。", "acceptance": "可接入陀螺仪、心率和设备状态等数据；融合后输出稳定判断结果；异常数据不会导致明显错误提示；数据不可用时系统可降级运行。", "priority": "P1"}, {"feature": "AI内容生成(AI功能)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要对骑行影像与轨迹自动生成摘要、标签和高光，以便更高效地整理和发布内容。", "acceptance": "支持对骑行影像和轨迹生成摘要；可自动打标签并识别高光片段；生成结果可预览和编辑；失败时保留原始素材不受影响。", "priority": "P2"}, {"feature": "AI配置与学习(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手，我想要根据自己的习惯调整AI提示强度、显示策略和个性化偏好，以便获得更适合自己的骑行辅助体验。", "acceptance": "支持配置提示强度、显示策略和个性化偏好；系统可根据使用习惯逐步学习并优化默认设置；用户可随时查看、修改或恢复默认配置。", "priority": "P2"}, {"feature": "AI运行与降级管理(AI功能)", "role": "后台管理员", "story": "作为后台管理员，我想要管理AI算力来源、功耗状态与异常降级，以便保障AI能力稳定可发售。", "acceptance": "支持识别本地与云端算力来源；可监控功耗与运行状态；异常时执行预设降级策略；核心能力优先保留；降级与恢复过程可记录和追踪。", "priority": "P0"}, {"feature": "信息分类(通知中心)", "role": "通勤骑手", "story": "作为通勤骑手，我想要按系统通知、社交互动和设备状态三类查看通知，以便快速筛选重要信息并减少干扰。", "acceptance": "通知按系统通知、社交互动和设备状态三类聚合展示；分类清晰且可快速切换；新通知进入后归类正确；重要设备状态通知可优先展示。", "priority": "P1"}, {"feature": "设备通知列表(通知中心)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在通知中心集中查看设备故障、电量过低、保养提醒等关键消息,以便及时处理问题并避免影响日常骑行。", "acceptance": "当设备产生故障、电量低或保养提醒时,通知中心应按时间倒序集中展示; 每条通知应包含类型、时间、摘要和状态; 用户可进入通知中心快速查看未处理的重要设备消息。", "priority": "P0"}, {"feature": "通知偏好设置(通知中心)", "role": "通勤骑手", "story": "作为通勤骑手,我想要按类别开关通知并设置免打扰时段,以便减少非必要打扰并保留关键提醒。", "acceptance": "用户可按故障、电量、保养等类别分别开启或关闭通知; 用户可设置免打扰开始和结束时间; 免打扰期间非关键通知静默,关键安全类通知仍可正常提醒。", "priority": "P1"}, {"feature": "通知历史与已读管理(通知中心)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看历史通知并管理已读状态,以便回溯重要设备事件并保持通知中心整洁。", "acceptance": "系统应保留可查询的历史通知列表; 用户可单条标记已读、全部标记已读和批量清理; 已读与未读状态应正确展示并在刷新后保持一致。", "priority": "P2"}, {"feature": "路线发起与同步(导航)", "role": "通勤骑手", "story": "作为通勤骑手,我想要将手机地图路线投送到头盔并建立导航会话,以便在骑行中直接通过头盔获得导航指引。", "acceptance": "用户在手机端发起路线后可一键投送至头盔; 头盔成功接收后应建立导航会话并显示起始导航信息; 若同步失败,系统应给出明确失败原因和重试入口。", "priority": "P0"}, {"feature": "离线导航与缓存兜底(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要在断连、弱网或无网情况下继续使用头盔端导航,以便在偏远路段也不会失去路线指引。", "acceptance": "在有网时系统应提前缓存当前路线和必要地图数据; 当手机断连、弱网或无网时,头盔端应自动切换为离线导航继续提供基础指引; 若缓存不足,系统应提前提示用户风险。", "priority": "P0"}, {"feature": "在线导航与网络切换(导航)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要利用蜂窝通讯模块获得在线导航并在网络变化时自动降级,以便尽可能保持导航连续性。", "acceptance": "设备在网络可用时应使用在线导航能力获取实时路线信息; 当网络质量下降或中断时应自动降级到可用模式且不中断当前会话; 网络恢复后应自动恢复在线能力并提示状态变化。", "priority": "P0"}, {"feature": "场景识别与模式切换(导航)", "role": "新手骑手", "story": "作为新手骑手,我想要系统基于IMU与速度自动识别骑车或步行场景并切换导航策略,以便获得更符合当前状态的导航提示。", "acceptance": "系统应基于IMU和速度数据识别骑行与步行场景; 场景切换后应自动应用对应导航策略和提示频率; 误判时用户应可手动纠正并在当前会话中生效。", "priority": "P1"}, {"feature": "HUD导航呈现(导航)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD以低干扰方式查看关键导航信息,以便在不频繁低头的情况下安全骑行。", "acceptance": "HUD应展示转向、距离、道路名称等关键导航信息; 信息布局应避免遮挡主要视野并保持高可读性; 在复杂路口前应适度增强提示,平稳路段保持低干扰显示。", "priority": "P0"}, {"feature": "偏航与重算(导航)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在偏离路线时被快速识别并自动重算,以便减少走错路带来的中断和焦虑。", "acceptance": "当用户偏离既定路线时,系统应在合理时间内识别偏航; 系统应自动发起重算并尽快给出新路线; 重算期间HUD应提示状态且不出现长时间无指引情况。", "priority": "P0"}, {"feature": "隐私指示与合规(摄像状态)", "role": "后台管理员", "story": "作为后台管理员,我想要提供硬件级隐私灯、状态定义、联锁机制与合规说明,以便满足隐私合规要求并降低误录风险。", "acceptance": "设备在摄像相关状态下应有明确硬件级隐私指示灯; 隐私灯状态需与实际摄像状态联动且不可被软件单独伪造; 系统应提供状态定义、联锁规则和合规说明文档供用户查看。", "priority": "P0"}, {"feature": "录制状态显示(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在HUD查看待机、录像、拍照与暂停等录制状态,以便确认当前是否成功记录画面。", "acceptance": "HUD应清晰显示待机、录像、拍照、暂停等核心状态; 状态切换后显示应在短时间内同步更新; 不同状态应有可区分的图标或文案提示。", "priority": "P0"}, {"feature": "存储与文件状态(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要查看剩余存储、写入异常与循环覆盖状态,以便避免素材丢失或录制失败。", "acceptance": "系统应显示剩余存储容量和可录制时长估算; 当发生写入异常时应及时告警并说明影响; 开启循环覆盖时应明确提示覆盖策略和当前状态。", "priority": "P1"}, {"feature": "电量与温度联动(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在电量或温度异常时收到摄像能力降级提示,以便及时调整录制计划并保护设备。", "acceptance": "当电量低或温度过高时,系统应根据策略限制分辨率、帧率或录制能力; HUD或设备界面应明确提示当前降级原因和影响; 状态恢复后应自动恢复可用能力或提示用户手动恢复。", "priority": "P1"}, {"feature": "连接与控制反馈(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要知道摄像控制命令是否执行成功以及与手机的连接状态,以便确认操作有效并及时排查问题。", "acceptance": "用户发起开始录制、停止录制、拍照等命令后,系统应返回成功、失败或超时结果; 系统应持续展示与手机的连接状态; 连接异常时应提示可能影响的控制能力。", "priority": "P1"}, {"feature": "取景与画面状态(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要查看摄像头开关、取景可用性与ADAS视觉处理状态,以便判断当前画面是否可用以及系统是否正在占用视觉资源。", "acceptance": "系统应显示摄像头是否开启、当前是否可取景; 当ADAS视觉处理中影响取景或画面能力时应明确提示; 状态变化应实时更新并可被用户感知。", "priority": "P2"}, {"feature": "消息接入与同步(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要接收手机通知并同步为可在HUD展示的标准消息卡片,以便骑行中快速获取重要消息。", "acceptance": "系统应接入手机通知并转换为统一格式的消息卡片; 支持常见消息类型的标题、摘要和来源展示; 同步失败或权限缺失时应提示用户完成授权或重试。", "priority": "P0"}, {"feature": "HUD提醒展示(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD以低干扰卡片方式查看消息并快速处理,以便兼顾信息获取与骑行安全。", "acceptance": "HUD消息卡片应以低干扰方式短时展示,不遮挡核心骑行信息; 用户可执行忽略、稍后查看等快速处理操作; 高优先级消息可适度增强提醒,普通消息应自动收起。", "priority": "P0"}, {"feature": "语音播报与控制(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过语音播报消息摘要并使用语音进行处理,以便在不分散视线的情况下完成消息交互。", "acceptance": "系统应支持播报消息摘要而非完整敏感内容; 用户可通过语音执行读取、忽略、回复模板等基础操作; 在高噪环境下识别失败时应提供明确反馈且不重复打扰。", "priority": "P1"}, {"feature": "安全策略与免打扰(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统根据骑行状态控制消息打扰强度,以便优先保障安全骑行。", "acceptance": "系统应根据速度、转弯、路口等骑行状态动态调整消息提醒强度; 高风险场景下普通消息应延后或静默; 用户可配置基础免打扰策略且关键联系人或紧急消息可按规则例外提醒。", "priority": "P0"}, {"feature": "消息记录与设置(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看最近消息摘要并进入基础设置,以便在停车后统一回顾消息并调整提醒方式。", "acceptance": "系统应提供最近消息摘要列表; 用户可从该入口进入消息相关基础设置; 已处理和未处理消息应有清晰区分并支持简单筛选。", "priority": "P2"}, {"feature": "隐私与数据保护(消息)", "role": "通勤骑手", "story": "作为通勤骑手,我想要控制消息内容在HUD和语音中的暴露范围,以便降低骑行中隐私泄露风险。", "acceptance": "用户可配置仅显示来源、不显示正文摘要或隐藏敏感字段; 语音播报应支持隐私模式; 设置生效后HUD与语音输出应遵循统一隐私策略。", "priority": "P1"}, {"feature": "头盔/手机互联(设备Tab)", "role": "新手骑手", "story": "作为新手骑手,我想要完成头盔与手机的首次绑定并查看连接状态,以便顺利使用基础互联能力。", "acceptance": "用户可通过清晰流程完成首次绑定; 设备Tab应展示当前连接状态、最近连接结果和基础互联能力状态; 连接失败时应提供排查指引和重试入口。", "priority": "P0"}, {"feature": "设备状况(设备Tab)", "role": "通勤骑手", "story": "作为通勤骑手,我想要集中查看设备在线状态、故障、温度、电量与健康信息,以便及时发现异常并保障出行可靠性。", "acceptance": "设备Tab应集中展示在线状态、故障、电量、温度和关键健康信息; 异常项应高亮并可进入详情; 数据刷新后应保持状态准确且延迟可接受。", "priority": "P0"}, {"feature": "行车记录(设备Tab)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要管理骑行录像、拍照与本地记录文件,以便快速查找、导出和整理素材。", "acceptance": "用户可查看录像、照片和本地记录文件列表; 支持预览、删除、导出和按时间筛选; 文件异常或缺失时应有明确提示。", "priority": "P1"}, {"feature": "高光时刻(设备Tab)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要从骑行录像中快速标记、提取和管理精彩片段,以便高效沉淀可分享内容。", "acceptance": "用户可在录像中添加高光标记并生成片段; 支持查看、重命名、删除和导出高光片段; 片段生成后应保留与原始录像的关联信息。", "priority": "P2"}, {"feature": "AI剪片(设备Tab)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要基于骑行录像自动生成短视频成片,以便降低剪辑门槛并快速分享骑行内容。", "acceptance": "用户可选择录像素材并发起AI剪片; 系统应在可接受时间内生成可预览的短视频成片; 用户可保存、导出或放弃生成结果,失败时应提示原因。", "priority": "P2"}, {"feature": "骑行轨迹(设备Tab)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要记录并查看骑行路线、时长、速度与里程数据,以便回顾旅程并管理骑行经历。", "acceptance": "系统应自动记录每次骑行的轨迹、时长、平均速度和里程; 用户可查看历史骑行详情和轨迹地图; 数据异常或缺失时应有提示并标注不完整状态。", "priority": "P1"}, {"feature": "设备设置与升级(设备Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要管理设备基础设置、固件升级与升级结果回执,以便保障设备版本一致性和功能稳定性。", "acceptance": "系统应支持查看和修改基础设备设置; 用户可发起固件升级并查看下载、安装、完成或失败状态; 升级结束后应生成结果回执并可追踪失败原因。", "priority": "P0"}, {"feature": "部件生命周期管理(设备Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要查看部件信息、认证状态、健康度、保养与更换历史,以便进行设备全生命周期管理。", "acceptance": "系统应展示部件型号、序列信息、认证状态和健康度; 支持查看保养记录与更换历史; 当部件接近寿命或认证异常时应触发提醒。", "priority": "P1"}, {"feature": "实时速度显示(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD持续看到当前车速,以便随时掌握速度并安全骑行。", "acceptance": "HUD应持续显示当前车速且刷新及时; 速度信息应在强光、弱光和振动场景下保持可读; 当速度数据异常或不可用时应给出明确状态提示。", "priority": "P0"}, {"feature": "跨设备协同交互(多模态交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在头盔、手机与第三方设备间自动分配交互职责,以便在设备断连时仍能保持核心功能可用且体验连续。", "acceptance": "支持头盔、手机与第三方设备的职责分配说明与实际切换; 断连后导航、通话或基础提示可降级可用; 重连后状态可自动恢复或同步; 用户可感知当前由哪个设备承载主要交互。", "priority": "P0"}, {"feature": "品牌与定位(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要了解产品品牌背景、合作关系与目标用户定位,以便快速判断产品是否值得信任且适合自己。", "acceptance": "页面清晰展示品牌背景、合作方与目标用户; 信息真实一致且易理解; 用户可在一个页面内完成品牌认知与定位判断。", "priority": "P2"}, {"feature": "核心功能说明(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要通过图文了解通讯、HUD后视、音频与互联等核心能力,以便快速理解产品能解决哪些骑行问题。", "acceptance": "页面包含通讯、HUD后视、音频与互联等核心能力说明; 每项能力有图文示意与使用价值描述; 用户可快速区分各功能用途与适用场景。", "priority": "P1"}, {"feature": "安全与认证说明(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要查看头盔安全认证、结构材料与防护信息,以便确认产品满足安全需求后再购买。", "acceptance": "页面展示安全认证、结构材料与防护相关信息; 认证信息准确可核验; 关键安全卖点表达清晰且不夸大。", "priority": "P0"}, {"feature": "使用指引与上手(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要获得配对、充电、佩戴与基础使用指引,以便尽快完成上手并避免错误操作。", "acceptance": "提供配对、充电、佩戴与基础使用步骤; 指引结构清晰且适合首次使用者; 用户可按步骤完成首次上手。", "priority": "P1"}, {"feature": "参数与版本信息(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要统一查看关键参数、版本差异与防水等规格信息,以便进行理性比较和选购。", "acceptance": "页面统一展示关键参数、版本差异与防水等规格; 参数口径一致且便于对比; 用户可快速识别不同版本差异。", "priority": "P1"}, {"feature": "多媒体与转化(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要通过视频、图集与购买入口进一步了解产品并直接下单,以便缩短决策路径并提升购买效率。", "acceptance": "页面支持视频与图集展示; 购买入口清晰可达; 多媒体内容与商品信息一致; 用户可从介绍页顺畅进入购买流程。", "priority": "P1"}, {"feature": "商品浏览(商城)", "role": "新手骑手", "story": "作为新手骑手,我想要浏览头盔、配件与服务商品信息并查看价格、参数、认证与对比,以便选到适合自己的商品。", "acceptance": "支持商品列表与详情浏览; 可查看价格、参数、认证信息; 支持商品对比; 商品信息完整且一致。", "priority": "P0"}, {"feature": "下单支付(商城)", "role": "新手骑手", "story": "作为新手骑手,我想要完成收货信息填写、优惠使用、支付与订单提交,以便顺利完成购买闭环。", "acceptance": "支持填写收货信息、选择优惠、完成支付并提交订单; 订单金额计算准确; 支付结果明确反馈; 下单成功后生成可查询订单。", "priority": "P0"}, {"feature": "订单与履约(商城)", "role": "新手骑手", "story": "作为新手骑手,我想要查看订单状态、发货物流、签收与跨境履约信息,以便及时掌握收货进度。", "acceptance": "支持查看订单状态流转、物流信息与签收状态; 跨境订单可展示履约节点; 信息更新及时且可追踪。", "priority": "P1"}, {"feature": "售后服务(商城)", "role": " ole": "新手骑手", "story": "作为新手骑手，我想要查看App版本与设备固件更新状态并进入升级入口，以便及时获得新功能、修复问题并保持设备稳定。", "acceptance": "用户可查看当前App版本、固件版本与是否有可用更新；支持一键进入升级入口；升级前展示注意事项，升级后反馈结果状态。", "priority": "P1"}, {"feature": "导航应用联动(第三方应用联动)", "role": "通勤骑手", "story": "作为通勤骑手，我想要接入高德、百度与微信位置并将路线投送到头盔导航，以便在日常出行中快速开始骑行导航。", "acceptance": "支持从高德、百度、微信位置发起路线投送；头盔连接成功后可接收并展示导航；投送失败时给出明确原因与重试入口。", "priority": "P0"}, {"feature": "行程与目的地导入(第三方应用联动)", "role": "摩旅骑手", "story": "作为摩旅骑手，我想要从酒店和旅程类应用导入目的地与行程并生成骑行导航入口，以便更高效地规划和执行长途路线。", "acceptance": "支持识别并导入第三方应用中的目的地或行程信息；导入后可生成导航入口并发起骑行导航；导入失败时提供兼容说明或手动补录方式。", "priority": "P1"}, {"feature": "通知联动与规则(第三方应用联动)", "role": "通勤骑手", "story": "作为通勤骑手，我想要对第三方App通知进行筛选、转发和骑行场景抑制，以便减少干扰并保留重要信息提醒。", "acceptance": "支持按应用、通知类型和骑行状态配置通知规则；骑行中可抑制非关键通知并转发关键通知；用户可随时修改规则并预览生效效果。", "priority": "P1"}, {"feature": "运动健康数据同步(第三方应用联动)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要同步骑行时长、里程等数据到主流健康平台，以便统一沉淀运动记录并用于展示个人骑行成果。", "acceptance": "支持绑定主流健康平台账号并授权同步；骑行结束后可同步时长、里程等核心数据；同步失败时展示原因并支持重试。", "priority": "P2"}, {"feature": "第三方接入稳定性(第三方应用联动)", "role": "后台管理员", "story": "作为后台管理员，我想要保障第三方联动在蓝牙连接和续航约束下稳定运行，以便降低联动失败率并提升用户体验。", "acceptance": "系统需在蓝牙连接波动下保持第三方联动可恢复；对高耗电场景进行策略控制；后台可监控联动成功率、异常日志与恢复情况。", "priority": "P0"}, {"feature": "HUD视觉呈现(视觉交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要定义HUD基础布局、亮度、层级与骑行主界面显示规则，以便在骑行中清晰获取关键信息且不过度分心。", "acceptance": "HUD支持基础布局与信息层级定义；支持亮度调节与不同环境下的显示策略；骑行主界面仅展示核心信息并保证可读性。", "priority": "P0"}, {"feature": "ADAS安全预警(视觉交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要在碰撞风险、侧后方来车等场景收到高优先级视觉预警，以便及时规避危险并提升骑行安全。", "acceptance": "系统可识别碰撞风险与侧后方来车等关键场景；HUD以高优先级样式展示预警；预警信息需明显区别于普通提示且不遮挡核心导航信息。", "priority": "P0"}, {"feature": "目标追踪(视觉交互)", "role": "团骑领队", "story": "作为团骑领队，我想要对选定车辆或风险目标进行短时锁定与相对位置提示，以便更快掌握关键目标动态并辅助安全判断。", "acceptance": "支持用户选定目标并进行短时追踪；HUD展示目标相对位置与变化趋势；追踪超时、目标丢失或风险解除时有明确反馈。", "priority": "P2"}, {"feature": "摄像联动可视化(视觉交互)", "role": "通勤骑手", "story": "作为通勤骑手，我想要将后视摄像头与录像状态以低干扰方式映射到HUD，以便在不分散注意力的情况下了解后方情况和录制状态。", "acceptance": "HUD可显示后视摄像头状态与录像状态；展示方式低干扰且不长期遮挡核心骑行信息；摄像头异常或录像中断时有提示。", "priority": "P1"}, {"feature": "视觉设置与升级(视觉交互)", "role": "新手骑手", "story": "作为新手骑手，我想要进行HUD校准、显示开关、样式配置并查看升级后的兼容提示，以便获得适合自己的显示效果并避免升级后使用问题。", "acceptance": "支持HUD校准流程、显示开关与样式配置；升级后展示兼容性说明与变更提示；配置修改后即时生效或明确提示生效条件。", "priority": "P1"}, {"feature": "新手入门(用户学习)", "role": "新手骑手", "story": "作为新手骑手，我想要完成首次认知、基础设置与安全提示学习，以便快速上手产品并安全开始骑行。", "acceptance": "首次进入时提供入门引导；覆盖基础功能认知、必要设置与安全提示；学习完成后记录状态并支持稍后继续。", "priority": "P0"}, {"feature": "功能教学(用户学习)", "role": "新手骑手", "story": "作为新手骑手，我想要获得围绕核心功能的场景化教学与操作演示，以便理解功能用途并正确使用。", "acceptance": "提供导航、HUD、连接等核心功能的场景化教学；包含操作步骤演示；用户可按主题进入学习并查看完成进度。", "priority": "P1"}, {"feature": "安全与规范(用户学习)", "role": "新手骑手", "story": "作为新手骑手，我想要了解认证、续航、防水与骑行安全边界，以便正确预期产品能力并避免不当使用风险。", "acceptance": "学习内容覆盖认证说明、续航限制、防水边界与骑行安全规范；重点风险信息需明确提示；用户学习后可查看关键注意事项摘要。", "priority": "P0"}, {"feature": "进阶学习(用户学习)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要获得更深入的功能理解与技巧学习，以便充分发挥设备能力并提升骑行与创作效率。", "acceptance": "提供进阶功能专题与技巧内容；内容按难度或主题分类；用户可收藏、继续学习并查看已完成章节。", "priority": "P2"}, {"feature": "学习反馈与复训(用户学习)", "role": "新手骑手", "story": "作为新手骑手，我想要记录学习完成情况并按需复训，以便查漏补缺并持续巩固关键操作与安全知识。", "acceptance": "系统记录各学习模块完成状态；支持用户重新进入任意模块复训；可提示未完成或建议复训的内容。", "priority": "P2"}, {"feature": "商品信息管理(App-商城)", "role": "后台管理员", "story": "作为后台管理员，我想要规范展示商品参数、适配关系与购买说明，以便帮助用户准确理解商品并减少售前误解。", "acceptance": "商品页支持维护参数、适配关系与购买说明；前台展示结构统一清晰；缺失关键信息时不可发布或需提示补全。", "priority": "P1"}, {"feature": "营销与服务触达(App-商城)", "role": "后台管理员", "story": "作为后台管理员，我想要通过优惠、客服与推荐提升转化与服务效率，以便促进成交并改善用户购买体验。", "acceptance": "支持配置优惠活动、客服入口与商品推荐；用户可在商城页看到相关触达内容；后台可查看触达效果与基础转化数据。", "priority": "P2"}, {"feature": "互动(App-社区)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要支持点赞、评论、关注、分享等基础社交互动，以便与其他骑手交流并扩大内容影响力。", "acceptance": "用户可对内容进行点赞、评论、关注作者与分享；互动结果实时反馈；用户可查看自己的互动记录与消息提醒。", "priority": "P1"}, {"feature": "社区治理(App-社区)", "role": "后台管理员", "story": "作为后台管理员，我想要具备审核与举报处理能力来保障社区内容合规与用户体验，以便降低违规内容风险并维护社区秩序。", "acceptance": "支持内容审核、用户举报、违规处置与结果记录；用户可发起举报并查看处理状态；后台可按规则执行下架、警告或封禁。", "priority": "P0"}, {"feature": "骑行内容联动(App-社区)", "role": "内容创作骑手", "story": "作为内容创作骑手，我想要将设备侧骑行记录与社区内容发布打通，以便快速生成更真实丰富的骑行分享内容。", "acceptance": "支持从设备侧选择骑行记录并带入社区发布；可附加里程、路线或时间等信息；导入失败时支持重试或手动编辑。", "priority": "P1"}, {"feature": "账号与安全(App-我的)", "role": "新手骑手", "story": "作为新手骑手，我想要管理登录身份、账号信息与基础安全能力，以便保护个人资料并便捷使用各项服务。", "acceptance": "支持查看和修改基础账号信息；支持登录方式管理、密码或验证码验证等安全能力；关键操作需进行身份校验。", "priority": "P0"}, {"feature": "设置(App-我的)", "role": "新手骑手", "story": "作为新手骑手，我想要管理通知、缓存与通用偏好设置，以便根据个人习惯优化App使用体验。", "acceptance": "支持通知开关、缓存清理与通用偏好配置；设置项分类清晰且修改后生效；涉及系统权限时提供引导说明。", "priority": "P1"}, {"feature": "头盔连接(App-设备)", "role": "新手骑手", "story": "作为新手骑手，我想要完成手机与头盔的发现、配对、重连与连接状态管理，以便顺利开始使用设备功能。", "acceptance": "支持搜索附近头盔、发起配对、自动重连与查看连接状态；连接失败时提供排查提示；连接成功后展示设备基本信息。", "priority": "P0"}, {"feature": "设备状态(App-设备)", "role": "通勤骑手", "story": "作为通勤骑手，我想要查看电量、续航、固件、防护与关键运行状态，以便在出发前确认设备是否适合当前骑行。", "acceptance": "设备页展示电量、预计续航、固件版本、防护信息与关键运行状态；状态异常时有醒目提示；数据刷新及时且可手动刷新。", "priority": "P0"}, {"feature": "固件与校准(App-设备)", "role": "新手骑手", "story": "作为新手骑手，我想要进行固件升级、HUD校准并查看升级结果反馈，以便保持设备最佳状态并获得正确显示效果。", "acceptance": "支持检测固件更新、执行升级与查看结果；支持HUD校准流程；升级或校准失败时提供原因说明与后续建议。", "priority": "P0"}, {"feature": "帮助与诊断(App-设备)", "role": "后台管理员", "story": "作为后台管理员，我想要提供连接异常排查、日志导出与售后辅助信息，以便提升问题定位效率并支持售后处理。", "acceptance": "用户可查看常见问题排查步骤；支持导出诊断日志与设备信息；售后所需辅助信息可一键汇总并分享。", "priority": "P1"}, {"feature": "简洁显示框架(简易)", "role": "通勤骑手", "story": "作为通勤骑手，我想要以最少元素展示核心骑行信息，以便降低视觉负担并专注道路环境。", "acceptance": "界面仅保留速度、导航或安全等核心信息；减少非必要装饰与次要信息；在骑行中保持清晰可读且切换简单。", "priority": "P1"}, {"feature": "简易路线提示(简易)", "role": "通勤骑手", "story": "作为通勤骑手，我想要仅保留转向与距离信息的轻量导航提示，以便快速理解路线并减少界面干扰。", "acceptance": "导航提示仅展示转向方向与剩余距离等必要信息；提示样式简洁明确；在无路线或偏航时提供基础状态反馈。", "priority": "P1"}, {"feature": "通话体验(来电)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在来电时看到通话状态并进行音频路由与基础控制,以便在骑行中快速处理电话且不分散注意力", "acceptance": "当有来电或通话中时,HUD可显示来电人/通话状态;用户可执行接听、挂断、静音或切换音频路由等基础操作;操作反馈清晰且在骑行中可快速完成", "priority": "P0"}, {"feature": "安全与免打扰(来电)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在高速或复杂路况下降低来电干扰,以便优先保障骑行安全", "acceptance": "系统可根据骑行状态触发免打扰策略;高风险场景下减少弹窗、播报或交互打断;用户可配置基础免打扰规则;安全策略生效时有明确提示", "priority": "P0"}, {"feature": "连接与异常处理(来电)", "role": "新手骑手", "story": "作为新手骑手,我想要在手机断连、权限缺失或音频占用时获得清晰的来电异常处理,以便及时恢复通话能力", "acceptance": "当发生断连、权限缺失、音频被占用等异常时,系统可识别并提示原因;提供可执行的恢复指引或重试入口;异常恢复后来电能力可自动或手动恢复", "priority": "P0"}, {"feature": "队友位置采集与同步(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要采集并同步队友位置到本机,以便在HUD中实时掌握队伍分布", "acceptance": "系统可持续采集已授权队友的位置数据并同步到本机;同步延迟在可接受范围内;当队友加入、退出或位置更新时可及时刷新;仅同步已授权成员数据", "priority": "P0"}, {"feature": "HUD位置呈现(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要在HUD中以低干扰方式看到队友方位、距离和状态,以便边骑行边快速判断队伍情况", "acceptance": "HUD可展示队友方位、距离和在线/异常状态;展示方式简洁且不遮挡核心骑行信息;信息更新及时;在骑行中可一眼识别关键队友状态", "priority": "P0"}, {"feature": "队友位置展示(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要系统定义队友展示对象与排序规则,以便保证HUD信息简洁可读", "acceptance": "系统支持按距离、队伍角色或关注对象进行展示与排序;超出展示上限时按规则折叠或隐藏;排序规则稳定且可理解;HUD始终保持简洁可读", "priority": "P1"}, {"feature": "异常状态提示(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要对断连、定位异常和队友离线等状态获得明确提示,以便及时判断是否需要调整队伍", "acceptance": "当队友断连、定位异常、长时间无更新或离线时,HUD和/或App可明确提示状态;不同异常有可区分的提示文案或图标;异常恢复后状态自动更新", "priority": "P0"}, {"feature": "交互控制(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要通过简化的开关、切换与收起操作控制队友位置显示,以便降低骑行干扰", "acceptance": "用户可快速开启/关闭队友位置显示,切换关注对象或收起面板;交互步骤少且适合骑行场景;操作后HUD反馈明确;不会影响核心骑行信息显示", "priority": "P1"}, {"feature": "隐私与权限(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要控制位置共享授权与可见范围,以便避免未授权展示队友位置", "acceptance": "位置共享需经用户明确授权后才生效;可设置谁可见、何时可见和共享范围;未授权成员不展示位置;用户可随时撤回授权并立即生效", "priority": "P0"}, {"feature": "App队伍地图辅助(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要通过App查看队伍地图并将当前主目标同步到HUD,以便更高效地组织队伍行进", "acceptance": "App可展示队伍地图与成员分布;领队可在App中选择当前主目标成员或目标点;所选主目标可同步到HUD展示;同步状态清晰且更新及时", "priority": "P1"}, {"feature": "基础按键输入(实体按键交互)", "role": "后台管理员", "story": "作为后台管理员,我想要系统稳定识别单击、双击和长按等基础按键输入,以便为所有按键功能提供统一底座", "acceptance": "系统可准确区分单击、双击、长按等输入事件;不同事件有统一定义与时序阈值;在正常骑行振动场景下识别稳定;可供上层功能复用", "priority": "P0"}, {"feature": "骑行核心控制(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过实体按键快速控制导航、来电和音乐等高频能力,以便减少骑行中查看屏幕的次数", "acceptance": "用户可通过按键完成导航、来电、音乐等核心功能的常用控制;操作路径短且响应及时;不同功能映射清晰;骑行中无需复杂学习即可使用", "priority": "P0"}, {"feature": "菜单与HUD联动(实体按键交互)", "role": "新手骑手", "story": "作为新手骑手,我想要通过按键在HUD中完成轻量菜单浏览、确认与返回,以便在不停车的情况下完成基础操作", "acceptance": "用户可通过按键在HUD中浏览菜单、确认选择和返回上一级;菜单层级轻量且可快速退出;当前焦点与操作结果有明确反馈;不会遮挡核心骑行信息", "priority": "P1"}, {"feature": "安全防误触(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过锁定、场景限制和确认机制降低按键误触风险,以便避免骑行中误操作带来安全问题", "acceptance": "系统支持按键锁定或特定场景下限制高风险操作;关键操作需二次确认或长按触发;误触率在骑行振动和戴手套场景下可控;用户可感知当前锁定状态", "priority": "P0"}, {"feature": "反馈与可学习性(实体按键交互)", "role": "新手骑手", "story": "作为新手骑手,我想要通过HUD、提示音和灯光联动明确知道按键结果,以便更快学会并放心使用实体按键", "acceptance": "每次有效按键后都有至少一种明确反馈;成功、失败和不可用状态可区分;反馈时机及时且不过度打扰;新用户可通过反馈理解按键映射关系", "priority": "P1"}, {"feature": "核心连接与后台保活权限(手机系统权限管理)", "role": "新手骑手", "story": "作为新手骑手,我想要管理蓝牙、通知与后台刷新/白名单权限,以便保障头盔连接稳定和后台告警可用", "acceptance": "系统可引导用户开启蓝牙、通知和后台保活相关权限;缺失权限时明确提示影响范围;权限开启后连接与后台告警能力恢复;支持查看当前权限状态", "priority": "P0"}, {"feature": "定位与骑行场景权限(手机系统权限管理)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要管理精确定位与后台定位权限,以便支撑导航、轨迹、组队和SOS等骑行场景", "acceptance": "系统可申请并管理精确定位与后台定位权限;说明权限用途与不开启的影响;权限开启后相关功能可正常使用;拒绝后提供降级方案与再次开启入口", "priority": "P0"}, {"feature": "媒体与语音输入权限(手机系统权限管理)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要管理相册、麦克风和相机权限,以便进行内容导入导出、语音操作和扫码", "acceptance": "系统可按需申请相册、麦克风和相机权限;每项权限均说明对应功能用途;权限通过后相关功能立即可用;拒绝后提供替代路径或设置入口", "priority": "P1"}, {"feature": "个人信息与提醒权限(手机系统权限管理)", "role": "通勤骑手", "story": "作为通勤骑手,我想要管理日历与通讯录权限,以便同步日程提醒并显示联系人或设置SOS联系人", "acceptance": "系统可申请日历与通讯录权限并说明用途;授权后可同步日程提醒、显示联系人信息或设置SOS联系人;拒绝后相关功能降级且提示明确;用户可随时修改授权", "priority": "P2"}, {"feature": "权限流程与跨平台适配(手机系统权限管理)", "role": "后台管理员", "story": "作为后台管理员,我想要定义首次申请流程、拒绝后降级UI、状态监控及iOS/Android差异映射,以便保证权限体验一致且可维护", "acceptance": "系统具备统一的权限申请流程规范;拒绝后有对应降级UI和恢复引导;可监控权限状态变化;针对iOS与Android差异有明确映射与处理逻辑", "priority": "P1"}, {"feature": "基础消息接入(手机消息同步)", "role": "通勤骑手", "story": "作为通勤骑手,我想要接入系统短信与主流即时通讯通知并统一展示,以便骑行中不错过重要消息", "acceptance": "系统可接入短信及主流即时通讯应用通知;不同来源消息以统一样式展示;接入成功后消息可及时同步到设备;不支持的应用有明确说明", "priority": "P0"}, {"feature": "消息展示与交互(手机消息同步)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中进行消息预览、播报和快捷回复等轻交互,以便安全高效地处理重要消息", "acceptance": "用户可查看简要消息预览、触发语音播报并使用预设快捷回复;交互步骤少且适合骑行场景;回复结果有反馈;不会要求复杂输入", "priority": "P1"}, {"feature": "筛选与隐私控制(手机消息同步)", "role": "通勤骑手", "story": "作为通勤骑手,我想要按应用与骑行状态控制消息显示范围和展示程度,以便兼顾重要信息获取与隐私保护", "acceptance": "用户可按应用、联系人或骑行状态配置消息筛选规则;可设置仅提示、不显示内容或完整预览等展示级别;规则生效后展示结果符合配置;隐私设置可随时调整", "priority": "P1"}, {"feature": "连接与可靠性(手机消息同步)", "role": "新手骑手", "story": "作为新手骑手,我想要保障蓝牙通知链路稳定并在异常时获得清晰反馈,以便持续接收消息而不困惑", "acceptance": "系统可监测通知同步链路状态;当蓝牙断连、通知权限失效或同步异常时给出明确提示;恢复后消息同步自动或手动恢复;异常原因可被用户理解", "priority": "P0"}, {"feature": "数据显示(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要实时查看前后轮胎压、胎温和连接状态,以便及时掌握轮胎健康并安全骑行", "acceptance": "系统可实时显示前后轮胎压、胎温及传感器连接状态;数据刷新及时且单位清晰;前后轮信息可明确区分;断连时有状态提示", "priority": "P0"}, {"feature": "异常预警(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要对低压、高温、快速漏气和传感器异常获得分级预警,以便尽早采取处理措施", "acceptance": "系统可识别低压、高温、快速漏气和传感器异常;不同风险等级有不同提示强度;预警信息包含异常类型与对应轮位;异常解除后状态自动更新", "priority": "P0"}, {"feature": "设备连接与绑定(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要完成胎压传感器发现、绑定、重连与在线状态管理,以便稳定使用胎温胎压功能", "acceptance": "用户可发现并绑定前后轮传感器;断连后系统可自动重连或提供重连入口;可查看每个传感器在线状态;更换传感器时支持重新绑定", "priority": "P0"}, {"feature": "交互与设置(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要通过快捷查看、基础设置与语音唤起使用胎温胎压功能,以便在骑行中低成本获取关键信息", "acceptance": "用户可快速查看胎温胎压卡片,进行基础阈值或单位设置,并通过语音唤起查询;交互不展开复杂配置;设置结果即时生效并有反馈", "priority": "P1"}, {"feature": "历史记录与诊断(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要查看最近异常摘要与传感器健康诊断入口,以便在App中进一步排查轮胎或设备问题", "acceptance": "系统可展示最近异常摘要和传感器健康状态入口;详细历史与诊断内容在App中查看;HUD或设备侧仅保留轻量摘要;用户可从摘要跳转到App详情", "priority": "P2"}, {"feature": "双灯区基础控制(氛围灯交互)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要独立控制后脑勺灯区与眼下方灯区并进行基础联动,以便兼顾个性表达与骑行状态展示", "acceptance": "用户可分别开启、关闭或调整后脑勺灯区与眼下方灯区的基础状态;支持两灯区的简单联动模式;操作结果有即时可见反馈;不会影响核心骑行安全功能", "priority": "P2"}, {"feature": "骑行安全灯效(氛围灯交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要头盔通过氛围灯向后方提示制动、转向、后向告警与夜间常亮状态,以便提升夜间和复杂路况下的被识别度与骑行安全。", "acceptance": "当骑行中发生制动、转向或后向告警事件时,对应安全灯效可及时触发; 夜间骑行时支持常亮提示; 安全灯效优先级高于非安全通知; 灯效在头盔端稳定可见且不影响正常骑行。", "priority": "P0"}, {"feature": "状态联动灯效(氛围灯交互)", "role": "新手骑手", "story": "作为新手骑手,我想要通过眼下方灯区直观看到配对、语音助手、电量与充电等设备状态,以便快速理解设备当前情况并减少学习成本。", "acceptance": "当设备配对、唤醒语音助手、电量变化或进入充电状态时,眼下方灯区显示对应灯效; 不同状态有可区分的反馈; 状态变化后灯效能及时更新; 不影响安全类灯效展示。", "priority": "P1"}, {"feature": "消息与社交通知灯效(氛围灯交互)", "role": "团骑领队", "story": "作为团骑领队,我想要通过眼下方灯区接收来电、消息和组队请求等非安全通知,以便在不中断骑行的情况下及时感知重要社交通知。", "acceptance": "当收到来电、消息或组队请求时,眼下方灯区触发对应通知灯效; 非安全通知不会覆盖安全灯效; 支持在免打扰或骑行限制场景下降低提示强度; 通知消失后灯效自动恢复默认状态。", "priority": "P2"}, {"feature": "音效与声场(音乐)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要使用预设音效、EQ、自适应补偿与空间音频能力,以便在不同骑行环境下获得更有沉浸感和层次感的听感。", "acceptance": "支持选择预设音效与自定义EQ; 在不同速度或噪声环境下可进行自适应补偿; 支持开启或关闭空间音频; 设置生效后音质变化可感知且播放过程稳定。", "priority": "P2"}, {"feature": "播放控制与信息展示(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中进行基础播放控制并查看歌曲信息与音源质量,以便更方便地管理通勤路上的音乐体验。", "acceptance": "支持播放、暂停、上一首、下一首等基础控制; 可展示当前歌曲名称等关键信息; 可显示音源质量状态; 操作反馈及时且不影响骑行安全。", "priority": "P1"}, {"feature": "连接与稳定性(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要蓝牙音乐连接稳定且异常后可自动恢复,以便在日常骑行中持续收听音乐而不被频繁中断。", "acceptance": "头盔与手机建立音乐连接后可稳定播放; 在短暂断连、来电切换等异常场景下支持自动恢复; 恢复过程对用户可感知且尽量少操作; 在稳定性与功耗之间保持合理平衡。", "priority": "P0"}, {"feature": "骑行音量与焦点管理(音乐)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要系统管理骑行场景下的音量、导航打断与语音交互优先级,以便在长途骑行中兼顾娱乐、导航和沟通效率。", "acceptance": "支持根据骑行场景调整音量策略; 导航播报可按规则打断音乐; 语音交互优先级高于普通音乐播放; 多音频源冲突时按预设焦点规则处理并可恢复原播放状态。", "priority": "P0"}, {"feature": "功耗与热管理边界(音乐)", "role": "后台管理员", "story": "作为后台管理员,我想要限制高负载音效能力并管理续航与温升边界,以便保障设备在音乐场景下的安全性和稳定性。", "acceptance": "当高负载音效导致功耗或温升接近阈值时,系统可自动限制相关能力; 限制策略不会导致核心音频功能不可用; 用户可收到必要提示; 设备续航与温升保持在安全边界内。", "priority": "P0"}, {"feature": "语言包管理(多语言支持)", "role": "后台管理员", "story": "作为后台管理员,我想要管理系统语言包的预置、下载、切换与版本状态,以便高效维护多语言能力并支持不同市场发布。", "acceptance": "支持查看已预置和可下载语言包; 支持下载、更新、删除和切换语言包; 可展示语言包版本与状态; 下载失败或版本异常时有明确提示与恢复机制。", "priority": "P1"}, {"feature": "界面文本本地化(多语言支持)", "role": "新手骑手", "story": "作为新手骑手,我想要HUD与App核心页面以我熟悉的语言显示文本,以便更容易理解功能并顺利完成操作。", "acceptance": "HUD与App核心页面支持多语言文本显示; 切换语言后主要界面文本同步更新; 文本显示完整且不出现明显错位或截断; 未覆盖内容有合理兜底语言。", "priority": "P1"}, {"feature": "语音播报本地化(多语言支持)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要导航、来电和设备状态等语音播报支持多语言,以便在跨地区骑行时更自然地接收关键信息。", "acceptance": "导航、来电、设备状态等核心语音播报支持所选语言; 切换语言后播报内容与发音同步变化; 播报内容清晰可理解; 不支持的内容有默认语言兜底。", "priority": "P1"}, {"feature": "语音识别多语言(多语言支持)", "role": "新手骑手", "story": "作为新手骑手,我想要在指定语言下使用语音唤醒和基础指令识别,以便更自然地免手操作设备。", "acceptance": "支持在指定语言下进行语音唤醒; 可识别基础控制指令; 语言切换后识别模型与指令集同步生效; 识别失败时有明确反馈或重试机制。", "priority": "P1"}, {"feature": "区域与合规适配(多语言支持)", "role": "后台管理员", "story": "作为后台管理员,我想要按地区适配语言、单位、认证说明与售后信息,以便满足不同市场的合规和本地化要求。", "acceptance": "系统可根据地区配置语言与单位; 可展示对应地区的认证说明与售后信息; 地区切换后相关内容同步更新; 不支持地区有默认合规兜底方案。", "priority": "P0"}, {"feature": "日历接入与同步(日程提醒)", "role": "通勤骑手", "story": "作为通勤骑手,我想要接入手机系统日历并同步事件到头盔提醒服务,以便在出发和通勤途中不错过重要安排。", "acceptance": "用户授权后可读取手机系统日历事件; 日历事件可同步到头盔提醒服务; 新增、修改、删除事件后可在合理时间内同步更新; 权限关闭时有明确提示。", "priority": "P1"}, {"feature": "骑行中提醒呈现(日程提醒)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中以极简方式收到即将开始或到时的日程提醒,以便及时知晓安排且不分散注意力。", "acceptance": "在骑行中可对即将开始或到时日程进行极简提醒; 提醒内容简洁且不遮挡关键骑行信息; 提醒时机可控且不过度打扰; 提醒结束后界面自动恢复。", "priority": "P1"}, {"feature": "导航联动(日程提醒)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统识别日程中的地址并建议启动导航,以便缩短出发准备时间并快速前往目的地。", "acceptance": "当日程包含可识别地址时,系统可提示启动导航; 用户确认后可快速发起导航; 地址无法识别时给出明确说明; 导航建议不会在不合适时机频繁弹出。", "priority": "P1"}, {"feature": "提醒策略与免打扰(日程提醒)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要根据骑行状态和免打扰设置控制提醒方式与强度,以便在长途骑行中减少干扰并保留必要提醒。", "acceptance": "支持根据骑行中、停车中等状态调整提醒策略; 支持免打扰开关及提醒强度控制; 重要提醒与普通提醒可区分处理; 设置生效后提醒行为符合预期。", "priority": "P1"}, {"feature": "App同步与个性化设置(日程提醒)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在App中配置同步范围、提醒时间和播报偏好,以便让日程提醒更符合我的通勤习惯。", "acceptance": "App中可设置同步哪些日历和事件范围; 可配置提前提醒时间与播报偏好; 设置保存后同步到头盔端生效; 修改后在后续提醒中按新规则执行。", "priority": "P2"}, {"feature": "异常与兜底(日程提醒)", "role": "新手骑手", "story": "作为新手骑手,我想要在断连、权限关闭或同步失败时收到明确提示和兜底处理,以便知道问题原因并尽快恢复日程提醒功能。", "acceptance": "当发生断连、权限关闭或同步失败时,系统可识别异常并提示原因; 提供可执行的恢复建议或重试入口; 异常期间避免错误提醒; 恢复后可继续正常同步与提醒。", "priority": "P1"}, {"feature": "头盔与手机互联(设备互联)", "role": "新手骑手", "story": "作为新手骑手,我想要完成头盔与手机的配对、重连和基础状态同步,以便快速开始使用核心智能功能。", "acceptance": "支持首次配对流程并有明确引导; 已配对设备可自动重连; 头盔与手机之间可同步基础状态信息; 配对失败或重连失败时有清晰提示与重试方式。", "priority": "P0"}, {"feature": "音频与通话互联(设备互联)", "role": "通勤骑手", "story": "作为通勤骑手,我想要使用手机音频播放、来电通话及语音链路切换能力,以便在骑行中顺畅处理娱乐与通信需求。", "acceptance": "支持手机音频播放到头盔; 来电时可接听、挂断并进行通话; 音乐与通话之间可自动切换语音链路; 切换过程稳定且通话清晰可用。", "priority": "P0"}, {"feature": "数据传输与同步(设备互联)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在头盔和手机间同步骑行数据、设备状态与媒体文件,以便更高效地管理素材和记录骑行过程。", "acceptance": "支持骑行数据、设备状态和媒体文件在头盔与手机间传输; 同步结果可查看状态与进度; 断连后支持继续或重试同步; 同步完成后数据内容一致可用。", "priority": "P1"}, {"feature": "第三方设备绑定(设备互联)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要发现、绑定并管理胎压计、车辆和相机等外设,以便在长途骑行中统一查看关键设备状态。", "acceptance": "支持发现附近可兼容外设; 用户可完成绑定、解绑和重命名等管理操作; 已绑定设备可展示连接状态与关键数据; 绑定失败或设备异常时有提示。", "priority": "P2"}, {"feature": "网络连接扩展(设备互联)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要支持Wi‑Fi与蜂窝网络扩展,以便为同步和在线服务提供更稳定的链路。", "acceptance": "支持配置和使用Wi‑Fi或蜂窝网络扩展链路; 在线服务与数据同步可优先使用可用网络; 网络切换时尽量不中断关键任务; 无可用网络时有状态提示。", "priority": "P2"}, {"feature": "连接安全与权限(设备互联)", "role": "后台管理员", "story": "作为后台管理员,我想要管理配对授权、设备解绑、隐私确认与异常连接防护,以便保障设备互联过程中的安全与合规。", "acceptance": "配对前需完成必要授权与隐私确认; 支持用户主动解绑设备; 对异常连接或未授权访问进行拦截或告警; 关键安全操作有记录且流程清晰。", "priority": "P0"}, {"feature": "账号与设置(我的Tab)", "role": "新手骑手", "story": "作为新手骑手,我想要在我的Tab中管理账号信息、基础偏好与多语言切换等个人设置,以便快速完成个性化配置。", "acceptance": "支持查看和编辑账号基础信息; 支持设置常用偏好项; 支持切换系统语言; 设置保存后在相关页面和功能中生效。", "priority": "P1"}, {"feature": "帮助与反馈(我的Tab)", "role": "新手骑手", "story": "作为新手骑手,我想要通过FAQ、在线客服与问题反馈获得帮助,以便在遇到问题时快速找到答案或联系支持。", "acceptance": "我的Tab中可访问FAQ、在线客服和问题反馈入口; FAQ内容可浏览和搜索; 反馈可提交问题描述及必要信息; 提交后用户可收到成功提示。", "priority": "P1"}, {"feature": "关于设备(我的Tab)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看设备身份、版本、保修与使用统计信息,以便了解设备状态并在售后或升级时快速定位信息。", "acceptance": "可展示设备型号、序列号、软件版本等身份信息; 可查看保修状态与期限; 可查看基础使用统计; 信息展示准确且支持刷新。", "priority": "P2"}, {"feature": "隐私与协议(我的Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要管理隐私政策、用户协议与数据授权,以便满足产品在不同场景下的合规要求。", "acceptance": "用户可查看最新隐私政策与用户协议; 支持管理数据授权状态; 协议更新后可提示用户重新确认; 未授权时相关数据功能按规则受限。", "priority": "P0"}, {"feature": "数据管理(我的Tab)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要导出骑行与视频数据并支持账号注销处理,以便管理个人资产并掌控数据去留。", "acceptance": "支持导出骑行数据与视频数据; 导出过程可查看状态或结果; 支持发起账号注销并提示影响范围; 注销前完成必要校验与确认流程。", "priority": "P1"}, {"feature": "部件识别", "role": "后台管理员", "story": "作为后台管理员，我想要对部件编码、型号、品牌、规格等信息进行自动或半自动识别，以便快速形成标准化部件候选记录并提升录入效率。", "acceptance": "支持从部件编码、型号、品牌、规格等字段自动或半自动识别信息；可生成标准化部件候选记录；无法完全识别时支持人工补充与确认；识别结果可保存并进入后续管理流程。", "priority": "P0"}, {"feature": "部件标准化管理", "role": "后台管理员", "story": "作为后台管理员，我想要统一部件命名、分类、属性口径与编码体系，以便减少同物异名、重复建档和数据歧义。", "acceptance": "支持统一维护部件命名、分类、属性口径和编码规则；可对重复或相似部件进行合并治理；新建部件时可按标准自动校验；标准化结果可被识别、校验和推荐模块复用。", "priority": "P0"}, {"feature": "兼容性规则管理", "role": "后台管理员", "story": "作为后台管理员，我想要建立兼容性判断规则库，以便覆盖型号适配、接口匹配、电气参数、尺寸约束和品牌限制等场景。", "acceptance": "支持配置型号适配、接口匹配、电气参数、尺寸约束、品牌限制等规则；规则可新增、编辑、停用和版本管理；规则冲突时可提示并处理；规则生效后可用于兼容性校验与推荐。", "priority": "P0"}, {"feature": "兼容性校验与推荐", "role": "新手骑手", "story": "作为新手骑手，我想要基于标准化数据与规则库进行实时兼容性判断，并获得替代推荐，以便快速选到适配的部件并避免买错。", "acceptance": "支持单件兼容性校验；支持批量校验多个部件组合；校验结果可明确显示兼容、不兼容或风险项；当不兼容或缺货时可提供替代推荐；推荐结果需基于已配置规则和标准化数据生成。", "priority": "P0"}, {"feature": "结果追溯与审计", "role": "后台管理员", "story": "作为后台管理员，我想要对识别、标准化、规则配置和校验结果进行全链路留痕，以便满足审计要求并快速追踪问题来源。", "acceptance": "系统需记录识别、标准化、规则配置和校验结果的操作日志；日志包含操作人、时间、变更内容和结果；支持按部件、规则或任务查询追溯链路；审计记录不可被普通操作直接篡改或删除。", "priority": "P1"}, {"feature": "佩戴状态检测", "role": "通勤骑手", "story": "作为通勤骑手，我想要设备基于红外、电容、加速度等信号准确判断我是否正在佩戴，以便获得稳定可靠的使用体验。", "acceptance": "系统可基于红外、电容、加速度等信号输出佩戴或未佩戴状态；在短时抖动或姿态变化下状态判断保持稳定；状态变化可在合理时延内更新；异常信号场景下可避免频繁误判。", "priority": "P0"}, {"feature": "佩戴联动控制", "role": "通勤骑手", "story": "作为通勤骑手，我想要设备根据佩戴状态自动联动音频、通话和连接行为，以便实现无感交互并减少手动操作。", "acceptance": "佩戴时可自动恢复或启用音频相关功能；摘下时可自动暂停音频或调整通话行为；联动逻辑支持与连接状态协同工作；误触发率低且用户可感知联动结果。", "priority": "P0"}, {"feature": "电源状态管理", "role": "后台管理员", "story": "作为后台管理员，我想要建立统一电源状态机来管理设备功耗与唤醒行为，以便保证系统运行稳定并降低能耗。", "acceptance": "系统需定义统一的电源状态及状态切换规则；支持待机、工作、休眠、唤醒等关键状态管理；不同业务模块遵循统一状态机执行；异常状态切换可被检测并记录。", "priority": "P0"}, {"feature": "电池与充电管理", "role": "通勤骑手", "story": "作为通勤骑手，我想要设备能够准确估算电量并识别充电状态，同时在低电和异常充电时进行保护，以便安全稳定地使用设备。", "acceptance": "系统可显示或输出电池电量估算结果；可识别充电、充满、未充电等状态；低电量时触发对应策略或提醒；出现过充、异常温度或异常充电场景时可执行安全保护联动。", "priority": "P0"}, {"feature": "低功耗优化与异常恢复", "role": "通勤骑手", "story": "作为通勤骑手，我想要设备在保证核心体验的前提下降低功耗，并在异常场景下自动恢复，以便延长续航并减少使用中断。", "acceptance": "系统在非核心场景下可自动进入低功耗策略；核心功能在需要时可被及时唤醒；出现死机、连接异常或状态紊乱时支持自动恢复；优化后续航提升且不明显影响主要使用体验。", "priority": "P1"}, {"feature": "状态感知与提醒(简易)", "role": "新手骑手", "story": "作为新手骑手,我想要在简易模式下只看到必要的设备与环境状态提醒,以便在不分散注意力的情况下安全骑行。", "acceptance": "进入简易模式后,系统仅展示电量、连接状态、基础风险与关键环境提醒; 非关键提醒默认收敛; 提醒信息可被骑行中快速识别且不影响主视野。", "priority": "P0"}, {"feature": "交互与安全降级(简易)", "role": "新手骑手", "story": "作为新手骑手,我想要使用低学习成本的简易操作,并在异常时自动降级,以便在复杂情况下仍能稳定使用设备。", "acceptance": "简易模式下核心操作步骤不超过3步; 支持大按钮/少选项交互; 当传感器、连接或显示异常时自动切换到基础安全模式并保留关键提醒。", "priority": "P0"}, {"feature": "路线接入与开始导航(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要接收手机端路线并让HUD快速进入骑行导航态,以便出发时无需重复设置导航。", "acceptance": "手机端发起路线后,HUD可在短时间内自动接收并显示导航入口; 用户可一键开始导航; 路线同步失败时给出明确提示与重试方式。", "priority": "P0"}, {"feature": "转向与距离提示(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在关键路口前看到转向箭头、距离和简化车道信息,以便提前做出安全变道和转向决策。", "acceptance": "在关键路口前按预设距离分阶段提示; 显示转向方向、剩余距离和必要车道建议; 信息简洁清晰,骑行中可快速识别。", "priority": "P0"}, {"feature": "路线进度与到达信息(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看剩余总距离、预计到达时间和到达完成状态,以便合理安排行程与时间。", "acceptance": "导航过程中持续显示剩余距离与预计到达时间; 到达目的地后明确提示导航完成; 数据更新及时且与当前路线一致。", "priority": "P1"}, {"feature": "异常与降级处理(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在断连、偏航或低电时获得可理解的降级导航反馈,以便在异常情况下仍知道下一步该怎么做。", "acceptance": "发生断连、偏航或低电时,系统在HUD上给出明确原因、当前影响和建议操作; 可切换到简化导航或保底提示模式; 异常恢复后自动或手动恢复正常导航。", "priority": "P0"}, {"feature": "交互与显示适配(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要路线导航适配骑行场景下的简化交互、亮度与显示安全边界,以便在不同环境中清晰且安全地查看信息。", "acceptance": "导航界面支持少操作交互; 亮度可根据环境自动或手动调节; 关键信息显示在安全视域内,不遮挡核心道路视线。", "priority": "P1"}, {"feature": "实时生命体征监测(生命体征与疲劳监测)", "role": "通勤骑手", "story": "作为通勤骑手,我想要实时采集并查看生命体征数据,以便及时了解自己的身体状态并避免带病或过劳骑行。", "acceptance": "系统可对接外部设备采集心率等生命体征; 完成基础清洗与时间同步; 在界面中实时展示当前状态与数据连接情况。", "priority": "P1"}, {"feature": "疲劳评估分析(生命体征与疲劳监测)", "role": "通勤骑手", "story": "作为通勤骑手,我想要基于睡眠、活动量、连续工作时长和心率变异趋势获得疲劳指数分级,以便判断自己是否适合继续骑行。", "acceptance": "系统可整合多源数据计算疲劳指数; 输出清晰的分级结果与简要解释; 当数据不足时提示评估可信度或缺失项。", "priority": "P1"}, {"feature": "异常告警与通知(生命体征与疲劳监测)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在生命体征异常、设备异常或疲劳高风险时收到及时通知,以便尽快采取休息或求助措施。", "acceptance": "系统基于规则识别生命体征异常、设备异常和高疲劳风险; 触发本地提醒及必要的App通知; 告警内容包含原因与建议动作。", "priority": "P0"}, {"feature": "趋势分析与报告(生命体征与疲劳监测)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看历史生命体征与疲劳趋势报告,以便长期了解身体变化并优化作息与骑行安排。", "acceptance": "系统可按日、周、月生成趋势图与周期报告; 支持查看关键指标变化与疲劳趋势; 报告内容清晰易懂并可在App中访问。", "priority": "P2"}, {"feature": "能力概览(AI Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要集中查看设备AI基础能力与当前运行状态,以便快速理解平台可支持的AI任务范围。", "acceptance": "AI Tab首页展示已支持的AI能力分类、可用状态和当前运行摘要; 信息结构清晰; 能区分可用、受限和异常状态。", "priority": "P2"}, {"feature": "模型管理(AI Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要统一管理本地AI模型及其生命周期和运行状态,以便高效维护模型版本与服务稳定性。", "acceptance": "支持模型安装、启停、更新、删除和版本查看; 可查看模型运行状态与异常信息; 关键操作有结果反馈与日志记录。", "priority": "P1"}, {"feature": "视觉任务中心(AI Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要通过统一入口管理多路摄像头的视觉AI任务,以便快速配置检测、分类和识别等能力。", "acceptance": "支持按摄像头源创建和查看视觉任务; 可选择检测、分类、识别等任务类型; 任务状态、输入源和结果摘要可统一查看。", "priority": "P1"}, {"feature": "性能与资源监控(AI Tab)", "role": "后台管理员", "story": "作为后台管理员,我想要监控AI任务运行时的关键性能指标,以便平衡性能、稳定性与功耗。", "acceptance": "可查看CPU、内存、推理时延、帧率、温度或功耗等关键指标; 支持按任务维度查看; 指标异常时有明显提示。", "priority": "P1"}, {"feature": "预置场景库(场景模式)", "role": "后台管理员", "story": "作为后台管理员,我想要使用内置的典型任务预置场景,以便减少现场配置成本并快速适配不同使用环境。", "acceptance": "系统提供多个可直接启用的预置场景; 每个场景包含适用说明与默认参数; 可覆盖头盔/ARC导轨集成、强噪声、通信协同和长续航等需求。", "priority": "P1"}, {"feature": "自定义场景配置(场景模式)", "role": "后台管理员", "story": "作为后台管理员,我想要按任务需求自定义收音、通信优先级、提示音、自动关机与节能策略,以便满足不同单位与个人偏好。", "acceptance": "支持对关键场景参数进行编辑、保存和复用; 配置项包含收音、通信、提示音、自动关机和节能策略; 配置生效结果可验证。", "priority": "P1"}, {"feature": "智能切换策略(场景模式)", "role": "后台管理员", "story": "作为后台管理员,我想要基于环境与设备状态进行场景模式建议切换或自动切换,以便降低用户手动操作负担。", "acceptance": "系统可识别训练、巡逻、载具、节能等场景触发条件; 支持建议切换和自动切换两种策略; 切换前后有明确提示与记录。", "priority": "P1"}, {"feature": "模式交互与反馈(场景模式)", "role": "后台管理员", "story": "作为后台管理员,我想要场景模式具备清晰且低认知负担的交互反馈,以便用户在手套、低光和高噪声环境下也能正确操作。", "acceptance": "模式切换与状态反馈支持视觉、声音或震动等多通道提示; 交互适配手套操作、低光和高噪声环境; 用户可明确识别当前模式与切换结果。", "priority": "P1"}, {"feature": "节能与耐候适配(场景模式)", "role": "后台管理员", "story": "作为后台管理员,我想要根据AA电池供电、长续航目标和环境耐受要求配置不同场景的功耗与可靠性策略,以便在续航和稳定性之间取得平衡。", "acceptance": "不同场景可配置节能等级与可靠性策略; 能体现续航优先或性能优先差异; 在低温、潮湿或震动等预期环境下保留关键功能策略。", "priority": "P2"}, {"feature": "碰撞风险预警(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要获得前向碰撞、行人/非机动车碰撞风险和低速障碍物提醒,以便降低追尾与碰撞风险。", "acceptance": "系统可识别前向高风险目标与低速接近障碍物场景; 在风险达到阈值时及时发出清晰预警; 预警内容区分风险类型与紧急程度。", "priority": "P0"}, {"feature": "车道与侧向风险预警(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要获得车道偏离、盲区和变道风险提示,以便降低侧向剐蹭与偏离道路风险。", "acceptance": "系统可在偏离车道、侧后方有风险目标或变道条件不足时发出提示; 预警时机适中且不频繁误报; 提示方式适合骑行中快速理解。", "priority": "P0"}, {"feature": "驾驶员状态预警(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在疲劳、分心或长时间连续驾驶时收到预警,以便及时休息并降低事故风险。", "acceptance": "系统可识别疲劳驾驶、分心驾驶和连续驾驶超时等状态; 达到阈值时触发分级提醒; 提醒包含休息建议或风险说明。", "priority": "P0"}, {"feature": "道路规则与环境风险提示(主动安全预警提示)", "role": "通勤骑手", "story": "作为通勤骑手,我想要收到限速、道路危险点和恶劣天气风险提示,以便提前感知外部环境风险并调整骑行策略。", "acceptance": "系统可基于地图或环境信息提示限速、危险路段和天气风险; 提示在接近风险前给出; 内容简洁并可区分不同风险来源。", "priority": "P1"}, {"feature": "预警策略与事件管理(主动安全预警提示)", "role": "后台管理员", "story": "作为后台管理员,我想要统一管理主动安全预警的策略、配置、日志与诊断分析,以便保障预警一致性与可运营性。", "acceptance": "支持统一配置各类预警阈值、开关和优先级; 预警事件可留存日志并支持查询; 可查看误报漏报分析或诊断信息。", "priority": "P1"}, {"feature": "手动SOS触发(SOS与紧急救援)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在意识清醒但需要帮助时通过头盔侧物理按键快速触发SOS,以便第一时间发起紧急求助。", "acceptance": "用户可通过物理按键在短时间内完成SOS触发; 触发后同步到App启动通知链路; 系统反馈触发成功状态并避免误触发。", "priority": "P0"}, {"feature": "跌倒自动检测(SOS与紧急救援)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在跌倒、碰撞或异常静止时由系统自动发起紧急救援流程,以便在失去操作能力时仍能获得帮助。", "acceptance": "系统基于IMU识别跌倒、碰撞和异常静止事件; 满足规则后自动进入SOS流程; 支持短暂取消窗口以降低误报。", "priority": "P0"}, {"feature": "紧急通知与联系人管理(SOS与紧急救援)", "role": "通勤骑手", "story": "作为通勤骑手,我想要预设紧急联系人并在事故时自动通知他们,以便他们能及时获知我的情况并提供帮助。", "acceptance": "用户可在App中添加、编辑和删除紧急联系人; SOS触发后按既定链路发送事故告警、位置和用户信息; 发送结果可追踪。", "priority": "P0"}, {"feature": "位置共享与救援信息(SOS与紧急救援)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在紧急事件中共享准确位置、最近骑行轨迹、时间戳和设备状态,以便联系人快速定位并组织救援。", "acceptance": "SOS事件中可生成并发送当前位置、最近轨迹、事件时间和设备状态; 信息格式便于联系人查看; 位置数据尽可能准确且持续更新。", "priority": "P0"}, {"feature": "状态反馈与异常兜底(SOS与紧急救援)", "role": "通勤骑手", "story": "作为通勤骑手,我想要看到SOS全流程状态反馈,并在断连、无网或低电时获得兜底策略,以便确认求助是否真正发出。", "acceptance": "系统可展示SOS触发、发送中、已通知、失败等状态; 在BLE断连、手机无网或低电量时给出明确兜底方案与提示; 异常过程有记录可追踪。", "priority": "P0"}], "test_cases": [{"case_id": "TC-0091", "feature": "按键中断与退出提示", "title": "按键触发退出正常流程", "precondition": "设备已开机并进入当前播报或识别状态；HUD可正常显示；已准备计时工具", "steps": "触发一段语音播报或进入语音识别中状态；按下退出按键1次；记录从按键触发到播报/识别停止的时间；观察HUD退出提示显示时长；重复执行50次并统计成功次数", "expected": "按键触发后当前播报或识别状态在≤300ms内停止；HUD退出提示显示2s；50次测试中退出成功次数≥49次（成功率≥98%）", "priority": "P0"}, {"case_id": "TC-0092", "feature": "按键中断与退出提示", "title": "按键退出稳定性异常验证", "precondition": "设备已开机；可反复进入播报或识别状态；HUD正常", "steps": "连续50次在不同播报进度和识别阶段按下退出按键；记录每次是否成功退出；记录失败次数及HUD提示是否显示2s；统计整体成功率", "expected": "50次测试中退出成功率≥98%，即失败次数≤1次；成功退出的场景中HUD退出提示均显示2s；任一次成功退出时停止时延均≤300ms", "priority": "P1"}, {"case_id": "TC-0093", "feature": "低电量下语音状态简化显示", "title": "进入低电量后语音状态简化显示生效", "precondition": "设备电量可调至低电量阈值；语音状态动画默认开启；具备帧率与功耗测量条件", "steps": "将整机电量降至低电量阈值；触发语音状态显示；测量动画帧率或确认是否切换为静态图标；测量显示模组额外功耗", "expected": "进入低电量阈值后，语音状态动画帧率降至≤8fps或切换为静态图标；显示模组额外功耗控制在0.5–1.5W范围内", "priority": "P1"}, {"case_id": "TC-0094", "feature": "低电量下语音状态简化显示", "title": "非低电量场景不应误触发简化显示", "precondition": "设备电量高于低电量阈值；语音状态动画可正常显示", "steps": "保持设备电量高于低电量阈值；触发语音状态显示；观察是否错误降为≤8fps或静态图标；测量显示模组额外功耗", "expected": "未进入低电量阈值时不应强制切换为低电量简化显示；若进入低电量后再测试，则动画帧率需≤8fps或切换静态图标；低电量模式下显示模组额外功耗仍需在0.5–1.5W范围内", "priority": "P2"}, {"case_id": "TC-0095", "feature": "低电量与高功耗限制降级", "title": "高功耗逼近15W时30秒内完成降级", "precondition": "设备可模拟语音相关链路高功耗；可测量整机平均功耗与语音链路附加功耗", "steps": "启动语音相关高功耗功能使整机平均功耗逼近15W上限；开始计时；观察系统是否关闭非核心语音特效并保留基础交互；记录降级完成时间；对比降级前后语音链路附加功耗", "expected": "当整机平均功耗逼近15W上限时，系统在30s内关闭非核心语音特效并保留基础交互；降级后语音链路附加功耗下降≥10%", "priority": "P0"}, {"case_id": "TC-0096", "feature": "低电量与高功耗限制降级", "title": "8小时高负载场景无语音模块导致强制关机", "precondition": "设备满电；可持续运行8小时场景；已开启语音基础交互与可触发降级逻辑", "steps": "在接近真实使用的高负载语音场景下连续运行8小时；期间多次触发功耗逼近15W上限的情况；观察是否发生因语音模块导致的强制关机；记录降级是否在30s内生效", "expected": "8小时场景内不出现因语音模块导致的强制关机；每次功耗逼近15W上限时系统均在30s内完成降级；降级后语音链路附加功耗下降≥10%", "priority": "P0"}, {"case_id": "TC-0097", "feature": "高速场景信息简化显示", "title": "车速达到80km/h自动启用简化模式", "precondition": "设备已连接车速信号；HUD可显示语音状态文案与卡片", "steps": "将车速从低于80km/h逐步提升至80km/h及以上；观察HUD是否自动启用简化模式；检查语音状态文案长度；触发非关键卡片并测量显示时长", "expected": "车速≥80km/h时自动启用简化模式；简化模式下HUD语音状态文案长度≤8个汉字；非关键卡片显示时长≤2s", "priority": "P0"}, {"case_id": "TC-0098", "feature": "高速场景信息简化显示", "title": "低速场景不应误启用简化模式", "precondition": "设备已连接车速信号；HUD显示正常", "steps": "保持车速低于80km/h；连续触发语音状态与非关键卡片显示；观察是否错误进入简化模式；随后将车速提升至80km/h以上再次验证", "expected": "车速低于80km/h时不应自动启用简化模式；车速达到或超过80km/h后应自动启用简化模式；启用后语音状态文案长度≤8个汉字，非关键卡片显示时长≤2s", "priority": "P1"}, {"case_id": "TC-0099", "feature": "安全提示抢占与语音中断策略", "title": "高优先级安全事件抢占当前播报", "precondition": "设备处于普通播报状态；可注入高优先级安全事件；可计时", "steps": "启动普通播报；触发高优先级安全事件；记录从事件触发到普通播报中断并切换显示的时间；重复执行20次并统计成功次数；观察被中断普通播报是否恢复及恢复延迟", "expected": "高优先级安全事件触发后500ms内中断当前播报并切换显示；20次抢占测试中成功次数≥19次；被中断的普通播报恢复次数≤1次且恢复延迟≤5s", "priority": "P0"}, {"case_id": "TC-0100", "feature": "安全提示抢占与语音中断策略", "title": "抢占后普通播报恢复异常控制", "precondition": "设备可重复触发普通播报与高优先级安全事件", "steps": "在20次测试中分别于普通播报开始、中段、结束前触发高优先级安全事件；记录每次是否在500ms内抢占成功；记录普通播报恢复次数与恢复延迟", "expected": "20次抢占测试中成功次数≥19次；每次成功抢占均在500ms内完成中断并切换显示；被中断的普通播报恢复次数≤1次，且若恢复则恢复延迟≤5s", "priority": "P1"}, {"case_id": "TC-0101", "feature": "连续失败后的交互封顶", "title": "连续2次未识别后停止主动追问", "precondition": "设备语音识别功能可用；可模拟未识别输入", "steps": "第1次输入无法识别内容；观察系统反馈；第2次再次输入无法识别内容；观察是否停止主动追问；第3次继续输入无法识别内容；观察是否仅显示静默提示卡片1次并计时", "expected": "连续2次未识别后系统停止主动追问；第3次仅显示静默提示卡片1次；该卡片持续2s；整个过程中连续打扰次数不超过3次", "priority": "P1"}, {"case_id": "TC-0102", "feature": "连续失败后的交互封顶", "title": "10轮异常回归中无超过3次连续打扰", "precondition": "设备可重复执行语音未识别场景", "steps": "按“连续3次未识别”为1轮执行异常流程，共执行10轮；每轮记录主动追问次数、静默提示卡片出现次数和持续时长；统计是否存在超过3次连续打扰", "expected": "10轮异常回归测试中无超过3次连续打扰；每轮在连续2次未识别后停止主动追问；第3次仅显示静默提示卡片1次且持续2s", "priority": "P1"}, {"case_id": "TC-0103", "feature": "状态超时自动回收", "title": "聆听态/处理态/异常态超时后1秒内回收", "precondition": "设备可分别进入聆听态、处理态、异常态；可计时", "steps": "进入聆听态并保持无输入，记录8s超时点到状态回收完成的时间；进入处理态并保持无结果，记录3s超时点到回收时间；进入异常态并保持不处理，记录3s超时点到回收时间", "expected": "聆听态超时8s后在1s内回收；处理态超时3s后在1s内回收；异常态超时3s后在1s内回收", "priority": "P0"}, {"case_id": "TC-0104", "feature": "状态超时自动回收", "title": "30次异常注入回收成功率验证", "precondition": "设备支持异常注入；可统计回收结果", "steps": "对聆听态、处理态、异常态随机注入超时异常，共执行30次；记录每次是否在对应超时后1s内完成回收；统计成功次数与成功率", "expected": "30次异常注入测试中回收成功率≥96%，即成功次数≥29次；其中聆听态按8s超时、处理态按3s超时、异常态按3s超时，并均在1s内回收", "priority": "P0"}, {"case_id": "TC-0105", "feature": "断连重连后的状态恢复", "title": "连接恢复后2秒内回到待命态", "precondition": "设备与手机或主连接端已建立连接；HUD可显示离线图标", "steps": "主动断开连接并确认HUD显示离线图标；恢复连接；记录从连接恢复到离线图标消失并回到待命态的时间；观察恢复过程中重复播报次数", "expected": "连接恢复后2s内离线图标消失并回到待命态；恢复过程中不重复播报超过1次", "priority": "P0"}, {"case_id": "TC-0106", "feature": "断连重连后的状态恢复", "title": "20次断连重连恢复正确率验证", "precondition": "设备可稳定执行断连与重连；可统计恢复结果", "steps": "执行20次断连重连测试；每次断连后确认离线图标出现；重连后记录是否在2s内恢复到待命态；记录是否出现超过1次重复播报；统计恢复正确率", "expected": "20次断连重连测试中恢复正确率≥95%，即正确恢复次数≥19次；每次正确恢复均在2s内离线图标消失并回到待命态；恢复过程中不重复播报超过1次", "priority": "P0"}, {"case_id": "TC-0107", "feature": "首次配对后自动教学触发", "title": "首次蓝牙配对成功后10秒内自动弹出教学", "precondition": "设备为未完成首次配对状态；支持蓝牙4.2连接；教学功能可用", "steps": "使用支持蓝牙4.2的手机与设备完成首次成功配对；从连接成功事件开始计时；观察教学是否自动弹出", "expected": "教学基于蓝牙连接触发；兼容蓝牙4.2连接成功事件；首次成功配对后10秒内弹出教学", "priority": "P1"}, {"case_id": "TC-0108", "feature": "首次配对后自动教学触发", "title": "重复配对不应重复自动触发超过1次", "precondition": "设备已完成首次配对并已触发过自动教学至少1次", "steps": "解除配对后再次完成配对；重复执行多次；记录每次是否自动弹出教学；统计重复配对后的自动触发次数", "expected": "重复配对不再自动触发超过1次；若发生自动触发，其触发仍应在连接成功后10秒内完成", "priority": "P2"}, {"case_id": "TC-0109", "feature": "教学跳过与稍后再学", "title": "     "开机动画","速度","设备状态","显示队友位置","头盔HUD",
    "实体按键交互","氛围灯交互","AI功能","语音交互","视觉交互","多模态交互"]);

const hudFeatures = DATA.features.filter(f => HUD_MODULES.has(f.module));
const appFeatures = DATA.features.filter(f => !HUD_MODULES.has(f.module));

function buildTabs() {
    const bar = document.getElementById('tabBar');
    const content = document.getElementById('contentArea');

    TAB_CONFIG.forEach((tab, idx) => {
        const el = document.createElement('div');
        el.className = 'tab' + (idx === 0 ? ' active' : '');
        el.dataset.target = tab.id;

        let count = 0;
        if (tab.id === 'hud') count = hudFeatures.length;
        else if (tab.id === 'app') count = appFeatures.length;
        else if (tab.id === 'state') count = DATA.state_scenarios.length;
        else if (tab.id === 'voice') count = DATA.voice_commands.length;
        else if (tab.id === 'button') count = DATA.button_mapping.length;
        else if (tab.id === 'light') count = DATA.light_effects.length;
        else if (tab.id === 'voice_nav') count = DATA.voice_nav.length;
        else if (tab.id === 'user_stories') count = (DATA.user_stories || []).length;
        else if (tab.id === 'test_cases') count = (DATA.test_cases || []).length;
        else if (tab.id === 'page_mapping') count = (DATA.page_mapping || []).length;
        else if (tab.id === 'dev_tasks') count = (DATA.dev_tasks || []).length;
        else if (tab.id === 'journey') count = (DATA.user_journeys || []).length;
        else if (tab.id === 'ai_scenarios') count = (DATA.ai_scenarios || []).length;

        el.innerHTML = `${tab.label}<span class="badge">${count}</span>`;
        el.onclick = () => switchTab(tab.id);
        bar.appendChild(el);

        const section = document.createElement('div');
        section.id = 'section-' + tab.id;
        section.className = 'section' + (idx === 0 ? ' active' : '');

        if (tab.type === 'tree') {
            section.innerHTML = buildTreeView(tab.id === 'hud' ? hudFeatures : appFeatures, tab.id === 'hud');
        } else if (tab.type === 'flow') {
            section.innerHTML = buildFlowView();
        } else {
            section.innerHTML = buildTableView(tab.id);
        }
        content.appendChild(section);
    });
}

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.target === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + id));
    // 滚动到内容区顶部
    const content = document.querySelector('.content');
    if (content) content.scrollTop = 0;
    // 如果是流程图/旅程图 tab，触发 Mermaid 渲染
    if (id === 'flow' || id === 'journey') {
        if (typeof mermaid !== 'undefined') {
            setTimeout(() => mermaid.run(), 100);
        }
    }
}

function buildTreeView(features, isHud = false) {
    let html = '<div class="stats">';
    const counts = {};
    features.forEach(f => { counts[f.priority] = (counts[f.priority]||0) + 1; });
    Object.entries(counts).sort().forEach(([p,c]) => {
        html += `<div class="stat"><div class="num">${c}</div><div class="label">${p}</div></div>`;
    });
    html += `<div class="stat"><div class="num">${features.length}</div><div class="label">总计</div></div></div>`;

    // 检测 L1 模块是否有实质内容（L2/L3 子节点）
    const l1HasChildren = {};
    features.forEach(f => {
        if (f.level === 'L1') l1HasChildren[f.name] = false;
        if (f.level === 'L2' || f.level === 'L3') l1HasChildren[f.name] = true;
    });

    let currentL1 = null, currentL2 = null;
    let l1Html = '';

    features.forEach(f => {
        const tag = `<span class="tag tag-${f.priority}">${f.priority}</span>`;
        if (f.level === 'L1') {
            if (currentL2) { l1Html += '</div>'; currentL2 = null; }
            if (currentL1) l1Html += '</div></div>';
            // 检查是否有子节点内容
            const isEmpty = !l1HasChildren[f.name];
            const l1Class = isEmpty ? 'l1 empty-content' : 'l1';
            l1Html += `<div class="${l1Class}" data-name="${f.name}" data-priority="${f.priority}">
                <div class="l1-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${tag} ${f.name} <span style="color:#999;font-size:12px;margin-left:auto">${f.interaction||''}</span>
                </div><div class="l1-body">`;
            currentL1 = f; currentL2 = null;
        } else if (f.level === 'L2') {
            if (currentL2) l1Html += '</div>';
            l1Html += `<div class="l2"><div class="l2-title" data-name="${f.name}" data-priority="${f.priority}">${tag} ${f.name}</div>`;
            currentL2 = f;
        } else if (f.level === 'L3') {
            // 检查描述是否为空或待生成
            const desc = f.description || '';
            const isDescEmpty = !desc || desc.includes('待生成') || desc.includes('待补充') || desc.length < 5;
            const descClass = isDescEmpty ? 'desc empty-desc' : 'desc';
            const descText = isDescEmpty ? '功能规划中' : desc;

            // B5: HUD 端增加 4 个新字段
            let extraFields = '';
            if (isHud) {
                const dp = (f.display_priority || 'medium').toLowerCase();
                extraFields = `
                    <span class="visual-output">${f.visual_output || ''}</span>
                    <span class="display-priority tag-${dp}">${f.display_priority || ''}</span>
                    <span class="degradation">${f.degradation || ''}</span>
                    <span class="display-duration">${f.display_duration || ''}</span>`;
            }

            l1Html += `<div class="l3" data-name="${f.name}" data-priority="${f.priority}">
                <span class="name">${tag} ${f.name}</span>
                <span class="${descClass}">${descText}</span>
                <span class="acc">${f.acceptance||''}</span>${extraFields}</div>`;
        }
    });
    if (currentL2) l1Html += '</div>';
    if (currentL1) l1Html += '</div></div>';

    return html + l1Html;
}

function buildTableView(id) {
    let data, headers, keys, colWidths;
    if (id === 'state') {
        data = DATA.state_scenarios;
        headers = ['前置状态','场景/操作','执行状态','HUD提示','灯光','语音','App提示','周期'];
        keys = ['pre_state','current','exec_state','hud','light','voice','app','cycle'];
        colWidths = ['12%','14%','12%','14%','10%','14%','14%','10%'];
    } else if (id === 'voice') {
        data = DATA.voice_commands;
        headers = ['分类','唤醒','用户说法','变体','系统动作','成功反馈','HUD反馈','失败反馈','优先级'];
        keys = ['category','wake','user_says','variants','action','success_voice','success_hud','fail_feedback','priority'];
        colWidths = ['10%','8%','14%','14%','14%','12%','10%','12%','6%'];
    } else if (id === 'button') {
        data = DATA.button_mapping;
        headers = ['按键','场景','单击','双击','长按','组合键','反馈','备注'];
        keys = ['button','scene','single_click','double_click','long_press','combo','feedback','note'];
        colWidths = ['10%','12%','14%','14%','14%','14%','14%','8%'];
    } else if (id === 'light') {
        data = DATA.light_effects;
        // B2: 增加 "作用灯区" 列
        headers = ['场景','颜色','模式','频率','时长','灯区','优先级','备注'];
        keys = ['trigger','color','mode','frequency','duration','lamp_zone','priority','note'];
        colWidths = ['12%','8%','10%','8%','10%','12%','8%','22%'];
    } else if (id === 'voice_nav') {
        data = DATA.voice_nav;
        headers = ['场景','触发','用户输入','AI动作','HUD显示','语音播报','灯光反馈','异常兜底','优先级','备注'];
        keys = ['scene','trigger','user_input','ai_action','hud_display','voice_output','light_effect','fallback','priority','note'];
        colWidths = ['10%','8%','12%','12%','12%','12%','10%','12%','6%','8%'];
    } else if (id === 'user_stories') {
        data = DATA.user_stories || [];
        headers = ['功能名','角色','用户故事','验收条件','优先级'];
        keys = ['feature','role','story','acceptance','priority'];
        colWidths = ['16%','12%','30%','28%','14%'];
    } else if (id === 'test_cases') {
        data = DATA.test_cases || [];
        headers = ['用例ID','功能名','标题','前置条件','步骤','预期结果','优先级'];
        keys = ['case_id','feature','title','precondition','steps','expected','priority'];
        colWidths = ['10%','14%','16%','14%','20%','18%','8%'];
    } else if (id === 'page_mapping') {
        data = DATA.page_mapping || [];
        headers = ['页面','父页面','平台','功能','入口','优先级','备注'];
        keys = ['page','parent','platform','features','entry','priority','note'];
        colWidths = ['14%','12%','10%','20%','14%','8%','22%'];
    } else if (id === 'dev_tasks') {
        data = DATA.dev_tasks || [];
        headers = ['任务ID','功能','描述','角色','工时','依赖','迭代','优先级','备注'];
        keys = ['task_id','feature','task','assignee','effort_days','dependency','sprint','priority','note'];
        colWidths = ['10%','12%','20%','10%','8%','12%','10%','6%','22%'];
    } else if (id === 'journey') {
        // B5: 用户旅程表
        data = DATA.user_journeys || [];
        headers = ['角色','画像','阶段数','触点数','Mermaid代码'];
        keys = ['role','persona','stages_count','touchpoints_count','mermaid_code'];
        colWidths = ['18%','30%','8%','8%','36%'];
    } else if (id === 'ai_scenarios') {
        // B5: AI场景表
        data = DATA.ai_scenarios || [];
        headers = ['场景名称','触发条件','系统动作','所需数据','用户控制'];
        keys = ['scenario','trigger','action','data_needed','user_control'];
        colWidths = ['18%','25%','25%','18%','14%'];
    }

    if (!data || data.length === 0) return '<p style="padding:20px;color:#999;">暂无数据</p>';

    // 添加 colgroup 定义列宽
    let colgroupHtml = '<colgroup>';
    (colWidths || []).forEach(w => { colgroupHtml += `<col style="width:${w}">`; });
    colgroupHtml += '</colgroup>';

    let html = '<div class="table-wrapper"><table>' + colgroupHtml + '<thead><tr>';
    headers.forEach(h => { html += `<th>${h}</th>`; });
    html += '</tr></thead><tbody>';
    data.forEach(row => {
        html += '<tr>';
        keys.forEach(k => {
            let val = row[k] || '';
            if (k === 'priority' && val) val = `<span class="tag tag-${val}">${val}</span>`;
            html += `<td>${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
}

function filterAll() {
    const q = document.getElementById('search').value.toLowerCase();
    const p = document.getElementById('priorityFilter').value;

    document.querySelectorAll('.l1').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q) || el.textContent.toLowerCase().includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('.l2, .l3').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('tbody tr').forEach(tr => {
        const text = tr.textContent.toLowerCase();
        const matchQ = !q || text.includes(q);
        const tagEl = tr.querySelector('.tag');
        const rowP = tagEl ? tagEl.textContent.trim() : '';
        const matchP = !p || rowP === p;
        tr.classList.toggle('hidden', !(matchQ && matchP));
    });
}

function expandAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.add('open'));
}
function collapseAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.remove('open'));
}

function updateHeaderHeight() {
    const header = document.querySelector('.header');
    const tabs = document.querySelector('.tabs');
    const content = document.querySelector('.content');

    if (header && tabs && content) {
        const headerH = header.offsetHeight;
        const tabsH = tabs.offsetHeight;
        const totalH = headerH + tabsH;

        // 设置 CSS 变量
        document.documentElement.style.setProperty('--header-height', headerH + 'px');
        document.documentElement.style.setProperty('--total-header-height', totalH + 'px');

        // 更新 tabs 的 top 位置
        tabs.style.top = headerH + 'px';

        // 更新 content 的 margin-top 和高度
        content.style.marginTop = totalH + 'px';
        content.style.height = `calc(100vh - ${totalH}px)`;

        // 更新表格表头的 sticky top
        document.querySelectorAll('th').forEach(th => {
            th.style.top = '0';
        });
    }
}

function updateStickyPositions() {
    updateHeaderHeight();
}

function updateStatsBar() {
    const allFeatures = DATA.features;
    const total = allFeatures.length;
    const p0 = allFeatures.filter(f => f.priority === 'P0').length;
    const p1 = allFeatures.filter(f => f.priority === 'P1').length;
    const p2 = allFeatures.filter(f => f.priority === 'P2').length;
    const p3 = allFeatures.filter(f => f.priority === 'P3').length;
    const modules = new Set(allFeatures.map(f => f.module)).size;

    const bar = document.getElementById('statsBar');
    if (bar) {
        bar.innerHTML = `
            <div class="stat">功能总数 <span class="stat-value">${total}</span></div>
            <div class="stat">P0 <span class="stat-value">${p0}</span></div>
            <div class="stat">P1 <span class="stat-value">${p1}</span></div>
            <div class="stat">P2 <span class="stat-value">${p2}</span></div>
            <div class="stat">P3 <span class="stat-value">${p3}</span></div>
            <div class="stat">模块数 <span class="stat-value">${modules}</span></div>
        `;
    }
}

buildTabs();
updateStatsBar();
updateHeaderHeight();
// 修复 2: 确保在 DOM 完全加载后执行
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(updateHeaderHeight, 100);
});
window.addEventListener('load', function() {
    setTimeout(updateHeaderHeight, 200);
});
window.addEventListener('resize', updateHeaderHeight);

const firstBody = document.querySelector('.l1-body');
if (firstBody) firstBody.classList.add('open');
</script>

<!-- Mermaid.js for flow diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
(function() {
    let mermaidReady = false;
    function tryInit() {
        if (typeof mermaid !== 'undefined' && !mermaidReady) {
            mermaid.initialize({ startOnLoad: false, theme: 'neutral', flowchart: { useMaxWidth: true } });
            mermaidReady = true;
        }
    }
    function renderFlows() {
        tryInit();
        if (mermaidReady) {
            try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) { console.error(e); }
        } else {
            document.querySelectorAll('.mermaid').forEach(el => {
                el.style.cssText = 'background:#f7f7f7;padding:16px;font-family:monospace;font-size:12px;white-space:pre-wrap;border:1px solid #ddd;border-radius:4px;';
                const tip = document.createElement('div');
                tip.style.cssText = 'color:#999;margin-bottom:8px;';
                tip.textContent = 'Flow diagram needs network (Mermaid.js). Copy code to mermaid.live to render.';
                el.parentNode.insertBefore(tip, el);
            });
        }
    }
    function toggleFlow(idx) {
        const body = document.getElementById('flow-body-' + idx);
        const hdr = body.previousElementSibling;
        const tog = hdr.querySelector('.flow-toggle');
        if (body.style.display === 'none') {
            body.style.display = 'block';
            tog.textContent = 'Hide';
            if (mermaidReady) { try { mermaid.run({ nodes: body.querySelectorAll('.mermaid') }); } catch(e) {} }
        } else {
            body.style.display = 'none';
            tog.textContent = 'Show';
        }
    }
    const origSwitchTab = window.switchTab;
    window.switchTab = function(id) {
        origSwitchTab(id);
        if (id === 'flow') { setTimeout(renderFlows, 100); }
    };
    window.addEventListener('load', tryInit);
})();
</script>
