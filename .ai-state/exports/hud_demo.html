<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Motorcycle Helmet HUD</title>
  <style>
    :root {
      --hud-color: rgba(80, 255, 120, 0.95);
      --hud-soft: rgba(80, 255, 120, 0.22);
      --hud-dim: rgba(80, 255, 120, 0.12);
      --hud-line: rgba(80, 255, 120, 0.65);
      --bg: #000000;
      --glow: 0 0 8px rgba(80, 255, 120, 0.45), 0 0 18px rgba(80, 255, 120, 0.18);
      --panel-bg: rgba(0, 20, 0, 0.18);
      --mode-label: "NIGHT";
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--hud-color);
      touch-action: manipulation;
    }

    body {
      position: relative;
      user-select: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 65%, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0) 18%),
        linear-gradient(to top, rgba(255,255,255,0.02), rgba(255,255,255,0) 22%),
        #000;
      overflow: hidden;
    }

    /* 模拟骑行视角道路 */
    .road {
      position: absolute;
      left: 50%;
      bottom: -8vh;
      width: 70vw;
      height: 85vh;
      transform: translateX(-50%);
      clip-path: polygon(46% 0%, 54% 0%, 100% 100%, 0% 100%);
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.03) 100%);
      opacity: 0.18;
      filter: blur(1px);
    }

    .lane {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      overflow: hidden;
      opacity: 0.35;
    }

    .lane::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.0) 0 18px,
          rgba(255,255,255,0.35) 18px 42px,
          rgba(255,255,255,0.0) 42px 72px
        );
      animation: laneMove 1.2s linear infinite;
    }

    @keyframes laneMove {
      from { transform: translateY(-72px); }
      to { transform: translateY(72px); }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.35) 78%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    .hud-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* HUD 放在右下，模拟 lower-right */
    .hud {
      position: absolute;
      right: max(3vw, env(safe-area-inset-right));
      bottom: max(4vh, env(safe-area-inset-bottom));
      width: min(42vw, 420px);
      height: min(34vh, 280px);
      color: var(--hud-color);
      filter: drop-shadow(0 0 6px rgba(80,255,120,0.25));
      transform-origin: bottom right;
    }

    .hud-frame {
      position: absolute;
      inset: 0;
      border: 1px solid var(--hud-line);
      border-radius: 18px;
      background: linear-gradient(to bottom left, rgba(80,255,120,0.05), rgba(80,255,120,0.01));
      box-shadow: inset 0 0 24px rgba(80,255,120,0.05), var(--glow);
      clip-path: polygon(8% 0%, 100% 0%, 100% 78%, 92% 100%, 0% 100%, 0% 18%);
      opacity: 0.9;
    }

    .hud-grid {
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      background-image:
        linear-gradient(rgba(80,255,120,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,255,120,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.45;
      clip-path: polygon(8% 0%, 100% 0%, 100% 78%, 92% 100%, 0% 100%, 0% 18%);
    }

    .speed-block {
      position: absolute;
      right: 18px;
      bottom: 18px;
      text-align: right;
    }

    .speed-label {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
      margin-bottom: 2px;
    }

    .speed-value {
      font-size: clamp(42px, 7vw, 78px);
      line-height: 0.9;
      font-weight: 700;
      text-shadow: var(--glow);
    }

    .speed-unit {
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .nav-block {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 46%;
      min-width: 120px;
    }

    .nav-title {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .nav-arrow-wrap {
      position: relative;
      width: 100%;
      height: 90px;
      border: 1px solid rgba(80,255,120,0.25);
      border-radius: 12px;
      background: var(--panel-bg);
      overflow: hidden;
    }

    .nav-arrow {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      animation: arrowPulse 2.8s ease-in-out infinite;
    }

    .nav-arrow svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 8px rgba(80,255,120,0.35));
    }

    @keyframes arrowPulse {
      0% { opacity: 0.08; transform: translateY(4px) scale(0.96); }
      20% { opacity: 0.95; transform: translateY(0) scale(1); }
      70% { opacity: 0.9; transform: translateY(0) scale(1); }
      100% { opacity: 0.08; transform: translateY(-4px) scale(0.96); }
    }

    .status-row {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 110px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      letter-spacing: 1.5px;
      opacity: 0.82;
    }

    .chip {
      border: 1px solid rgba(80,255,120,0.28);
      background: rgba(80,255,120,0.06);
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .fov-mark {
      position: absolute;
      right: 18px;
      top: 18px;
      font-size: 11px;
      letter-spacing: 1.5px;
      opacity: 0.65;
      text-align: right;
    }

    .call-popup {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%) translateY(-10px);
      min-width: min(86vw, 360px);
      max-width: 90vw;
      padding: 14px 16px;
      border: 1px solid rgba(80,255,120,0.45);
      border-radius: 16px;
      background: rgba(0, 20, 0, 0.42);
      color: var(--hud-color);
      box-shadow: var(--glow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s ease;
      backdrop-filter: blur(6px);
    }

    .call-popup.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .call-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .call-title {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.75;
    }

    .call-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .call-sub {
      font-size: 13px;
      opacity: 0.8;
    }

    .call-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .call-btn {
      flex: 1;
      text-align: center;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(80,255,120,0.35);
      background: rgba(80,255,120,0.08);
      font-size: 12px;
      letter-spacing: 1.5px;
    }

    .mode-tip {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.65);
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }

    .mode-badge {
      position: absolute;
      left: 18px;
      bottom: 18px;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.7;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.00) 0px,
        rgba(255,255,255,0.00) 2px,
        rgba(80,255,120,0.02) 3px,
        rgba(255,255,120,0.00) 4px
      );
      mix-blend-mode: screen;
      opacity: 0.25;
      pointer-events: none;
    }

    /* 模式 */
    body.mode-day {
      --hud-color: rgba(120, 255, 140, 0.98);
      --hud-soft: rgba(120, 255, 140, 0.18);
      --hud-dim: rgba(120, 255, 140, 0.10);
      --hud-line: rgba(120, 255, 140, 0.72);
      --bg: #050505;
      --panel-bg: rgba(10, 40, 10, 0.14);
    }

    body.mode-day .scene {
      background:
        radial-gradient(circle at 50% 65%, rgba(255,255,255,0.06), transparent 28%),
        linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.01) 18%),
        #050505;
    }

    body.mode-night {
      --hud-color: rgba(80, 255, 120, 0.95);
      --hud-soft: rgba(80, 255, 120, 0.22);
      --hud-dim: rgba(80, 255, 120, 0.12);
      --hud-line: rgba(80, 255, 120, 0.65);
      --bg: #000000;
      --panel-bg: rgba(0, 20, 0, 0.18);
    }

    body.mode-tunnel {
      --hud-color: rgba(90, 255, 110, 0.92);
      --hud-soft: rgba(90, 255, 110, 0.16);
      --hud-dim: rgba(90, 255, 110, 0.08);
      --hud-line: rgba(90, 255, 110, 0.55);
      --bg: #010101;
      --panel-bg: rgba(0, 12, 0, 0.28);
    }

    body.mode-tunnel .scene {
      background:
        radial-gradient(circle at 50% 55%, rgba(255,255,255,0.015), transparent 22%),
        linear-gradient(to bottom, rgba(255,255,255,0.01), rgba(255,255,255,0) 20%),
        #010101;
    }

    body.mode-tunnel .vignette {
      background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,0.48) 72%, rgba(0,0,0,0.82) 100%);
    }

    @media (max-width: 700px) {
      .hud {
        width: min(58vw, 360px);
        height: min(32vh, 240px);
        right: 3vw;
        bottom: max(3vh, env(safe-area-inset-bottom));
      }

      .nav-arrow-wrap {
        height: 72px;
      }

      .nav-arrow svg {
        width: 56px;
        height: 56px;
      }

      .status-row {
        bottom: 92px;
        font-size: 11px;
      }

      .speed-value {
        font-size: clamp(38px, 10vw, 64px);
      }
    }
  </style>
</head>
<body class="mode-night">
  <div class="scene" id="scene">
    <div class="road">
      <div class="lane"></div>
    </div>
    <div class="scanline"></div>
    <div class="vignette"></div>
  </div>

  <div class="hud-root" id="toggleArea">
    <div class="call-popup" id="callPopup">
      <div class="call-top">
        <div class="call-title">INCOMING CALL</div>
        <div class="call-title">5G LINK</div>
      </div>
      <div class="call-name">Alex Chen</div>
      <div class="call-sub">Helmet intercom connected</div>
      <div class="call-actions">
        <div class="call-btn">REJECT</div>
        <div class="call-btn">ANSWER</div>
      </div>
    </div>

    <div class="hud">
      <div class="hud-frame"></div>
      <div class="hud-grid"></div>

      <div class="fov-mark">
        FOV 19°<br />
        1024×768
      </div>

      <div class="nav-block">
        <div class="nav-title">NAVIGATION</div>
        <div class="nav-arrow-wrap">
          <div class="nav-arrow">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path
                d="M20 70 L50 20 L80 70 L58 70 L58 84 L42 84 L42 70 Z"
                stroke="rgba(80,255,120,0.95)"
                stroke-width="4"
                fill="rgba(80,255,120,0.18)"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>

      <div class="status-row">
        <div class="chip" id="rideState">RIDE: NORMAL</div>
        <div class="chip" id="etaState">ETA 12 MIN</div>
      </div>

      <div class="mode-badge" id="modeBadge">MODE: NIGHT</div>

      <div class="speed-block">
        <div class="speed-label">SPEED</div>
        <div class="speed-value" id="speedValue">0</div>
        <div class="speed-unit">KM/H</div>
      </div>
    </div>

    <div class="mode-tip">点击任意位置切换：日间 / 夜间 / 隧道</div>
  </div>

  <script>
    (function () {
      const speedEl = document.getElementById("speedValue");
      const callPopup = document.getElementById("callPopup");
      const modeBadge = document.getElementById("modeBadge");
      const body = document.body;
      const rideState = document.getElementById("rideState");
      const etaState = document.getElementById("etaState");

      const modes = ["day", "night", "tunnel"];
      let modeIndex = 1; // 默认 night
      let speed = 0;
      let targetSpeed = 80;
      let startTime = performance.now();
      let callShown = false;

      function updateMode() {
        body.classList.remove("mode-day", "mode-night", "mode-tunnel");
        const mode = modes[modeIndex];
        body.classList.add("mode-" + mode);
        modeBadge.textContent = "MODE: " + mode.toUpperCase();

        if (mode === "day") {
          rideState.textContent = "RIDE: NORMAL";
          etaState.textContent = "VIS 92%";
        } else if (mode === "night") {
          rideState.textContent = "RIDE: NORMAL";
          etaState.textContent = "ETA 12 MIN";
        } else {
          rideState.textContent = "RIDE: TUNNEL";
          etaState.textContent = "GPS WEAK";
        }
      }

      function animateSpeed(now) {
        const elapsed = (now - startTime) / 1000;

        // 0 -> 80，约 10 秒内逐步上升，带一点缓动
        const progress = Math.min(elapsed / 10, 1);
        const eased = 1 - Math.pow(1 - progress, 2.2);
        const simulated = targetSpeed * eased;

        // 叠加轻微抖动，模拟实时变化
        const jitter = Math.sin(now / 280) * 1.2 + Math.sin(now / 1100) * 0.8;
        speed = Math.max(0, Math.min(targetSpeed, simulated + jitter));
        speedEl.textContent = Math.round(speed);

        // 5 秒后显示来电
        if (!callShown && elapsed >= 5) {
          callShown = true;
          callPopup.classList.add("show");
        }

        requestAnimationFrame(animateSpeed);
      }

      document.getElementById("toggleArea").addEventListener("click", function () {
        modeIndex = (modeIndex + 1) % modes.length;
        updateMode();
      });

      // 尝试进入全屏（移动端部分浏览器可能限制）
      function tryFullscreen() {
        const el = document.documentElement;
        const req =
          el.requestFullscreen ||
          el.webkitRequestFullscreen ||
          el.msRequestFullscreen;
        if (req) {
          try { req.call(el); } catch (e) {}
        }
      }

      window.addEventListener("load", () => {
        updateMode();
        requestAnimationFrame(animateSpeed);
        setTimeout(tryFullscreen, 600);
      });

      // 防止双击缩放影响体验
      let lastTouchEnd = 0;
      document.addEventListener("touchend", function (event) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    })();
  </script>
</body>
</html>
