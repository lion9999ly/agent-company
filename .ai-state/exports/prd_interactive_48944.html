(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要查看剩余存储、文件保存结果及存储异常,以便避免素材丢失并及时处理存储问题", "acceptance": "系统可显示剩余存储容量或可录制时长;每次录制结束后可反馈文件保存成功或失败;当存储卡异常、空间不足或写入失败时需及时告警;用户可在App查看最近文件状态记录", "priority": "P0"}, {"feature": "电量与温度联动(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要根据设备电量和温度状态获得摄像可用性与风险提示,以便提前调整录制计划并保护设备", "acceptance": "当电量过低时系统提示录制时长受限或建议停止录制;当温度过高时系统提示性能降级、暂停或保护措施;电量和温度状态变化应联动更新摄像可用性;风险提示需区分一般提醒与严重告警", "priority": "P1"}, {"feature": "连接与控制反馈(摄像状态)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要及时知道摄像控制指令是否生效以及与手机或配件的连接状态,以便确认设备可正常协同工作", "acceptance": "用户发起开始、停止、拍照等控制后系统需返回成功、失败或处理中反馈;界面可显示与手机、遥控器或配件的连接状态;连接中断时需提示并支持自动重连;控制失败时应给出可理解原因或处理建议", "priority": "P1"}, {"feature": "语音交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过语音完成骑行中的核心控制与信息获取,以便减少手动操作并专注道路环境", "acceptance": "用户可通过语音触发常用控制与查询,如导航、速度、录像或消息处理;系统应在识别后给出明确反馈;骑行噪声环境下仍需支持基础指令识别;无法识别时应提示重试或提供替代方式", "priority": "P0"}, {"feature": "视觉交互(AI功能)", "role": "新手骑手", "story": "作为新手骑手,我想要基于摄像头与算法获得骑行辅助感知、目标识别与影像智能能力,以便更早发现风险并提升骑行判断", "acceptance": "系统可识别预设目标或风险场景并输出可理解提示;提示内容应避免遮挡核心骑行信息;用户可在支持场景下查看识别结果或影像增强效果;识别异常时系统不得输出误导性强制指令", "priority": "P1"}, {"feature": "多模态感知(AI功能)", "role": "新手骑手", "story": "作为新手骑手,我想要融合IMU、位置与外设数据来提升安全判断与场景理解能力,以便在复杂路况下获得更可靠的辅助提示", "acceptance": "系统可结合IMU、定位和外设数据进行场景判断;在急刹、摔车、异常停车等场景下可输出对应提示或触发联动;当单一数据源异常时应有兜底策略;用户可查看主要感知能力的开启状态", "priority": "P1"}, {"feature": "AI内容生成(AI功能)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要基于骑行视频、轨迹与事件数据自动生成摘要、标签与可分享内容,以便更高效地整理和发布骑行作品", "acceptance": "系统可对一次骑行生成摘要、关键事件标签或精选片段建议;生成内容可在App中预览、编辑和分享;标签应关联视频或轨迹时间点;生成失败时需提示原因并支持重试", "priority": "P1"}, {"feature": "AI配置与学习(AI功能)", "role": "后台管理员", "story": "作为后台管理员,我想要支持用户对AI能力进行开关、灵敏度与个性化偏好配置并通过OTA持续优化,以便平衡体验一致性、用户差异和模型迭代效率", "acceptance": "用户侧可配置AI能力开关、灵敏度和偏好项;后台可管理配置项版本与默认策略;OTA升级后配置兼容且可追踪版本变化;系统可基于合规前提支持效果优化与策略更新", "priority": "P2"}, {"feature": "实时速度显示(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD主界面持续看到当前骑行速度,以便在骑行中快速读取并控制车速", "acceptance": "HUD主界面默认显示当前速度;速度数值更新应及时且清晰可读;静止或无有效数据时应显示合理状态;显示样式在强光和夜间场景下均可辨识", "priority": "P0"}, {"feature": "超速提醒(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在当前速度超过设定阈值时收到HUD、语音或灯光提醒,以便及时减速并降低违章与安全风险", "acceptance": "用户可设置一个或多个超速阈值;当速度超过阈值时系统按配置触发HUD、语音或灯光提醒;速度回落后提醒应自动解除或降级;提醒频率应避免持续骚扰", "priority": "P0"}, {"feature": "平均与峰值速度(速度)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要记录并查看本次骑行的平均速度与最高速度,以便复盘骑行节奏和路段表现", "acceptance": "系统可在骑行结束后展示平均速度与最高速度;数据统计范围应与本次骑行会话一致;用户可在App查看历史骑行的相关数据;异常数据应有过滤或标记机制", "priority": "P2"}, {"feature": "速度数据源与校准(速度)", "role": "后台管理员", "story": "作为后台管理员,我想要管理速度数据来源、异常兜底与显示校准,以便提升速度显示的稳定性和可信度", "acceptance": "系统支持配置主要与备用速度数据源;当主数据源异常时可自动切换或降级显示;支持速度显示校准参数管理;异常切换和校准结果应可记录与追踪", "priority": "P1"}, {"feature": "速度交互控制(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过按键、语音和App对速度模块进行开关、切换和快捷操作,以便按场景快速调整显示与提醒方式", "acceptance": "用户可通过按键、语音和App控制速度模块显示与提醒;不同入口的控制结果应保持一致;操作后系统需给出明确反馈;骑行中高风险操作应限制步骤或采用安全确认机制", "priority": "P1"}, {"feature": "数据显示(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要查看前后轮胎压胎温的实时数值和状态,以便及时掌握轮胎健康并保障长途骑行安全", "acceptance": "系统可区分前后轮显示胎压和胎温;数值与状态应实时更新;异常或无数据时应有明确标识;显示单位支持与系统设置保持一致", "priority": "P0"}, {"feature": "异常预警(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要在低压、高压、高温或快速漏气时收到分级预警,以便及时采取措施避免爆胎或失控风险", "acceptance": "系统可识别低压、高压、高温和快速漏气等异常;不同异常按严重程度分级提醒;提醒可通过HUD、语音或App触发;严重异常需优先展示并支持持续提醒直到风险解除", "priority": "P0"}, {"feature": "设备连接与绑定(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要完成胎压传感器与头盔或手机的发现、绑定、重连和状态管理,以便稳定获取轮胎监测数据", "acceptance": "用户可搜索并绑定前后轮传感器;绑定后系统可显示设备状态和电量等基础信息;断连后支持自动重连或手动重连;更换传感器时支持解绑与重新绑定", "priority": "P1"}, {"feature": "交互与设置(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要通过查看、播报、阈值设置和快捷操作管理胎温胎压功能,以便在骑行中减少操作负担并保持关注重点", "acceptance": "用户可查看当前胎温胎压并通过语音获取播报;可设置预警阈值和提醒方式;支持快捷入口进行常用操作;骑行中设置流程应尽量简化并避免复杂输入", "priority": "P1"}, {"feature": "历史记录与诊断(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要查看胎温胎压历史趋势与传感器健康状态,以便进行轮胎维护和故障诊断", "acceptance": "App可按骑行记录展示胎温胎压历史曲线;用户可查看传感器电量、信号和健康状态;异常历史事件应可定位到时间点;支持导出或分享基础诊断信息", "priority": "P2"}, {"feature": "账号注册与登录(身份认证)", "role": "新手骑手", "story": "作为新手骑手,我想要创建账号并通过标准登录流程进入系统,以便保存个人设备、设置和骑行数 正常完成对应操作。", "priority": "P3"}, {"feature": "商品浏览(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要浏览头盔整机、配件和增值服务商品信息,以便挑选适合自己的商品。", "acceptance": "支持按品类浏览整机、配件和增值服务;商品详情页展示关键信息、价格和规格;支持查看商品图文信息;浏览过程流畅可返回继续挑选。", "priority": "P1"}, {"feature": "下单支付(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要将商品加入购物车、提交订单并完成支付,以便顺利购买所需商品。", "acceptance": "支持加入购物车和修改购买数量;支持提交订单并填写必要信息;支持完成支付并返回支付结果;订单创建和支付结果需有明确反馈。", "priority": "P0"}, {"feature": "订单与履约(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查看订单状态、物流进度和签收结果,以便及时掌握商品履约情况。", "acceptance": "支持查看订单列表和订单详情;展示订单当前状态;展示物流进度信息;支持查看签收结果或完成状态。", "priority": "P1"}, {"feature": "售后服务(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要申请退换货、维修、配件补购并查询售后进度,以便在出现问题时获得持续服务支持。", "acceptance": "支持发起退换货申请;支持发起维修申请;支持配件补购入口;支持查看售后处理进度和结果;关键节点有消息提示。", "priority": "P1"}, {"feature": "营销与转化(App-商城)", "role": "后台管理员", "story": "作为后台管理员,我想要通过优惠券、活动和推荐提升商城转化率与客单价,以便提高商城经营效果。", "acceptance": "支持配置优惠券和活动入口;支持商品推荐位展示;用户在浏览和下单过程中可看到相关营销信息;营销能力不影响正常下单流程。", "priority": "P2"}, {"feature": "客服与咨询(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要获得购买前、订单和售后咨询入口,以便在商城各阶段都能及时得到帮助。", "acceptance": "提供购买前咨询入口;提供订单咨询入口;提供售后咨询入口;用户可从商品页、订单页或售后页便捷进入咨询。", "priority": "P1"}, {"feature": "基础按键输入(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要设备支持单击、双击、长按等基础按键输入,以便稳定完成各类实体交互操作。", "acceptance": "系统可识别单击、双击、长按等基础输入;不同输入动作有明确判定规则;输入结果可供上层功能调用;在骑行场景下识别稳定可靠。", "priority": "P0"}, {"feature": "骑行核心控制(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过实体按键盲操完成骑行中必须的核心功能控制,以便在不看屏幕的情况下安全操作。", "acceptance": "支持通过实体按键完成核心高频功能控制;操作可在骑行中盲操完成;关键操作有即时反馈;控制链路短且不依赖复杂菜单。", "priority": "P0"}, {"feature": "菜单与HUD联动(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过实体按键在HUD界面中切换菜单并进行确认和返回,以便快速完成界面操作。", "acceptance": "支持按键切换HUD菜单项;支持确认和返回操作;HUD界面状态与按键操作保持一致;操作后有清晰视觉或语音反馈。", "priority": "P1"}, {"feature": "安全防误触(实体按键交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过锁定、去抖和场景限制降低误触风险,以便避免骑行中发生错误操作。", "acceptance": "支持按键锁定机制;支持输入去抖处理;可根据骑行场景限制高风险操作;误触被拦截时有明确提示。", "priority": "P0"}, {"feature": "反馈与可学习性(实体按键交互)", "role": "新手骑手", "story": "作为新手骑手,我想要在按键操作后获得HUD、语音或音效反馈并得到学习引导,以便更快掌握设备使用方式。", "acceptance": "按键操作后提供HUD、语音或音效反馈;反馈内容能说明操作是否成功;支持新手学习提示或引导;引导不影响正常骑行使用。", "priority": "P1"}, {"feature": "基础信息简显(简易)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在简易模式下只看到速度、电量和连接状态等必需信息,以便快速获取关键状态并减少干扰。", "acceptance": "简易模式下仅展示必要骑行信息;至少包含速度、电量和连接状态;信息布局清晰易读;不展示影响专注的复杂内容。", "priority": "P0"}, {"feature": "简化导航入口(简易)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在不进入复杂导航页的情况下获得基础方向与距离提示,以便更轻量地完成导航查看。", "acceptance": "简易模式下可直接查看基础方向提示;可查看剩余距离等核心导航信息;无需进入复杂导航页面;展示内容简洁且适合骑行中快速识别。", "priority": "P1"}, {"feature": "简化消息提醒(简易)", "role": "通勤骑手", "story": "作为通勤骑手,我想要对来电和消息等通知进行压缩展示,以便减少骑行干扰同时不错过重要提醒。", "acceptance": "支持来电和消息等高频通知的简化展示;提醒内容经过压缩不过度占用界面;重要通知可被识别;提醒结束后界面自动恢复。", "priority": "P1"}, {"feature": "快捷交互控制(简易)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过实体按键和语音快速切换或确认简易模式操作,以便更高效地完成常用交互。", "acceptance": "支持通过实体按键进入或切换简易模式相关操作;支持通过语音完成快速确认或切换;操作路径短且反馈明确;与其他模式切换状态一致。", "priority": "P1"}, {"feature": "显示与安全约束(简易)", "role": "通勤骑手", "story": "作为通勤骑手,我想要简易模式限制信息密度和显示行为,以便确保骑行中的安全性和可读性。", "acceptance": "简易模式对信息密度有明确限制;高干扰内容在骑行中受限显示;界面元素满足可读性要求;显示策略优先保障骑行安全。", "priority": "P0"}, {"feature": "HUD路线展示", "role": "通勤骑手", "story": "作为通勤骑手,我想要将路线核心信息以低干扰方式显示在HUD中并配合语音提示,以便在骑行中快速获取导航信息且不分散注意力", "acceptance": "当导航开始后,HUD应持续显示下一转向、距离和关键路口信息;在接近转向点时提供清晰语音提示;显示内容不得遮挡核心视野且信息层级简洁;在白天和夜间场景下均可辨识", "priority": "P0"}, {"feature": "路线执行与重规划", "role": "通勤骑手", "story": "作为通勤骑手,我想要在偏航、错过路口或路况变化时系统持续保持路线可用,以便我能不中断地继续前往目的地", "acceptance": "当用户偏离原路线、错过路口或前方路况变化时,系统应自动检测并触发重规划;重规划期间应保留当前导航状态并给出提示;新路线生成后HUD与语音提示应同步更新;若暂时无法重规划,应提示用户当前状态与恢复方式", "priority": "P0"}, {"feature": "路线与设备协同", "role": "通勤骑手", "story": "作为通勤骑手,我想要路线功能结合设备连接、电量和安全状态稳定运行,以便在关键出行过程中导航不中断", "acceptance": "当设备连接正常时,路线信息应稳定同步到HUD和语音链路;当手机断连、设备低电或安全状态异常时,系统应及时提示并采取降级策略;在恢复连接或供电后,路线功能应自动恢复;异常期间不得出现误导性导航信息", "priority": "P0"}, {"feature": "唤醒与会话控制", "role": "新手骑手", "story": "作为新手骑手,我想要通过语音或按键唤醒助手并控制会话开始、结束与打断,以便在骑行中更自然安全地使用语音功能", "acceptance": "系统应支持唤醒词和按键两种唤醒方式;唤醒成功后应明确进入会话状态;用户可通过语音、按键或超时结束会话;当用户再次发起指令或外部高优先级事件出现时,当前会话应可被打断并正确处理", "priority": "P0"}, {"feature": "状态展示与反馈", "role": "新手骑手", "story": "作为新手骑手,我想要通过HUD、灯光、语音和App了解助手当前工作状态与结果反馈,以便确认系统是否正确响应了我的操作", "acceptance": "在待机、监听、识别、执行、成功、失败等状态下,系统应提供一致且可区分的反馈;HUD、灯光、语音和App反馈应保持状态一致;执行成功时应明确告知结果,失败时应说明原因或下一步建议;反馈不得造成骑行中的过度干扰", "priority": "P1"}, {"feature": "场景状态机", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统根据骑行、通话、导航、音乐等场景切换助手可用状态与优先级,以便在不同场景下获得更合理的交互体验", "acceptance": "系统应识别骑行、通话、导航、音乐等主要场景;不同场景下助手可用能力和优先级应按预设规则切换;导航和安全相关能力优先级应高于娱乐类能力;场景切换时应避免状态冲突和重复播报", "priority": "P0"}, {"feature": "设置与个性化", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要配置唤醒方式、反馈方式、语言与播报偏好,以便让语音助手更符合我的使用习惯和创作场景", "acceptance": "用户应可在可用设置入口中配置唤醒方式、反馈方式、语言和播报偏好;设置修改后应即时生效或明确提示生效时机;系统应保存用户偏好并在下次使用时自动应用;不支持的配置项应给出明确说明", "priority": "P2"}, {"feature": "数据记录与诊断", "role": "后台管理员", "story": "作为后台管理员,我想要记录助手唤醒、失败、异常与版本信息,以便用于售后排查和持续优化产品表现", "acceptance": "系统应记录唤醒事件、识别失败、执行异常、设备版本和关键上下文信息;日志应可按时间和设备维度查询;异常日志应支持售后定位问题;记录过程应满足隐私与权限要求", "priority": "P1"}, {"feature": "语音唤醒与会话控制", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中通过唤醒词或按键进入语音助手并管理会话开始、结束与打断,以便减少手动操作并保持骑行专注", "acceptance": "骑行中用户可通过唤醒词或按键进入语音助手;进入后系统应明确提示已开始会话;用户可主动结束会话或在超时后自动结束;当导航播报、来电或更高优先级事件发生时,会话应可被安全打断并恢复到正确状态", "priority": "P0"}, {"feature": "骑行指令理解与执行", "role": "通勤骑手", "story": "作为通勤骑手,我想要语音助手识别并执行导航、通话、音乐等高频骑行语音指令,以便在不分心的情况下完成常用操作", "acceptance": "系统应支持导航、通话、音乐等高频指令的识别与执行;识别成功后应在合理时间内完成操作并反馈结果;无法识别或不支持的指令应明确提示;涉及安全或高风险操作时应增加确认或限制机制", "priority": "P0"}, {"feature": "语音反馈与多模态提示", "role": "新手骑手", "story": "作为新手骑手,我想要通过语音、HUD和灯光获得助手识别状态、执行结果和异常反馈,以便及时理解系统当前情况并决定下一步操作", "acceptance": "在识别中、执行中、成功、失败和异常状态下,系统应通过至少一种主反馈和一种辅助反馈进行提示;HUD、灯光和语音反馈应语义一致;异常时应提供可理解的原因或建议;反馈强度应适配骑行场景避免干扰", "priority": "P1"}, {"feature": "抗噪拾音与通话增强", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过麦克风阵列与降噪算法提升风噪环境下的语音识别与通话质量,以便在高速或嘈杂环境中仍能稳定使用语音功能", "acceptance": "在典型骑行风噪和路噪环境下,系统应保持可用的语音拾音能力;语音识别成功率和通话清晰度应明显优于无降噪状态;多人说话或强噪声场景下应尽量突出主说话人;当环境超出可处理范围时应给出提示而非错误执行", "priority": "P0"}, {"feature": "助手设置与个性化", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要在App或头盔端配置唤醒词开关、播报音量、语言与权限项,以便根据不同骑行和创作场景灵活调整助手行为", "acceptance": "用户应可在App或头盔端查看并修改唤醒词开关、播报音量、语言和权限项;配置修改后应同步到实际使用端;权限关闭后相关能力应受限并给出说明;设置应可持久保存并支持再次编辑", "priority": "P2"}, {"feature": "声学环境异常处理", "role": "通勤骑手", "story": "作为通勤骑手,我想要在风噪、路噪和多人说话等复杂环境下识别失败时获得提示、重试和降级处理,以便避免误操作并知道如何继续使用", "acceptance": "当系统检测到复杂声学环境导致识别失败时,应明确提示失败原因或环境问题;系统应支持自动或引导式重试;连续失败时应进入降级策略,如建议按键操作或简化指令;不得在低置信度下直接执行高风险指令", "priority": "P0"}, {"feature": "连接与资源异常处理", "role": "通勤骑手", "story": "作为通勤骑手,我想要在蓝牙断连、手机无网、音频通道占用和低电量等情况下语音助手仍可降级运行或安全退出,以便减少骑行中的功能中断和风险", "acceptance": "当蓝牙断连、无网络、音频通道占用或低电量发生时,系统应识别异常并提示用户;可离线或本地执行的能力应继续可用;无法继续的能力应安全退出且不造成卡死或误反馈;异常恢复后系统应支持自动或手动恢复服务", "priority": "P0"}, {"feature": "误唤醒与误执行防护", "role": "通勤骑手", "story": "作为通勤骑手,我想要降低误唤醒、误识别和误执行带来的风险,以便在骑行中更放心地使用语音助手", "acceptance": "系统应对误唤醒进行检测和抑制;对低置信度识别结果应避免直接执行关键操作;导航、通话和安全相关指令应具备更严格的确认或校验机制;用户应可感知被拦截或取消的原因", "priority": "P0"}, {"feature": "骑行安全边界控制", "role": "新手骑手", "story": "作为新手骑手,我想要系统根据骑行状态限制复杂交互并优先保障导航、预警和通话等核心能力,以便在骑行中始终以安全为先", "acceptance": "系统应根据静止、低速、高速等骑行状态调整可交互能力;复杂或高干扰操作在骑行中应被限制或延后;导航、预警和通话等核心能力应始终优先可用;被限制的操作应给出简洁明确的提示", "priority": "P0"}, {"feature": "反馈与恢复机制", "role": "新手骑手", "story": "作为新手骑手,我想要在异常场景下获得统一反馈、可理解的恢复路径和可追踪日志,以便快速恢复使用并在需要时寻求支持", "acceptance": "异常发生时系统应提供统一风格的反馈;反馈内容应包含问题概述和建议恢复步骤;用户完成恢复操作后系统应能回到可用状态;关键异常应生成可追踪日志供售后或诊断使用", "priority": "P1"}, {"feature": "队友位置采集与同步", "role": "团骑领队", "story": "作为团骑领队,我想要通过手机网络与头盔互联获取队友位置并同步到HUD显示链路,以便实时掌握队伍分布情况", "acceptance": "系统应能采集队友位置并通过网络同步;头盔与手机连接正常时位置数据应传递到HUD显示链路;位置更新应在可接受时延内完成;当部分队友数据缺失时不应影响其他队友信息展示", "priority": "P0"}, {"feature": "HUD位置呈现", "role": "团骑领队", "story": "作为团骑领队,我想要在HUD中以简洁图标、方向与距离信息展示队友相对位置,以便在不频繁查看手机的情况下了解队伍状态", "acceptance": "HUD应以简洁方式展示队友方向和相对距离;显示信息应避免遮挡核心骑行视野;多名队友存在时应有清晰的优先级或聚合策略;信息更新时应平滑且易于理解", "priority": "P1"}, {"feature": "异常状态提示", "role": "团骑领队", "story": "作为团骑领队,我想要在队友掉线、距离过远或定位异常时收到明确提示,以便及时调整队伍节奏和沟通策略", "acceptance": "当队友掉线、超出设定距离或定位异常时,系统应及时提示;提示应区分异常类型并标识对应队友;异常解除后状态应自动更新;提示方式应兼顾及时性与低干扰", "priority": "P1"}, {"feature": "交互控制", "role": "团骑领队", "story": "作为团骑领队,我想要通过按键、语音和App控制队友位置显示的开关与模式切换,以便根据路况和编队需求灵活调整显示方式", "acceptance": "用户应可通过按键、语音和App控制队友位置显示开关;系统应支持不同显示模式切换;切换后HUD应立即更新到对应模式;在骑行中不安全的复杂操作应被限制或简化", "priority": "P2"}, {"feature": "App队伍地图辅助", "role": "团骑领队", "story": "作为团骑领队,我想要在App中查看更完整的队伍地图视图,以便作为HUD简化显示的补充进行整体判断", "acceptance": "App应提供完整队伍地图视图并展示成员位置;地图信息应与HUD数据保持一致或说明延迟状态;用户可在App中查看更多队伍细节信息;当HUD信息不足时,App应作为补充入口可用", "priority": "P2"}, {"feature": "电源与续航异常", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统识别电池电量、续航预估、低电与关机边界异常并及时提示,以便提前采取措施避免骑行中断", "acceptance": "系统应显示当前电量和续航预估;在低电、极低电和即将关机时应分级提示;提示应包含建议操作如充电或关闭非核心功能;在关机边界前应优先保障关键能力和数据安全", "priority": "P0"}, {"feature": "充电与供电边界", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统管理USB-C充电、充满、异常充电和边充边用等供电边界状态,以便安全稳定地使用设备", "acceptance": "接入USB-C后系统应识别充电状态并展示;充满电时应明确提示;异常充电或供电不稳定时应告警并限制风险操作;边充边用场景下系统应说明可用能力和注意事项", "priority": "P1"}, {"feature": "连接与通信异常", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统处理头盔与手机、蓝牙音频、对讲及网络连接中断、弱连接和重连边界,以便关键功能尽快恢复可用", "acceptance": "当头盔与手机、蓝牙音频、对讲或网络连接异常时,系统应及时检测并提示;弱连接状态下应提示可能影响的功能;连接恢复后应自动或引导重连;重连过程中应避免重复报错和状态混乱", "priority": "P0"}, {"feature": "环境与硬件边界", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要系统识别防水、温度、重量佩戴负担及硬件自检失败等环境与硬件边界,以便在长途复杂环境中安全使用设备", "acceptance": "系统应在启动或运行中进行必要的硬件自检;检测到温度异常、防水风险或硬件故障时应及时提示;对可能影响安全或寿命的问题应给出处理建议;严重异常时应限制相关功能并保留必要日志", "priority": "P1"}, {"feature": "显示与交互异常", "role": "新手骑手", "story": "作为新手骑手,我想要系统处理HUD不可见、语音不可用、按键失效等交互链路异常,以便在出现问题时仍知道当前状态并找到替代操作方式", "acceptance": "当HUD不可见、语音不可用或按键失效时,系统应检测并提示异常;应提供可用的替代交互路径,如App控制或其他反馈方式;异常恢复后系统应自动更新状态;关键异常应被记录用于后续排查", "priority": "P1"}, {"feature": "日志与售后诊断", "role": "后台管理员", "story": "作为后台管理员,我想要对异常事件进行记录、导出与售后诊断,以便支撑问题复现、定位和维修决策", "acceptance": "系统应记录关键异常事件及发生时间、版本和上下文;日志应支持导出用于售后分析;售后人员应能基于日志定位常见问题;日志采集与导出过程应符合权限和隐私要求", "priority": "P1"}, {"feature": "头盔/手机互联", "role": "新手骑手", "story": "作为新手骑手,我想要完成头盔与手机的发现、配对、连接和基础控制,以便顺利开始使用导航、语音和设备管理功能", "acceptance": "用户应可发现附近可配对头盔并完成配对;配对成功后应建立稳定连接并显示连接状态;用户可通过App进行基础控制和状态查看;连接失败时应提供明确原因和重试指引", "priority": "P0"}], "test_cases": [{"case_id": "TC-0031", "feature": "一键开启队内对讲", "title": "短按按键成功开启队内对讲", "precondition": "设备已开机并成功入队；网络与语音链路正常；HUD可正常显示", "steps": "确认当前未处于对讲中状态；短按指定对讲按键1次；开始计时并观察连接建立过程；在10秒内查看HUD状态", "expected": "短按指定按键后10秒内建立队内对讲连接；连接成功后HUD显示“对讲中”", "priority": "P0"}, {"case_id": "TC-0032", "feature": "一键开启队内对讲", "title": "连续3次开启失败时给出错误提示", "precondition": "设备已开机并成功入队；人为断开对讲所需链路或制造不可连接环境；HUD与语音播报功能正常", "steps": "确认当前未处于对讲中状态；短按指定对讲按键1次并等待失败结果；重复短按指定对讲按键第2次并等待失败结果；重复短按指定对讲按键第3次并观察提示", "expected": "连续3次建立队内对讲失败后，系统给出语音或HUD错误提示；10秒内未建立成功连接；HUD不显示“对讲中”", "priority": "P1"}, {"case_id": "TC-0033", "feature": "对讲静音与恢复", "title": "静音与恢复在1秒内生效并显示图标", "precondition": "设备已建立队内对讲连接；HUD可正常显示静音图标", "steps": "在对讲中执行静音操作1次；开始计时并观察语音是否被静音；查看HUD是否显示静音图标；执行恢复操作1次；开始计时并观察语音是否恢复；查看HUD静音图标是否取消", "expected": "静音操作后1秒内生效；HUD显示静音图标；恢复操作后1秒内取消静音；HUD静音图标消失", "priority": "P0"}, {"case_id": "TC-0034", "feature": "对讲静音与恢复", "title": "连续切换静音与恢复20次功能无异常", "precondition": "设备已建立队内对讲连接；HUD显示正常；可稳定执行静音与恢复操作", "steps": "从对讲中状态开始；按“静音-恢复”为1轮连续执行20轮切换；每轮观察静音是否在1秒内生效、恢复是否在1秒内取消；记录HUD图标显示与取消情况；检查过程中是否出现卡死、无响应、状态错乱", "expected": "连续切换20次过程中功能无异常；每次静音后1秒内生效并显示静音图标；每次恢复后1秒内取消静音；HUD状态与实际状态一致", "priority": "P1"}, {"case_id": "TC-0035", "feature": "对讲连接异常提示", "title": "链路中断后3秒内触发异常提示并自动重连成功", "precondition": "设备已建立队内对讲连接；HUD与语音提示功能正常；可模拟链路中断并恢复", "steps": "在对讲中人为断开链路；开始计时并观察HUD或语音提示；持续观察系统自动重连过程并记录尝试次数；恢复链路条件；观察重连成功后的HUD状态显示恢复时间", "expected": "链路中断后3秒内触发HUD或语音提示；系统自动重连尝试次数不少于3次；重连成功后10秒内恢复对讲状态显示", "priority": "P0"}, {"case_id": "TC-0036", "feature": "对讲连接异常提示", "title": "链路中断后自动重连至少尝试3次但未成功时保持异常提示", "precondition": "设备已建立队内对讲连接；HUD与语音提示功能正常；可持续保持链路不可用", "steps": "在对讲中人为断开链路并保持不可恢复；开始计时观察3秒内是否出现异常提示；持续观察自动重连过程并记录尝试次数；在超过3次重连尝试后检查HUD状态", "expected": "链路中断后3秒内触发HUD或语音提示；自动重连尝试次数达到3次及以上；由于链路未恢复，10秒内不恢复对讲状态显示，异常提示持续存在或更新", "priority": "P1"}, {"case_id": "TC-0037", "feature": "成员退出队伍", "title": "成员确认退出后在规定时间内完成离队与断开语音", "precondition": "当前用户为普通成员且已在队伍中；HUD显示队伍卡片；队内语音连接已建立", "steps": "进入退出队伍入口；执行退出操作并确认；开始计时；观察退出完成时间；检 d": "TC-0396", "feature": "超距分散提醒", "title": "同一队友重复超距提醒间隔不少于30秒", "precondition": "已建立队伍，超距阈值设置为300米，队友在线。", "steps": "将队友距离拉大到301米并等待首次提醒出现；记录首次提醒时间；在30秒内让队友距离反复在290米与310米之间切换；观察是否再次提醒；在首次提醒后满30秒再次超过300米并观察提醒", "expected": "首次超过300米后3秒内触发提醒；同一队友在单次骑行中重复提醒间隔不少于30秒，即首次提醒后30秒内不应再次提醒，达到30秒后再次超距才可再次提醒。", "priority": "P1"}, {"case_id": "TC-0397", "feature": "显示开关控制", "title": "短按按键触发HUD显示开关且反馈时间不超过1秒", "precondition": "设备已开机，HUD当前为开启状态，实体按键功能正常。", "steps": "短按显示控制按键1次；从按下时开始计时；观察HUD状态变化与反馈；再次短按按键恢复原状态并观察", "expected": "每次短按后HUD状态均发生切换；状态切换反馈时间均不超过1秒。", "priority": "P0"}, {"case_id": "TC-0398", "feature": "显示开关控制", "title": "连续20次开关操作成功率校验", "precondition": "设备已开机，HUD与语音功能正常，可使用按键或语音指令执行开关操作。", "steps": "连续执行20次HUD显示开关操作；每次操作后确认HUD状态是否按预期切换；统计成功次数与成功率", "expected": "连续20次开关操作中，成功次数不少于19次，成功率不低于95%；单次成功操作的反馈时间均不超过1秒。", "priority": "P1"}, {"case_id": "TC-0399", "feature": "显示模式切换", "title": "简洁模式与详细模式切换显示内容正确", "precondition": "设备已开机，存在1名在线队友且有方向与距离数据，HUD显示正常。", "steps": "进入显示模式设置；切换到简洁模式；观察HUD内容；再切换到详细模式；观察HUD内容与刷新时间", "expected": "系统至少支持2种模式；简洁模式仅显示方向，不显示距离；详细模式显示方向+距离；每次模式切换后HUD刷新时间不超过1秒。", "priority": "P0"}, {"case_id": "TC-0400", "feature": "显示模式切换", "title": "模式设置在连续3次重启后保持一致", "precondition": "设备已开机，HUD显示正常，可执行重启操作。", "steps": "将显示模式设置为详细模式；重启设备第1次并检查模式；重启设备第2次并检查模式；重启设备第3次并检查模式", "expected": "用户设置的显示模式在下次开机后保留；连续3次重启后模式保持一致，均为详细模式；每次开机后模式切换结果与上次设置一致。", "priority": "P1"}, {"case_id": "TC-0401", "feature": "队友列表卡片", "title": "单屏展示4名队友卡片且信息完整", "precondition": "队伍中至少有4名队友，App列表页面可正常打开。", "steps": "进入队友列表页面；观察单屏可见卡片数量；检查每张卡片展示字段", "expected": "单屏至少展示4名队友卡片；每张卡片至少包含昵称、距离、在线状态3项信息。", "priority": "P0"}, {"case_id": "TC-0402", "feature": "队友列表卡片", "title": "列表下拉刷新在2秒内完成", "precondition": "队友列表页面已打开，网络正常，存在可更新的队友状态数据。", "steps": "在列表页执行下拉刷新；从松手触发刷新开始计时；等待刷新完成并观察最新数据是否展示", "expected": "列表下拉刷新完成时间不超过2秒；刷新后队友昵称、距离、在线状态信息更新为最新数据。", "priority": "P1"}, {"case_id": "TC-0403", "feature": "地图跟随与居中", "title": "开启跟随后偏离中心超过20%自动回中", "precondition": "App地图页面已打开，地图跟随功能可开启，定位正常。", "steps": "开启地图跟随；手动拖动地图使本车位置偏离屏幕中心超过20%；停止操作并观察地图是否自动回中", "expected": "开启跟随后，当本车位置偏离屏幕中心超过20%时，地图自动回中。", "priority": "P0"}, {"case_id": "TC-0404", "feature": "地图跟随与居中", "title": "点击居中按钮回中时间与30次成功率校验", "precondition": "App地图页面已打开，定位正常，可重复执行居中操作。", "steps": "将地图拖离当前位置；点击居中按钮并计时；确认地图是否回到本车位置中心；重复上述操作30次；统计成功次数与成功率", "expected": "每次点击居中按钮后地图回中时间不超过1秒；连续30次操作成功次数不少于29次，成功率不低于95%。", "priority": "P1"}, {"case_id": "TC-0405", "feature": "位置共享开关", "title": "位置共享开关修改后10秒内生效", "precondition": "设备已连接App并处于组队状态，位置共享当前为开启。", "steps": "在App中关闭位置共享；从点击确认开始计时；观察系统状态变化；10秒后检查共享状态是否已更新", "expected": "位置共享开关状态修改后10秒内生效；系统显示当前状态为关闭。", "priority": "P0"}, {"case_id": "TC-0406", "feature": "位置共享开关", "title": "连续10次切换位置共享状态成功率100%", "precondition": "设备已连接App并处于组队状态，位置共享功能正常。", "steps": "连续执行10次位置共享开关切换；每次切换后等待状态生效并确认结果；统计成功次数", "expected": "连续10次切换状态均成功，成功次数为10次，成功率为100%；每次状态修改后均在10秒内生效。", "priority": "P1"}, {"case_id": "TC-0407", "feature": "低电量分级告警", "title": "20%、10%、5%三档低电量告警按时触发", "precondition": "设备可模拟电量变化，HUD与语音功能正常。", "steps": "将电量设置为21%后降至20%；从首次命中20%开始计时并观察HUD与语音；再将电量降至10%并重复观察；再将电量降至5%并重复观察", "expected": "电量≤20%时触发一级告警，≤10%时触发二级告警，≤5%时触发强提醒；每级告警在阈值首次命中后2秒内显示HUD提示，并在3秒内完成1次语音播报。", "priority": "P0"}, {"case_id": "TC-0408", "feature": "续航场景预估异常提示", "title": "4种参考场景续航预估展示正确", "precondition": "设备与App连接正常，可切换续航场景查看预估。", "steps": "依次进入Mesh对讲、蓝牙对讲、灯光闪烁、灯光常亮4种场景；查看每种场景的续航预估文案", "expected": "至少支持4种参考场景的续航预估展示：Mesh对讲约11小时、蓝牙对讲约12小时、灯光闪烁约6小时、灯光常亮约2.5小时。", "priority": "P1"}, {"case_id": "TC-0409", "feature": "续航场景预估异常提示", "title": "预估偏离基线20%以上时2秒内提示耗电异常", "precondition": "设备可模拟实际功耗变化，当前已进入任一续航场景页面。", "steps": "选择Mesh对讲场景作为基线；模拟实际功耗使续航预估相对基线偏离20%及以上；从偏离达到20%时开始计时；观察系统提示", "expected": "当实际功耗导致预估偏离基线达到或超过20%时，系统在2秒内提示“耗电异常”。", "priority": "P0"}, {"case_id": "TC-0410", "feature": "临界关机保护", "title": "电量低于3%进入临界关机保护并保留提示", "precondition": "设备可模拟电量变化，HUD与语音功能正常。", "steps": "将设备电量从4%降至3%；观察是否进入临界关机保护；检查非关键功能是否关闭；观察HUD低电提示与语音播报是否保留", "expected": "电量≤3%时进入临界关机保护；系统关闭非关键功能后，仍保留至少1次HUD低电提示与1次语音播报。", "priority": "P0"}, {"case_id": "TC-0411", "feature": "临界关机保护", "title": "从触发临界关机保护到自动关机时间不少于30秒", "precondition": "设备可模拟电量变化并记录关机时间。", "steps": "将设备电量降至3%触发临界关机保护；从触发时开始计时；等待设备自动关机；记录总时长", "expected": "从触发临界关机保护到自动关机的时间不少于30秒。", "priority": "P1"}, {"case_id": "TC-0412", "feature": "USB-C充电状态识别", "title": "USB-C插入与拔出后2秒内HUD与App状态一致更新", "precondition": "设备开机，HUD与App均在线显示，USB-C线缆可正常插拔。", "steps": "插入USB-C充电线并开始计时；观察HUD与App充电状态；拔出USB-C充电线并再次计时；观察HUD与App状态变化", "expected": "USB-C插入或拔出后2秒内，HUD与App中的充电状态一致更新；插入后显示为充电中，拔出后显示为未充电。", "priority": "P0"}, {"case_id": "TC-0413", "feature": "USB-C充电状态识别", "title": "充电中显示剩余时间估算接近3小时参考值", "precondition": "设备电量较低，已接入USB-C充电，HUD与App可显示预计充满时间。", "steps": "插入USB-C充电线；等待系统识别充电状态；查看HUD或App中的剩余时间估算", "expected": "充电中可显示剩余时间估算；参考满充时间显示约3小时。", "priority": "P2"}, {"case_id": "TC-0414", "feature": "充电异常告警", "title": "接入充电30秒后电量无增长触发充电异常", "precondition": "设备电量低于满电，支持模拟充电但电量不增长场景，HUD与App正常。", "steps": "接入充电器并保持30秒；模拟电量在30秒内无任何增长；从30秒时刻开始计时；观察系统提示", "expected": "接入充电30秒后若电量无增长，系统在2秒内提示“充电异常”。", "priority": "P0"}, {"case_id": "TC-0415", "feature": "充电异常告警", "title": "异常解除后10秒内恢复正常状态显示", "precondition": "系统当前已处于“充电异常”提示状态，充电链路可恢复正常。", "steps": "恢复稳定充电并确保电量开始增长；从异常解除时开始计时；观察HUD与App状态显示", "expected": "充电异常解除后10秒内，系统恢复正常充电状态显示，不再显示“充电异常”。", "priority": "P1"}, {"case_id": "TC-0416", "feature": "边充边用限制提示", "title": "充电状态下高功耗组合2秒内弹出限制提示", "precondition": "设备处于充电状态，可分别开启Mesh、蓝牙音频、灯光常亮功能。", "steps": "在充电状态下同时开启Mesh与蓝牙音频；观察提示；关闭后再分别测试Mesh+灯光常亮、蓝牙音频+灯光常亮组合；记录每组提示时间", "expected": "在充电状态下开启高功耗组合后，系统均在2秒内弹出限制提示；至少覆盖3类高功耗功能组合：Mesh+蓝牙音频、Mesh+灯光常亮、蓝牙音频+灯光常亮。", "priority": "P1"}, {"case_id": "TC-0417", "feature": "手机蓝牙断连提示", "title": "蓝牙断连后图标与语音提示按时触发", "precondition": "手机与设备已通过蓝牙连接，HUD与语音功能正常。", "steps": "关闭手机蓝牙或使设备超出蓝牙范围导致断连；从链路断开时开始计时；观察HUD断连图标；继续观察语音提示", "expected": "蓝牙链路断开后2秒内HUD显示断连图标；3秒内完成1次语音提示。", "priority": "P0"}, {"case_id": "TC-0418", "feature": "手机蓝牙断连提示", "title": "系统自动重连尝试次数与间隔校验", "precondition": "手机与设备曾成功配对，当前处于断连状态，允许自动重连。", "steps": "触发蓝牙断连；记录系统自动重连尝试时间点；持续 // 分组功能清单
const HUD_MODULES = new Set(["导航","来电","音乐","消息","AI语音助手","Ai语音助手",
    "简易","简易路线","路线","主动安全预警提示","组队","摄像状态","胎温胎压",
    "开机动画","速度","设备状态","显示队友位置","头盔HUD",
    "实体按键交互","氛围灯交互","AI功能","语音交互","视觉交互","多模态交互"]);

const hudFeatures = DATA.features.filter(f => HUD_MODULES.has(f.module));
const appFeatures = DATA.features.filter(f => !HUD_MODULES.has(f.module));

function buildTabs() {
    const bar = document.getElementById('tabBar');
    const content = document.getElementById('contentArea');

    TAB_CONFIG.forEach((tab, idx) => {
        const el = document.createElement('div');
        el.className = 'tab' + (idx === 0 ? ' active' : '');
        el.dataset.target = tab.id;

        let count = 0;
        if (tab.id === 'hud') count = hudFeatures.length;
        else if (tab.id === 'app') count = appFeatures.length;
        else if (tab.id === 'state') count = DATA.state_scenarios.length;
        else if (tab.id === 'voice') count = DATA.voice_commands.length;
        else if (tab.id === 'button') count = DATA.button_mapping.length;
        else if (tab.id === 'light') count = DATA.light_effects.length;
        else if (tab.id === 'voice_nav') count = DATA.voice_nav.length;
        else if (tab.id === 'user_stories') count = (DATA.user_stories || []).length;
        else if (tab.id === 'test_cases') count = (DATA.test_cases || []).length;
        else if (tab.id === 'page_mapping') count = (DATA.page_mapping || []).length;
        else if (tab.id === 'dev_tasks') count = (DATA.dev_tasks || []).length;

        el.innerHTML = `${tab.label}<span class="badge">${count}</span>`;
        el.onclick = () => switchTab(tab.id);
        bar.appendChild(el);

        const section = document.createElement('div');
        section.id = 'section-' + tab.id;
        section.className = 'section' + (idx === 0 ? ' active' : '');

        if (tab.type === 'tree') {
            section.innerHTML = buildTreeView(tab.id === 'hud' ? hudFeatures : appFeatures);
        } else {
            section.innerHTML = buildTableView(tab.id);
        }
        content.appendChild(section);
    });
}

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.target === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + id));
    window.scrollTo(0, 0);
}

function buildTreeView(features) {
    let html = '<div class="stats">';
    const counts = {};
    features.forEach(f => { counts[f.priority] = (counts[f.priority]||0) + 1; });
    Object.entries(counts).sort().forEach(([p,c]) => {
        html += `<div class="stat"><div class="num">${c}</div><div class="label">${p}</div></div>`;
    });
    html += `<div class="stat"><div class="num">${features.length}</div><div class="label">总计</div></div></div>`;

    let currentL1 = null, currentL2 = null;
    let l1Html = '';

    features.forEach(f => {
        const tag = `<span class="tag tag-${f.priority}">${f.priority}</span>`;
        if (f.level === 'L1') {
            if (currentL2) { l1Html += '</div>'; currentL2 = null; }
            if (currentL1) l1Html += '</div></div>';
            l1Html += `<div class="l1" data-name="${f.name}" data-priority="${f.priority}">
                <div class="l1-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${tag} ${f.name} <span style="color:#999;font-size:12px;margin-left:auto">${f.interaction||''}</span>
                </div><div class="l1-body">`;
            currentL1 = f; currentL2 = null;
        } else if (f.level === 'L2') {
            if (currentL2) l1Html += '</div>';
            l1Html += `<div class="l2"><div class="l2-title" data-name="${f.name}" data-priority="${f.priority}">${tag} ${f.name}</div>`;
            currentL2 = f;
        } else if (f.level === 'L3') {
            l1Html += `<div class="l3" data-name="${f.name}" data-priority="${f.priority}">
                <span class="name">${tag} ${f.name}</span>
                <span class="desc">${f.description||''}</span>
                <span class="acc">${f.acceptance||''}</span></div>`;
        }
    });
    if (currentL2) l1Html += '</div>';
    if (currentL1) l1Html += '</div></div>';

    return html + l1Html;
}

    } else if (id === 'voice_nav') {
        data = DATA.voice_nav;
        headers = ['场景','触发','用户输入','AI动作','HUD显示','语音播报','灯光反馈','异常兜底','优先级','备注'];
        keys = ['scene','trigger','user_input','ai_action','hud_display','voice_output','light_effect','fallback','priority','note'];
    } else if (id === 'user_stories') {
        data = DATA.user_stories || [];
        headers = ['功能名','角色','用户故事','验收条件','优先级'];
        keys = ['feature','role','story','acceptance','priority'];
    } else if (id === 'test_cases') {
        data = DATA.test_cases || [];
        headers = ['用例ID','功能名','标题','前置条件','步骤','预期结果','优先级'];
        keys = ['case_id','feature','title','precondition','steps','expected','priority'];
    } else if (id === 'page_mapping') {
        data = DATA.page_mapping || [];
        headers = ['页面','父页面','平台','功能','入口','优先级','备注'];
        keys = ['page','parent','platform','features','entry','priority','note'];
    } else if (id === 'dev_tasks') {
        data = DATA.dev_tasks || [];
        headers = ['任务ID','功能','描述','角色','工时','依赖','迭代','优先级','备注'];
        keys = ['task_id','feature','task','assignee','effort_days','dependency','sprint','priority','note'];
    }

    if (!data || data.length === 0) return '<p style="padding:20px;color:#999;">暂无数据</p>';

    let html = '<table><thead><tr>';
    headers.forEach(h => { html += `<th>${h}</th>`; });
    html += '</tr></thead><tbody>';
    data.forEach(row => {
        html += '<tr>';
        keys.forEach(k => {
            let val = row[k] || '';
            if (k === 'priority' && val) val = `<span class="tag tag-${val}">${val}</span>`;
            html += `<td>${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

function filterAll() {
    const q = document.getElementById('search').value.toLowerCase();
    const p = document.getElementById('priorityFilter').value;

    document.querySelectorAll('.l1').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q) || el.textContent.toLowerCase().includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('.l2, .l3').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('tbody tr').forEach(tr => {
        const text = tr.textContent.toLowerCase();
        const matchQ = !q || text.includes(q);
        const tagEl = tr.querySelector('.tag');
        const rowP = tagEl ? tagEl.textContent.trim() : '';
        const matchP = !p || rowP === p;
        tr.classList.toggle('hidden', !(matchQ && matchP));
    });
}

function expandAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.add('open'));
}
function collapseAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.remove('open'));
}

function updateStickyPositions() {
    const headerH = document.querySelector('.header')?.offsetHeight || 0;
    const tabsH = document.querySelector('.tabs')?.offsetHeight || 0;
    const totalH = headerH + tabsH;

    const tabsEl = document.querySelector('.tabs');
    if (tabsEl) tabsEl.style.top = headerH + 'px';

    document.querySelectorAll('th').forEach(th => {
        th.style.top = totalH + 'px';
    });
}

buildTabs();
updateStickyPositions();
window.addEventListener('resize', updateStickyPositions);

const firstBody = document.querySelector('.l1-body');
if (firstBody) firstBody.classList.add('open');
</script></body></html>
