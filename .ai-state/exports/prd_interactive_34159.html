<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.header { background: #2F5496; color: #fff; padding: 12px 24px;

.tag-P1 { background: #FF8C00; }
.tag-P2 { background: #4CAF50; }
.tag-P3 { background: #9E9E9E; }

 "系统可同时接收语音、按键和App输入; 当多源指令冲突时按预设优先级仲裁; 冲突结果有明确反馈; 不会因重复输入导致核心功能异常执行。", "priority": "P0"}, {"feature": "输出协同(多模态交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统根据场景将信息协同分发到HUD、语音和灯光,以便在不同环境下都能及时感知关键信息。", "acceptance": "系统可将提示输出到HUD、语音和灯光; 不同场景下输出强度与优先级可调整; 高优先级安全信息优先触达; 避免同一信息重复过度打扰。", "priority": "P1"}, {"feature": "传感器驱动交互(多模态交互)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要系统基于IMU、心率等传感器状态主动触发提醒与控制策略,以便在长时间骑行中获得更及时的辅助。", "acceptance": "系统可接入IMU、心率等传感器状态; 满足触发条件时执行预设提醒或交互策略; 触发逻辑可区分正常与异常状态; 提醒方式符合安全优先原则。", "priority": "P2"}, {"feature": "场景化交互策略(多模态交互)", "role": "团骑领队", "story": "作为团骑领队,我想要系统根据骑行、停车、组队、导航等场景自动切换交互模式与信息密度,以便在不同任务下获得合适的信息支持。", "acceptance": "系统可识别骑行、停车、组队、导航等主要场景; 不同场景自动切换交互模式; 信息密度与提示方式随场景调整; 切换过程稳定且不影响核心使用。", "priority": "P1"}, {"feature": "个性化与学习(多模态交互)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统记录我的偏好并逐步优化提示方式、频率和交互入口,以便获得更符合习惯的使用体验。", "acceptance": "系统可记录用户对提示方式、频率和入口的偏好; 后续交互可基于偏好进行优化; 用户可查看或调整关键偏好设置; 个性化结果不影响安全类强提醒。", "priority": "P2"}, {"feature": "播放控制(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中对音乐进行基础播放控制,以便减少掏手机操作并保持骑行专注。", "acceptance": "支持播放、暂停、上一首、下一首等基础控制; 可通过按键或语音完成操作; 控制结果有即时反馈; 骑行中无需打开手机即可完成常用操作。", "priority": "P1"}, {"feature": "信息展示(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD与App中查看必要的音乐状态信息,以便低打扰地确认当前播放状态。", "acceptance": "HUD与App可展示播放/暂停状态、曲目基础信息等必要内容; HUD展示遵循低干扰原则; 不显示影响骑行注意力的冗长信息; 状态变化可及时同步。", "priority": "P2"}, {"feature": "音频协同策略(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要系统处理音乐与导航、来电、语音助手等多音频源的优先级关系,以便关键提示不会被遮挡。", "acceptance": "系统定义音乐、导航、来电和语音助手的音频优先级; 高优先级音频到来时音乐自动降音、暂停或让路; 关键提示结束后音乐可按策略恢复; 全过程无明显混音冲突。", "priority": "P0"}, {"feature": "连接与兼容(音乐)", "role": "通勤骑手", "story": "作为通勤骑手,我想要头盔与手机音乐源保持稳定蓝牙连接并具备基础兼容性,以便日常通勤中持续正常听音。", "acceptance": "设备可与主流手机音乐源完成蓝牙连接; 连接后可稳定传输音频与控制指令; 断连后支持重连或明确提示; 基础播放控制在兼容设备上可正常工作。", "priority": "P1"}, {"feature": "可靠性与安全限制(音乐)", "role": "后台管理员", "story": "作为后台管理员,我想要在骑行安全优先前提下约束音乐交互复杂度并建立可量产验收的稳定性标准,以便确保功能可安全上线。", "acceptance": "音乐交互仅保留骑行中必要的基础能力; 骑行状态下限制复杂操作与高干扰展示; 定义连接稳定性、控制成功率等验收标准; 未达标版本不可作为量产发布。", " nce": "支持通过头盔按键控制队友位置显示开关; 支持语音指令切换显示模式; 支持在App中进行同类设置; 控制结果可即时生效并反馈当前模式; 骑行中常用操作步骤简洁", "priority": "P1"}, {"feature": "App队伍地图辅助(显示队友位置)", "role": "团骑领队", "story": "作为团骑领队,我想要在App中查看更完整的队伍地图视图,以便作为HUD简化显示的补充来进行队伍管理与路线判断", "acceptance": "App中可展示完整队伍地图视图; 可查看队友位置分布与基础状态; 与HUD显示信息保持一致或可追溯; 地图视图适合作为停车或低风险场景下的补充查看方式; 数据刷新状态清晰可见", "priority": "P1"}, {"feature": "数据接入与绑定(胎温胎压)", "role": "新手骑手", "story": "作为新手骑手,我想要完成胎压计发现、绑定、轮位分配与连接状态同步,以便正确接入前后轮数据并稳定使用胎温胎压功能", "acceptance": "系统可发现可用胎压计设备; 用户可完成绑定流程; 支持前后轮轮位分配; 绑定后连接状态可同步展示; 当绑定失败、轮位冲突或设备断连时有明确提示", "priority": "P0"}, {"feature": "HUD实时显示(胎温胎压)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行中以低干扰方式查看前后轮胎温与胎压信息,以便及时掌握轮胎状态并降低安全风险", "acceptance": "HUD可实时显示前后轮胎温与胎压; 显示方式低干扰且适合骑行中快速读取; 数据更新及时; 当前后轮数据缺失时有状态说明; 信息单位与显示格式清晰一致", "priority": "P0"}, {"feature": "异常告警与提醒(胎温胎压)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在胎压异常、胎温异常或传感器异常时收到分级提醒,以便尽早处理问题并降低骑行风险", "acceptance": "系统可识别胎压异常、胎温异常与传感器异常; 不同风险等级采用不同提醒方式; 提醒内容包含异常类型、对应轮位与建议动作; 严重异常可提高提醒优先级; 异常解除后状态可恢复正常显示", "priority": "P0"}, {"feature": "设置与历史记录(胎温胎压)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要设置阈值、切换单位并查看历史趋势与异常记录,以便根据长途骑行场景调整策略并复盘轮胎状态变化", "acceptance": "用户可设置胎压与胎温阈值; 支持常用单位切换; 可查看历史趋势数据; 可查看异常记录及发生时间; 设置修改后可生效并用于后续提醒判断", "priority": "P1"}, {"feature": "语音交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过语音完成导航、通话与基础设备控制,以便减少骑行中手动操作并提升安全性", "acceptance": "系统支持语音触发导航相关操作; 支持语音发起或控制通话相关操作; 支持基础设备控制指令; 识别成功后有明确反馈; 在骑行噪声环境下具备基本可用性; 无法识别时可提示重试", "priority": "P0"}, {"feature": "视觉交互(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手,我想要基于摄像头与感知算法获得ADAS预警、目标追踪与事件识别能力,以便更早发现风险并提升骑行安全", "acceptance": "系统可基于摄像头与算法输出ADAS预警; 支持目标追踪与基础事件识别; 预警信息在HUD或相关界面中清晰可见; 高风险事件提醒优先级高于普通信息; 功能异常或不可用时有状态说明", "priority": "P0"}, {"feature": "多模态感知(AI功能)", "role": "通勤骑手", "story": "作为通勤骑手,我想要融合IMU、GNSS及可扩展生理数据进行状态识别、异常提醒与联动,以便在复杂骑行场景下获得更准确的安全辅助", "acceptance": "系统可接入IMU与GNSS数据并支持扩展生理数据; 可基于多源数据进行状态识别; 当识别到异常状态时可触发提醒; 可与其他功能产生联动反馈; 数据源缺失时系统可提示能力受限", "priority": "P1"}, {"feature": "AI内容与服务(AI功能)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要获得骑行记录、分享与持续升级相关的AI剪片、事件摘要与OTA能力,以便更高效产出内容并持续获得新服务体验", "acceptance": "系统可基于骑行记录生成AI剪片; 可输出事件摘要供用户查看或分享; 支持相关服务能力持续升级与OTA更新; 用户可查看处理结果与升级状态; 生成内容可被保存或分享至外部平台", "priority": "P1"}, {"feature": "异常与安全降级(导航)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在断连、低电量或显示异常时获得导航降级与安全提示,以便在异常情况下仍能安全骑行并及时调整路线或停车处理。", "acceptance": "当发生断连、低电量或HUD显示异常时,系统应在3秒内触发明确提示; 可切换为语音/基础方向指引等降级模式; 提示内容包含当前异常类型与建议操作; 异常恢复后可自动或手动恢复正常导航。", "priority": "P0"}, {"feature": "实时速度显示(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在骑行主界面持续看到当前车速,以便随时掌握基础骑行状态并控制行驶节奏。", "acceptance": "骑行主界面默认显示当前速度; 速度信息应持续刷新且在骑行中清晰可见; 当速度不可用时显示明确占位或异常状态; 显示样式不应遮挡核心骑行信息。", "priority": "P0"}, {"feature": "速度数据源与精度管理(速度)", "role": "后台管理员", "story": "作为后台管理员,我想要管理速度数据来源、可用性与异常状态,以便保证前端显示的速度信息可信且可追踪。", "acceptance": "系统应支持识别并切换速度数据源; 当数据源异常、延迟或精度不足时应标记状态; 前端可获取当前数据源可用性与可信度信息; 后台可查看异常日志与状态记录。", "priority": "P0"}, {"feature": "超速提醒(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在当前速度超过我设定的阈值时通过HUD收到提醒,以便及时降速并降低骑行风险。", "acceptance": "用户可设置超速阈值; 当实时速度超过阈值时HUD应立即触发可识别提醒; 速度恢复到阈值以下后提醒自动解除; 提醒频率应可控,避免连续打扰。", "priority": "P1"}, {"feature": "速度趋势与骑行反馈(速度)", "role": "新手骑手", "story": "作为新手骑手,我想要看到速度变化趋势与阶段反馈,以便理解自己当前的骑行状态并逐步建立稳定的骑行习惯。", "acceptance": "系统应展示加速、减速或稳定等趋势信息; 在不同骑行阶段提供简明反馈; 反馈内容易理解且不影响安全骑行; 当趋势数据不足时应提示当前无法生成反馈。", "priority": "P2"}, {"feature": "交互与配置(速度)", "role": "通勤骑手", "story": "作为通勤骑手,我想要通过按键、语音和App对速度模块进行开关与样式配置,以便按自己的骑行习惯调整显示方式。", "acceptance": "用户可通过按键、语音和App开启或关闭速度模块; 用户可配置显示样式、位置或提醒相关选项; 配置结果在设备与App间保持同步; 配置变更后应即时生效或给出明确生效时机提示。", "priority": "P1"}, {"feature": "商品浏览(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要浏览头盔整机、配件与服务类商品并进行筛选,以便快速找到适合自己的商品方案。", "acceptance": "用户可查看商品列表、详情、价格与关键规格; 支持按品类、价格、用途等条件筛选; 商品详情页包含图片、说明与购买入口; 筛选结果应准确且可恢复默认状态。", "priority": "P1"}, {"feature": "下单支付(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要完成购物车、订单确认、支付与结果反馈,以便顺利完成购买闭环。", "acceptance": "用户可将商品加入购物车并修改数量; 下单时可确认商品、地址、发票和金额; 支持主流支付方式并返回明确支付结果; 支付成功后生成订单并可在订单列表查看。", "priority": "P0"}, {"feature": "订单履约(App-商城)", "role": "通勤骑手", "story": "作为通勤骑手,我想要查 定框架,以便后续新增连接方式时能够复用现有流程。", "acceptance": "系统配对框架应支持抽象不同连接类型的统一入口与状态模型; 新增连接方式时无需重构核心绑定流程; 设备状态、绑定关系和异常处理接口保持一致; 文档中明确扩展规范与兼容边界。", "priority": "P2"}, {"feature": "路线创建与导入(路线)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要通过App、语音或快捷入口创建骑行路线,以便快速开始导航并适配不同出发场景。", "acceptance": "用户可通过App输入目的地或导入路线; 支持语音发起常用路线创建; 提供快捷入口进入路线功能; 创建成功后可进入预览或直接开始导航。", "priority": "P1"}, {"feature": "路线规划策略(路线)", "role": "摩旅骑手", "story": "作为摩旅骑手,我想要根据骑行场景获得可选路线方案并设置偏好,以便选择更符合自己需求的骑行路线。", "acceptance": "系统可输出多条可选路线方案; 用户可设置如更快、避堵、风景优先等偏好; 路线结果应体现偏好差异; 用户可在出发前切换并确认最终方案。", "priority": "P1"}, {"feature": "HUD路线展示(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在HUD中以低干扰方式看到路线核心信息并配合语音提示,以便专注前方道路同时完成导航。", "acceptance": "HUD展示转向、距离、剩余时间等核心路线信息; 信息布局简洁且不遮挡关键视野; 关键路口提供语音提示; 显示与语音内容保持一致。", "priority": "P0"}, {"feature": "路线执行与重规划(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要在偏航、错过路口或路况变化时持续获得可用路线,以便不中断导航并尽快回到正确路径。", "acceptance": "当用户偏航、错过路口或路况变化时系统应自动检测; 在合理时间内完成重规划; 重规划后更新HUD与语音提示; 若无法重规划应提示用户采取下一步操作。", "priority": "P0"}, {"feature": "路线与设备协同(路线)", "role": "通勤骑手", "story": "作为通勤骑手,我想要路线功能结合设备连接、电量和安全状态稳定运行,以便在骑行过程中减少因设备问题导致的导航中断。", "acceptance": "路线功能应感知设备连接状态、电量和安全异常; 当状态异常时触发提醒或降级策略; 在条件允许时优先保障核心导航能力; 相关状态变化应同步到路线执行界面。", "priority": "P0"}, {"feature": "品牌与定位(产品介绍)", "role": "内容创作骑手", "story": "作为内容创作骑手,我想要了解品牌理念、产品定位与目标用户场景,以便快速判断产品是否适合我的内容方向和使用需求。", "acceptance": "产品介绍页包含品牌理念、产品定位和目标用户场景; 内容结构清晰易浏览; 关键信息可在短时间内获取; 页面支持继续跳转到功能或购买相关内容。", "priority": "P2"}, {"feature": "核心功能说明(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要系统化了解头盔核心功能能力与交互方式,以便在购买前后都能快速理解产品价值和使用方法。", "acceptance": "页面应覆盖导航、速度、配对、提醒等核心功能说明; 每项功能包含用途与基本交互方式; 内容表达通俗易懂; 用户可从说明页跳转到更详细的指引内容。", "priority": "P1"}, {"feature": "安全与认证说明(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要了解产品的安全价值、辅助预警能力与合规认证信息,以便更放心地做出购买和使用决策。", "acceptance": "页面明确说明产品安全相关能力边界; 展示辅助预警能力与适用场景; 提供合规认证或检测信息; 对非替代人工判断的限制有清晰说明。", "priority": "P1"}, {"feature": "使用指引与上手(产品介绍)", "role": "新手骑手", "story": "作为新手骑手,我想要快速理解首次使用流程、配对方式与基础操作,以便尽快完成上手并开始骑行。", "acceptance": "页面提供首次开机、配对、基础操作等上手内容; 步骤顺序 误触发率超限", "precondition": "设备已开机并完成IMU校准；已配置姿态动作；日志记录工具已开启。", "steps": "执行标准姿态动作20次并统计成功次数;执行非目标干扰动作20次并统计误触发次数;检查系统支持的姿态动作种类数", "expected": "若支持的姿态/状态触发动作少于3种则判定失败；若20次标准动作成功次数少于18次即成功率<90%则判定失败；若20次干扰动作误触发次数超过1次即误触发率>5%则判定失败。", "priority": "P2"}, {"case_id": "TC-0159", "feature": "心率异常提醒联动", "title": "正常流程-支持1种以上设备绑定且异常后1秒内提醒并留存10条记录", "precondition": "设备已开机并连接App；至少准备2种可绑定的心率设备或1种以上设备类型；心率异常模拟能力可用。", "steps": "在App中绑定1种以上心率设备并确认绑定成功;触发心率异常1次并记录从异常发生到HUD或语音提醒启动的时间;连续制造10次心率异常事件;进入App查看异常记录列表", "expected": "系统支持心率设备绑定1种以上；异常触发后1秒内至少启动HUD或语音其中1种提醒；App中可留存最近10条异常记录，列表可见10条最新记录。", "priority": "P0"}, {"case_id": "TC-0160", "feature": "心率异常提醒联动", "title": "异常流程-提醒超时或记录不足10条", "precondition": "设备已开机并连接App；心率设备已绑定；日志记录工具已开启。", "steps": "触发心率异常1次并记录提醒启动时间;连续制造10条以上异常事件后进入App查看记录数量;检查是否存在HUD和语音均未启动的情况", "expected": "若异常触发后1秒内HUD和语音均未启动任一提醒则判定失败；若App最近异常记录少于10条则判定不满足“最近10条记录”要求；若不支持1种以上心率设备绑定则判定失败。", "priority": "P1"}, {"case_id": "TC-0161", "feature": "急加速急减速交互抑制", "title": "正常流程-识别2类高动态状态并抑制非安全提示且保留安全提示", "precondition": "设备已开机；可模拟急加速、急减速状态；可同时注入安全类与非安全类提示事件。", "steps": "分别触发急加速和急减速状态各1次并确认系统识别;在高动态状态下连续注入10次非安全类提示并统计被抑制次数;在高动态状态下连续注入10次安全类提示并统计保留次数", "expected": "系统可识别不少于2类高动态状态，即急加速和急减速；高动态状态下非安全类提示抑制比例≥80%，若测试10次则至少抑制8次；安全类提示保留率=100%，若测试10次则应保留10次。", "priority": "P0"}, {"case_id": "TC-0162", "feature": "急加速急减速交互抑制", "title": "异常流程-非安全提示抑制不足或安全提示未100%保留", "precondition": "设备已开机；高动态状态模拟工具可用；日志记录工具已开启。", "steps": "分别触发急加速和急减速状态并确认识别结果;在高动态状态下注入10次非安全类提示并统计抑制次数;在高动态状态下注入10次安全类提示并统计保留次数", "expected": "若系统无法识别急加速或急减速任一状态则判定失败；若10次非安全类提示抑制次数少于8次即抑制比例<80%则判定失败；若10次安全类提示保留次数少于10次即保留率<100%则判定失败。", "priority": "P1"}, {"case_id": "TC-0163", "feature": "骑行中低干扰模式", "title": "正常流程-骑行状态屏蔽5类非必要入口并保留3类核心交互", "precondition": "设备已进入骑行状态；HUD与App连接正常；可访问主界面与设置入口。", "steps": "进入骑行主界面并检查可见设置/管理入口列表;统计被屏蔽的非必要设置入口类别数;验证导航、来电、安全预警3类核心交互可正常触发和访问;保持连续骑行30分钟并观察是否弹出复杂配置页面", "expected": "骑行状态下屏蔽不少于5类非必要设置入口；保留导航、来电、安全预警3类核心交互；30分钟连续骑行测试中无弹出式复杂配置页面。", "priority": "P0"}, {"case_id": "TC-0164", "feature": "骑行中低干扰模式", "title": "异常流程-屏蔽入口不足或30分钟内弹出复杂配置页面", "precondition": "设备已进入骑行状态；日志记录工具已开启。", "steps": "进入骑行主界面并统计仍可访问的非必要设置入口;触发导航、来电、安全预警并检查是否有任一核心交互缺失;执行30分钟连续骑行测试并记录是否出现复杂配置页面弹窗", "expected": "若被屏蔽的非必要设置入口少于5类则判定失败；若导航、来电、安全预警3类核心交互任一不可用则判定失败；若30分钟内出现任意1次弹出式复杂配置页面则判定失败。", "priority": "P1"}, {"case_id": "TC-0165", "feature": "停车后完整交互模式", "title": "正常流程-停车状态可访问10项功能且2秒内切换完成", "precondition": "设备当前处于骑行模式；可切换到停车状态；App与HUD连接正常。", "steps": "将设备状态从骑行切换为停车并开始计时;观察HUD与App切换到完整交互模式的完成时间;在停车状态下统计可访问的设置/管理功能项数量;对比App与HUD显示状态并进行20次抽样核对", "expected": "停车状态下可访问不少于10项设置/管理功能；从骑行模式切换到完整模式耗时≤2秒；App与HUD状态一致率≥95%，若抽样20次则一致次数不少于19次。", "priority": "P1"}, {"case_id": "TC-0166", "feature": "停车后完整交互模式", "title": "异常流程-切换超时或状态一致率不足", "precondition": "设备当前处于骑行模式；App与HUD连接正常；日志记录工具已开启。", "steps": "将设备切换到停车状态并记录切换完成时间;统计停车状态下可访问功能项数量;对App与HUD状态进行20次抽样比对并统计一致次数", "expected": "若切换耗时>2秒则判定失败；若可访问设置/管理功能少于10项则判定失败；若20次抽样一致次数少于19次即一致率<95%则判定失败。", "priority": "P2"}, {"case_id": "TC-0167", "feature": "组队场景优先级切换", "title": "正常流程-组队状态下队友位置和队内消息优先于音乐信息", "precondition": "设备已加入组队；音乐正在播放；可模拟队友位置提示和队内消息提示。", "steps": "在组队状态下触发1类队友位置提示并观察HUD显示优先级;触发1类队内消息提示并观察HUD显示优先级;在音乐信息持续展示时交替触发组队事件共20次并统计优先级切换正确次数", "expected": "组队状态下队友位置与队内消息优先级高于音乐信息；支持显示不少于1类队友位置提示和1类队内消息提示；20次组队事件测试切换正确率≥90%，即正确次数不少于18次。", "priority": "P1"}, {"case_id": "TC-0168", "feature": "组队场景优先级切换", "title": "异常流程-优先级切换错误或支持提示类型不足", "precondition": "设备已加入组队；音乐正在播放；日志记录工具已开启。", "steps": "触发队友位置提示并检查是否被音乐信息遮挡;触发队内消息提示并检查是否被音乐信息遮挡;执行20次组队事件切换测试并统计正确次数", "expected": "若不支持至少1类队友位置提示或1类队内消息提示则判定失败；若队友位置或队内消息优先级未高于音乐信息则判定失败；若20次测试正确次数少于18次即正确率<90%则判定失败。", "priority": "P2"}, {"case_id": "TC-0169", "feature": "提示偏好记忆", "title": "正常流程-记忆8项偏好并在重连后恢复且30秒内同步生效", "precondition": "设备与App已连接；可配置至少8项提示偏好；支持断开重连头盔。", "steps": "在App中修改并保存8项提示偏好;等待并验证修改后30秒内设备侧配置生效;断开头盔连接后重新连接;检查8项偏好是否恢复;重复重连20次并统计恢复成功次数", "expected": "系统支持不少于8项提示偏好记忆；用户修改后30秒内同步生效；重新连接头盔后偏好恢复成功率≥95%，若测试20次则恢复成功次数不少于19次。", "priority": "P1"}, {"case_id": "TC-0170", "feature": "提示偏好记忆", "title": "异常流程-偏好项不足或重连恢复成功率不足", "precondition": "设备与App已连接；日志记录工具已开启。", "steps": "检查可配置并记忆的提示偏好项数量;修改偏好后记录生效时间;执行20次断开重连并统计偏好恢复成功次数", "expected": "若可记忆偏好项少于8项则判定失败；若修改后超过30秒仍未同步生效则判定失败；若20次重连恢复成功次数少于19次即成功率<95%则判定失败。", "priority": "P2"}, {"case_id": "TC-0171", "feature": "常用指令快捷集", "title": "正常流程-支持5组自定义快捷指令且单组最多3个动作", "precondition": "设备与App已连接；快捷指令配置入口可用；可执行相关动作。", "steps": "在App中创建5组快捷指令;为每组分别配置不超过3个动作并保存;逐组执行快捷指令共20次并统计成功次数", "expected": "系统支持用户自定义不少于5组快捷指令；单组快捷指令最多包含3个动作；20次执行测试成功率≥90%，即成功次数不少于18次。", "priority": "P1"}, {"case_id": "TC-0172", "feature": "常用指令快捷集", "title": "异常流程-快捷组数不足或执行成功率不足", "precondition": "设备与App已连接；日志记录工具已开启。", "steps": "检查最多可创建的快捷指令组数;尝试为单组配置4个动作并观察系统限制;执行快捷指令20次并统计成功次数", "expected": "若可创建快捷指令组数少于5组则判定失败；若单组允许超过3个动作则判定不满足验收；若20次执行成功次数少于18次即成功率<90%则判定失败。", "priority": "P2"}, {"case_id": "TC-0173", "feature": "自适应提示频率", "title": "正常流程-学习周期7天且调整幅度不超过50%并可1分钟内关闭", "precondition": "设备与App已连接；已开启自适应提示频率；具备连续7天测试数据或模拟数据环境。", "steps": "持续运行或导入连续7天学习数据;对比学习前后非安全类提示频率并计算调整幅度;在App中关闭自适应提示频率功能并计时;在1分钟内再次触发非安全类提示并观察是否按关闭状态执行", "expected": "连续学习周期不少于7天；非安全类提示频率调整幅度不超过50%；用户可在App中关闭该能力，关闭后1分钟内生效。", "priority": "P2"}, {"case_id": "TC-0174", "feature": "自适应提示频率", "title": "异常流程-学习周期不足或关闭后超过1分钟未生效", "precondition": "设备与App已连接；日志记录工具已开启。", "steps": "检查学习数据覆盖天数;对比学习前后非安全类提示频率并计算调整幅度;在App中关闭功能并记录实际生效时间", "expected": "若学习周期少于7天则判定失败；若非安全类提示频率调整幅度超过50%则判定失败；若关闭后超过1分钟仍未生效则判定失败。", "priority": "P3"}, {"case_id": "TC-0175", "feature": "播放/暂停", "title": "正常流程-已连接手机并打开音乐App时播放暂停成功率达标", "precondition": "头盔已连接手机；音乐App已打开并可播放；HUD正常工作。", "steps": "执行播放与暂停控制交替操作20次;每次操作后确认音乐状态是否正确切换;观察连续20次控制过程中系统是否出现死机或黑屏", "expected": "在已连接手机并打开音乐App条件下，播放/暂停成功率应达到95%以上；若连续执行20次，则成功次数不少于19次；连续执行20次控制无死机黑屏。", "priority": "P0"}, {"case_id": "TC-0176", "feature": "播放/暂停", "title": "异常流程-播放暂停成功率不足或连续20次出现死机黑屏", "precondition": "头盔已连接手机；音乐App已打开；日志记录工具已开启。", "steps": "执行播放与暂停控制20次并统计成功次数;记录测试过程中是否出现死机、黑屏或无响应", "expected": "若20次操作成功次数少于19次即成功率<95%则判定失败；若连续20次控制过程中出现任意1次死机或黑屏则判定失败。", "priority": "P1"}, {"case_id": "TC-0177", "feature": "切歌控制", "title": "正常流程-支持上一曲下一曲并连续20次切歌无异常", "precondition": "头盔已连接手机；音乐App播放列表中至少有3首歌曲；HUD可显示曲目信息。", "steps": "执行上一曲操作1次并确认曲目切换;执行下一曲操作1次并确认曲目切换;连续执行切歌操作20次并统计HUD曲目信息刷新成功次数;观察系统是否出现异常中断", "expected": "系统支持上一曲、下一曲2种切歌动作；连续切歌20次后系统无异常中断；HUD曲目信息刷新成功率95%以上，若测试20次则刷新成功次数不少于19次。", "priority": "P1"}, {"case_id": "TC-0178", "feature": "切歌控制", "title": "异常流程-不支持2种切歌动作或HUD刷新成功率不足", "precondition": "头盔已连接手机；音乐App已打开；日志记录工具已开启。", "steps": "分别执行上一曲和下一曲操作并检查是否生效;连续切歌20次并统计HUD曲目信息刷新成功次数;记录是否出现异常中断", "expected": "若上一曲、下一曲任一动作不支持则判定失败；若20次切歌中HUD曲目信息刷新成功次数少于19次即成功率<95%则判定失败；若出现任意异常中断则判定失败。", "priority": "P2"}, {"case_id": "TC-0179", "feature": "断点续播", "title": "正常流程-重启或蓝牙短断后恢复到上次播放状态且10次成功率达标", "precondition": "头盔已连接手机并正在播放音乐；可执行头盔重启或蓝牙短时断开操作。", "steps": "记录当前播放状态与曲目位置;执行头盔重启或蓝牙短时断开后恢复连接1次;检查是否回到上次播放状态并记录恢复时长;重复测试10次并统计成功次数", "expected": "头盔重启或蓝牙短时断开后，恢复连接时可回到上次播放状态；10次测试中成功率90%以上，即成功次数不少于9次；恢复时长应被记录用于验收待验证项。", "priority": "P1"}, {"case_id": "TC-0180", "feature": "断点续播", "title": "异常流程-恢复不到上次播放状态或10次成功率不足", "precondition": "头盔已连接手机并正在播放音乐；日志记录工具已开启。", "steps": "执行头盔重启或蓝牙短时断开并恢复连接共10次;每次检查是否恢复到上次播放状态并统计成功次数;记录恢复时长", "expected": "若10次测试中恢复成功次数少于9次即成功率<90%则判定失败；若恢复后未回到上次播放状态则判定失败；恢复时长为待验证指标需完整记录。", "priority": "P2"}, {"case_id": "TC-0181", "feature": "HUD播放状态展示", "title": "正常流程-播放状态切换后HUD同步更新且长稳错误率低于5%", "precondition": "头盔已连接手机；音乐App已打开；HUD正常显示播放状态。", "steps": "执行播放到暂停状态切换并记录HUD更新时间;执行暂停到播放状态切换并记录HUD更新时间;进行连续骑行长稳测试并统计HUD状态显示错误次数与总观察次数", "expected": "播放状态切换后HUD状态应同步更新；更新时延应被记录用于验收待验证项；连续骑行长稳测试中状态显示错误率低于5%，例如观察100次时错误次数少于5次。", "priority": "P1"}, {"case_id": "TC-0182", "feature": "HUD播放状态展示", "title": "异常流程-长稳测试状态显示错误率达到或超过5%", "precondition": "头盔已连接手机；音乐App已打开；日志记录工具已开启。", "steps": "多次切换播放状态并记录HUD是否同步更新;在连续骑行长稳测试中统计总观察次数和错误次数", "expected": "若HUD未随播放状态切换同步更新则判定失败；若长稳测试中状态显示错误率≥5%，例如观察100次时错误次数达到5次或以上，则判定失败；更新时延需完整记录。", "priority": "P2"}, {"case_id": "TC-0183", "feature": "曲目信息展示", "title": "正常流程-至少展示歌曲名称且超长名称显示规则一致", "precondition": "头盔已连接手机；音乐App可播放包含普 机；音乐正在播放；日志记录工具已开启。", "steps": "连续模拟来电20次;每次记录音乐是否停止或静音以及来电提示是否优先呈现;统计切换成功次数", "expected": "若20次来电测试中成功次数少于19次即成功率<95%则判定失败；若任一来电场景中来电提示未优先于音乐信息呈现则判定失败。", "priority": "P1"}, {"case_id": "TC-0191", "feature": "语音助手抢占音频焦点", "title": "正常流程-语音助手唤醒后音乐压低或暂停且10次流程完成率达标", "precondition": "头盔已连接手机；音乐正在播放；语音助手可正常唤醒。", "steps": "唤醒语音助手1次并记录音乐进入压低或暂停状态的时间;连续唤醒语音助手10次并统计识别流程完成次数", "expected": "语音助手唤醒后音乐应在[待验证]秒内压低或暂停；连续10次语音唤醒测试中识别流程可完成率90%以上，即完成次数不少于9次。", "priority": "P1"}, {"case_id": "TC-0192", "feature": "语音助手抢占音频焦点", "title": "异常流程-10次语音唤醒流程完成率不足", "precondition": "头盔已连接手机；音乐正在播放；日志记录工具已开启。", "steps": "连续唤醒语音助手10次;每次记录音乐是否在规定时间内压低或暂停并统计流程完成次数", "expected": "若10次语音唤醒测试中流程完成次数少于9次即完成率<90%则判定失败；音乐压低或暂停时延需记录用于[待验证]秒指标核验。", "priority": "P2"}, {"case_id": "TC-0193", "feature": "蓝牙音乐连接", "title": "正常流程-满足Bluetooth 5.0基线并支持8小时以上连续播放", "precondition": "头盔、手机、蓝牙协议分析工具可用；音乐App可连续播放；电量充足。", "steps": "使用协议分析工具检查蓝牙连接能力与版本基线;完成手机与头盔配对并开始播放音乐;持续播放并覆盖真实骑行场景累计8小时以上;观察音频流是否稳定接收", "expected": "蓝牙连接能力应满足Bluetooth 5.0基线；完成配对后可稳定接收手机音乐音频流；连续播放时长应覆盖8小时以上真实骑行场景。", "priority": "P0"}, {"case_id": "TC-0194", "feature": "蓝牙音乐连接", "title": "异常流程-蓝牙基线不满足或8小时连续播放不稳定", "precondition": "头盔、手机、协议分析工具可用；日志记录工具已开启。", "steps": "检查蓝牙版本与能力基线;完成配对后进行连续播放测试至8小时;记录播放过程中断流、断连或异常次数", "expected": "若蓝牙连接能力不满足Bluetooth 5.0基线则判定失败；若连续播放未覆盖8小时以上真实骑行场景或期间无法稳定接收音乐音频流则判定失败。", "priority": "P1"}, {"case_id": "TC-0195", "feature": "主流音乐App兼容", "title": "正常流程-验证播放暂停、切歌、曲名读取3项兼容能力", "precondition": "已安装主流音乐App清单中的多个App；头盔与手机已连接；HUD可显示曲名。", "steps": "针对每个目标音乐App分别执行播放/暂停操作并记录结果;针对每个目标音乐App分别执行切歌操作并记录结果;针对每个目标音乐App播放歌曲并检查曲名读取显示结果", "expected": "应至少验证播放/暂停、切歌、曲名读取3项兼容能力；每个纳入兼容清单的App均应完成上述3项验证；兼容App清单与覆盖数量需输出记录用于验收。", "priority": "P1"}, {"case_id": "TC-0196", "feature": "主流音乐App兼容", "title": "异常流程-3项兼容能力验证不完整", "precondition": "已安装目标音乐App；日志记录工具已开启。", "steps": "逐个App检查是否完成播放/暂停验证;逐个App检查是否完成切歌验证;逐个App检查是否完成曲名读取验证", "expected": "若任一目标App未完成播放/暂停、切歌、曲名读取3项中的任一项验证，则判定不满足验收；兼容App清单与覆盖数量缺失也判定不满足验收。", "priority": "P2"}, {"case_id": "TC-0197 d": "系统支持倒计时取消误报；在倒计时结束前取消后不向队内发送正式告警；事件日志中应记录为已取消或误报事件", "priority": "P1"}, {"case_id": "TC-0285", "feature": "一键集合与返航提示", "title": "一键集合广播与HUD提示正常", "precondition": "队伍已建立，至少3名成员在线，HUD可正常显示", "steps": "队长点击“一键集合”;观察全队成员端提示;查看成员HUD显示;等待未响应成员超时后观察二次提醒", "expected": "集合指令可广播至全队；成员HUD显示集合点方向或文字提示；未响应成员会被二次提醒", "priority": "P0"}, {"case_id": "TC-0286", "feature": "一键集合与返航提示", "title": "取消集合指令生效", "precondition": "队长已发起集合，成员端仍处于集合提示状态", "steps": "队长点击“取消集合”;观察成员端提示变化;查看HUD是否清除集合信息", "expected": "支持取消集合；取消后全队成员端停止集合提示；HUD中的集合点方向或文字提示被清除", "priority": "P1"}, {"case_id": "TC-0287", "feature": "组队省电模式", "title": "低电量自动建议开启省电模式", "precondition": "设备电量可调至低电量状态，队伍已建立", "steps": "将设备电量降至低电量阈值;观察是否自动弹出省电建议;点击开启省电模式;检查组队核心功能;查看预计续航提升信息", "expected": "低电量时自动触发建议；开启后核心组队功能保持可用；用户可查看预计续航提升；关键安全提醒不受影响", "priority": "P0"}, {"case_id": "TC-0288", "feature": "组队省电模式", "title": "省电模式下关键安全提醒不受影响", "precondition": "设备已开启组队省电模式，队伍已建立", "steps": "在省电模式下触发1次关键安全提醒场景;观察提醒是否正常到达;同时检查成员列表、语音、位置同步是否仍可用", "expected": "开启省电模式后核心组队功能保持可用；关键安全提醒正常触发且不受影响；用户仍可查看省电相关信息", "priority": "P1"}, {"case_id": "TC-0289", "feature": "断连自动恢复", "title": "短时断连后自动重连成功", "precondition": "用户已在队伍中，语音功能开启，网络可模拟短时断连", "steps": "在队伍中进行语音通话;断开网络短时间后恢复;观察是否自动重连;检查成员状态与语音权限;确认队伍人数是否重复", "expected": "短时断连可自动重连；恢复后成员状态与语音权限同步正确；不造成重复入队", "priority": "P0"}, {"case_id": "TC-0290", "feature": "断连自动恢复", "title": "多次重连失败给出明确处理建议", "precondition": "用户已在队伍中，可模拟持续网络异常", "steps": "持续断开网络并触发多次自动重连失败;观察系统提示内容;恢复网络后检查是否出现重复入队", "expected": "多次失败时给出明确处理建议；失败期间不造成重复入队；恢复后可继续正常加入或重连", "priority": "P1"}, {"case_id": "TC-0291", "feature": "灯光总开关", "title": "短按或App点击1秒内完成开关切换", "precondition": "设备已开机，灯光功能正常，支持实体短按和App控制", "steps": "在开灯状态下短按灯光按键并计时;观察灯光关闭结果;在关灯状态下通过App点击开灯并计时;重复确认外部LED状态", "expected": "短按或App点击后1秒内完成开/关切换；关灯状态下外部LED可见亮点数量为0", "priority": "P0"}, {"case_id": "TC-0292", "feature": "灯光总开关", "title": "连续100次开关成功率验证", "precondition": "设备已开机，灯光功能正常，具备自动化或人工重复操作条件", "steps": "连续执行100次开灯和关灯操作;记录每次是否在1秒内成功切换;统计成功次数与成功率", "expected": "连续执行 const TAB_CONFIG = [
    {id: "hud", label: "HUD及头盔端", type: "tree"},
    {id: "app", label: "App端", type: "tree"},
    {id: "state", label: "状态场景对策", type: "table"},
    {id: "voice", label: "语音指令表", type: "table"},
    {id: "button", label: "按键映射表", type: "table"},
    {id: "light", label: "灯效定义表", type: "table"},
    {id: "voice_nav", label: "AI语音导航", type: "table"},
    {id: "user_stories", label: "用户故事", type: "table"},
    {id: "test_cases", label: "测试用例", type: "table"},
    {id: "page_mapping", label: "页面映射", type: "table"},
    {id: "dev_tasks", label: "开发任务", type: "table"},
];

// 分组功能清单
const HUD_MODULES = new Set(["导航","来电","音乐","消息","AI语音助手","Ai语音助手",
    "简易","简易路线","路线","主动安全预警提示","组队","摄像状态","胎温胎压",
    "开机动画","速度","设备状态","显示队友位置","头盔HUD",
    "实体按键交互","氛围灯交互","AI功能","语音交互","视觉交互","多模态交互"]);

const hudFeatures = DATA.features.filter(f => HUD_MODULES.has(f.module));
const appFeatures = DATA.features.filter(f => !HUD_MODULES.has(f.module));

function buildTabs() {
    const bar = document.getElementById('tabBar');
    const content = document.getElementById('contentArea');

    TAB_CONFIG.forEach((tab, idx) => {
        const el = document.createElement('div');
        el.className = 'tab' + (idx === 0 ? ' active' : '');
        el.dataset.target = tab.id;

        let count = 0;
        if (tab.id === 'hud') count = hudFeatures.length;
        else if (tab.id === 'app') count = appFeatures.length;
        else if (tab.id === 'state') count = DATA.state_scenarios.length;
        else if (tab.id === 'voice') count = DATA.voice_commands.length;
        else if (tab.id === 'button') count = DATA.button_mapping.length;
        else if (tab.id === 'light') count = DATA.light_effects.length;
        else if (tab.id === 'voice_nav') count = DATA.voice_nav.length;
        else if (tab.id === 'user_stories') count = (DATA.user_stories || []).length;
        else if (tab.id === 'test_cases') count = (DATA.test_cases || []).length;
        else if (tab.id === 'page_mapping') count = (DATA.page_mapping || []).length;
        else if (tab.id === 'dev_tasks') count = (DATA.dev_tasks || []).length;

        el.innerHTML = `${tab.label}<span class="badge">${count}</span>`;
        el.onclick = () => switchTab(tab.id);
        bar.appendChild(el);

        const section = document.createElement('div');
        section.id = 'section-' + tab.id;
        section.className = 'section' + (idx === 0 ? ' active' : '');

        if (tab.type === 'tree') {
            section.innerHTML = buildTreeView(tab.id === 'hud' ? hudFeatures : appFeatures);
        } else {
            section.innerHTML = buildTableView(tab.id);
        }
        content.appendChild(section);
    });
}

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.target === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + id));
    window.scrollTo(0, 0);
}

function buildTreeView(features) {
    let html = '<div class="stats">';
    const counts = {};
    features.forEach(f => { counts[f.priority] = (counts[f.priority]||0) + 1; });
    Object.entries(counts).sort().forEach(([p,c]) => {
        html += `<div class="stat"><div class="num">${c}</div><div class="label">${p}</div></div>`;
    });
    html += `<div class="stat"><div class="num">${features.length}</div><div class="label">总计</div></div></div>`;

    let currentL1 = null, currentL2 = null;
    let l1Html = '';

    features.forEach(f => {
        const tag = `<span class="tag tag-${f.priority}">${f.priority}</span>`;
        if (f.level === 'L1') {
            if (currentL2) { l1Html += '</div>'; currentL2 = null; }
            if (currentL1) l1Html += '</div></div>';
            l1Html += `<div class="l1" data-name="${f.name}" data-priority="${f.priority}">
                <div class="l1-header" onclick="this.nextElementSibling.classList.toggle('open')">
                    ${tag} ${f.name} <span style="color:#999;font-size:12px;margin-left:auto">${f.interaction||''}</span>
                </div><div class="l1-body">`;
            currentL1 = f; currentL2 = null;
        } else if (f.level === 'L2') {
            if (currentL2) l1Html += '</div>';
            l1Html += `<div class="l2"><div class="l2-title" data-name="${f.name}" data-priority="${f.priority}">${tag} ${f.name}</div>`;
            currentL2 = f;
        } else if (f.level === 'L3') {
            l1Html += `<div class="l3" data-name="${f.name}" data-priority="${f.priority}">
                <span class="name">${tag} ${f.name}</span>
                <span class="desc">${f.description||''}</span>
                <span class="acc">${f.acceptance||''}</span></div>`;
        }
    });
    if (currentL2) l1Html += '</div>';
    if (currentL1) l1Html += '</div></div>';

    return html + l1Html;
}

function buildTableView(id) {
    let data, headers, keys;
    if (id === 'state') {
        data = DATA.state_scenarios;
        headers = ['前置状态','场景/操作','执行状态','HUD提示','灯光','语音','App提示','周期'];
        keys = ['pre_state','current','exec_state','hud','light','voice','app','cycle'];
    } else if (id === 'voice') {
        data = DATA.voice_commands;
        headers = ['分类','唤醒','用户说法','变体','系统动作','成功反馈','HUD反馈','失败反馈','优先级'];
        keys = ['category','wake','user_says','variants','action','success_voice','success_hud','fail_feedback','priority'];
    } else if (id === 'button') {
        data = DATA.button_mapping;
        headers = ['按键','场景','单击','双击','长按','组合键','反馈','备注'];
        keys = ['button','scene','single_click','double_click','long_press','combo','feedback','note'];
    } else if (id === 'light') {
        data = DATA.light_effects;
        headers = ['场景','颜色','模式','频率','时长','优先级','备注'];
        keys = ['trigger','color','mode','frequency','duration','priority','note'];
    } else if (id === 'voice_nav') {
        data = DATA.voice_nav;
        headers = ['场景','触发','用户输入','AI动作','HUD显示','语音播报','灯光反馈','异常兜底','优先级','备注'];
        keys = ['scene','trigger','user_input','ai_action','hud_display','voice_output','light_effect','fallback','priority','note'];
    } else if (id === 'user_stories') {
        data = DATA.user_stories || [];
        headers = ['功能名','角色','用户故事','验收条件','优先级'];
        keys = ['feature','role','story','acceptance','priority'];
    } else if (id === 'test_cases') {
        data = DATA.test_cases || [];
        headers = ['用例ID','功能名','标题','前置条件','步骤','预期结果','优先级'];
        keys = ['case_id','feature','title','precondition','steps','expected','priority'];
    } else if (id === 'page_mapping') {
        data = DATA.page_mapping || [];
        headers = ['页面','父页面','平台','功能','入口','优先级','备注'];
        keys = ['page','parent','platform','features','entry','priority','note'];
    } else if (id === 'dev_tasks') {
        data = DATA.dev_tasks || [];
        headers = ['任务ID','功能','描述','角色','工时','依赖','迭代','优先级','备注'];
        keys = ['task_id','feature','task','assignee','effort_days','dependency','sprint','priority','note'];
    }

    if (!data || data.length === 0) return '<p style="padding:20px;color:#999;">暂无数据</p>';

    let html = '<table><thead><tr>';
    headers.forEach(h => { html += `<th>${h}</th>`; });
    html += '</tr></thead><tbody>';
    data.forEach(row => {
        html += '<tr>';
        keys.forEach(k => {
            let val = row[k] || '';
            if (k === 'priority' && val) val = `<span class="tag tag-${val}">${val}</span>`;
            html += `<td>${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

function filterAll() {
    const q = document.getElementById('search').value.toLowerCase();
    const p = document.getElementById('priorityFilter').value;

    document.querySelectorAll('.l1').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q) || el.textContent.toLowerCase().includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('.l2, .l3').forEach(el => {
        const name = (el.dataset.name || '').toLowerCase();
        const priority = el.dataset.priority || '';
        const matchQ = !q || name.includes(q);
        const matchP = !p || priority === p;
        el.classList.toggle('hidden', !(matchQ && matchP));
    });

    document.querySelectorAll('tbody tr').forEach(tr => {
        const text = tr.textContent.toLowerCase();
        const matchQ = !q || text.includes(q);
        const tagEl = tr.querySelector('.tag');
        const rowP = tagEl ? tagEl.textContent.trim() : '';
        const matchP = !p || rowP === p;
        tr.classList.toggle('hidden', !(matchQ && matchP));
    });
}

function expandAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.add('open'));
}
function collapseAllTrees() {
    document.querySelectorAll('.l1-body').forEach(b => b.classList.remove('open'));
}

function updateStickyPositions() {
    const headerH = document.querySelector('.header')?.offsetHeight || 0;
    const tabsH = document.querySelector('.tabs')?.offsetHeight || 0;
    const totalH = headerH + tabsH;

    const tabsEl = document.querySelector('.tabs');
    if (tabsEl) tabsEl.style.top = headerH + 'px';

    document.querySelectorAll('th').forEach(th => {
        th.style.top = totalH + 'px';
    });
}

buildTabs();
updateStickyPositions();
window.addEventListener('resize', updateStickyPositions);

const firstBody = document.querySelector('.l1-body');
if (firstBody) firstBody.classList.add('open');
