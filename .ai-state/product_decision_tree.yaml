      - "骑行场景录像的用户需求优先级"

  - id: "v1_jdm_partner"
    question: "JDM 合作伙伴选歌尔、立讯还是其他？"
    status: "open"
    priority: 1
    blocking_knowledge:
      - "歌尔头盔/AR 产品线的实际产能和报价"
      - "立讯精密的 AR/XR 代工经验和报价"
      - "其他潜在 JDM 供应商评估"